<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון: Wh- Questions – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F4F8;--card:#fff;--primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;--secondary:#E76F7A;--sec-l:#FDE8EA;--green:#52B788;--green-l:#D8F3DC;--dark:#1E293B;--gray:#64748B;--shadow:0 2px 20px -4px rgba(0,0,0,.06);--r:20px;--blue:#4A90D9;--blue-l:#DBEAFE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;width:100%;max-width:640px;padding:20px}
.screen.active{display:block}
.card{background:var(--card);border-radius:var(--r);padding:32px;box-shadow:var(--shadow);animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'Rubik',sans-serif;font-size:1.8rem;font-weight:700;color:var(--primary-d);margin-bottom:8px;text-align:center}
h2{font-size:1.2rem;font-weight:600;color:var(--dark);margin-bottom:20px;line-height:1.6;direction:ltr;text-align:left}
h2 .blank{color:var(--primary);font-weight:700;border-bottom:2px dashed var(--primary)}
.subtitle{text-align:center;color:var(--gray);font-size:1rem;margin-bottom:24px}
.icon{text-align:center;font-size:3rem;margin-bottom:16px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-weight:500;margin-bottom:6px;color:var(--gray);font-size:.9rem}
.input-group input,.input-group select{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;transition:border .2s}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--primary)}
.btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--primary-d)}
.btn:disabled{background:var(--gray);cursor:not-allowed}
.progress{position:fixed;top:0;left:0;height:4px;background:var(--primary);transition:width .3s;z-index:100}
.q-counter{text-align:center;color:var(--gray);font-size:.85rem;margin-bottom:8px}
.part-label{text-align:center;font-size:.8rem;font-weight:700;color:var(--primary);background:var(--primary-l);padding:6px 14px;border-radius:50px;display:inline-block;margin-bottom:16px}
.part-wrap{text-align:center;margin-bottom:16px}
.points-label{text-align:center;font-size:.78rem;color:var(--gray);margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt-btn{padding:14px 18px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;font-family:'Rubik',sans-serif;font-size:1.1rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;direction:ltr;letter-spacing:0.5px}
.opt-btn:hover{border-color:var(--primary);background:var(--primary-l)}
.opt-btn.correct{background:var(--green-l);border-color:var(--green);color:#2d6a4f}
.opt-btn.wrong{background:var(--sec-l);border-color:var(--secondary);color:#9b1c31}
.opt-btn.disabled{pointer-events:none;opacity:.7}
.opt-btn.correct-answer{border-color:var(--green);background:var(--green-l)}
.open-input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:14px;font-family:'Rubik',sans-serif;font-size:1.2rem;font-weight:600;text-align:center;direction:ltr;transition:border .2s;letter-spacing:1px}
.open-input:focus{outline:none;border-color:var(--primary)}
.open-input.correct{border-color:var(--green);background:var(--green-l);color:#2d6a4f}
.open-input.wrong{border-color:var(--secondary);background:var(--sec-l);color:#9b1c31}
.check-btn{display:block;width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;margin-top:12px;transition:background .2s}
.check-btn:hover{background:#3a7bc8}
.check-btn:disabled{background:var(--gray);cursor:not-allowed}
.feedback{padding:14px 18px;border-radius:12px;margin-bottom:16px;font-size:.95rem;line-height:1.6;display:none}
.feedback.show{display:block;animation:fadeUp .3s ease}
.feedback.correct-fb{background:var(--green-l);color:#2d6a4f}
.feedback.wrong-fb{background:var(--sec-l);color:#9b1c31}
.next-btn{display:none;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;width:100%}
.next-btn.show{display:block;animation:fadeUp .3s ease}
.score-num{font-size:4rem;font-weight:800;color:var(--primary);text-align:center;font-family:'Rubik',sans-serif}
.score-label{text-align:center;font-size:1.2rem;color:var(--gray);margin-bottom:20px}
.score-msg{text-align:center;font-size:1.3rem;font-weight:600;margin-bottom:24px;padding:16px;border-radius:14px}
.send-status{text-align:center;margin-top:12px;padding:10px;border-radius:10px;font-size:.9rem}
.send-status.success{background:var(--green-l);color:#2d6a4f}
.send-status.error{background:var(--sec-l);color:#9b1c31}
.score-breakdown{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.score-part{background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:14px 20px;text-align:center;min-width:130px}
.score-part .part-name{font-size:.8rem;color:var(--gray);margin-bottom:4px}
.score-part .part-score{font-size:1.4rem;font-weight:700;color:var(--dark);font-family:'Rubik',sans-serif}
</style>
</head>
<body>

<div class="progress" id="progressBar"></div>

<!-- מסך פתיחה -->
<div class="screen active" id="startScreen">
<div class="card">
  <div class="icon">❓</div>
  <h1>Wh- Questions</h1>
  <p class="subtitle">שאלון אנגלית – כיתה י</p>
  <p style="text-align:center;color:var(--gray);font-size:.88rem;margin-bottom:20px;line-height:1.7">
    חלק א׳ – בחרו את מילת השאלה הנכונה (20 שאלות)<br>
    חלק ב׳ – כתבו את מילת השאלה המתאימה (10 שאלות)
  </p>
  <div class="input-group">
    <label>שם מלא</label>
    <input type="text" id="nameInput" placeholder="הכניסו את שמכם">
  </div>
  <div class="input-group">
    <label>כיתה</label>
    <input type="text" id="classInput" placeholder="למשל: י1">
  </div>
  <button class="btn" onclick="startQuiz()">!Let's Go</button>
</div>
</div>

<!-- מסך שאלה -->
<div class="screen" id="questionScreen">
<div class="card">
  <div class="part-wrap"><span class="part-label" id="partLabel"></span></div>
  <div class="q-counter" id="qCounter"></div>
  <div class="points-label" id="pointsLabel"></div>
  <h2 id="qText"></h2>
  <div class="options" id="optionsContainer"></div>
  <div id="openInputWrap" style="display:none;margin-bottom:20px">
    <input type="text" class="open-input" id="openInput" placeholder="Type the Wh- word..." autocomplete="off" autocapitalize="off" spellcheck="false">
    <button class="check-btn" id="checkBtn" onclick="checkOpenAnswer()">בדוק</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">שאלה הבאה</button>
</div>
</div>

<!-- מסך ציון -->
<div class="screen" id="scoreScreen">
<div class="card">
  <div class="icon" id="scoreIcon"></div>
  <div class="score-num" id="scoreNum"></div>
  <div class="score-label">מתוך 100</div>
  <div class="score-breakdown">
    <div class="score-part">
      <div class="part-name">חלק א׳ – רב-ברירה</div>
      <div class="part-score" id="partAScore"></div>
    </div>
    <div class="score-part">
      <div class="part-name">חלק ב׳ – שאלות פתוחות</div>
      <div class="part-score" id="partBScore"></div>
    </div>
  </div>
  <div class="score-msg" id="scoreMsg"></div>
  <button class="btn" onclick="sendResults()">שלחו תוצאות למורה</button>
  <div class="send-status" id="sendStatus"></div>
</div>
</div>

<!-- לוגו -->
<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
var studentName='',studentClass='';
var currentQ=0,partAScore=0,partBScore=0;
var totalQuestions=30;

// חלק א' – רב-ברירה (20 שאלות × 5 נקודות = 100)
var partA=[
  {q:'___ is your best friend?',opts:['Who','Where'],correct:0},
  {q:'___ do you live?',opts:['Where','Why'],correct:0},
  {q:'___ is your teacher\'s name?',opts:['What','When'],correct:0},
  {q:'___ do you study English?',opts:['Why','Whose'],correct:0},
  {q:'___ do you go to school?',opts:['How','Who'],correct:0},
  {q:'___ is your classroom?',opts:['Where','When'],correct:0},
  {q:'___ is your birthday?',opts:['When','Why'],correct:0},
  {q:'___ is that boy?',opts:['Who','Which'],correct:0},
  {q:'___ bag is this?',opts:['Whose','What'],correct:0},
  {q:'___ do you like English?',opts:['Why','Where'],correct:0},
  {q:'___ book do you want?',opts:['Which','Who'],correct:0},
  {q:'___ is your favorite food?',opts:['What','Whose'],correct:0},
  {q:'___ do you go on vacation?',opts:['Where','How'],correct:0},
  {q:'___ goes with you?',opts:['Who','Which'],correct:0},
  {q:'___ are you today?',opts:['How','When'],correct:0},
  {q:'___ is the test?',opts:['When','Who'],correct:0},
  {q:'___ do you sit in class?',opts:['Where','What'],correct:0},
  {q:'___ do you open the door?',opts:['How','Why'],correct:0},
  {q:'___ teacher do you like?',opts:['Which','Whose'],correct:0},
  {q:'___ is your favorite sport?',opts:['What','Who'],correct:0}
];

// חלק ב' – שאלות פתוחות (10 שאלות × 10 נקודות = 100)
var partB=[
  {q:'___ is your English teacher?',answer:['who']},
  {q:'___ do you live?',answer:['where']},
  {q:'___ is your favorite subject?',answer:['what']},
  {q:'___ do you go to school?',answer:['how']},
  {q:'___ is your birthday?',answer:['when']},
  {q:'___ are you happy today?',answer:['why']},
  {q:'___ bag is on the chair?',answer:['whose']},
  {q:'___ book do you want to read?',answer:['which']},
  {q:'___ do you do your homework?',answer:['when','where','how']},
  {q:'___ sits next to you in class?',answer:['who']}
];

var allQuestions=[];
var isPartB=false;

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active')}
function updateProgress(){document.getElementById('progressBar').style.width=((currentQ+1)/totalQuestions*100)+'%'}

function startQuiz(){
  studentName=document.getElementById('nameInput').value.trim();
  studentClass=document.getElementById('classInput').value.trim();
  if(!studentName||!studentClass){alert('נא למלא שם וכיתה');return}
  currentQ=0;partAScore=0;partBScore=0;isPartB=false;
  showScreen('questionScreen');
  showCurrentQuestion();
}

function showCurrentQuestion(){
  updateProgress();
  var fb=document.getElementById('feedback');fb.className='feedback';fb.style.display='none';
  document.getElementById('nextBtn').className='next-btn';
  document.getElementById('optionsContainer').innerHTML='';
  document.getElementById('openInputWrap').style.display='none';

  if(currentQ<20){
    // חלק א'
    isPartB=false;
    var q=partA[currentQ];
    document.getElementById('partLabel').textContent='Part A – Choose the correct word';
    document.getElementById('qCounter').textContent='שאלה '+(currentQ+1)+' מתוך 30';
    document.getElementById('pointsLabel').textContent='5 נקודות';
    document.getElementById('qText').innerHTML=q.q.replace('___','<span class="blank">______</span>');
    var c=document.getElementById('optionsContainer');
    c.style.display='flex';
    q.opts.forEach(function(opt,i){
      var b=document.createElement('button');b.className='opt-btn';b.textContent=opt;
      b.onclick=function(){checkMultiChoice(i,q)};c.appendChild(b);
    });
  } else {
    // חלק ב'
    isPartB=true;
    var idx=currentQ-20;
    var q=partB[idx];
    document.getElementById('partLabel').textContent='Part B – Write the correct Wh- word';
    document.getElementById('qCounter').textContent='שאלה '+(currentQ+1)+' מתוך 30';
    document.getElementById('pointsLabel').textContent='10 נקודות';
    document.getElementById('qText').innerHTML=q.q.replace('___','<span class="blank">______</span>');
    document.getElementById('optionsContainer').style.display='none';
    document.getElementById('openInputWrap').style.display='block';
    var inp=document.getElementById('openInput');
    inp.value='';inp.className='open-input';inp.disabled=false;inp.focus();
    document.getElementById('checkBtn').disabled=false;
    // Allow Enter key
    inp.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();checkOpenAnswer()}};
  }
}

function checkMultiChoice(sel,q){
  var btns=document.querySelectorAll('.opt-btn');
  btns.forEach(function(b,i){
    b.classList.add('disabled');
    if(i===q.correct)b.classList.add('correct');
    if(i===sel&&i!==q.correct)b.classList.add('wrong');
  });
  var ok=sel===q.correct;
  if(ok)partAScore+=5;
  var fb=document.getElementById('feedback');
  var correctWord=q.opts[q.correct];
  fb.textContent=ok?'!Correct ✓':'The correct answer is: '+correctWord;
  fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  document.getElementById('nextBtn').className='next-btn show';
}

function checkOpenAnswer(){
  var inp=document.getElementById('openInput');
  var val=inp.value.trim().toLowerCase();
  if(!val){inp.style.border='2px solid var(--secondary)';return}
  var idx=currentQ-20;
  var q=partB[idx];
  var ok=q.answer.indexOf(val)!==-1;
  inp.disabled=true;
  document.getElementById('checkBtn').disabled=true;
  if(ok){
    partBScore+=10;
    inp.className='open-input correct';
  } else {
    inp.className='open-input wrong';
  }
  var fb=document.getElementById('feedback');
  var correctStr=q.answer.length>1?q.answer.map(function(a){return a.charAt(0).toUpperCase()+a.slice(1)}).join(' / '):q.answer[0].charAt(0).toUpperCase()+q.answer[0].slice(1);
  fb.textContent=ok?'!Correct ✓':'The correct answer is: '+correctStr;
  fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQuestion(){
  currentQ++;
  if(currentQ<totalQuestions){showCurrentQuestion()}
  else{showScore()}
}

function showScore(){
  // נרמול ל-100: חלק א' שווה 50%, חלק ב' שווה 50%
  var partAPct=Math.round((partAScore/100)*100);
  var partBPct=Math.round((partBScore/100)*100);
  var totalPct=Math.round((partAScore+partBScore)/2);
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('scoreNum').textContent=totalPct;
  document.getElementById('partAScore').textContent=partAScore+'/100';
  document.getElementById('partBScore').textContent=partBScore+'/100';
  var icon,msg,bg;
  if(totalPct>=90){icon='&#127942;';msg='!Excellent! You really know your Wh- Questions';bg='background:var(--green-l);color:#2d6a4f'}
  else if(totalPct>=70){icon='&#128170;';msg='!Good job! Keep practicing';bg='background:var(--primary-l);color:var(--primary-d)'}
  else if(totalPct>=50){icon='&#128161;';msg='Not bad – review the Wh- words again';bg='background:#FEF3C7;color:#92400e'}
  else{icon='&#128214;';msg='Let\'s go over Wh- Questions again together';bg='background:var(--sec-l);color:#9b1c31'}
  document.getElementById('scoreIcon').innerHTML=icon;
  document.getElementById('scoreMsg').textContent=msg;
  document.getElementById('scoreMsg').style.cssText=bg+';border-radius:14px;padding:16px';
  showScreen('scoreScreen');
}

var SHEETS_URL='https://script.google.com/macros/s/AKfycbyLwo3jrseEDJ4GLnVNCzoJTRJBK_IAkJE0IiGGcx18buwJQ0XSRgOcJ2FmbMtA5ojU/exec';
function sendResults(){
  var btn=event.target;btn.disabled=true;btn.textContent='...שולח';
  var totalPct=Math.round((partAScore+partBScore)/2);
  var totalCorrect=Math.round(partAScore/5)+Math.round(partBScore/10);
  var params=new URLSearchParams({
    action:'submit',
    quizName:'Wh- Questions',
    studentName:studentName,
    classroom:studentClass,
    score:totalPct,
    totalQuestions:30,
    correctAnswers:totalCorrect,
    level:'אנגלית כיתה י',
    teacherEmail:'marian@bh.ort.org.il'
  });
  var s=document.createElement('script');s.src=SHEETS_URL+'?'+params.toString();
  s.onload=s.onerror=function(){
    var st=document.getElementById('sendStatus');
    st.className='send-status success';
    st.textContent='התוצאות נשלחו בהצלחה למורה! ✓';
    btn.textContent='!נשלח';s.remove();
  };
  document.body.appendChild(s);
}
</script>
</body>
</html>
