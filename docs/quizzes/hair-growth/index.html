<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון: מחזוריות צמיחת השיער – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F4F8;--card:#fff;--primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;--secondary:#E76F7A;--sec-l:#FDE8EA;--green:#52B788;--green-l:#D8F3DC;--dark:#1E293B;--gray:#64748B;--shadow:0 2px 20px -4px rgba(0,0,0,.06);--r:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;width:100%;max-width:600px;padding:20px}
.screen.active{display:block}
.card{background:var(--card);border-radius:var(--r);padding:32px;box-shadow:var(--shadow);animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'Rubik',sans-serif;font-size:1.8rem;font-weight:700;color:var(--primary-d);margin-bottom:8px;text-align:center}
h2{font-size:1.3rem;font-weight:600;color:var(--dark);margin-bottom:20px;line-height:1.6}
.subtitle{text-align:center;color:var(--gray);font-size:1rem;margin-bottom:24px}
.icon{text-align:center;font-size:3rem;margin-bottom:16px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-weight:500;margin-bottom:6px;color:var(--gray);font-size:.9rem}
.input-group input,.input-group select{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;transition:border .2s}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--primary)}
.btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--primary-d)}
.btn:disabled{background:var(--gray);cursor:not-allowed}
.progress{position:fixed;top:0;left:0;height:4px;background:var(--primary);transition:width .3s;z-index:100}
.q-counter{text-align:center;color:var(--gray);font-size:.85rem;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt-btn{padding:14px 18px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;font-family:'Heebo',sans-serif;font-size:1rem;cursor:pointer;text-align:right;transition:all .2s;line-height:1.5}
.opt-btn:hover{border-color:var(--primary);background:var(--primary-l)}
.opt-btn.correct{background:var(--green-l);border-color:var(--green);color:#2d6a4f}
.opt-btn.wrong{background:var(--sec-l);border-color:var(--secondary);color:#9b1c31}
.opt-btn.disabled{pointer-events:none;opacity:.7}
.opt-btn.correct-answer{border-color:var(--green);background:var(--green-l)}
.feedback{padding:14px 18px;border-radius:12px;margin-bottom:16px;font-size:.95rem;line-height:1.6;display:none}
.feedback.show{display:block;animation:fadeUp .3s ease}
.feedback.correct-fb{background:var(--green-l);color:#2d6a4f}
.feedback.wrong-fb{background:var(--sec-l);color:#9b1c31}
.next-btn{display:none;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;width:100%}
.next-btn.show{display:block;animation:fadeUp .3s ease}
.score-num{font-size:4rem;font-weight:800;color:var(--primary);text-align:center;font-family:'Rubik',sans-serif}
.score-label{text-align:center;font-size:1.2rem;color:var(--gray);margin-bottom:20px}
.score-msg{text-align:center;font-size:1.3rem;font-weight:600;margin-bottom:24px;padding:16px;border-radius:14px}
.send-status{text-align:center;margin-top:12px;padding:10px;border-radius:10px;font-size:.9rem}
.send-status.success{background:var(--green-l);color:#2d6a4f}
.send-status.error{background:var(--sec-l);color:#9b1c31}
</style>
</head>
<body>
<a href="../../lessons/hair-growth/index.html" class="back-btn" style="position:fixed;top:16px;left:16px;z-index:9999;background:rgba(30,41,59,.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:#F8FAFC;padding:8px 16px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .2s" onmouseover="this.style.background='rgba(30,41,59,.95)'" onmouseout="this.style.background='rgba(30,41,59,.85)'">

  חזרה
</a>
<button onclick="navigator.clipboard.writeText(window.location.href).then(function(){var t=document.getElementById('share-toast');if(!t){t=document.createElement('div');t.id='share-toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1E293B;color:#fff;padding:14px 28px;border-radius:14px;font-weight:600;z-index:9999;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.2);font-family:Heebo,sans-serif';document.body.appendChild(t)}t.textContent='הקישור הועתק!';t.style.transform='translateX(-50%) translateY(0)';setTimeout(function(){t.style.transform='translateX(-50%) translateY(100px)'},2500)})" style="position:fixed;top:16px;right:16px;z-index:9999;background:rgba(30,41,59,.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:#F8FAFC;padding:8px 16px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s" onmouseover="this.style.background='rgba(30,41,59,.95)'" onmouseout="this.style.background='rgba(30,41,59,.85)'">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
  שתף
</button>

<div class="progress" id="progressBar"></div>

<!-- מסך פתיחה -->
<div class="screen active" id="startScreen">
<div class="card">
  <div class="icon">🔬</div>
  <h1>מחזוריות צמיחת השיער</h1>
  <p class="subtitle">שאלון מחזור חיי השיער – כיתה י–יא</p>
  <div class="input-group">
    <label>שם מלא</label>
    <input type="text" id="nameInput" placeholder="הכניסו את שמכם">
  </div>
  <div class="input-group">
    <label>כיתה</label>
    <select id="classInput">
      <option value="">בחרו כיתה</option>
      <option value="ט'1">ט'1</option>
      <option value="ט'2">ט'2</option>
      <option value="י'1">י'1</option>
      <option value="י'2">י'2</option>
      <option value="יא'1">יא'1</option>
      <option value="יא'2">יא'2</option>
      <option value="יב'1">יב'1</option>
      <option value="יב'2">יב'2</option>
    </select>
  </div>
  <button class="btn" onclick="startQuiz()">התחילו!</button>
</div>
</div>

<!-- מסך שאלה -->
<div class="screen" id="questionScreen">
<div class="card">
  <div class="q-counter" id="qCounter"></div>
  <h2 id="qText"></h2>
  <div class="options" id="optionsContainer"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">שאלה הבאה</button>
</div>
</div>

<!-- מסך ציון -->
<div class="screen" id="scoreScreen">
<div class="card">
  <div class="icon" id="scoreIcon"></div>
  <div class="score-num" id="scoreNum"></div>
  <div class="score-label">מתוך 100</div>
  <div class="score-msg" id="scoreMsg"></div>
  <button class="btn" onclick="sendResults()">שלחו תוצאות למורה</button>
  <div class="send-status" id="sendStatus"></div>
</div>
</div>

<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
var studentName='',studentClass='';
var currentQ=0,score=0,questionsPerSet=8;
var diagnosticCorrect=0,detectedLevel='';
var answers=[],activeQuestions=[];
var totalDisplayQuestions=10;
var diagnosticPhase=true,diagnosticIndex=0;

var diagnosticQuestions=[
  {q:'כמה שלבים יש במחזור חיי השיער?',opts:['2 שלבים','3 שלבים','5 שלבים','שלב אחד'],correct:1,explain:'במחזור חיי השיער יש 3 שלבים: אנאגן (צמיחה), קטאגן (מנוחה) וטלוגן (נשירה).'},
  {q:'מה הכמות הטבעית של שערות שנושרות ביום?',opts:['10-20 שערות','200-300 שערות','500+ שערות','60-100 שערות'],correct:3,explain:'באופן טבעי נושרות כ-60 עד 100 שערות ביום. זה חלק מהמחזור הרגיל של השיער.'}
];

// בסיסי – correctIndex: 1,0,1,2,2,1,1,1
var basicQuestions=[
  {q:'מה שם השלב שבו השיער צומח?',opts:['קטאגן','אנאגן','טלוגן','מלנוגן'],correct:1,explain:'שלב האנאגן הוא שלב הצמיחה הפעילה של השיער, שבו השיער גדל מהזקיק.'},
  {q:'כמה זמן נמשך שלב הצמיחה של השיער?',opts:['כ-3 שנים','כ-3 חודשים','כ-3 שבועות','כ-3 ימים'],correct:0,explain:'שלב הצמיחה (אנאגן) נמשך בממוצע כ-3 שנים, אך יכול להימשך בין 2 ל-6 שנים.'},
  {q:'מה ההבדל בין נשירת שיער לקריעת שיער?',opts:['אין הבדל','נשירה מהשורש, קריעה לא','קריעה חמורה יותר','נשירה רק אצל גברים'],correct:1,explain:'נשירת שיער מתרחשת מהשורש כחלק מהמחזור הטבעי, ואילו קריעה היא שבירה של השיער לאורכו.'},
  {q:'מה יכול לגרום לקריעת שיער?',opts:['שינה רבה','אכילת ירקות','קוקו חזק מדי','שתיית מים'],correct:2,explain:'קוקו חזק מדי, שימוש מוגזם בחום וטיפולים כימיים עלולים לגרום לקריעת שיער.'},
  {q:'מה עושה הספר/ית כשהלקוח/ה סובל/ת מנשירה חמורה?',opts:['נותן/ת תרופות','מתעלם/ת','מפנה לרופא','עושה טיפול כימי'],correct:2,explain:'ספר/ית מקצועי/ת מפנה את הלקוח/ה לרופא עור, כי נשירה חמורה עלולה להצביע על בעיה רפואית.'},
  {q:'באיזה עונות השנה יש נשירה מוגברת שנחשבת רגילה?',opts:['קיץ וחורף','סתיו ואביב','רק בחורף','אין כזה דבר'],correct:1,explain:'בסתיו ובאביב יש נשירה מוגברת שנחשבת רגילה – זה חלק מהמחזור העונתי של הגוף.'},
  {q:'מהו שלב הטלוגן?',opts:['שלב הצמיחה','שלב הנשירה','שלב ההזנה','שלב הצביעה'],correct:1,explain:'שלב הטלוגן הוא השלב האחרון במחזור – בו השיער נושר ומפנה מקום לשיער חדש.'},
  {q:'"גילוח שיער מחזק אותו" – נכון או לא?',opts:['נכון','לא נכון, זה מיתוס','נכון רק לגברים','תלוי בגיל'],correct:1,explain:'זהו מיתוס! גילוח לא משנה את עובי השיער או את קצב הצמיחה שלו. השיער רק נראה עבה יותר כי הקצה חתוך ישר.'}
];

// בינוני – correctIndex: 1,1,2,1,0,0,1,2
var mediumQuestions=[
  {q:'כמה זמן נמשך שלב המנוחה (קטאגן)?',opts:['כ-3 שנים','כ-3 שבועות','כ-3 חודשים','כ-3 ימים'],correct:1,explain:'שלב הקטאגן (מנוחה) נמשך כ-3 שבועות בלבד. זהו שלב מעבר קצר בין צמיחה לנשירה.'},
  {q:'מה קורה לשורש השיערה בשלב הקטאגן?',opts:['הוא גדל','הוא מצטמק ועולה','הוא מתחלק','שום דבר'],correct:1,explain:'בשלב הקטאגן שורש השיערה מצטמק ועולה כלפי מעלה, מתנתק מאספקת הדם.'},
  {q:'איזה גורם לא קשור לנשירת שיער?',opts:['סטרס','תזונה לקויה','צבע עיניים','שינויים הורמונליים'],correct:2,explain:'צבע עיניים לא קשור כלל לנשירת שיער. לעומת זאת, סטרס, תזונה ושינויים הורמונליים משפיעים.'},
  {q:'מהי כמות השערות הממוצעת על ראש אדם?',opts:['כ-10,000','כ-100,000','כ-1,000,000','כ-1,000'],correct:1,explain:'על ראש אדם ממוצע יש כ-100,000 שערות. המספר משתנה לפי צבע השיער ומוצא אתני.'},
  {q:'מה הקצב הממוצע של צמיחת שיער בחודש?',opts:['1-2 ס"מ','5-10 ס"מ','0.1 ס"מ','20 ס"מ'],correct:0,explain:'שיער צומח בקצב ממוצע של 1-2 ס"מ בחודש, כלומר כ-15 ס"מ בשנה.'},
  {q:'מה ההבדל בין נשירה טבעית ללא טבעית?',opts:['בנשירה לא טבעית השיער לא צומח חזרה','אין הבדל','נשירה טבעית כואבת','נשירה לא טבעית קורית בלילה'],correct:0,explain:'בנשירה טבעית השיער צומח חזרה כחלק מהמחזור. בנשירה לא טבעית הזקיק עלול להיפגע והשיער לא תמיד צומח מחדש.'},
  {q:'מדוע חשוב לספר/ית להכיר את שלבי צמיחת השיער?',opts:['כדי לתת תרופות','כדי לדעת מתי להפנות לרופא','כדי לעשות ניתוח','זה לא חשוב'],correct:1,explain:'הכרת שלבי הצמיחה עוזרת לספר/ית לזהות נשירה חריגה ולהפנות את הלקוח לרופא בזמן.'},
  {q:'מה עלול לקרות משימוש מוגזם בחום על השיער?',opts:['השיער מתחזק','השיער גדל מהר יותר','קריעה ופגיעה בשיער','שום דבר'],correct:2,explain:'חום מוגזם (פן, מחליק, מסלסל) פוגע במבנה השיער, גורם ליובש, קריעה ושבירה.'}
];

// מתקדם – correctIndex: 1,1,1,2,1,1,1,1
var advancedQuestions=[
  {q:'מה הקשר בין תזונה לנשירת שיער?',opts:['אין קשר','חוסר ויטמינים ומינרלים פוגע בצמיחת השיער','אכילה מרובה גורמת לנשירה','רק חלבון משפיע'],correct:1,explain:'חוסר בברזל, אבץ, ביוטין וויטמינים אחרים פוגע בזקיקי השיער ועלול לגרום לנשירה מוגברת.'},
  {q:'כיצד שינויים הורמונליים משפיעים על השיער?',opts:['הם לא משפיעים','הם יכולים לגרום לנשירה מוגברת או לשינוי במרקם','הם גורמים לשיער לגדול מהר יותר','הם משנים רק את הצבע'],correct:1,explain:'שינויים הורמונליים (גיל ההתבגרות, הריון, גיל המעבר) משפיעים על מחזור הצמיחה ועלולים לגרום לנשירה או לשינוי במרקם.'},
  {q:'לקוחה בהריון שואלת למה השיער שלה עבה יותר. מה תסבירו?',opts:['זה מקרי','הורמונים מאריכים את שלב הצמיחה','היא פשוט שמה לב יותר','זה בגלל התזונה בלבד'],correct:1,explain:'בהריון, רמות אסטרוגן גבוהות מאריכות את שלב האנאגן (צמיחה) – יותר שערות נשארות ולא נושרות.'},
  {q:'מה עשוי לקרות לשיער אחרי לידה?',opts:['שום דבר','השיער מתעבה עוד יותר','נשירה מוגברת זמנית כי שערות רבות עוברות לטלוגן','השיער משנה צבע'],correct:2,explain:'אחרי לידה, רמות ההורמונים יורדות ושערות רבות שנשארו בשלב הצמיחה עוברות לטלוגן ונושרות בבת אחת. זה זמני.'},
  {q:'ספר/ית מזהה אזור קירחות עגול אצל לקוח. מה עליו/ה לעשות?',opts:['לעשות תספורת שמסתירה','לייעץ ללקוח לפנות לרופא עור','לתת טיפול שיער','להתעלם'],correct:1,explain:'כתם קירחות עגול עלול להיות אלופציה אראטה – מצב רפואי שדורש טיפול של רופא עור.'},
  {q:'מדוע סטרס כרוני עלול לגרום לנשירת שיער?',opts:['כי הוא גורם לגירוד','כי הוא דוחף שערות רבות לשלב הטלוגן בו-זמנית','כי הוא משנה את צבע השיער','סטרס לא גורם לנשירה'],correct:1,explain:'סטרס כרוני גורם לתופעה הנקראת Telogen Effluvium – שערות רבות עוברות לשלב הנשירה בו-זמנית.'},
  {q:'מה ההבדל בין אלופציה אראטה לנשירה הורמונלית?',opts:['אין הבדל','אלופציה = כתמי קרחות עגולים, הורמונלית = דלילות כללית','אלופציה = רק גברים, הורמונלית = רק נשים','אלופציה היא מחלה מדבקת'],correct:1,explain:'אלופציה אראטה היא מחלה אוטואימונית שגורמת לכתמי קרחות עגולים. נשירה הורמונלית גורמת לדלילות כללית, בעיקר בקודקוד.'},
  {q:'מה תפקיד הזקיק בצמיחת השיער?',opts:['אין לו תפקיד','הזקיק מייצר ומזין את השיער, ואחראי על המחזוריות','הזקיק קובע רק את צבע השיער','הזקיק מגן מפני קור'],correct:1,explain:'הזקיק (פוליקול) הוא המבנה שממנו צומח השיער. הוא מייצר, מזין ושולט על כל מחזור החיים של השיערה.'}
];

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active')}
function updateProgress(){var c=diagnosticPhase?diagnosticIndex:2+currentQ;document.getElementById('progressBar').style.width=((c+1)/totalDisplayQuestions*100)+'%'}

function startQuiz(){
  studentName=document.getElementById('nameInput').value.trim();
  studentClass=document.getElementById('classInput').value.trim();
  if(!studentName||!studentClass){alert('נא למלא שם וכיתה');return}
  diagnosticIndex=0;diagnosticCorrect=0;diagnosticPhase=true;currentQ=0;score=0;answers=[];
  showQuestion(diagnosticQuestions[0],true);showScreen('questionScreen');updateProgress();
}

function showQuestion(q,isDiag){
  var n=isDiag?diagnosticIndex+1:2+currentQ+1;
  document.getElementById('qCounter').textContent='שאלה '+n+' מתוך '+totalDisplayQuestions;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').style.display='none';
  document.getElementById('nextBtn').className='next-btn';
  var c=document.getElementById('optionsContainer');c.innerHTML='';
  q.opts.forEach(function(opt,i){var b=document.createElement('button');b.className='opt-btn';b.textContent=opt;b.onclick=function(){checkAnswer(i,q,isDiag)};c.appendChild(b)});
}

function checkAnswer(sel,q,isDiag){
  var btns=document.querySelectorAll('.opt-btn');
  btns.forEach(function(b,i){b.classList.add('disabled');if(i===q.correct)b.classList.add('correct-answer');if(i===sel&&i!==q.correct)b.classList.add('wrong');if(i===sel&&i===q.correct)b.classList.add('correct')});
  var fb=document.getElementById('feedback');var ok=sel===q.correct;
  if(isDiag){if(ok)diagnosticCorrect++}else{if(ok)score++;answers.push({question:q.q,correct:ok})}
  fb.textContent=ok?'נכון! '+q.explain:'לא נכון. '+q.explain;
  fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQuestion(){
  if(diagnosticPhase){diagnosticIndex++;if(diagnosticIndex<diagnosticQuestions.length){showQuestion(diagnosticQuestions[diagnosticIndex],true);updateProgress();return}
  diagnosticPhase=false;
  if(diagnosticCorrect===0){detectedLevel='בסיסי';activeQuestions=basicQuestions}
  else if(diagnosticCorrect===1){detectedLevel='בינוני';activeQuestions=mediumQuestions}
  else{detectedLevel='מתקדם';activeQuestions=advancedQuestions}}
  if(currentQ<activeQuestions.length){showQuestion(activeQuestions[currentQ],false);currentQ++;updateProgress()}else{showScore()}
}

function showScore(){
  var pct=Math.round((score/questionsPerSet)*100);
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('scoreNum').textContent=pct;
  var icon,msg,bg;
  if(pct>=90){icon='&#127942;';msg='מצוין! שליטה מרשימה בחומר!';bg='background:var(--green-l);color:#2d6a4f'}
  else if(pct>=70){icon='&#128170;';msg='כל הכבוד! ידע טוב מאוד!';bg='background:var(--primary-l);color:var(--primary-d)'}
  else if(pct>=50){icon='&#128161;';msg='אפשר לשפר – חזרו על החומר';bg='background:#FEF3C7;color:#92400e'}
  else{icon='&#128214;';msg='כדאי לחזור על החומר ולנסות שוב';bg='background:var(--sec-l);color:#9b1c31'}
  document.getElementById('scoreIcon').innerHTML=icon;
  document.getElementById('scoreMsg').textContent=msg;
  document.getElementById('scoreMsg').style.cssText=bg+';border-radius:14px;padding:16px';
  showScreen('scoreScreen');
}

var SHEETS_URL='https://script.google.com/macros/s/AKfycbyLwo3jrseEDJ4GLnVNCzoJTRJBK_IAkJE0IiGGcx18buwJQ0XSRgOcJ2FmbMtA5ojU/exec';
function sendResults(){
  var btn=event.target;btn.disabled=true;btn.textContent='שולח...';
  var pct=Math.round((score/questionsPerSet)*100);
  var params=new URLSearchParams({action:'submit',quizName:'מחזוריות צמיחת השיער',studentName:studentName,classroom:studentClass,score:pct,totalQuestions:questionsPerSet,correctAnswers:score,level:detectedLevel,teacherEmail:'meytalp@bethaarava.ort.org.il'});
  var s=document.createElement('script');s.src=SHEETS_URL+'?'+params.toString();
  s.onload=s.onerror=function(){var st=document.getElementById('sendStatus');st.className='send-status success';st.textContent='התוצאות נשלחו בהצלחה למורה! ✓';btn.textContent='נשלח!';s.remove()};
  document.body.appendChild(s);
}
</script>
