<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאגר שאלונים – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F0F4F8;--card:#ffffff;
  --primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;
  --secondary:#E76F7A;--sec-l:#FDE8EA;
  --green:#52B788;--green-l:#D8F3DC;
  --blue:#4A90D9;--blue-l:#DBEAFE;
  --accent:#E9A319;--accent-l:#FEF3C7;
  --purple:#7C3AED;--purple-l:#F3E8FF;
  --pink:#DB2777;--pink-l:#FCE7F3;
  --dark:#1E293B;--gray:#64748B;--gray-l:#94A3B8;
  --border:rgba(0,0,0,.06);
  --shadow:0 2px 20px -4px rgba(0,0,0,.06);
  --shadow-md:0 8px 28px rgba(0,0,0,.07);
  --r:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{text-align:center;padding:48px 20px 32px}
.header-icon{width:80px;height:80px;border-radius:24px;background:var(--primary-l);color:var(--primary-d);display:inline-flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px}
.header h1{font-family:'Rubik',sans-serif;font-size:32px;font-weight:900;margin-bottom:6px}
.header p{color:var(--gray);font-size:16px;margin-bottom:8px}
.header .count{font-size:14px;color:var(--primary);font-weight:600}

/* BUILDER LINK */
.builder-link{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:12px 24px;background:var(--primary);color:white;border-radius:14px;font-size:15px;font-weight:700;text-decoration:none;transition:all .3s}
.builder-link:hover{background:var(--primary-d);transform:translateY(-2px);box-shadow:var(--shadow-md)}

/* CONTAINER */
.container{max-width:960px;margin:0 auto;padding:0 20px 60px}

/* FILTERS */
.filters{margin-bottom:28px}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:10px 20px;border:2px solid var(--border);border-radius:50px;background:white;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .3s;white-space:nowrap}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary)}

.search-wrap{margin-top:12px;position:relative}
.search-wrap input{width:100%;padding:14px 18px 14px 44px;border:2px solid var(--border);border-radius:14px;font-family:'Heebo',sans-serif;font-size:15px;color:var(--dark);background:white;transition:all .3s}
.search-wrap input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(42,157,143,.1)}
.search-wrap .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--gray-l)}

/* GRID */
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}

/* CARD */
.quiz-card{background:var(--card);border-radius:var(--r);padding:28px;box-shadow:var(--shadow);transition:all .35s;animation:fadeUp .45s ease both;cursor:default}
.quiz-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-md)}
.card-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}
.card-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.card-info{flex:1}
.card-name{font-family:'Rubik',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px}
.card-desc{font-size:13px;color:var(--gray);line-height:1.5}
.card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600}
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-teacher{font-size:13px;color:var(--gray-l);display:flex;align-items:center;gap:4px}
.card-btn{padding:10px 22px;background:var(--primary);color:white;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block}
.card-btn:hover{background:var(--primary-d);transform:translateY(-2px)}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;animation:fadeUp .45s ease}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state p{color:var(--gray);font-size:16px}
.empty-state .reset-btn{margin-top:16px;padding:10px 24px;background:var(--primary-l);color:var(--primary-d);border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s}
.empty-state .reset-btn:hover{background:var(--primary);color:white}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .header h1{font-size:24px}
  .quiz-grid{grid-template-columns:1fr}
  .quiz-card{padding:22px}
  .card-bottom{flex-direction:column;align-items:stretch}
  .card-btn{text-align:center}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">📝</div>
  <h1>מאגר שאלונים</h1>
  <p>אורט בית הערבה – שאלונים אינטראקטיביים לתלמידים</p>
  <div class="count" id="quizCount"></div>
  <div><a href="../quiz-builder/index.html" class="builder-link">+ צרו שאלון חדש</a></div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-row" id="filterRow"></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="חיפוש לפי שם שאלון או נושא...">
    </div>
  </div>

  <!-- GRID -->
  <div class="quiz-grid" id="quizGrid"></div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🔎</div>
    <p>לא נמצאו שאלונים מתאימים</p>
    <button class="reset-btn" onclick="resetFilters()">הציגו את כל השאלונים</button>
  </div>

</div>

<!-- LOGO -->
<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
// ===== QUIZ REGISTRY =====
const quizzes = [
  {
    id: 'shem-hamispar',
    name: 'שם המספר',
    subject: 'עברית',
    grade: 'כיתה י',
    teacher: 'מיטל',
    icon: 'א',
    description: 'שאלון על שמות מספר מונים וסודרים – התאמה במין ובצורה',
    path: 'shem-hamispar/index.html'
  },
  {
    id: 'great-revolt',
    name: 'המרד הגדול',
    subject: 'היסטוריה',
    grade: 'כיתה י',
    teacher: 'לירון',
    icon: '⚔',
    description: 'שאלון על המרד הגדול ברומאים, חורבן בית המקדש ותוצאותיו',
    path: 'great-revolt/index.html'
  },
  {
    id: 'hygiene',
    name: 'היגיינה אישית וסביבתית',
    subject: 'תספורת',
    grade: 'כיתה י',
    teacher: 'מיטל',
    icon: '🧼',
    description: 'שאלון על היגיינה אישית וסביבתית במספרה – חיטוי, ניקיון וסטריליזציה',
    path: 'hygiene/index.html'
  },
  {
    id: 'haircut',
    name: 'תספורת ועיצוב שיער',
    subject: 'תספורת',
    grade: 'כיתה י',
    teacher: 'מיטל',
    icon: '✂',
    description: 'שאלון על תספורת ועיצוב שיער – כלים, טכניקות ובטיחות',
    path: 'haircut/index.html'
  },
  {
    id: 'hair-growth',
    name: 'מחזוריות צמיחת השיער',
    subject: 'תספורת',
    grade: 'כיתה י',
    teacher: 'מיטל',
    icon: '🔬',
    description: 'שאלון על שלבי צמיחת השיער, נשירה טבעית ולא טבעית, וגורמים לנשירה',
    path: 'hair-growth/index.html'
  }
];

// ===== SUBJECT COLORS =====
const subjectColors = {
  'עברית':    { bg: 'var(--blue-l)',   text: '#1565C0', iconBg: '#DBEAFE' },
  'מתמטיקה':  { bg: 'var(--sec-l)',    text: '#B44050', iconBg: '#FDE8EA' },
  'היסטוריה': { bg: 'var(--accent-l)', text: '#92400E', iconBg: '#FEF3C7' },
  'אנגלית':   { bg: '#E0F2FE',        text: '#0369A1', iconBg: '#E0F2FE' },
  'מדעים':    { bg: 'var(--green-l)',  text: '#2D6A4F', iconBg: '#D8F3DC' },
  'חשבונאות': { bg: 'var(--purple-l)', text: '#7C3AED', iconBg: '#F3E8FF' },
  'תספורת':   { bg: 'var(--pink-l)',   text: '#DB2777', iconBg: '#FCE7F3' }
};

const subjects = ['הכל', 'עברית', 'מתמטיקה', 'היסטוריה', 'אנגלית', 'מדעים', 'חשבונאות'];

// ===== STATE =====
let activeFilter = 'הכל';
let searchText = '';

// ===== RENDER FILTERS =====
function renderFilters() {
  const row = document.getElementById('filterRow');
  row.innerHTML = subjects.map(s =>
    `<button class="filter-btn${s === activeFilter ? ' active' : ''}" onclick="setFilter('${s}')">${s}</button>`
  ).join('');
}

// ===== FILTER LOGIC =====
function setFilter(subject) {
  activeFilter = subject;
  renderFilters();
  renderCards();
}

function resetFilters() {
  activeFilter = 'הכל';
  searchText = '';
  document.getElementById('searchInput').value = '';
  renderFilters();
  renderCards();
}

function getFilteredQuizzes() {
  return quizzes.filter(q => {
    if (activeFilter !== 'הכל' && q.subject !== activeFilter) return false;
    if (searchText) {
      const s = searchText.toLowerCase();
      const searchable = (q.name + ' ' + q.subject + ' ' + q.description + ' ' + q.teacher + ' ' + q.grade).toLowerCase();
      if (!searchable.includes(s)) return false;
    }
    return true;
  });
}

// ===== RENDER CARDS =====
function renderCards() {
  const filtered = getFilteredQuizzes();
  const grid = document.getElementById('quizGrid');
  const empty = document.getElementById('emptyState');

  document.getElementById('quizCount').textContent = `${quizzes.length} שאלונים במאגר`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = filtered.map((q, i) => {
    const colors = subjectColors[q.subject] || { bg: 'var(--primary-l)', text: 'var(--primary-d)', iconBg: 'var(--primary-l)' };
    return `
    <div class="quiz-card" style="animation-delay:${i * 0.06}s">
      <div class="card-top">
        <div class="card-icon" style="background:${colors.iconBg};color:${colors.text}">${q.icon}</div>
        <div class="card-info">
          <div class="card-name">${q.name}</div>
          <div class="card-desc">${q.description}</div>
        </div>
      </div>
      <div class="card-tags">
        <span class="tag" style="background:${colors.bg};color:${colors.text}">${q.subject}</span>
        <span class="tag" style="background:var(--primary-l);color:var(--primary-d)">${q.grade}</span>
      </div>
      <div class="card-bottom">
        <span class="card-teacher">👩‍🏫 ${q.teacher}</span>
        <a href="${q.path}" class="card-btn">פתחו שאלון</a>
      </div>
    </div>`;
  }).join('');
}

// ===== SEARCH =====
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchText = this.value.trim();
    renderCards();
  }, 200);
});

// ===== INIT =====
renderFilters();
renderCards();
</script>
</body>
</html>
