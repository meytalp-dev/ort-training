<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון – שם המספר | כיתה י – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F0F4F8;--card:#ffffff;
  --primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;
  --secondary:#E76F7A;--sec-l:#FDE8EA;
  --green:#52B788;--green-l:#D8F3DC;
  --blue:#4A90D9;--blue-l:#DBEAFE;
  --accent:#E9A319;--accent-l:#FEF3C7;
  --dark:#1E293B;--gray:#64748B;--gray-l:#94A3B8;
  --border:rgba(0,0,0,.06);
  --shadow:0 2px 20px -4px rgba(0,0,0,.06);
  --shadow-md:0 8px 28px rgba(0,0,0,.07);
  --r:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}

.quiz-wrapper{max-width:580px;width:100%;margin:0 auto}

/* PROGRESS BAR */
.progress-wrap{background:rgba(0,0,0,.04);border-radius:20px;height:8px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(to left,var(--primary-l),var(--primary),var(--primary-d));border-radius:20px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* CARD */
.q-card{background:var(--card);border-radius:var(--r);padding:36px;box-shadow:var(--shadow-md);animation:fadeUp .45s ease}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* INTRO */
.intro-icon{width:80px;height:80px;border-radius:24px;background:var(--primary-l);color:var(--primary-d);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 20px}
.intro-title{font-family:'Rubik',sans-serif;font-size:28px;font-weight:900;text-align:center;margin-bottom:6px}
.intro-sub{color:var(--gray);font-size:16px;text-align:center;margin-bottom:28px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:14px;font-weight:600;color:var(--gray);margin-bottom:6px}
.input-group input,.input-group select{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-family:'Heebo',sans-serif;font-size:16px;color:var(--dark);background:var(--bg);transition:border-color .3s}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--primary);background:white}

/* BUTTONS */
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-d);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-next{background:var(--primary);color:white;margin-top:16px;display:none}
.btn-next:hover{background:var(--primary-d);transform:translateY(-2px)}

/* QUESTION */
.q-counter{font-size:13px;color:var(--primary);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.q-text{font-size:20px;font-weight:700;font-family:'Rubik',sans-serif;line-height:1.5;margin-bottom:22px}
.q-options{display:flex;flex-direction:column;gap:10px}

.q-opt{background:var(--bg);border:2px solid rgba(0,0,0,.05);border-radius:14px;padding:16px 20px;font-size:16px;cursor:pointer;transition:all .3s;text-align:right;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:12px;color:var(--dark)}
.q-opt:hover{background:var(--primary-l);border-color:var(--primary);color:var(--primary-d)}
.q-opt .opt-letter{width:32px;height:32px;border-radius:10px;background:rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:var(--gray);font-family:'Rubik',sans-serif}
.q-opt.correct{background:var(--green-l);border-color:var(--green);color:#2D7A54}
.q-opt.correct .opt-letter{background:var(--green);color:white}
.q-opt.wrong{background:var(--sec-l);border-color:var(--secondary);color:#B44050}
.q-opt.wrong .opt-letter{background:var(--secondary);color:white}
.q-opt.disabled{pointer-events:none;opacity:.7}
.q-opt.disabled.dim{opacity:.45}

.q-feedback{margin-top:16px;padding:16px 20px;border-radius:14px;font-size:15px;line-height:1.6;display:none;animation:fadeUp .3s ease}
.q-feedback.show{display:block}
.q-feedback.correct{background:var(--green-l);border:1px solid rgba(82,183,136,.2);color:#2D7A54}
.q-feedback.wrong{background:var(--sec-l);border:1px solid rgba(231,111,122,.2);color:#B44050}

/* SCORE */
.score-icon{font-size:60px;text-align:center;margin-bottom:12px}
.score-num{font-size:5rem;font-weight:900;font-family:'Rubik',sans-serif;text-align:center;line-height:1}
.score-label{font-size:16px;color:var(--gray);text-align:center;margin-top:4px}
.score-msg{font-size:20px;font-weight:700;text-align:center;margin-top:20px;padding:16px;border-radius:14px}
.score-details{margin-top:20px;display:flex;gap:12px;justify-content:center}
.score-detail{background:var(--bg);border-radius:14px;padding:14px 20px;text-align:center;flex:1}
.score-detail .num{font-size:24px;font-weight:900;font-family:'Rubik',sans-serif}
.score-detail .lbl{font-size:12px;color:var(--gray);margin-top:4px}

.send-status{margin-top:16px;padding:14px;border-radius:12px;text-align:center;font-size:15px;display:none}
.send-status.success{display:block;background:var(--green-l);color:#2D7A54}
.send-status.error{display:block;background:var(--sec-l);color:#B44050}

/* DOTS */
.q-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.q-dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.08);transition:all .3s}
.q-dot.current{background:var(--primary);transform:scale(1.3)}
.q-dot.done{background:var(--green)}
.q-dot.wrong-dot{background:var(--secondary)}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:500px){
  .q-card{padding:24px}
  .q-text{font-size:18px}
  .score-num{font-size:3.5rem}
  .score-details{flex-direction:column}
}
</style>
</head>
<body>

<div class="quiz-wrapper">
  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

  <!-- ===== INTRO SCREEN ===== -->
  <div class="screen active" id="introScreen">
    <div class="q-card">
      <div class="intro-icon">א</div>
      <div class="intro-title">שאלון – שם המספר</div>
      <div class="intro-sub">עברית | כיתה י | אורט בית הערבה</div>
      <div class="input-group">
        <label>שם מלא</label>
        <input type="text" id="studentName" placeholder="הכניסו את השם שלכם" autocomplete="off">
      </div>
      <div class="input-group">
        <label>כיתה</label>
        <select id="studentClass">
          <option value="">בחרו כיתה</option>
          <option>י1</option><option>י2</option><option>י3</option><option>י4</option>
          <option>יא1</option><option>יא2</option><option>יא3</option>
          <option>יב1</option><option>יב2</option><option>יב3</option>
        </select>
      </div>
      <button class="btn btn-primary" id="startBtn" disabled onclick="startQuiz()">התחילו</button>
    </div>
  </div>

  <!-- ===== QUESTION SCREEN ===== -->
  <div class="screen" id="questionScreen">
    <div class="q-card">
      <div class="q-dots" id="qDots"></div>
      <div class="q-counter" id="qCounter"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-options" id="qOptions"></div>
      <div class="q-feedback" id="qFeedback"></div>
      <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">שאלה הבאה</button>
    </div>
  </div>

  <!-- ===== SCORE SCREEN ===== -->
  <div class="screen" id="scoreScreen">
    <div class="q-card" style="text-align:center">
      <div class="score-icon" id="scoreIcon"></div>
      <div class="score-num" id="scoreNum"></div>
      <div class="score-label">מתוך 100</div>
      <div class="score-msg" id="scoreMsg"></div>
      <div class="score-details">
        <div class="score-detail">
          <div class="num" id="correctCount" style="color:var(--green)"></div>
          <div class="lbl">תשובות נכונות</div>
        </div>
        <div class="score-detail">
          <div class="num" id="wrongCount" style="color:var(--secondary)"></div>
          <div class="lbl">תשובות שגויות</div>
        </div>
        <div class="score-detail">
          <div class="num" id="totalCount" style="color:var(--primary)"></div>
          <div class="lbl">סה"כ שאלות</div>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:24px" onclick="sendResults()">שלחו תוצאות למורה</button>
      <div class="send-status" id="sendStatus"></div>
    </div>
  </div>
</div>

<!-- LOGO -->
<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
// ===== QUESTION BANKS =====

// Diagnostic question (medium level)
const diagnosticQ = {
  text: "מהו שם מספר?",
  options: [
    "שם שמתאר כמות או מיקום של שם עצם",
    "שם שמתאר תכונה של שם עצם",
    "מילה שמחליפה שם עצם",
    "מילה שמתארת פעולה"
  ],
  correct: 0,
  explanation: "שם מספר הוא מילה שמציינת כמות (שלושה ילדים) או מיקום/סדר (הילד השלישי) של שם עצם."
};

// BASIC question set (for students who got diagnostic wrong)
const basicQuestions = [
  {
    text: "באיזה משפט מופיע שם מספר?",
    options: ["ראיתי שלושה כלבים", "ראיתי כלבים יפים", "ראיתי כלבים בפארק", "ראיתי את הכלבים"],
    correct: 0,
    explanation: "\"שלושה\" הוא שם מספר – הוא מציין כמות."
  },
  {
    text: "מהו שם מספר מונה?",
    options: ["מספר שמציין כמות (אחד, שניים, שלושה)", "מספר שמציין סדר (ראשון, שני)", "מספר שמציין גיל", "מספר טלפון"],
    correct: 0,
    explanation: "שם מספר מונה מציין כמות: אחד, שניים, שלושה, ארבעה..."
  },
  {
    text: "מהו שם מספר סודר?",
    options: ["מספר שמציין מיקום בסדר (ראשון, שני, שלישי)", "מספר שמציין כמות", "מספר שמציין שעה", "מספר שנה"],
    correct: 0,
    explanation: "שם מספר סודר מציין מיקום: ראשון, שני, שלישי, רביעי..."
  },
  {
    text: "\"ארבע חתולות ישבו על הגדר\" – מהו שם המספר במשפט?",
    options: ["ארבע", "חתולות", "ישבו", "גדר"],
    correct: 0,
    explanation: "\"ארבע\" הוא שם מספר מונה – מציין כמות החתולות."
  },
  {
    text: "\"הילד השני קיבל פרס\" – מהו סוג שם המספר?",
    options: ["סודר", "מונה", "שם תואר", "שם פעולה"],
    correct: 0,
    explanation: "\"השני\" הוא שם מספר סודר – מציין מיקום בסדר."
  },
  {
    text: "שם מספר חייב להתאים ל:",
    options: ["מין שם העצם (זכר/נקבה)", "אורך המשפט", "סוג הפועל", "מיקום במשפט"],
    correct: 0,
    explanation: "שם מספר חייב להתאים במין לשם העצם: שלושה ילדים (ז), שלוש ילדות (נ)."
  },
  {
    text: "\"קניתי שתי עוגות\" – שם המספר בלשון:",
    options: ["נקבה", "זכר", "רבים", "יחיד"],
    correct: 0,
    explanation: "\"שתי\" הוא שם מספר בלשון נקבה, מתאים ל\"עוגות\" (נקבה)."
  },
  {
    text: "איזה מהבאים הוא שם מספר מונה?",
    options: ["חמישה", "חמישי", "חמש פעמים", "חומש"],
    correct: 0,
    explanation: "\"חמישה\" הוא שם מספר מונה – מציין כמות. \"חמישי\" הוא סודר."
  },
  {
    text: "\"זה הספר הראשון שקראתי\" – סמנו את שם המספר:",
    options: ["הראשון", "הספר", "קראתי", "זה"],
    correct: 0,
    explanation: "\"הראשון\" הוא שם מספר סודר."
  }
];

// ADVANCED question set (for students who got diagnostic right)
const advancedQuestions = [
  {
    text: "באיזה משפט שם המספר לא מתאים במין לשם העצם?",
    options: ["שלושה ילדות רצו בחצר", "שלוש ילדות רצו בחצר", "ארבעה תלמידים נבחנו", "שני ספרים נמכרו"],
    correct: 0,
    explanation: "\"שלושה\" הוא זכר, אבל \"ילדות\" הוא נקבה – חוסר התאמה. הנכון: שלוש ילדות."
  },
  {
    text: "מה ההבדל בין \"שלוש\" לבין \"שלושה\"?",
    options: ["שלוש – נקבה, שלושה – זכר", "שלוש – יחיד, שלושה – רבים", "אין הבדל", "שלוש – סודר, שלושה – מונה"],
    correct: 0,
    explanation: "שלוש = נקבה (שלוש בנות), שלושה = זכר (שלושה בנים). זו התאמת מין."
  },
  {
    text: "\"בכיתה שלנו עשרים ושבעה תלמידים\" – כמה שמות מספר יש?",
    options: ["שניים (עשרים, שבעה)", "אחד", "שלושה", "אין שם מספר"],
    correct: 0,
    explanation: "\"עשרים ושבעה\" מורכב משני שמות מספר: עשרים + שבעה."
  },
  {
    text: "באיזה משפט שם המספר משמש כלוואי (נלווה לשם עצם)?",
    options: ["חמשת הילדים יצאו להפסקה", "חמישה יצאו להפסקה", "הם חמישה", "מספר חמש"],
    correct: 0,
    explanation: "\"חמשת הילדים\" – שם המספר נלווה לשם העצם ומגדיר אותו. בשאר הוא עומד לבד."
  },
  {
    text: "מה הצורה הנכונה: \"______ ספרים חדשים\"?",
    options: ["שלושה", "שלוש", "שלישי", "שלשה"],
    correct: 0,
    explanation: "\"ספרים\" הוא זכר רבים, לכן שם המספר צריך להיות בזכר: שלושה ספרים."
  },
  {
    text: "\"בפעם הרביעית הצלחתי\" – נתחו את שם המספר:",
    options: ["סודר, נקבה, יחיד", "מונה, נקבה, יחיד", "סודר, זכר, יחיד", "מונה, זכר, רבים"],
    correct: 0,
    explanation: "\"הרביעית\" = סודר (מציין סדר), נקבה (מתאים ל\"פעם\"), יחיד."
  },
  {
    text: "מה ההבדל בין \"שני תלמידים\" לבין \"שניים\"?",
    options: ["\"שני\" נלווה לשם עצם, \"שניים\" עומד בפני עצמו", "\"שני\" הוא סודר, \"שניים\" הוא מונה", "אין הבדל", "\"שניים\" הוא צורת נקבה"],
    correct: 0,
    explanation: "\"שני\" הוא צורת הנסמך – נלווה לשם עצם. \"שניים\" הוא צורת הנפרד – עומד לבד."
  },
  {
    text: "כאשר שם מספר מונה מגיע לפני שם עצם מיודע, מה קורה?",
    options: ["שם המספר מקבל צורת נסמך (שלושת, ארבעת)", "שם המספר לא משתנה", "שם העצם עובר ליחיד", "מוסיפים ה' הידיעה לשם המספר"],
    correct: 0,
    explanation: "לפני שם עצם מיודע: שלושת הילדים, ארבעת הספרים, חמשת התלמידים."
  },
  {
    text: "באיזה משפט יש שימוש נכון בשם מספר סודר?",
    options: ["סיימתי את הפרק השלישי", "סיימתי שלוש פרקים", "סיימתי את שלישי הפרק", "סיימתי את שלושה פרקים"],
    correct: 0,
    explanation: "\"השלישי\" – שם מספר סודר שמציין את מיקום הפרק בסדר."
  }
];

// ===== STATE =====
let studentName = '';
let studentClass = '';
let currentQ = 0;
let score = 0;
let answers = [];
let activeQuestions = [];
let detectedLevel = '';
let totalQuestions = 0;

// ===== INIT =====
const nameInput = document.getElementById('studentName');
const classInput = document.getElementById('studentClass');
const startBtn = document.getElementById('startBtn');

function checkInputs() {
  startBtn.disabled = !(nameInput.value.trim() && classInput.value);
}
nameInput.addEventListener('input', checkInputs);
classInput.addEventListener('change', checkInputs);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== START =====
function startQuiz() {
  studentName = nameInput.value.trim();
  studentClass = classInput.value;
  currentQ = 0;
  score = 0;
  answers = [];
  // Start with diagnostic question
  activeQuestions = [diagnosticQ];
  totalQuestions = 10; // 1 diagnostic + 9 from set
  showScreen('questionScreen');
  renderQuestion();
}

// ===== RENDER =====
function renderQuestion() {
  const q = activeQuestions[currentQ];
  const qNum = currentQ + 1;
  const total = totalQuestions;

  // Progress
  document.getElementById('progressFill').style.width = ((qNum) / total * 100) + '%';

  // Dots
  const dotsHtml = Array.from({length: total}, (_, i) => {
    let cls = 'q-dot';
    if (i < answers.length) cls += answers[i].correct ? ' done' : ' wrong-dot';
    else if (i === currentQ) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('qDots').innerHTML = dotsHtml;

  // Counter
  document.getElementById('qCounter').textContent = `שאלה ${qNum} מתוך ${total}`;

  // Question text
  document.getElementById('qText').textContent = q.text;

  // Options
  const letters = ['א', 'ב', 'ג', 'ד'];
  const optHtml = q.options.map((opt, i) =>
    `<div class="q-opt" onclick="selectAnswer(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <span>${opt}</span>
    </div>`
  ).join('');
  document.getElementById('qOptions').innerHTML = optHtml;

  // Hide feedback & next
  const fb = document.getElementById('qFeedback');
  fb.className = 'q-feedback';
  fb.textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
}

// ===== SELECT ANSWER =====
function selectAnswer(idx) {
  const q = activeQuestions[currentQ];
  const opts = document.querySelectorAll('.q-opt');
  const isCorrect = idx === q.correct;

  // Disable all options
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct');
    else if (i === idx && !isCorrect) o.classList.add('wrong');
    else o.classList.add('dim');
  });

  // Feedback
  const fb = document.getElementById('qFeedback');
  fb.className = 'q-feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect
    ? `<strong>נכון!</strong> ${q.explanation}`
    : `<strong>לא נכון.</strong> ${q.explanation}`;

  if (isCorrect) score++;

  answers.push({ question: q.text, selected: idx, correct: isCorrect });

  // After diagnostic (question 0), choose question set
  if (currentQ === 0) {
    if (isCorrect) {
      detectedLevel = 'מתקדם';
      activeQuestions = [diagnosticQ, ...advancedQuestions];
    } else {
      detectedLevel = 'בסיסי';
      activeQuestions = [diagnosticQ, ...basicQuestions];
    }
  }

  // Update dots
  const total = totalQuestions;
  const dotsHtml = Array.from({length: total}, (_, i) => {
    let cls = 'q-dot';
    if (i < answers.length) cls += answers[i].correct ? ' done' : ' wrong-dot';
    else if (i === currentQ + 1) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('qDots').innerHTML = dotsHtml;

  // Show next button
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = currentQ < totalQuestions - 1 ? 'שאלה הבאה' : 'סיום';
}

// ===== NEXT =====
function nextQuestion() {
  currentQ++;
  if (currentQ >= totalQuestions) {
    showScore();
  } else {
    // Re-render with animation
    const card = document.querySelector('#questionScreen .q-card');
    card.style.animation = 'none';
    card.offsetHeight; // trigger reflow
    card.style.animation = 'fadeUp .45s ease';
    renderQuestion();
  }
}

// ===== SCORE =====
function showScore() {
  const pct = Math.round((score / totalQuestions) * 100);
  document.getElementById('progressFill').style.width = '100%';

  let icon, msg, msgBg;
  if (pct >= 90) { icon = '🌟'; msg = 'מצוין! שליטה מעולה בחומר!'; msgBg = 'var(--green-l)'; }
  else if (pct >= 70) { icon = '👏'; msg = 'כל הכבוד! ביצוע טוב מאוד!'; msgBg = 'var(--primary-l)'; }
  else if (pct >= 50) { icon = '💪'; msg = 'אפשר לשפר – חיזרו על החומר'; msgBg = 'var(--accent-l)'; }
  else { icon = '📖'; msg = 'כדאי לחזור על החומר ולנסות שוב'; msgBg = 'var(--sec-l)'; }

  document.getElementById('scoreIcon').textContent = icon;
  document.getElementById('scoreNum').textContent = pct;
  document.getElementById('scoreNum').style.color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--secondary)';
  const msgEl = document.getElementById('scoreMsg');
  msgEl.textContent = msg;
  msgEl.style.background = msgBg;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = totalQuestions - score;
  document.getElementById('totalCount').textContent = totalQuestions;

  showScreen('scoreScreen');
}

// ===== SEND TO GOOGLE SHEETS =====
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwc0veY5waDX-DSoA0soE1Hca5kIxPt8Wyghvg5tIwZI-T4mY94D3cdt40LeHZMLHHOWA/exec';

function sendResults() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'שולח...';

  const pct = Math.round((score / totalQuestions) * 100);

  const data = {
    quizName: 'שם המספר – כיתה י',
    studentName: studentName,
    classroom: studentClass,
    score: pct,
    totalQuestions: totalQuestions,
    correctAnswers: score,
    level: detectedLevel,
    answers: answers.map(a => ({q: a.question, correct: a.correct})),
    timestamp: new Date().toISOString(),
    teacherEmail: 'meytalp@bethaarava.ort.org.il'
  };

  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(() => {
    const status = document.getElementById('sendStatus');
    status.className = 'send-status success';
    status.textContent = 'התוצאות נשלחו בהצלחה למורה! ✓';
    btn.textContent = 'נשלח!';
  })
  .catch(() => {
    const status = document.getElementById('sendStatus');
    status.className = 'send-status error';
    status.textContent = 'שגיאה בשליחה – נסו שוב';
    btn.disabled = false;
    btn.textContent = 'שלחו תוצאות למורה';
  });
}
