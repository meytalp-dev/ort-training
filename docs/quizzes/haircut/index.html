<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון: תספורת ועיצוב שיער – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F4F8;--card:#fff;--primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;--secondary:#E76F7A;--sec-l:#FDE8EA;--green:#52B788;--green-l:#D8F3DC;--dark:#1E293B;--gray:#64748B;--shadow:0 2px 20px -4px rgba(0,0,0,.06);--r:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;width:100%;max-width:600px;padding:20px}
.screen.active{display:block}
.card{background:var(--card);border-radius:var(--r);padding:32px;box-shadow:var(--shadow);animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'Rubik',sans-serif;font-size:1.8rem;font-weight:700;color:var(--primary-d);margin-bottom:8px;text-align:center}
h2{font-size:1.3rem;font-weight:600;color:var(--dark);margin-bottom:20px;line-height:1.6}
.subtitle{text-align:center;color:var(--gray);font-size:1rem;margin-bottom:24px}
.icon{text-align:center;font-size:3rem;margin-bottom:16px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-weight:500;margin-bottom:6px;color:var(--gray);font-size:.9rem}
.input-group input,.input-group select{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;transition:border .2s}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--primary)}
.btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--primary-d)}
.btn:disabled{background:var(--gray);cursor:not-allowed}
.progress{position:fixed;top:0;left:0;height:4px;background:var(--primary);transition:width .3s;z-index:100}
.q-counter{text-align:center;color:var(--gray);font-size:.85rem;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt-btn{padding:14px 18px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;font-family:'Heebo',sans-serif;font-size:1rem;cursor:pointer;text-align:right;transition:all .2s;line-height:1.5}
.opt-btn:hover{border-color:var(--primary);background:var(--primary-l)}
.opt-btn.correct{background:var(--green-l);border-color:var(--green);color:#2d6a4f}
.opt-btn.wrong{background:var(--sec-l);border-color:var(--secondary);color:#9b1c31}
.opt-btn.disabled{pointer-events:none;opacity:.7}
.opt-btn.correct-answer{border-color:var(--green);background:var(--green-l)}
.feedback{padding:14px 18px;border-radius:12px;margin-bottom:16px;font-size:.95rem;line-height:1.6;display:none}
.feedback.show{display:block;animation:fadeUp .3s ease}
.feedback.correct-fb{background:var(--green-l);color:#2d6a4f}
.feedback.wrong-fb{background:var(--sec-l);color:#9b1c31}
.next-btn{display:none;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;width:100%}
.next-btn.show{display:block;animation:fadeUp .3s ease}
.score-num{font-size:4rem;font-weight:800;color:var(--primary);text-align:center;font-family:'Rubik',sans-serif}
.score-label{text-align:center;font-size:1.2rem;color:var(--gray);margin-bottom:20px}
.score-msg{text-align:center;font-size:1.3rem;font-weight:600;margin-bottom:24px;padding:16px;border-radius:14px}
.send-status{text-align:center;margin-top:12px;padding:10px;border-radius:10px;font-size:.9rem}
.send-status.success{background:var(--green-l);color:#2d6a4f}
.send-status.error{background:var(--sec-l);color:#9b1c31}
</style>
</head>
<body>

<div class="progress" id="progressBar"></div>

<!-- מסך פתיחה -->
<div class="screen active" id="startScreen">
<div class="card">
  <div class="icon">✂️</div>
  <h1>תספורת ועיצוב שיער</h1>
  <p class="subtitle">שאלון עיצוב שיער – כיתה י–יא</p>
  <div class="input-group">
    <label>שם מלא</label>
    <input type="text" id="nameInput" placeholder="הכניסו את שמכם">
  </div>
  <div class="input-group">
    <label>כיתה</label>
    <input type="text" id="classInput" placeholder="למשל: י1">
  </div>
  <button class="btn" onclick="startQuiz()">התחילו!</button>
</div>
</div>

<!-- מסך שאלה -->
<div class="screen" id="questionScreen">
<div class="card">
  <div class="q-counter" id="qCounter"></div>
  <h2 id="qText"></h2>
  <div class="options" id="optionsContainer"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">שאלה הבאה</button>
</div>
</div>

<!-- מסך ציון -->
<div class="screen" id="scoreScreen">
<div class="card">
  <div class="icon" id="scoreIcon"></div>
  <div class="score-num" id="scoreNum"></div>
  <div class="score-label">מתוך 100</div>
  <div class="score-msg" id="scoreMsg"></div>
  <button class="btn" onclick="sendResults()">שלחו תוצאות למורה</button>
  <div class="send-status" id="sendStatus"></div>
</div>
</div>

<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
var studentName='',studentClass='';
var currentQ=0,score=0,questionsPerSet=8;
var diagnosticCorrect=0,detectedLevel='';
var answers=[],activeQuestions=[];
var totalDisplayQuestions=10;
var diagnosticPhase=true,diagnosticIndex=0;

var diagnosticQuestions=[
  {q:'מהי תספורת בוב?',opts:['תספורת עם שכבות ארוכות','תספורת קצרה מאוד לגברים','תספורת בקו ישר בגובה הסנטר או הכתפיים','תספורת עם גילוח בצדדים'],correct:2,explain:'תספורת בוב היא תספורת בקו ישר, בדרך כלל בגובה הסנטר עד הכתפיים.'},
  {q:'מה קורה כשגוזרים שיער בזווית של 90 מעלות?',opts:['השיער נשאר חלק ושטוח','נוצרות שכבות אחידות עם נפח','השיער מתקצר מאוד','נוצר קו ישר'],correct:1,explain:'גזירה בזווית 90° מרחיקה את השיער מהראש ויוצרת שכבות אחידות עם נפח.'}
];

// בסיסי – correctIndex: 1,3,0,2,1,3,0,2
var basicQuestions=[
  {q:'מהו הכלי הבסיסי ביותר של הספר?',opts:['מכונת גילוח','מספריים','סכין גילוח','מסלסל'],correct:1,explain:'מספריים הם הכלי הבסיסי והחשוב ביותר של הספר לביצוע תספורות.'},
  {q:'מה תפקיד המסרק בזמן תספורת?',opts:['לייבש שיער','לצבוע שיער','לקשט','להחזיק ולהפריד את השיער לפני הגזירה'],correct:3,explain:'המסרק מפריד, מחלק ומחזיק את השיער במקום הנכון לפני הגזירה.'},
  {q:'מהי תספורת שכבות?',opts:['תספורת שבה השיער נגזר באורכים שונים ליצירת נפח ומרקם','תספורת קצרה מאוד','גילוח מלא','תספורת בקו ישר'],correct:0,explain:'תספורת שכבות גוזרת את השיער באורכים שונים כדי ליצור נפח, תנועה ומרקם.'},
  {q:'מה עושים עם מכונת תספורת?',opts:['מסלסלים','מייבשים','גוזרים שיער קצר באורכים אחידים','צובעים'],correct:2,explain:'מכונת תספורת גוזרת שיער באורכים קצרים ואחידים, בעיקר בתספורות גבריות.'},
  {q:'מהי "פוני"?',opts:['שיער בעורף','שיער שנגזר ונופל על המצח','שיער ארוך מאחור','שיער מסולסל'],correct:1,explain:'פוני הוא חלק מהשיער שנגזר ונופל על המצח, ומשמש למסגר את הפנים.'},
  {q:'מתי משתמשים בסכין גילוח בתספורת?',opts:['רק לגילוח זקן','רק לנשים','לשטיפת שיער','ליצירת טקסטורה רכה ואפקט מדורג'],correct:3,explain:'סכין גילוח יוצרת קצוות רכים, טקסטורה ואפקט מדורג בתספורת.'},
  {q:'מהי תספורת פיקסי?',opts:['תספורת קצרה מאוד לנשים','תספורת ארוכה','תספורת עם צמות','קוקו'],correct:0,explain:'פיקסי היא תספורת קצרה מאוד לנשים, עם שיער קצר בצדדים ומעט יותר ארוך למעלה.'},
  {q:'למה חשוב לייעץ ללקוח לפני התספורת?',opts:['כדי לגבות יותר','כדי לבזבז זמן','כדי להתאים את התספורת לרצון הלקוח ולמבנה פניו','כדי לשכנע אותו'],correct:2,explain:'ייעוץ מקצועי מבטיח שהתספורת תתאים לרצון הלקוח, למבנה הפנים ולאורח חייו.'}
];

// בינוני – correctIndex: 2,0,3,1,0,2,3,1
var mediumQuestions=[
  {q:'מה ההבדל בין גזירה בזווית 0° לזווית 45°?',opts:['אין הבדל','0° יוצרת נפח, 45° יוצרת קו ישר','0° יוצרת קו ישר ואחיד, 45° יוצרת שכבות קלות','שתיהן יוצרות אותו אפקט'],correct:2,explain:'גזירה ב-0° יוצרת קו ישר (one length). גזירה ב-45° יוצרת שכבות עדינות ותנועה קלה.'},
  {q:'מה תפקיד מספריים מדללים (thinning shears)?',opts:['להוריד נפח ולרכך קצוות בלי לשנות את האורך','לגזור קו ישר','לצבוע שיער','לסלסל'],correct:0,explain:'מספריים מדללים מסירות חלק מהשיער כדי להפחית נפח ולרכך קצוות.'},
  {q:'מהי טכניקת "דגרדה"?',opts:['גילוח מלא','צביעה','קו ישר','מעבר הדרגתי מקצר לארוך'],correct:3,explain:'דגרדה (degrade) הוא מעבר הדרגתי מאורך קצר בתחתית לאורך ארוך יותר למעלה.'},
  {q:'מדוע חשוב לבדוק את כיוון צמיחת השיער לפני תספורת?',opts:['לא חשוב','כיוון הצמיחה משפיע על התוצאה הסופית ועל נפילת השיער','כדי לחסוך זמן','כדי לבחור מספריים'],correct:1,explain:'כיוון הצמיחה (growth pattern) משפיע איך השיער ייפול אחרי הגזירה – מסתולים, מחלקות טבעיות ועוד.'},
  {q:'מהי טכניקת "פוינטינג" (pointing)?',opts:['גזירה בקצות המספריים כלפי מעלה ליצירת טקסטורה','גזירה בקו ישר','סלסול','החלקה'],correct:0,explain:'פוינטינג היא גזירה בקצות המספריים בזווית כלפי מעלה, שיוצרת קצוות לא אחידים ומראה טבעי.'},
  {q:'מהי תספורת "אנדרקאט" (undercut)?',opts:['תספורת ארוכה','תספורת עם צמות','גזירה קצרה מאוד בצדדים ובעורף עם שיער ארוך למעלה','תספורת בוב'],correct:2,explain:'אנדרקאט היא תספורת עם צדדים ועורף קצרים מאוד (מכונה) ושיער ארוך יותר בחלק העליון.'},
  {q:'איך משפיע מרקם השיער על בחירת טכניקת הגזירה?',opts:['לא משפיע','כל שיער זהה','רק הצבע חשוב','שיער גס דורש טכניקות שונות משיער דק – כל מרקם מגיב אחרת'],correct:3,explain:'שיער דק, בינוני או גס מגיב אחרת לגזירה. שיער דק צריך פחות דילול, שיער גס צריך יותר.'},
  {q:'מה היתרון של גזירה על שיער יבש?',opts:['יותר מהר','רואים את התוצאה הסופית ואת נפילת השיער הטבעית','יותר קל','יותר זול'],correct:1,explain:'גזירה על יבש מאפשרת לראות איך השיער באמת נופל ומה תהיה התוצאה הסופית.'}
];

// מתקדם – correctIndex: 3,1,0,2,3,0,2,1
var advancedQuestions=[
  {q:'כיצד תתאים תספורת ללקוחה עם פנים עגולות?',opts:['תספורת קצרה מאוד','בוב ישר בגובה הסנטר','שיער שטוח ונצמד','שכבות עם נפח למעלה ואורך שמייצר אשליית אורך'],correct:3,explain:'לפנים עגולות – נפח בקודקוד, אורך מתחת לסנטר ושכבות שמאריכות את הפנים ויזואלית.'},
  {q:'מה ההבדל בין גזירה בזווית 90° לזווית 180°?',opts:['אין הבדל','90° יוצרת שכבות אחידות, 180° יוצרת שכבות דרמטיות עם הפרש אורכים גדול','180° יוצרת קו ישר','90° קצרה יותר'],correct:1,explain:'ב-90° השיער מורם הצידה – שכבות אחידות. ב-180° מורם למעלה – שכבות דרמטיות עם הפרש גדול.'},
  {q:'מהי טכניקת "סלייד קאטינג" (slide cutting)?',opts:['החלקת המספריים לאורך גדיל השיער ליצירת מעבר רך ומרקם','גזירה בקו ישר','גילוח','סלסול'],correct:0,explain:'סלייד קאטינג מחליק את המספריים לאורך השיער, יוצר מעבר רך ומפחית נפח בצורה טבעית.'},
  {q:'למה שיער מתולתל נגזר אחרת משיער חלק?',opts:['כי הוא יותר יפה','כי הוא זול יותר','כי הוא מתכווץ כשמתייבש (shrinkage) ולכן צריך להשאיר אורך נוסף','כי הוא חזק יותר'],correct:2,explain:'שיער מתולתל מתכווץ 20-50% כשמתייבש. ספר מנוסה משאיר אורך נוסף כדי לפצות.'},
  {q:'כיצד עקרונות הייעוץ המקצועי משפיעים על שביעות רצון הלקוח?',opts:['לא משפיעים','משפיעים רק על המחיר','משפיעים רק על הזמן','ייעוץ מקצועי מנהל ציפיות, מתאים את התספורת לצרכים ומגביר אמון'],correct:3,explain:'ייעוץ טוב מנהל ציפיות, מזהה צרכים ומגבלות, ויוצר שביעות רצון גבוהה יותר.'},
  {q:'מה ההבדל בין texturizing ל-thinning?',opts:['Texturizing יוצר מרקם ותנועה בקצוות, thinning מפחית נפח כללי – שתיהן משתמשות בטכניקות שונות','אין הבדל','Thinning ליופי, texturizing לנוחות','שתיהן גזירה בקו ישר'],correct:0,explain:'Texturizing מוסיף מרקם ותנועה בקצוות. Thinning מפחית נפח כללי מבלי לשנות צורה.'},
  {q:'מדוע מומלץ לגזור שיער מתולתל כשהוא יבש?',opts:['כי זה מהר','כי זה זול','כי רואים את דפוס התלתלים הטבעי ואפשר לגזור תלתל-תלתל','כי הלקוח מעדיף'],correct:2,explain:'גזירה על יבש מראה את הדפוס הטבעי של כל תלתל, ומאפשרת גזירה מדויקת תלתל-תלתל.'},
  {q:'כיצד תשלב עקרונות עיצוב (סימטריה, פרופורציה, איזון) בייעוץ תספורת?',opts:['לא צריך','אנליזה של מבנה הפנים, הפרופורציות והמאפיינים – ובחירת תספורת שמאזנת','בחירה אקראית','לפי האופנה בלבד'],correct:1,explain:'ספר מקצועי מנתח מבנה פנים, פרופורציות וקו לסתות כדי להמליץ על תספורת שמאזנת ומחמיאה.'}
];

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active')}
function updateProgress(){var c=diagnosticPhase?diagnosticIndex:2+currentQ;document.getElementById('progressBar').style.width=((c+1)/totalDisplayQuestions*100)+'%'}

function startQuiz(){
  studentName=document.getElementById('nameInput').value.trim();
  studentClass=document.getElementById('classInput').value.trim();
  if(!studentName||!studentClass){alert('נא למלא שם וכיתה');return}
  diagnosticIndex=0;diagnosticCorrect=0;diagnosticPhase=true;currentQ=0;score=0;answers=[];
  showQuestion(diagnosticQuestions[0],true);showScreen('questionScreen');updateProgress();
}

function showQuestion(q,isDiag){
  var n=isDiag?diagnosticIndex+1:2+currentQ+1;
  document.getElementById('qCounter').textContent='שאלה '+n+' מתוך '+totalDisplayQuestions;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').style.display='none';
  document.getElementById('nextBtn').className='next-btn';
  var c=document.getElementById('optionsContainer');c.innerHTML='';
  q.opts.forEach(function(opt,i){var b=document.createElement('button');b.className='opt-btn';b.textContent=opt;b.onclick=function(){checkAnswer(i,q,isDiag)};c.appendChild(b)});
}

function checkAnswer(sel,q,isDiag){
  var btns=document.querySelectorAll('.opt-btn');
  btns.forEach(function(b,i){b.classList.add('disabled');if(i===q.correct)b.classList.add('correct-answer');if(i===sel&&i!==q.correct)b.classList.add('wrong');if(i===sel&&i===q.correct)b.classList.add('correct')});
  var fb=document.getElementById('feedback');var ok=sel===q.correct;
  if(isDiag){if(ok)diagnosticCorrect++}else{if(ok)score++;answers.push({question:q.q,correct:ok})}
  fb.textContent=ok?'נכון! '+q.explain:'לא נכון. '+q.explain;
  fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQuestion(){
  if(diagnosticPhase){diagnosticIndex++;if(diagnosticIndex<diagnosticQuestions.length){showQuestion(diagnosticQuestions[diagnosticIndex],true);updateProgress();return}
  diagnosticPhase=false;
  if(diagnosticCorrect===0){detectedLevel='בסיסי';activeQuestions=basicQuestions}
  else if(diagnosticCorrect===1){detectedLevel='בינוני';activeQuestions=mediumQuestions}
  else{detectedLevel='מתקדם';activeQuestions=advancedQuestions}}
  if(currentQ<activeQuestions.length){showQuestion(activeQuestions[currentQ],false);currentQ++;updateProgress()}else{showScore()}
}

function showScore(){
  var pct=Math.round((score/questionsPerSet)*100);
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('scoreNum').textContent=pct;
  var icon,msg,bg;
  if(pct>=90){icon='&#127942;';msg='מצוין! שליטה מרשימה בחומר!';bg='background:var(--green-l);color:#2d6a4f'}
  else if(pct>=70){icon='&#128170;';msg='כל הכבוד! ידע טוב מאוד!';bg='background:var(--primary-l);color:var(--primary-d)'}
  else if(pct>=50){icon='&#128161;';msg='אפשר לשפר – חזרו על החומר';bg='background:#FEF3C7;color:#92400e'}
  else{icon='&#128214;';msg='כדאי לחזור על החומר ולנסות שוב';bg='background:var(--sec-l);color:#9b1c31'}
  document.getElementById('scoreIcon').innerHTML=icon;
  document.getElementById('scoreMsg').textContent=msg;
  document.getElementById('scoreMsg').style.cssText=bg+';border-radius:14px;padding:16px';
  showScreen('scoreScreen');
}

var SHEETS_URL='https://script.google.com/macros/s/AKfycbyLwo3jrseEDJ4GLnVNCzoJTRJBK_IAkJE0IiGGcx18buwJQ0XSRgOcJ2FmbMtA5ojU/exec';
function sendResults(){
  var btn=event.target;btn.disabled=true;btn.textContent='שולח...';
  var pct=Math.round((score/questionsPerSet)*100);
  var params=new URLSearchParams({action:'submit',quizName:'תספורת ועיצוב שיער',studentName:studentName,classroom:studentClass,score:pct,totalQuestions:questionsPerSet,correctAnswers:score,level:detectedLevel,teacherEmail:'meytalp@bethaarava.ort.org.il'});
  var s=document.createElement('script');s.src=SHEETS_URL+'?'+params.toString();
  s.onload=s.onerror=function(){var st=document.getElementById('sendStatus');st.className='send-status success';st.textContent='התוצאות נשלחו בהצלחה למורה! ✓';btn.textContent='נשלח!';s.remove()};
  document.body.appendChild(s);
}
