<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קלפי השלכה – מנהיגות אורט</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(135deg, #0a1628 0%, #102a4a 40%, #1a3a5c 70%, #0d2240 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  /* === HEADER === */
  .page-header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  .meeting-badge {
    display: inline-block;
    background: linear-gradient(135deg, #e8722a, #f59e0b);
    color: #fff;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 6px 24px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  .page-header h1 {
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .page-header .subtitle {
    font-size: clamp(0.9rem, 2vw, 1.15rem);
    color: #94a3b8;
    font-weight: 300;
    max-width: 700px;
    margin: 0 auto 8px;
    line-height: 1.7;
  }

  .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #e8722a, transparent);
    margin: 18px auto 0;
  }

  /* === CARDS GRID === */
  .cards-section {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px 60px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  /* === CARD === */
  .card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1;
    background: #1e3a5f;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 12px 40px rgba(232, 114, 42, 0.25), 0 4px 20px rgba(0,0,0,0.4);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .card:hover img {
    transform: scale(1.05);
  }

  .card .card-num {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(232, 114, 42, 0.85);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover .card-num {
    opacity: 1;
  }

  /* === MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 15, 30, 0.92);
    backdrop-filter: blur(12px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-card {
    background: linear-gradient(145deg, #1a3050, #0f2035);
    border: 1px solid rgba(232, 114, 42, 0.3);
    border-radius: 24px;
    max-width: 500px;
    width: 100%;
    overflow: hidden;
    animation: slideUp 0.4s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(232, 114, 42, 0.1);
  }

  .modal-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .modal-body {
    padding: 24px 28px 28px;
    text-align: center;
  }

  .modal-body .card-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: #e8722a;
    margin-bottom: 10px;
  }

  .modal-body .card-desc {
    font-size: 1rem;
    color: #cbd5e1;
    line-height: 1.8;
    font-weight: 300;
  }

  .modal-close {
    display: inline-block;
    margin-top: 20px;
    background: linear-gradient(135deg, #e8722a, #f59e0b);
    color: #fff;
    border: none;
    padding: 10px 36px;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .modal-close:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(232, 114, 42, 0.4);
  }

  /* === FOOTER === */
  .page-footer {
    text-align: center;
    padding: 20px;
    color: #475569;
    font-size: 0.8rem;
    font-weight: 300;
  }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .cards-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .page-header { padding: 24px 16px 6px; }
    .cards-section { padding: 0 12px 40px; margin-top: 20px; }
  }

  @media (max-width: 480px) {
    .cards-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="meeting-badge">מפגש לפני חופשה | צוות מנהלים אורט | ענת דובר</div>
  <h1>קלפי השלכה: המנהיגות של אורט לקראת חופשת החירות והאביב</h1>
  <p class="subtitle">בחרו קלף אחד שמתאר את המצב שלכם כרגע מול כל האתגרים</p>
  <div class="divider"></div>
</header>

<section class="cards-section">
  <div class="cards-grid" id="cardsGrid"></div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <img id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="card-title" id="modalTitle"></div>
      <div class="card-desc" id="modalDesc"></div>
      <button class="modal-close" onclick="closeModal()">סגור</button>
    </div>
  </div>
</div>

<footer class="page-footer">
  רשת אורט ישראל &middot; קלפי השלכה למנהלים &middot; פסח תשפ"ו
</footer>

<script>
const cards = [
  {
    title: 'הלוהט \u2013 מנהל אורט',
    desc: 'שמונה ידיים, אלף משימות. בין זום לצלחת הסדר, בין רובוט לילד בוכה \u2013 איכשהו מחזיקים הכל.',
    img: 'https://design.canva.ai/vDpNCeoI3g9CyaG'
  },
  {
    title: 'שרטוט של חירות',
    desc: 'צלחת הסדר כתוכנית הנדסית. חירות כתובה בשפת מעגלים חשמליים \u2013 כי באורט, גם החופש הוא טכנולוגי.',
    img: 'https://design.canva.ai/_wkhT6IqltnfTQM'
  },
  {
    title: 'המעבדה המוגנת',
    desc: 'כלנית אדומה פורחת בתוך כיפת מגן. תלמידים קטנים מתבוננים בה במיקרוסקופ \u2013 תקווה שגדלה גם בתוך המלחמה.',
    img: 'https://design.canva.ai/5RyKnl8n_7CT5fs'
  },
  {
    title: 'זום בכיתה חשוכה',
    desc: 'יושבים בחושך, מוארים רק מהמסכים. סמנים שבורים, כוסות קפה ריקות \u2013 המציאות של למידה מרחוק.',
    img: 'https://design.canva.ai/aAul0-BROnxefT8'
  },
  {
    title: 'כפתור האיפוס',
    desc: 'כפתור RESET אדום ענק על הקיר. רק לחיצה אחת והחופשה מתחילה \u2013 אבל מי ימצא את הכפתור?',
    img: 'https://design.canva.ai/dVJpGEWo7vWH412'
  },
  {
    title: 'יציאת מצרים המודרנית',
    desc: 'שורה של אנשים יוצאים מהעיר עם מחשבים ניידים, מזוודות ומצות \u2013 לקראת אופק של שקט.',
    img: 'https://design.canva.ai/mtdHNYk5NfRTgOW'
  },
  {
    title: 'מגדלור הטכנולוגיה',
    desc: 'מנהל עומד על צוק ומאיר בסמארטפון ענק לתוך הסערה. קרן האור בנויה מעיגולי אורט \u2013 מנהיגות באי-ודאות.',
    img: 'https://design.canva.ai/kPvVm2lZJ1BI68o'
  },
  {
    title: 'מעגל הסולידריות',
    desc: 'ידיים באזרחי, במדים ובחולצת אורט \u2013 שלובות יחד למעגל שלא נשבר. אחדות מול הכל.',
    img: 'https://design.canva.ai/2U6dhe8s8aAz884'
  },
  {
    title: 'צונאמי הניירת',
    desc: 'קבורים עד הצוואר בטפסים, דוחות תקציב ומחשבים שבורים. הביורוקרטיה לא לוקחת חופש.',
    img: 'https://design.canva.ai/GZ0MsHpaoxtfY1V'
  },
  {
    title: 'פרפר התקווה הדיגיטלית',
    desc: 'פרפר כחול-לבן עם כנפיים של מעגלים חשמליים, יוצא מקיר בטון סדוק. שינוי מתחיל מהסדק.',
    img: 'https://design.canva.ai/IeNyTBxvOzeaHM-'
  },
  {
    title: 'עוגן הקפה',
    desc: 'כוס קפה בצורת עוגן כבד, שוקעת לתוך ים של משוואות וכותרות חדשות. מצב הישרדות \u2013 בטעם קפה.',
    img: 'https://design.canva.ai/66vF-xmwMGaJwJH'
  },
  {
    title: 'המטען המנותק',
    desc: 'כבל מטען שחוק ופרום שלא נכנס לשקע. האנרגיה נגמרה \u2013 וצריך סוג אחר של טעינה.',
    img: 'https://design.canva.ai/TK7sF3lKCQEswIs'
  }
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const shuffled = shuffle(cards);
  grid.innerHTML = shuffled.map((c, i) => `
    <div class="card" onclick="openCard(${cards.indexOf(c)})">
      <img src="${c.img}" alt="קלף ${i + 1}" loading="lazy">
      <div class="card-num">${i + 1}</div>
    </div>
  `).join('');
}

function openCard(idx) {
  const c = cards[idx];
  document.getElementById('modalImg').src = c.img;
  document.getElementById('modalTitle').textContent = c.title;
  document.getElementById('modalDesc').textContent = c.desc;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCards();
</script>
</body>
</html>
