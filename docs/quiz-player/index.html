<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F4F8;--card:#fff;--primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;--secondary:#E76F7A;--sec-l:#FDE8EA;--green:#52B788;--green-l:#D8F3DC;--accent:#E9A319;--accent-l:#FEF3C7;--dark:#1E293B;--gray:#64748B;--gray-l:#94A3B8;--border:rgba(0,0,0,.06);--shadow:0 2px 20px -4px rgba(0,0,0,.06);--shadow-md:0 8px 28px rgba(0,0,0,.07);--r:20px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.quiz-wrapper{max-width:580px;width:100%;margin:0 auto}

/* LOADING */
.loading-screen{text-align:center;padding:60px 20px}
.loading-spinner{width:48px;height:48px;border:4px solid var(--primary-l);border-top:4px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
.loading-text{color:var(--gray);font-size:18px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-screen{text-align:center;padding:60px 20px}
.error-icon{font-size:56px;margin-bottom:16px}
.error-title{font-family:'Rubik',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;color:var(--secondary)}
.error-text{color:var(--gray);font-size:16px;margin-bottom:24px}
.error-btn{padding:14px 32px;background:var(--primary);color:white;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s}
.error-btn:hover{background:var(--primary-d);transform:translateY(-2px)}

/* QUIZ UI */
.progress-wrap{background:rgba(0,0,0,.04);border-radius:20px;height:8px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(to left,var(--primary-l),var(--primary),var(--primary-d));border-radius:20px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
.q-card{background:var(--card);border-radius:var(--r);padding:36px;box-shadow:var(--shadow-md);animation:fadeUp .45s ease}
.screen{display:none}.screen.active{display:block}
.intro-icon{width:80px;height:80px;border-radius:24px;background:var(--primary-l);color:var(--primary-d);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 20px}
.intro-title{font-family:'Rubik',sans-serif;font-size:28px;font-weight:900;text-align:center;margin-bottom:6px}
.intro-sub{color:var(--gray);font-size:16px;text-align:center;margin-bottom:28px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:14px;font-weight:600;color:var(--gray);margin-bottom:6px}
.input-group input,.input-group select{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-family:'Heebo',sans-serif;font-size:16px;color:var(--dark);background:var(--bg);transition:border-color .3s}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--primary);background:white}
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s}
.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-d);transform:translateY(-2px);box-shadow:var(--shadow-md)}.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-next{background:var(--primary);color:white;margin-top:16px;display:none}.btn-next:hover{background:var(--primary-d);transform:translateY(-2px)}
.q-counter{font-size:13px;color:var(--primary);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.q-text{font-size:20px;font-weight:700;font-family:'Rubik',sans-serif;line-height:1.5;margin-bottom:22px}
.q-options{display:flex;flex-direction:column;gap:10px}
.q-opt{background:var(--bg);border:2px solid rgba(0,0,0,.05);border-radius:14px;padding:16px 20px;font-size:16px;cursor:pointer;transition:all .3s;text-align:right;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:12px;color:var(--dark)}
.q-opt:hover{background:var(--primary-l);border-color:var(--primary);color:var(--primary-d)}
.q-opt .opt-letter{width:32px;height:32px;border-radius:10px;background:rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:var(--gray);font-family:'Rubik',sans-serif}
.q-opt.correct{background:var(--green-l);border-color:var(--green);color:#2D7A54}.q-opt.correct .opt-letter{background:var(--green);color:white}
.q-opt.wrong{background:var(--sec-l);border-color:var(--secondary);color:#B44050}.q-opt.wrong .opt-letter{background:var(--secondary);color:white}
.q-opt.disabled{pointer-events:none;opacity:.7}.q-opt.disabled.dim{opacity:.45}
.q-feedback{margin-top:16px;padding:16px 20px;border-radius:14px;font-size:15px;line-height:1.6;display:none;animation:fadeUp .3s ease}
.q-feedback.show{display:block}.q-feedback.correct{background:var(--green-l);border:1px solid rgba(82,183,136,.2);color:#2D7A54}.q-feedback.wrong{background:var(--sec-l);border:1px solid rgba(231,111,122,.2);color:#B44050}
.score-icon{font-size:60px;text-align:center;margin-bottom:12px}
.score-num{font-size:5rem;font-weight:900;font-family:'Rubik',sans-serif;text-align:center;line-height:1}
.score-label{font-size:16px;color:var(--gray);text-align:center;margin-top:4px}
.score-msg{font-size:20px;font-weight:700;text-align:center;margin-top:20px;padding:16px;border-radius:14px}
.score-details{margin-top:20px;display:flex;gap:12px;justify-content:center}
.score-detail{background:var(--bg);border-radius:14px;padding:14px 20px;text-align:center;flex:1}
.score-detail .num{font-size:24px;font-weight:900;font-family:'Rubik',sans-serif}
.score-detail .lbl{font-size:12px;color:var(--gray);margin-top:4px}
.send-status{margin-top:16px;padding:14px;border-radius:12px;text-align:center;font-size:15px;display:none}
.send-status.success{display:block;background:var(--green-l);color:#2D7A54}
.q-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.q-dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.08);transition:all .3s}
.q-dot.current{background:var(--primary);transform:scale(1.3)}.q-dot.done{background:var(--green)}.q-dot.wrong-dot{background:var(--secondary)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.q-card{padding:24px}.q-text{font-size:18px}.score-num{font-size:3.5rem}.score-details{flex-direction:column}.intro-title{font-size:22px}}
</style>
</head>
<body>
<div class="quiz-wrapper">
  <!-- LOADING -->
  <div class="screen active" id="loadingScreen">
    <div class="q-card">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">טוען שאלון...</div>
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="screen" id="errorScreen">
    <div class="q-card">
      <div class="error-screen">
        <div class="error-icon">😕</div>
        <div class="error-title" id="errorTitle">שאלון לא נמצא</div>
        <div class="error-text" id="errorText">הקישור שקיבלתם לא תקין או שהשאלון הוסר.</div>
        <a href="../quizzes/" class="error-btn">למאגר השאלונים</a>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quizContainer" style="display:none">
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

    <!-- INTRO -->
    <div class="screen active" id="introScreen">
      <div class="q-card">
        <div class="intro-icon" id="quizIcon">📝</div>
        <div class="intro-title" id="quizTitle">שאלון</div>
        <div class="intro-sub" id="quizSub"></div>
        <div class="input-group"><label>שם מלא</label><input type="text" id="studentName" placeholder="הכניסו את השם שלכם" autocomplete="off"></div>
        <div class="input-group"><label>כיתה</label><select id="studentClass"><option value="">בחרו כיתה</option></select></div>
        <button class="btn btn-primary" id="startBtn" disabled onclick="startQuiz()">התחילו</button>
      </div>
    </div>

    <!-- QUESTION -->
    <div class="screen" id="questionScreen">
      <div class="q-card">
        <div class="q-dots" id="qDots"></div>
        <div class="q-counter" id="qCounter"></div>
        <div class="q-text" id="qText"></div>
        <div class="q-options" id="qOptions"></div>
        <div class="q-feedback" id="qFeedback"></div>
        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">שאלה הבאה</button>
      </div>
    </div>

    <!-- SCORE -->
    <div class="screen" id="scoreScreen">
      <div class="q-card" style="text-align:center">
        <div class="score-icon" id="scoreIcon"></div>
        <div class="score-num" id="scoreNum"></div>
        <div class="score-label">מתוך 100</div>
        <div class="score-msg" id="scoreMsg"></div>
        <div class="score-details">
          <div class="score-detail"><div class="num" id="correctCount" style="color:var(--green)"></div><div class="lbl">תשובות נכונות</div></div>
          <div class="score-detail"><div class="num" id="wrongCount" style="color:var(--secondary)"></div><div class="lbl">תשובות שגויות</div></div>
          <div class="score-detail"><div class="num" id="totalCount" style="color:var(--primary)"></div><div class="lbl">סה"כ שאלות</div></div>
        </div>
        <button class="btn btn-primary" style="margin-top:24px" onclick="sendResults()">שלחו תוצאות למורה</button>
        <div class="send-status" id="sendStatus"></div>
      </div>
    </div>
  </div>
</div>

<!-- LOGO -->
<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
// ===== CONFIG =====
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyLwo3jrseEDJ4GLnVNCzoJTRJBK_IAkJE0IiGGcx18buwJQ0XSRgOcJ2FmbMtA5ojU/exec';
const LETTERS = ['א','ב','ג','ד'];

// ===== STATE =====
let quizConfig = null;
let studentName = '', studentClass = '';
let currentQ = 0, score = 0, answers = [];
let activeQuestions = [], detectedLevel = '', totalQuestions = 0, diagnosticCorrect = 0;

// ===== LOAD QUIZ =====
function getQuizId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function loadQuiz() {
  const quizId = getQuizId();
  if (!quizId) {
    showError('קישור לא תקין', 'חסר מזהה שאלון בקישור.');
    return;
  }

  // Load via JSONP
  const callbackName = 'quizCallback_' + Date.now();
  window[callbackName] = function(data) {
    delete window[callbackName];
    if (data.error) {
      showError('שאלון לא נמצא', 'השאלון שחיפשתם לא קיים במערכת.');
      return;
    }
    try {
      quizConfig = JSON.parse(data.quizJSON);
      quizConfig._meta = {
        name: data.name,
        subject: data.subject,
        grade: data.grade,
        teacher: data.teacher,
        email: data.email
      };
      initQuiz();
    } catch(e) {
      showError('שגיאה בטעינה', 'נתוני השאלון פגומים.');
    }
  };

  const script = document.createElement('script');
  script.src = SHEETS_URL + '?action=getQuiz&id=' + encodeURIComponent(quizId) + '&callback=' + callbackName;
  script.onerror = function() {
    delete window[callbackName];
    showError('שגיאת רשת', 'לא ניתן להתחבר לשרת. בדקו חיבור לאינטרנט.');
  };
  document.body.appendChild(script);

  // Timeout after 15 seconds
  setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      showError('זמן הטעינה עבר', 'השרת לא הגיב. נסו שוב מאוחר יותר.');
    }
  }, 15000);
}

function showError(title, text) {
  document.getElementById('loadingScreen').classList.remove('active');
  document.getElementById('errorScreen').classList.add('active');
  document.getElementById('errorTitle').textContent = title;
  document.getElementById('errorText').textContent = text;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== INIT QUIZ =====
function initQuiz() {
  const meta = quizConfig._meta;
  const subjectIcons = { 'עברית':'א','מתמטיקה':'➗','היסטוריה':'📜','אנגלית':'A','מדעים':'🔬','חשבונאות':'📊' };
  const icon = subjectIcons[meta.subject] || '📝';

  // Update page title
  document.title = 'שאלון – ' + meta.name + ' | אורט בית הערבה';

  // Setup intro screen
  document.getElementById('quizIcon').textContent = icon;
  document.getElementById('quizTitle').textContent = 'שאלון – ' + meta.name;
  document.getElementById('quizSub').textContent = meta.subject + ' | ' + meta.grade + ' | אורט בית הערבה';

  // Setup class options
  const gradeMap = {
    'כיתה ט':['ט1','ט2','ט3','ט4'],
    'כיתה י':['י1','י2','י3','י4'],
    'כיתה יא':['יא1','יא2','יא3'],
    'כיתה יב':['יב1','יב2','יב3']
  };
  const classes = gradeMap[meta.grade] || ['א','ב','ג','ד'];
  const classSelect = document.getElementById('studentClass');
  classes.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    classSelect.appendChild(opt);
  });

  // Setup input validation
  const nameInput = document.getElementById('studentName');
  const startBtn = document.getElementById('startBtn');
  function checkInputs() {
    startBtn.disabled = !(nameInput.value.trim() && classSelect.value);
  }
  nameInput.addEventListener('input', checkInputs);
  classSelect.addEventListener('change', checkInputs);

  // Show quiz
  document.getElementById('loadingScreen').classList.remove('active');
  document.getElementById('quizContainer').style.display = 'block';
  document.getElementById('introScreen').classList.add('active');
}

// ===== START QUIZ =====
function startQuiz() {
  studentName = document.getElementById('studentName').value.trim();
  studentClass = document.getElementById('studentClass').value;
  currentQ = 0; score = 0; answers = []; diagnosticCorrect = 0;

  // Start with diagnostic questions
  activeQuestions = quizConfig.diagnosticQuestions.slice();
  const sampleSet = quizConfig.questionSets.basic || quizConfig.questionSets.advanced || [];
  totalQuestions = quizConfig.diagnosticQuestions.length + sampleSet.length;

  showScreen('questionScreen');
  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = activeQuestions[currentQ];
  const qNum = currentQ + 1;

  document.getElementById('progressFill').style.width = (qNum / totalQuestions * 100) + '%';

  // Dots
  document.getElementById('qDots').innerHTML = Array.from({length: totalQuestions}, (_, i) => {
    let c = 'q-dot';
    if (i < answers.length) c += answers[i].correct ? ' done' : ' wrong-dot';
    else if (i === currentQ) c += ' current';
    return '<div class="' + c + '"></div>';
  }).join('');

  document.getElementById('qCounter').textContent = 'שאלה ' + qNum + ' מתוך ' + totalQuestions;
  document.getElementById('qText').textContent = q.text;

  document.getElementById('qOptions').innerHTML = q.options.map((o, i) =>
    '<div class="q-opt" onclick="selectAnswer(' + i + ')"><div class="opt-letter">' + LETTERS[i] + '</div><span>' + escapeHTML(o) + '</span></div>'
  ).join('');

  const fb = document.getElementById('qFeedback');
  fb.className = 'q-feedback';
  fb.textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== SELECT ANSWER =====
function selectAnswer(idx) {
  const q = activeQuestions[currentQ];
  const opts = document.querySelectorAll('.q-opt');
  const ok = idx === q.correct;

  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct');
    else if (i === idx && !ok) o.classList.add('wrong');
    else o.classList.add('dim');
  });

  const fb = document.getElementById('qFeedback');
  fb.className = 'q-feedback show ' + (ok ? 'correct' : 'wrong');
  fb.innerHTML = ok
    ? '<strong>נכון!</strong> ' + escapeHTML(q.explanation)
    : '<strong>לא נכון.</strong> ' + escapeHTML(q.explanation);

  if (ok) score++;
  answers.push({ question: q.text, selected: idx, correct: ok });

  // Diagnostic branching
  const diagLen = quizConfig.diagnosticQuestions.length;
  if (currentQ < diagLen) {
    if (ok) diagnosticCorrect++;
    if (currentQ === diagLen - 1) {
      doBranching();
    }
  }

  // Update dots
  document.getElementById('qDots').innerHTML = Array.from({length: totalQuestions}, (_, i) => {
    let c = 'q-dot';
    if (i < answers.length) c += answers[i].correct ? ' done' : ' wrong-dot';
    else if (i === currentQ + 1) c += ' current';
    return '<div class="' + c + '"></div>';
  }).join('');

  const nb = document.getElementById('nextBtn');
  nb.style.display = 'block';
  nb.textContent = currentQ < totalQuestions - 1 ? 'שאלה הבאה' : 'סיום';
}

// ===== BRANCHING LOGIC =====
function doBranching() {
  const diagLen = quizConfig.diagnosticQuestions.length;
  const sets = quizConfig.questionSets;

  if (diagLen === 1) {
    // 1 diagnostic → 2 levels
    if (diagnosticCorrect === 1) {
      detectedLevel = 'מתקדם';
      activeQuestions = quizConfig.diagnosticQuestions.concat(sets.advanced || []);
    } else {
      detectedLevel = 'בסיסי';
      activeQuestions = quizConfig.diagnosticQuestions.concat(sets.basic || []);
    }
  } else {
    // 2 diagnostics → 3 levels
    if (diagnosticCorrect === 0) {
      detectedLevel = 'בסיסי';
      activeQuestions = quizConfig.diagnosticQuestions.concat(sets.basic || []);
    } else if (diagnosticCorrect === 1) {
      detectedLevel = 'בינוני';
      activeQuestions = quizConfig.diagnosticQuestions.concat(sets.medium || sets.basic || []);
    } else {
      detectedLevel = 'מתקדם';
      activeQuestions = quizConfig.diagnosticQuestions.concat(sets.advanced || []);
    }
  }
  totalQuestions = activeQuestions.length;
}

// ===== NEXT QUESTION =====
function nextQuestion() {
  currentQ++;
  if (currentQ >= totalQuestions) { showScore(); return; }
  const c = document.querySelector('#questionScreen .q-card');
  c.style.animation = 'none';
  c.offsetHeight;
  c.style.animation = 'fadeUp .45s ease';
  renderQuestion();
}

// ===== SCORE SCREEN =====
function showScore() {
  const p = Math.round(score / totalQuestions * 100);
  document.getElementById('progressFill').style.width = '100%';

  let ic, msg, bg;
  if (p >= 90) { ic = '🌟'; msg = 'מצוין! שליטה מעולה בחומר!'; bg = 'var(--green-l)'; }
  else if (p >= 70) { ic = '👏'; msg = 'כל הכבוד! ביצוע טוב מאוד!'; bg = 'var(--primary-l)'; }
  else if (p >= 50) { ic = '💪'; msg = 'אפשר לשפר – חיזרו על החומר'; bg = 'var(--accent-l)'; }
  else { ic = '📖'; msg = 'כדאי לחזור על החומר ולנסות שוב'; bg = 'var(--sec-l)'; }

  document.getElementById('scoreIcon').textContent = ic;
  document.getElementById('scoreNum').textContent = p;
  document.getElementById('scoreNum').style.color = p >= 70 ? 'var(--green)' : p >= 50 ? 'var(--accent)' : 'var(--secondary)';
  const m = document.getElementById('scoreMsg');
  m.textContent = msg;
  m.style.background = bg;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = totalQuestions - score;
  document.getElementById('totalCount').textContent = totalQuestions;
  showScreen('scoreScreen');
}

// ===== SEND RESULTS =====
function sendResults() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'שולח...';

  const meta = quizConfig._meta;
  const p = Math.round(score / totalQuestions * 100);
  const sheetName = meta.name + ' – ' + meta.grade;

  const params = new URLSearchParams({
    action: 'submit',
    quizName: sheetName,
    studentName: studentName,
    classroom: studentClass,
    score: p,
    totalQuestions: totalQuestions,
    correctAnswers: score,
    level: detectedLevel,
    teacherEmail: meta.email
  });

  const s = document.createElement('script');
  s.src = SHEETS_URL + '?' + params.toString();
  s.onload = s.onerror = function() {
    const st = document.getElementById('sendStatus');
    st.className = 'send-status success';
    st.textContent = 'התוצאות נשלחו בהצלחה למורה! ✓';
    btn.textContent = 'נשלח!';
    s.remove();
  };
  document.body.appendChild(s);
}

// ===== INIT =====
loadQuiz();
</script>
</body>
</html>
