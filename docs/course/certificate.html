<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תעודת סיום | קורס Claude Code — Learni</title>
  <meta name="description" content="תעודת סיום קורס Claude Code — מאפס לתוצרים מדהימים | Learni.">
  <link rel="stylesheet" href="course.css">
</head>
<body>
  <a href="#main" class="skip-link">דלגו לתוכן</a>

  <header class="course-header">
    <a href="index.html"><img src="../assets/lerani-logo.svg" alt="Learni" class="logo"></a>
    <nav>
      <a href="index.html" class="nav-link">&larr; חזרה לקורס</a>
    </nav>
  </header>

  <main class="course-main" id="main">
    <div class="certificate-wrapper">

      <!-- Name input (shown if course complete, name not set) -->
      <div id="name-form" style="text-align:center; margin-bottom:2rem;">
        <h2>הזינו את שמכם לתעודה</h2>
        <p style="color:var(--text-light); margin-bottom:1rem;">השם יופיע על תעודת הסיום</p>
        <div style="display:flex; gap:1rem; justify-content:center; max-width:400px; margin:0 auto;">
          <input type="text" id="cert-name-input" placeholder="השם המלא שלכם"
            style="flex:1; padding:.75rem 1rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:'Heebo',sans-serif; font-size:1rem; direction:rtl;">
          <button class="btn btn-primary" onclick="generateCertificate()">צרו תעודה</button>
        </div>
      </div>

      <!-- Certificate (hidden until name entered) -->
      <div id="certificate-display" style="display:none;">
        <div class="certificate">
          <img src="../assets/lerani-logo.svg" alt="Learni" class="cert-logo">
          <h1>תעודת סיום</h1>
          <p class="cert-text">ניתנת בזאת ל</p>
          <p class="cert-name" id="cert-name-display"></p>
          <p class="cert-text">
            על סיום בהצלחה את הקורס<br>
            <strong>Claude Code — מאפס לתוצרים מדהימים</strong><br>
            5 מודולים · 18 שיעורים
          </p>
          <p class="cert-date" id="cert-date"></p>
        </div>

        <div style="text-align:center; margin-top:2rem;">
          <button class="btn btn-primary btn-lg" onclick="window.print()">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            הורידו כ-PDF
          </button>
        </div>
      </div>

      <!-- Not complete message -->
      <div id="not-complete" style="display:none; text-align:center; padding:4rem 2rem;">
        <h2>עוד לא סיימתם את הקורס</h2>
        <p style="color:var(--text-light); margin:1rem 0 2rem;">השלימו את כל המודולים כדי לקבל את התעודה</p>
        <a href="index.html" class="btn btn-primary btn-lg">חזרו לקורס</a>
      </div>

    </div>
  </main>

  <footer class="course-footer">
    <img src="../assets/lerani-logo.svg" alt="Learni" class="footer-logo">
    <p>Learni — בינה מלאכותית שעובדת בשבילכם</p>
  </footer>

  <script src="course.js"></script>
  <script>
    // Certificate logic
    function generateCertificate() {
      const name = document.getElementById('cert-name-input').value.trim();
      if (!name) { alert('נא להזין שם'); return; }
      setUserName(name);
      showCertificate(name);
    }

    function showCertificate(name) {
      document.getElementById('name-form').style.display = 'none';
      document.getElementById('certificate-display').style.display = 'block';
      document.getElementById('cert-name-display').textContent = name;

      const today = new Date();
      const dateStr = today.toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('cert-date').textContent = dateStr;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const { percent } = getOverallProgress();

      if (percent < 100) {
        document.getElementById('name-form').style.display = 'none';
        document.getElementById('not-complete').style.display = 'block';
        return;
      }

      const savedName = getUserName();
      if (savedName) {
        showCertificate(savedName);
      }
    });
  </script>
</body>
</html>
