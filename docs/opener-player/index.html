<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פעילות פתיחה – השתתפות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2A9D8F;--primary-light:#E0F5F1;--primary-dark:#1E7A6E;
  --secondary:#E76F7A;--accent:#52B788;--orange:#F4A261;
  --dark:#1E293B;--gray:#64748B;--light-gray:#F1F5F9;--white:#FFFFFF;
  --radius:16px;
}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#E0F5F1 0%,#F1F5F9 50%,#EDE9FE 100%);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* LOADING */
.loading{text-align:center;padding:40px}
.loading .spinner{width:48px;height:48px;border:4px solid #E2E8F0;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-box{background:var(--white);border-radius:var(--radius);padding:40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:400px}
.error-box .icon{font-size:3rem;margin-bottom:12px}
.error-box h2{font-family:'Rubik',sans-serif;margin-bottom:8px}
.error-box p{color:var(--gray);font-size:0.9rem}

/* INTRO */
.intro{background:var(--white);border-radius:var(--radius);padding:40px 32px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:500px;width:100%;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.intro .icon{font-size:3rem;margin-bottom:12px}
.intro h1{font-family:'Rubik',sans-serif;font-size:1.6rem;margin-bottom:8px}
.intro .meta{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:12px 0 20px}
.tag{background:var(--light-gray);padding:4px 14px;border-radius:50px;font-size:0.85rem;color:var(--gray)}
.tag.hl{background:var(--primary);color:var(--white)}
.intro input{width:100%;border:2px solid #E2E8F0;border-radius:12px;padding:14px 18px;font-family:'Heebo',sans-serif;font-size:1.05rem;outline:none;direction:rtl;margin-bottom:12px;transition:border-color .25s}
.intro input:focus{border-color:var(--primary)}

/* MAIN */
.main-container{background:var(--white);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:600px;width:100%;overflow:hidden;display:none;animation:fadeUp .5s ease}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:var(--light-gray);border-bottom:2px solid #E2E8F0}
.tab{padding:14px 18px;cursor:pointer;font-weight:500;font-size:0.85rem;border-bottom:3px solid transparent;transition:all .25s;white-space:nowrap;text-align:center;flex:1}
.tab:hover{background:var(--primary-light)}
.tab.active{border-bottom-color:var(--primary);color:var(--primary);font-weight:700;background:var(--white)}

/* PANEL */
.panel{display:none;padding:28px 24px}
.panel.active{display:block;animation:fadeUp .3s ease}
.section-title{font-family:'Rubik',sans-serif;font-size:1.2rem;font-weight:600;text-align:center;margin-bottom:16px}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:500;padding:12px 24px;border-radius:12px;font-size:0.95rem;transition:all .25s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--white)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(42,157,143,0.3)}
.btn-secondary{background:var(--light-gray);color:var(--dark)}
.btn-block{width:100%;justify-content:center}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}

/* VOTE */
.vote-q{font-family:'Rubik',sans-serif;font-size:1.1rem;font-weight:600;text-align:center;margin-bottom:16px}
.vote-opts{display:flex;flex-direction:column;gap:10px}
.vote-o{border:2px solid #E2E8F0;background:var(--light-gray);padding:14px 18px;border-radius:14px;font-size:1.05rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:10px;text-align:right}
.vote-o:hover{border-color:var(--primary);background:var(--primary-light)}
.vote-o.voted{border-color:var(--primary);background:var(--primary-light);pointer-events:none}
.vote-o.voted::after{content:'✓';margin-right:auto;color:var(--primary);font-weight:700}
.vote-letter{background:var(--primary);color:var(--white);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:0.9rem}
.voted-msg{text-align:center;color:var(--accent);font-weight:600;margin-top:16px;font-size:1.1rem;display:none}

/* WORDCLOUD */
.wc-prompt{font-family:'Rubik',sans-serif;font-size:1.1rem;font-weight:600;text-align:center;margin-bottom:16px}
.wc-input-row{display:flex;gap:10px;margin-bottom:16px}
.wc-input{flex:1;border:2px solid #E2E8F0;border-radius:12px;padding:12px 16px;font-family:'Heebo',sans-serif;font-size:1.05rem;outline:none;direction:rtl}
.wc-input:focus{border-color:var(--primary)}
.wc-area{min-height:120px;border:2px dashed #E2E8F0;border-radius:16px;padding:16px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px}
.wc-area.has{border-color:var(--primary);background:var(--primary-light)}
.wc-word{display:inline-block;padding:5px 14px;border-radius:50px;font-family:'Rubik',sans-serif;font-weight:500;color:var(--white);animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.wc-empty{color:var(--gray);font-size:0.9rem}
.wc-count{text-align:center;font-size:0.8rem;color:var(--gray);margin-top:8px}

/* GUESS NUMBER */
.big-question{font-family:'Rubik',sans-serif;font-size:1.2rem;font-weight:600;text-align:center;padding:20px;background:var(--primary-light);border-radius:16px;margin-bottom:16px;line-height:1.7}
.result-box{padding:16px;border-radius:14px;text-align:center;color:var(--white);font-weight:600;display:none;animation:fadeUp .3s ease;margin-top:12px}

/* DILEMMA */
.dilemma-text{font-size:1.05rem;line-height:1.8;padding:20px;background:var(--primary-light);border-radius:16px;margin-bottom:16px;text-align:center}
.dilemma-opts{display:flex;flex-direction:column;gap:10px}
.dilemma-o{background:var(--white);border:2px solid #E2E8F0;border-radius:14px;padding:16px;cursor:pointer;transition:all .25s;text-align:center;font-weight:600}
.dilemma-o:hover{border-color:var(--primary);background:var(--primary-light)}
.dilemma-o.chosen{border-color:var(--primary);background:var(--primary-light);pointer-events:none}

/* THANK YOU */
.thankyou{text-align:center;padding:24px;display:none}
.thankyou .icon{font-size:3rem;margin-bottom:8px}
.thankyou h3{font-family:'Rubik',sans-serif;margin-bottom:8px}

footer{text-align:center;padding:20px;color:var(--gray);font-size:0.75rem;margin-top:auto}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading">
  <div class="spinner"></div>
  <div>טוען פעילות...</div>
</div>

<!-- ERROR -->
<div id="errorScreen" class="error-box" style="display:none">
  <div class="icon">😕</div>
  <h2>אופס!</h2>
  <p id="errorMsg">לא נמצאה פעילות</p>
</div>

<!-- INTRO -->
<div id="introScreen" class="intro" style="display:none">
  <div class="icon">🎯</div>
  <h1 id="openerTitle">פעילויות פתיחה</h1>
  <div class="meta">
    <span class="tag hl" id="tagSubject"></span>
    <span class="tag" id="tagGrade"></span>
  </div>
  <input type="text" id="studentName" placeholder="מה השם שלך?">
  <button class="btn btn-primary btn-block" onclick="joinActivity()">🚀 הצטרפו!</button>
</div>

<!-- MAIN ACTIVITY -->
<div id="mainContainer" class="main-container">
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<div class="thankyou" id="thankyou">
  <div class="icon">🎉</div>
  <h3>תודה על ההשתתפות!</h3>
  <p style="color:var(--gray)">התשובה שלכם נשמרה</p>
</div>

<footer>אורט בית הערבה – פעילויות פתיחה</footer>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyLwo3jrseEDJ4GLnVNCzoJTRJBK_IAkJE0IiGGcx18buwJQ0XSRgOcJ2FmbMtA5ojU/exec';

let openerData = null;
let openerMeta = null;
let studentName = '';
let openerId = '';

// ===== LOAD =====
function loadOpener() {
  openerId = new URLSearchParams(window.location.search).get('id');
  if (!openerId) { showError('לא צוין מזהה פעילות. בקשו מהמורה קישור חדש.'); return; }

  const callbackName = 'openerCallback_' + Date.now();

  window[callbackName] = function(data) {
    delete window[callbackName];
    if (data.error) { showError('הפעילות לא נמצאה.'); return; }
    try {
      openerMeta = data;
      openerData = JSON.parse(data.openerJSON);
      showIntro();
    } catch (e) {
      showError('שגיאה בטעינת הפעילות.');
    }
  };

  const script = document.createElement('script');
  script.src = SHEETS_URL + '?action=getOpener&id=' + encodeURIComponent(openerId) + '&callback=' + callbackName;
  script.onerror = () => showError('שגיאה בחיבור לשרת.');

  setTimeout(() => {
    if (window[callbackName]) {
      delete window[callbackName];
      showError('זמן הטעינה עבר. נסו שוב.');
    }
  }, 15000);

  document.body.appendChild(script);
}

function showError(msg) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

function showIntro() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('introScreen').style.display = 'block';
  document.getElementById('openerTitle').textContent = 'פעילויות פתיחה – ' + (openerMeta.name || '');
  document.getElementById('tagSubject').textContent = openerMeta.subject || '';
  document.getElementById('tagGrade').textContent = 'כיתה ' + (openerMeta.grade || '') + '׳';
}

function joinActivity() {
  studentName = document.getElementById('studentName').value.trim();
  if (!studentName) { document.getElementById('studentName').style.borderColor = 'var(--secondary)'; return; }
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('mainContainer').style.display = 'block';
  buildActivities();
}

// ===== BUILD =====
const TYPES = {
  question:   { icon: '🤔', name: 'שאלה' },
  story:      { icon: '📖', name: 'סיפור' },
  vote:       { icon: '📊', name: 'סקר' },
  riddle:     { icon: '🔍', name: 'חידה' },
  truefalse:  { icon: '✅', name: 'נכון/לא' },
  dilemma:    { icon: '🎭', name: 'דילמה' },
  image:      { icon: '🖼️', name: 'תמונה' },
  wordcloud:  { icon: '☁️', name: 'ענן מילים' },
  wheel:      { icon: '🎲', name: 'גלגל' },
  fillblank:  { icon: '🧩', name: 'השלמה' },
  guessnumber:{ icon: '🏆', name: 'ניחוש' },
  twotruths:  { icon: '💬', name: 'אמת/שקר' }
};

const letters = ['א','ב','ג','ד','ה','ו'];
const wcColors = ['linear-gradient(135deg,#2A9D8F,#52B788)','linear-gradient(135deg,#6366F1,#818CF8)','linear-gradient(135deg,#E76F7A,#F87171)','linear-gradient(135deg,#F4A261,#FBBF24)','linear-gradient(135deg,#7C3AED,#A78BFA)','linear-gradient(135deg,#0EA5E9,#38BDF8)'];

let wcData = {};

function buildActivities() {
  const acts = openerData.activities;
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');

  acts.forEach((act, i) => {
    const t = TYPES[act.type] || { icon: '📝', name: act.type };

    // Tab
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.icon + ' ' + t.name;
    tab.onclick = () => switchTab(i);
    tabsEl.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel_' + i;
    panel.innerHTML = buildPanel(act, i);
    panelsEl.appendChild(panel);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

function buildPanel(act, idx) {
  const d = act.data;
  switch(act.type) {
    case 'vote':
      return `<div class="section-title">📊 סקר כיתתי</div>
        <div class="vote-q">${d.question || ''}</div>
        <div class="vote-opts">${(d.options||[]).map((o, j) =>
          `<div class="vote-o" onclick="submitVote(${idx},${j})" id="vo_${idx}_${j}"><span class="vote-letter">${letters[j]||j+1}</span><span>${o}</span></div>`
        ).join('')}</div>
        <div class="voted-msg" id="votedMsg_${idx}">✅ ההצבעה נשמרה!</div>`;

    case 'wordcloud':
      return `<div class="section-title">☁️ ענן מילים</div>
        <div class="wc-prompt">${d.prompt || 'כתבו מילה...'}</div>
        <div class="wc-input-row">
          <input type="text" class="wc-input" id="wcInput_${idx}" placeholder="כתבו מילה..." maxlength="20" onkeydown="if(event.key==='Enter')submitWord(${idx})">
          <button class="btn btn-primary" onclick="submitWord(${idx})">➕</button>
        </div>
        <div class="wc-area" id="wcArea_${idx}"><span class="wc-empty">🌤️ הוסיפו מילים!</span></div>
        <div class="wc-count" id="wcCount_${idx}"></div>`;

    case 'guessnumber':
      return `<div class="section-title">🏆 ניחוש מספר</div>
        <div class="big-question">${d.question || 'כמה...?'}</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <input type="number" class="wc-input" id="gnInput_${idx}" placeholder="הניחוש שלכם..." style="max-width:180px;text-align:center;font-size:1.2rem">
          <button class="btn btn-primary" onclick="submitGuess(${idx})">🏆 שלח</button>
        </div>
        <div class="result-box" id="gnResult_${idx}"></div>`;

    case 'dilemma':
      return `<div class="section-title">🎭 מה היית עושה?</div>
        <div class="dilemma-text">${d.scenario || ''}</div>
        <div class="dilemma-opts">${(d.options||[]).map((o, j) =>
          `<div class="dilemma-o" onclick="submitDilemma(${idx},${j})">${o.text || 'אפשרות'}</div>`
        ).join('')}</div>
        <div class="voted-msg" id="dilemmaMsg_${idx}">✅ הבחירה נשמרה!</div>`;

    default:
      // Non-shared activities show a "view on teacher's screen" message
      return `<div style="text-align:center;padding:24px">
        <div style="font-size:3rem;margin-bottom:12px">${(TYPES[act.type]||{}).icon || '📝'}</div>
        <h3 style="font-family:'Rubik',sans-serif;margin-bottom:8px">פעילות זו מוצגת על מסך המורה</h3>
        <p style="color:var(--gray);font-size:0.9rem">עקבו אחרי המסך בכיתה 👀</p>
      </div>`;
  }
}

// ===== SUBMISSIONS =====
function submitVote(actIdx, optIdx) {
  document.querySelectorAll(`#panel_${actIdx} .vote-o`).forEach(o => o.classList.remove('voted'));
  document.getElementById(`vo_${actIdx}_${optIdx}`).classList.add('voted');
  document.getElementById(`votedMsg_${actIdx}`).style.display = 'block';

  sendToSheets({
    action: 'openerVote',
    openerId: openerId,
    activityIndex: actIdx,
    student: studentName,
    optionIndex: optIdx,
    timestamp: new Date().toISOString()
  });
}

function submitWord(actIdx) {
  const input = document.getElementById('wcInput_' + actIdx);
  const word = input.value.trim();
  if (!word) return;

  if (!wcData[actIdx]) wcData[actIdx] = {};
  wcData[actIdx][word] = (wcData[actIdx][word] || 0) + 1;
  input.value = '';
  input.focus();

  renderLocalWC(actIdx);

  sendToSheets({
    action: 'openerWord',
    openerId: openerId,
    activityIndex: actIdx,
    student: studentName,
    word: word,
    timestamp: new Date().toISOString()
  });
}

function renderLocalWC(actIdx) {
  const area = document.getElementById('wcArea_' + actIdx);
  const countEl = document.getElementById('wcCount_' + actIdx);
  if (!area) return;
  const entries = Object.entries(wcData[actIdx] || {});
  let html = '';
  entries.forEach(([word, count], i) => {
    const sz = count >= 3 ? '1.4rem' : count >= 2 ? '1.1rem' : '0.9rem';
    html += `<span class="wc-word" style="background:${wcColors[i % wcColors.length]};font-size:${sz}">${word}${count > 1 ? ' ('+count+')' : ''}</span>`;
  });
  area.innerHTML = html || '<span class="wc-empty">🌤️ הוסיפו מילים!</span>';
  area.classList.toggle('has', entries.length > 0);
  const total = Object.values(wcData[actIdx]||{}).reduce((a,b)=>a+b,0);
  if (countEl) countEl.textContent = entries.length > 0 ? entries.length + ' מילים | ' + total + ' סה"כ' : '';
}

function submitGuess(actIdx) {
  const input = document.getElementById('gnInput_' + actIdx);
  const guess = parseFloat(input.value);
  if (isNaN(guess)) return;

  const el = document.getElementById('gnResult_' + actIdx);
  el.style.display = 'block';
  el.style.background = 'linear-gradient(135deg,var(--primary),var(--accent))';
  el.textContent = '✅ הניחוש שלכם נשמר: ' + guess;

  sendToSheets({
    action: 'openerGuess',
    openerId: openerId,
    activityIndex: actIdx,
    student: studentName,
    guess: guess,
    timestamp: new Date().toISOString()
  });
}

function submitDilemma(actIdx, optIdx) {
  document.querySelectorAll(`#panel_${actIdx} .dilemma-o`).forEach(o => o.classList.remove('chosen'));
  event.target.closest('.dilemma-o').classList.add('chosen');
  document.getElementById(`dilemmaMsg_${actIdx}`).style.display = 'block';

  sendToSheets({
    action: 'openerDilemma',
    openerId: openerId,
    activityIndex: actIdx,
    student: studentName,
    optionIndex: optIdx,
    timestamp: new Date().toISOString()
  });
}

function sendToSheets(data) {
  try {
    fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });
  } catch (e) { /* silent */ }
}

// ===== START =====
loadOpener();
</script>
</body>
</html>
