<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#C9A96E">
<link rel="manifest" href="manifest.json">
<title>סטודיו עיצוב</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF5EC;--card:#fff;--text:#3A3A50;--muted:#8A847D;--border:#E8DDD0;--gold:#C9A96E;--accent:#D4766E}
body{font-family:Heebo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* Bottom Nav (mobile app feel) */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding:6px 0;box-shadow:0 -2px 12px rgba(0,0,0,.05)}
.bottom-nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;font-family:Heebo;font-size:.68rem;color:var(--muted);cursor:pointer;transition:.2s}
.bottom-nav button.active{color:var(--gold)}
.bottom-nav button svg{width:22px;height:22px}

/* Header */
.app-header{background:linear-gradient(160deg,#F0E6D3 0%,#FAF5EC 50%,#F0E6D3 100%);padding:20px;text-align:center;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.app-header h1{font-size:1.4rem;font-weight:800;color:var(--text)}
.app-header p{font-size:.82rem;color:var(--muted);margin-top:2px}

/* Pages */
.page{display:none;padding:16px;max-width:800px;margin:0 auto}
.page.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Section titles */
.sec-title{font-size:1.1rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title svg{width:20px;height:20px;flex-shrink:0}

/* Palette cards */
.pal-card{background:var(--card);border-radius:18px;overflow:hidden;border:2px solid var(--border);margin-bottom:14px;transition:.3s;cursor:pointer}
.pal-card:hover,.pal-card:active{border-color:var(--gold);box-shadow:0 6px 24px rgba(0,0,0,.06)}
.pal-card.selected{border-color:var(--accent);border-width:3px}
.pal-colors{display:flex;height:50px}
.pal-colors div{flex:1}
.pal-info{padding:14px}
.pal-name{font-weight:700;font-size:.95rem;margin-bottom:3px}
.pal-desc{font-size:.8rem;color:var(--muted);margin-bottom:6px;line-height:1.5}
.pal-tags{display:flex;gap:4px;flex-wrap:wrap}
.pal-tag{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:600}
.pal-hex{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.pal-hex span{font-size:.65rem;padding:2px 6px;border-radius:8px;font-weight:500}

/* Preview */
.preview-box{background:var(--card);border-radius:18px;border:2px solid var(--border);overflow:hidden;margin-bottom:14px}
.preview-hero{padding:28px 20px;text-align:center;position:relative}
.preview-hero h2{font-size:1.5rem;font-weight:900;position:relative;z-index:2}
.preview-hero p{font-size:.88rem;opacity:.8;position:relative;z-index:2;margin-top:4px}
.preview-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 16px}
.preview-card{border-radius:12px;padding:14px 8px;text-align:center;border:2px solid}
.preview-card .num{font-size:1.3rem;font-weight:900}
.preview-card .lbl{font-size:.7rem;margin-top:2px}
.preview-btns{display:flex;gap:8px;justify-content:center;padding-bottom:16px}
.preview-btns span{padding:8px 20px;border-radius:20px;font-size:.82rem;font-weight:600}

/* Style cards */
.sty-card{background:var(--card);border-radius:18px;overflow:hidden;border:2px solid var(--border);margin-bottom:14px;transition:.3s}
.sty-card:hover{border-color:var(--gold)}
.sty-preview{height:170px;padding:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden}
.sty-preview h3{position:relative;z-index:2;font-size:1.35rem}
.sty-preview p{position:relative;z-index:2;font-size:.82rem;opacity:.7;margin-top:4px}
.sty-preview .deco{position:absolute;pointer-events:none}
.sty-info{padding:14px;border-top:1px solid var(--border)}
.sty-name{font-weight:700;font-size:.95rem;margin-bottom:3px}
.sty-desc{font-size:.8rem;color:var(--muted);line-height:1.5;margin-bottom:6px}

/* Font cards */
.fnt-card{background:var(--card);border-radius:16px;padding:18px;border:2px solid var(--border);margin-bottom:12px}
.fnt-title{font-size:1.4rem;margin-bottom:4px;line-height:1.3}
.fnt-body{font-size:.9rem;color:var(--muted);margin-bottom:8px;line-height:1.6}
.fnt-names{display:flex;gap:6px;flex-wrap:wrap}
.fnt-names span{font-size:.7rem;background:#F0E6D3;padding:3px 10px;border-radius:8px;color:var(--muted)}

/* Inspiration gallery */
.insp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.insp-item{border-radius:14px;overflow:hidden;border:2px solid var(--border);transition:.3s}
.insp-item:hover{border-color:var(--gold);transform:translateY(-2px)}
.insp-item img{width:100%;display:block;height:120px;object-fit:cover}
.insp-item .cap{padding:8px;font-size:.72rem;color:var(--muted);text-align:center;background:#fff}

/* Search */
.search-box{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:10px 16px;width:100%;font-family:Heebo;font-size:.9rem;margin-bottom:16px}
.search-box:focus{outline:none;border-color:var(--gold)}

/* Filter chips */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:var(--card);font-family:Heebo;font-size:.8rem;cursor:pointer;transition:.2s;font-weight:500;color:var(--muted)}
.filter-chip:hover{border-color:var(--gold)}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}

@media(min-width:600px){
  .insp-grid{grid-template-columns:repeat(4,1fr)}
  .preview-cards{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:900px){
  body{padding-bottom:0}
  .bottom-nav{position:static;background:transparent;border:none;box-shadow:none;justify-content:center;gap:8px;padding:12px 0}
  .bottom-nav button{flex:none;flex-direction:row;gap:6px;padding:10px 20px;border-radius:20px;font-size:.85rem}
  .bottom-nav button.active{background:var(--text);color:#fff;border-radius:20px}
}
</style>
</head>

</nav>

<!-- ===== PAGE: PALETTES ===== -->
<div class="page active" id="page-palettes">

  <div class="filters" id="palFilters">
    <div class="filter-chip active" onclick="filterCat('all')">הכל</div>
    <div class="filter-chip" onclick="filterCat('warm')">חם</div>
    <div class="filter-chip" onclick="filterCat('pastel')">פסטל</div>

    <div class="filter-chip" onclick="filterCat('pro')">מקצועי</div>
  </div>

</div>

<!-- ===== PAGE: STYLES ===== -->
<div class="page" id="page-styles">
  <div class="sec-title"><svg viewBox="0 0 24 24" fill="none" stroke="#C9A96E" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg> סגנונות עיצוב</div>

<!-- ===== PAGE: FONTS ===== -->
<div class="page" id="page-fonts">

  <div id="fntGrid"></div>
</div>

<!-- ===== PAGE: FORMATS ===== -->
<div class="page" id="page-formats">
  <div class="sec-title"><svg viewBox="0 0 24 24" fill="none" stroke="#C9A96E" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> גדלים ופורמטים</div>

    <div class="filter-chip" onclick="filterFmt('presentation')">מצגות</div>

    <div class="filter-chip" onclick="filterFmt('web')">אתרים</div>
  </div>

</div>

// ===== RENDER =====
let currentCat = 'all';
let selectedPal = null;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function filterCat(cat){
  currentCat=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.textContent.includes(cat==='all'?'הכל':cat==='warm'?'חם':cat==='pastel'?'פסטל':cat==='bold'?'נועז':cat==='nature'?'טבע':'מקצועי')));
  renderPalettes();
}

function filterPalettes(q){
  renderPalettes(q.toLowerCase());
}

function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>150}

function renderPalettes(search=''){
  const list=allPalettes.filter(p=>{
    if(currentCat!=='all'&&!p.cat.includes(currentCat))return false;
    if(search&&!p.name.includes(search)&&!p.desc.includes(search))return false;
    return true;
  });
  document.getElementById('palGrid').innerHTML=list.map((p,i)=>`
    <div class="pal-card${selectedPal===p.name?' selected':''}" onclick="selectPal('${p.name}')">
      <div class="pal-colors">${p.colors.map(c=>`<div style="background:${c}"></div>`).join('')}</div>
      <div class="pal-info">
        <div class="pal-name">${p.name}</div>
        <div class="pal-desc">${p.desc}</div>
        <div class="pal-hex">${p.colors.map((c,j)=>`<span style="background:${c};color:${isLight(c)?'#333':'#fff'}">${p.names[j]}</span>`).join('')}</div>
      </div>
    </div>`).join('')||(search||currentCat!=='all'?'<div style="text-align:center;padding:30px;color:var(--muted)">לא נמצאו תוצאות</div>':'');
}

function selectPal(name){
  selectedPal=name;
  const p=allPalettes.find(x=>x.name===name);
  renderPalettes();
  const box=document.getElementById('previewBox');
  box.style.display='';
  box.innerHTML=`
    <div class="preview-hero" style="background:linear-gradient(135deg,${p.primary},${p.secondary});color:${isLight(p.primary)?'#333':'#fff'}">
      <h2>כותרת ראשית</h2><p>טקסט משנה – כך זה ייראה</p>
    </div>
    <div class="preview-cards">
      <div class="preview-card" style="border-color:${p.colors[0]};background:${p.bg}"><div class="num" style="color:${p.colors[0]}">45</div><div class="lbl" style="color:${p.text}">מורים</div></div>
      <div class="preview-card" style="border-color:${p.colors[1]};background:${p.bg}"><div class="num" style="color:${p.colors[1]}">342</div><div class="lbl" style="color:${p.text}">שעות</div></div>
      <div class="preview-card" style="border-color:${p.colors[2]};background:${p.bg}"><div class="num" style="color:${p.colors[2]}">85%</div><div class="lbl" style="color:${p.text}">שיבוץ</div></div>
    </div>
    <div class="preview-btns">
      <span style="background:${p.accent};color:${isLight(p.accent)?'#333':'#fff'}">כפתור ראשי</span>
      <span style="border:2px solid ${p.primary};color:${p.text}">כפתור משני</span>
    </div>`;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderStyles(){
  document.getElementById('styGrid').innerHTML=designStyles.map(s=>{
    let deco='';
    if(s.deco==='flowers')deco=`<div class="deco" style="top:-5px;right:-5px;width:70px;height:70px;opacity:.2"><svg viewBox="0 0 70 70" fill="none"><circle cx="35" cy="15" r="10" fill="${s.accent}" opacity=".4"/><circle cx="50" cy="30" r="7" fill="${s.sec}" opacity=".4"/><path d="M25 45 C30 25 45 20 55 30" stroke="${s.sec}" stroke-width="1.5" fill="none"/></svg></div>`;
    if(s.deco==='dots')deco=`<div class="deco" style="inset:0;opacity:.07;background-image:radial-gradient(${s.accent} 4px,transparent 4px),radial-gradient(${s.sec} 3px,transparent 3px);background-size:40px 40px,55px 55px;background-position:0 0,18px 18px"></div>`;
    if(s.deco==='watercolor')deco=`<div class="deco" style="top:10px;right:15px;width:45px;height:45px;border-radius:50%;background:${s.accent};opacity:.15;filter:blur(8px)"></div><div class="deco" style="bottom:15px;left:20px;width:30px;height:30px;border-radius:50%;background:${s.sec};opacity:.12;filter:blur(6px)"></div>`;
    if(s.deco==='shapes')deco=`<div class="deco" style="top:-10px;left:-10px;width:50px;height:50px;border-radius:50%;background:${s.accent};opacity:.1"></div><div class="deco" style="bottom:-8px;right:-8px;width:60px;height:30px;border-radius:15px;background:${s.sec};opacity:.08;transform:rotate(-15deg)"></div>`;
    if(s.deco==='borders')deco=`<div class="deco" style="top:12px;right:12px;bottom:12px;left:12px;border:2.5px solid ${s.accent};border-radius:12px;opacity:.2"></div>`;
    return `<div class="sty-card">
      <div class="sty-preview" style="background:${s.bg}">

function filterFmt(cat){
  currentFmt=cat;
  document.querySelectorAll('#page-formats .filter-chip').forEach(c=>c.classList.toggle('active',c.textContent.includes(cat==='all'?'הכל':catNames[cat]||'')));
  renderFormats();
}

function renderFormats(){
  const list=formats.filter(f=>currentFmt==='all'||f.cat===currentFmt);
  document.getElementById('fmtGrid').innerHTML=list.map(f=>{
    const ratio=f.w/f.h;
    const previewW=Math.min(60,60*ratio);
    const previewH=Math.min(60,60/ratio);
    const col=catColors[f.cat];
    return `<div style="background:var(--card);border-radius:14px;border:2px solid var(--border);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:.2s" onmouseover="this.style.borderColor='${col}'" onmouseout="this.style.borderColor='var(--border)'">

        <div style="width:${previewW}px;height:${previewH}px;border-radius:4px;background:${col}18;border:2px solid ${col};display:flex;align-items:center;justify-content:center;font-size:.55rem;color:${col};font-weight:600">${f.aspect}</div>

  }).join('');
}
