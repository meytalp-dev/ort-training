<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>מיטל פלג – סגנון פרחי צבעי מים</title>
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@300;400;700;800&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Heebo,sans-serif;
  background:#FFF8F0;
  color:#4A3050;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:700px;
  background:#FFFDF8;
  border-radius:28px;
  position:relative;
  overflow:hidden;
  box-shadow:0 12px 50px rgba(74,48,80,.08);
  padding:60px 40px 40px;
  min-height:85vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

/* === Watercolor flowers bottom === */
.flowers-bottom{
  position:absolute;
  bottom:0;left:0;right:0;
  height:220px;
  pointer-events:none;
}
.flowers-bottom svg{width:100%;height:100%}

/* === Watercolor flowers top corners === */
.flowers-top-right{
  position:absolute;top:-20px;left:-20px;width:180px;height:180px;pointer-events:none;opacity:.7;
}
.flowers-top-left{
  position:absolute;top:-10px;right:-10px;width:140px;height:140px;pointer-events:none;opacity:.5;transform:scaleX(-1);
}

/* === Paper note === */
.paper-note{
  background:rgba(220,215,205,.45);
  padding:20px 32px;
  border-radius:4px;
  position:relative;
  margin-bottom:20px;
  box-shadow:2px 3px 8px rgba(0,0,0,.06);
  transform:rotate(-1deg);
}
.paper-note::before{
  content:'';position:absolute;top:-3px;left:10%;right:10%;height:4px;
  background:repeating-linear-gradient(90deg,rgba(220,215,205,.6) 0px,rgba(220,215,205,.6) 8px,transparent 8px,transparent 12px);
}

/* === Title === */
.title{
  font-family:Heebo,sans-serif;
  font-size:clamp(2rem,5vw,2.8rem);
  font-weight:700;
  color:#4A3050;
  line-height:1.2;
  margin-bottom:8px;
  position:relative;z-index:2;
}
.slogan{
  font-family:Heebo,sans-serif;
  font-size:clamp(.95rem,2.2vw,1.15rem);
  font-weight:400;
  color:#7A6080;
  line-height:1.6;
  position:relative;z-index:2;
}

/* === Logo === */
.logo-area{
  margin:16px 0 8px;
  position:relative;z-index:2;
}
.logo-area img{height:28px;opacity:.5}

/* === Diagram === */
.diagram{
  display:flex;gap:12px;margin:6px 0 0;position:relative;z-index:2;flex-wrap:wrap;justify-content:center;
}
.diagram-item{
  width:90px;height:90px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;color:#fff;position:relative;
}
.diagram-item span{font-size:.65rem;font-weight:400;opacity:.85;margin-top:2px}
.diagram-connector{
  position:absolute;top:50%;width:20px;height:2px;left:-16px;
}

/* === Buttons === */
.buttons{
  display:flex;gap:10px;margin-top:14px;position:relative;z-index:2;flex-wrap:wrap;justify-content:center;
}
.btn{
  padding:8px 20px;border-radius:22px;
  font-family:Heebo;font-size:.82rem;font-weight:500;
  cursor:pointer;transition:.2s;
}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:#E8A0BF;color:#fff;border:none;box-shadow:0 2px 8px rgba(232,160,191,.3)}
.btn-secondary{background:transparent;color:#9B7EC8;border:1.5px solid rgba(155,126,200,.3)}
.btn-secondary:hover{border-color:rgba(155,126,200,.6)}

.mini-chart{
  display:flex;flex-direction:column;gap:6px;width:70%;margin:14px auto 0;position:relative;z-index:2;
}
.chart-bar{
  height:10px;border-radius:5px;opacity:.6;
}

/* === Decorative dots === */
.dot{position:absolute;border-radius:50%;pointer-events:none}

@media(max-width:500px){
  .card{padding:40px 20px 30px;border-radius:20px}
  .diagram-item{width:70px;height:70px;font-size:.65rem}
}
</style>
</head>
<body>

<div class="card">
  <!-- Decorative dots -->
  <div class="dot" style="width:8px;height:8px;background:#E8A0BF;top:40px;right:60px;opacity:.4"></div>
  <div class="dot" style="width:5px;height:5px;background:#B5C8E4;top:80px;right:30px;opacity:.3"></div>
  <div class="dot" style="width:6px;height:6px;background:#A7D7C5;top:30px;left:80px;opacity:.35"></div>
  <div class="dot" style="width:10px;height:10px;background:#F5C6C0;top:100px;left:40px;opacity:.25"></div>

  <!-- Top corner flowers -->
  <div class="flowers-top-right">
    <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="50" r="18" fill="#E8A0BF" opacity=".3"/>
      <circle cx="70" cy="30" r="12" fill="#B5C8E4" opacity=".35"/>
      <circle cx="30" cy="80" r="10" fill="#F5C6C0" opacity=".3"/>
      <circle cx="90" cy="60" r="8" fill="#A7D7C5" opacity=".3"/>
      <circle cx="55" cy="70" r="6" fill="#9B7EC8" opacity=".25"/>
      <path d="M50 90 C45 60 60 40 80 35" stroke="#A7D7C5" stroke-width="1.5" opacity=".3"/>
      <path d="M25 100 C30 75 40 60 55 50" stroke="#E8A0BF" stroke-width="1" opacity=".25"/>
      <!-- Flower petals -->
      <ellipse cx="40" cy="45" rx="7" ry="4" transform="rotate(-30 40 45)" fill="#E8A0BF" opacity=".2"/>
      <ellipse cx="40" cy="55" rx="7" ry="4" transform="rotate(30 40 55)" fill="#E8A0BF" opacity=".2"/>
      <ellipse cx="45" cy="50" rx="4" ry="7" fill="#E8A0BF" opacity=".2"/>
      <circle cx="40" cy="50" r="3" fill="#F5C6C0" opacity=".4"/>
    </svg>
  </div>

  <!-- Paper note with slogan -->
  <div class="paper-note">
    <div class="slogan">לחשוב קדימה.</div>
    <div class="slogan">לחלום בגדול.</div>
    <div class="slogan">לבנות מחדש.</div>
  </div>

  <!-- Title -->
  <div class="title">מיטל פלג</div>
  <div style="font-size:1.15rem;color:#9B7EC8;margin-bottom:4px;font-weight:400;letter-spacing:.5px">מנהלת בית ספר ויזמית חינוכית דיגיטלית</div>

  <!-- Logo -->
  <div class="logo-area">
    <img src="../logo.png" alt="לרני">
  </div>

  <!-- Mini diagram -->
  <div class="diagram">
    <div class="diagram-item" style="background:linear-gradient(135deg,#E8A0BF,#D48AA8)">
      חזון
      <span>לחשוב</span>
    </div>
    <div class="diagram-item" style="background:linear-gradient(135deg,#B5C8E4,#9AB0D0)">
      תכנון
      <span>לחלום</span>
    </div>
    <div class="diagram-item" style="background:linear-gradient(135deg,#A7D7C5,#8DC0AE)">
      יצירה
      <span>לבנות</span>
    </div>
    <div class="diagram-item" style="background:linear-gradient(135deg,#9B7EC8,#8568B0)">
      השפעה
      <span>להוביל</span>
    </div>
  </div>

  <!-- UI Demo Buttons -->
  <div class="buttons">
    <span class="btn btn-primary">ראשי</span>
    <span class="btn btn-secondary">תרשימים</span>
    <span class="btn btn-secondary">גלריה</span>
    <span class="btn btn-secondary">אודות</span>
  </div>

  <!-- Mini chart bar -->
  <div class="mini-chart">
    <div class="chart-bar" style="width:85%;background:linear-gradient(90deg,#E8A0BF,#B5C8E4)"></div>
    <div class="chart-bar" style="width:65%;background:linear-gradient(90deg,#A7D7C5,#B5C8E4)"></div>
    <div class="chart-bar" style="width:45%;background:linear-gradient(90deg,#9B7EC8,#E8A0BF)"></div>
  </div>

  <!-- Bottom flowers -->
  <div class="flowers-bottom">
    <svg viewBox="0 0 700 220" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
      <!-- Stems -->
      <path d="M50 220 C55 180 45 140 60 100" stroke="#8BC5A0" stroke-width="1.5" opacity=".5"/>
      <path d="M120 220 C115 170 130 130 125 80" stroke="#A7D7C5" stroke-width="1.5" opacity=".5"/>
      <path d="M200 220 C195 175 210 140 205 95" stroke="#8BC5A0" stroke-width="1" opacity=".4"/>
      <path d="M280 220 C285 185 275 150 290 110" stroke="#B5C8E4" stroke-width="1.5" opacity=".4"/>
      <path d="M350 220 C345 180 360 145 355 100" stroke="#A7D7C5" stroke-width="1" opacity=".5"/>
      <path d="M430 220 C435 175 420 135 440 90" stroke="#8BC5A0" stroke-width="1.5" opacity=".4"/>
      <path d="M500 220 C495 180 510 150 505 105" stroke="#B5C8E4" stroke-width="1" opacity=".4"/>
      <path d="M570 220 C575 185 560 140 580 95" stroke="#A7D7C5" stroke-width="1.5" opacity=".5"/>
      <path d="M640 220 C635 175 650 135 645 90" stroke="#8BC5A0" stroke-width="1" opacity=".4"/>

      <!-- Flowers - pink/rose -->
      <circle cx="60" cy="95" r="14" fill="#E8A0BF" opacity=".5"/>
      <circle cx="60" cy="95" r="8" fill="#F5C6C0" opacity=".5"/>
      <circle cx="60" cy="95" r="4" fill="#FFE0D0" opacity=".6"/>

      <!-- Flowers - orange/warm -->
      <circle cx="125" cy="75" r="16" fill="#F5C6A0" opacity=".45"/>
      <circle cx="125" cy="75" r="9" fill="#FFD4A8" opacity=".5"/>
      <ellipse cx="118" cy="68" rx="5" ry="8" transform="rotate(-20 118 68)" fill="#F5B580" opacity=".3"/>
      <ellipse cx="132" cy="68" rx="5" ry="8" transform="rotate(20 132 68)" fill="#F5B580" opacity=".3"/>

      <!-- Flowers - purple lavender -->
      <ellipse cx="205" cy="90" rx="4" ry="7" fill="#9B7EC8" opacity=".4"/>
      <ellipse cx="200" cy="95" rx="4" ry="7" fill="#B5A0D8" opacity=".35"/>
      <ellipse cx="210" cy="93" rx="4" ry="7" fill="#9B7EC8" opacity=".3"/>
      <ellipse cx="203" cy="100" rx="4" ry="6" fill="#C5B0E0" opacity=".3"/>

      <!-- Flowers - blue -->
      <circle cx="290" cy="105" r="12" fill="#B5C8E4" opacity=".45"/>
      <circle cx="290" cy="105" r="6" fill="#D0DFF0" opacity=".5"/>

      <!-- Flowers - pink tall -->
      <circle cx="355" cy="95" r="10" fill="#E8A0BF" opacity=".4"/>
      <circle cx="355" cy="95" r="5" fill="#F0C0D5" opacity=".45"/>

      <!-- Flowers - yellow/orange -->
      <circle cx="440" cy="85" r="15" fill="#F5D4A0" opacity=".45"/>
      <circle cx="440" cy="85" r="8" fill="#FFE4B5" opacity=".5"/>
      <circle cx="440" cy="85" r="4" fill="#FFF0D0" opacity=".6"/>

      <!-- Flowers - mint -->
      <circle cx="505" cy="100" r="11" fill="#A7D7C5" opacity=".4"/>
      <circle cx="505" cy="100" r="5" fill="#C5E8D8" opacity=".5"/>

      <!-- Flowers - pink/rose right -->
      <circle cx="580" cy="90" r="13" fill="#E8A0BF" opacity=".45"/>
      <circle cx="580" cy="90" r="7" fill="#F5C6D0" opacity=".5"/>
      <ellipse cx="575" cy="82" rx="5" ry="7" transform="rotate(-15 575 82)" fill="#D090A8" opacity=".3"/>
      <ellipse cx="588" cy="84" rx="5" ry="7" transform="rotate(15 588 84)" fill="#D090A8" opacity=".3"/>

      <!-- Flowers - small accent -->
      <circle cx="645" cy="85" r="9" fill="#B5C8E4" opacity=".4"/>
      <circle cx="645" cy="85" r="4" fill="#D0E0F0" opacity=".5"/>

      <!-- Small wildflowers -->
      <circle cx="80" cy="150" r="5" fill="#F5C6C0" opacity=".3"/>
      <circle cx="170" cy="160" r="4" fill="#B5C8E4" opacity=".25"/>
      <circle cx="320" cy="155" r="5" fill="#E8A0BF" opacity=".3"/>
      <circle cx="470" cy="148" r="4" fill="#A7D7C5" opacity=".25"/>
      <circle cx="600" cy="155" r="5" fill="#F5C6A0" opacity=".3"/>

      <!-- Leaves -->
      <ellipse cx="90" cy="140" rx="6" ry="3" transform="rotate(-40 90 140)" fill="#8BC5A0" opacity=".3"/>
      <ellipse cx="150" cy="130" rx="8" ry="3" transform="rotate(30 150 130)" fill="#A7D7C5" opacity=".25"/>
      <ellipse cx="310" cy="140" rx="7" ry="3" transform="rotate(-25 310 140)" fill="#8BC5A0" opacity=".3"/>
      <ellipse cx="460" cy="135" rx="6" ry="3" transform="rotate(35 460 135)" fill="#A7D7C5" opacity=".25"/>
      <ellipse cx="550" cy="140" rx="8" ry="3" transform="rotate(-30 550 140)" fill="#8BC5A0" opacity=".3"/>
    </svg>
  </div>
</div>

</body>
</html>
