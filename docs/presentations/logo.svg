<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- Gradient for left circle -->
    <radialGradient id="leftCircle" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8c8f0"/>
      <stop offset="50%" stop-color="#7babd4"/>
      <stop offset="100%" stop-color="#5a93c0"/>
    </radialGradient>

    <!-- Gradient for right circle -->
    <radialGradient id="rightCircle" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="50%" stop-color="#7dd4ac"/>
      <stop offset="100%" stop-color="#5abf92"/>
    </radialGradient>

    <!-- Overlap blend gradient -->
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Subtle shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2c3e5080"/>
    </filter>

    <!-- Glow for text -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip paths for overlap effect -->
    <clipPath id="clipLeft">
      <circle cx="160" cy="115" r="85"/>
    </clipPath>
    <clipPath id="clipRight">
      <circle cx="240" cy="115" r="85"/>
    </clipPath>
  </defs>

  <!-- Left circle with gradient -->
  <circle cx="160" cy="115" r="85" fill="url(#leftCircle)" opacity="0.75" filter="url(#softShadow)"/>

  <!-- Right circle with gradient -->
  <circle cx="240" cy="115" r="85" fill="url(#rightCircle)" opacity="0.75" filter="url(#softShadow)"/>

  <!-- Overlap area - left circle clipped by right -->
  <circle cx="160" cy="115" r="85" fill="url(#overlapGrad)" clip-path="url(#clipRight)" opacity="0.5"/>

  <!-- Decorative ring accents -->
  <circle cx="160" cy="115" r="85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="240" cy="115" r="85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

  <!-- Small decorative dots -->
  <circle cx="110" cy="75" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="290" cy="75" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="200" cy="50" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="130" cy="150" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="270" cy="150" r="2.5" fill="#ffffff" opacity="0.3"/>

  <!-- Main text: Lerani -->
  <text x="200" y="125" text-anchor="middle" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#1e3a5f" letter-spacing="1" filter="url(#textGlow)">Lerani</text>

  <!-- Subtitle - Hebrew -->
  <text x="200" y="228" text-anchor="middle" font-family="'Heebo', 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="#4a6a8a" letter-spacing="1" opacity="0.85" direction="rtl">חינוך · בינה מלאכותית · הגשמת חלומות</text>

  <!-- Subtle decorative line under subtitle -->
  <line x1="120" y1="240" x2="280" y2="240" stroke="url(#overlapGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Small sparkle accents for "dreams" theme -->
  <g opacity="0.45">
    <!-- Top sparkle -->
    <path d="M200 38 L202 44 L208 46 L202 48 L200 54 L198 48 L192 46 L198 44 Z" fill="#7babd4"/>
    <!-- Left sparkle -->
    <path d="M98 100 L99.5 103 L102.5 104.5 L99.5 106 L98 109 L96.5 106 L93.5 104.5 L96.5 103 Z" fill="#a8c8f0"/>
    <!-- Right sparkle -->
    <path d="M302 90 L303.5 93 L306.5 94.5 L303.5 96 L302 99 L300.5 96 L297.5 94.5 L300.5 93 Z" fill="#a8e6cf"/>
  </g>
</svg>