<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>מחולל אינפוגרפיקה | Lerani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Karantina:wght@400;700&family=Secular+One&family=Suez+One&family=Rubik:wght@400;500;700;900&family=Assistant:wght@400;600;700&family=Frank+Ruhl+Libre:wght@400;700;900&family=Varela+Round&family=Alef:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'GveretLevin';src:url('../design-studio/fonts/GveretLevinAlefAlefAlef-Regular.otf') format('opentype');font-display:swap}
@font-face{font-family:'DanaYad';src:url('../design-studio/fonts/DanaYadAlefAlefAlef-Normal.otf') format('opentype');font-display:swap}
@font-face{font-family:'Carmela';src:url('../design-studio/fonts/Carmela.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Cafe';src:url('../design-studio/fonts/Cafe.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Tapuach';src:url('../design-studio/fonts/tapuach.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Paskol';src:url('../design-studio/fonts/Paskol.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Nehama';src:url('../design-studio/fonts/Nehama.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Petel';src:url('../design-studio/fonts/Petel.ttf') format('truetype');font-display:swap}
@font-face{font-family:'HummusChips';src:url('../design-studio/fonts/HummusChipsSalat.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Carnaval';src:url('../design-studio/fonts/carnaval.ttf') format('truetype');font-display:swap}
@font-face{font-family:'TzevaTari';src:url('../design-studio/fonts/TzevaTari.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Dragon';src:url('../design-studio/fonts/Dragon.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Kidma';src:url('../design-studio/fonts/Kidma-Book.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Kanisah';src:url('../design-studio/fonts/Kanisah.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Manual';src:url('../design-studio/fonts/manual.ttf') format('truetype');font-display:swap}

*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF5EC;--card:#fff;--text:#3A3A50;--muted:#8A847D;--border:#E8DDD0;--gold:#C9A96E;--accent:#D4766E}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0}
.topbar h1{font-size:1rem;font-weight:900;margin-left:auto}
.topbar-sep{width:1px;height:28px;background:var(--border)}
.topbar input{flex:1;font-family:'Heebo';font-size:.85rem;padding:8px 12px;border:2px solid var(--border);border-radius:10px;background:var(--card);min-width:180px;transition:.2s}
.topbar input:focus{outline:none;border-color:var(--gold)}
.topbar textarea{width:200px;font-family:'Heebo';font-size:.78rem;padding:6px 10px;border:2px solid var(--border);border-radius:8px;background:var(--card);resize:none;height:36px;transition:.2s}
.topbar textarea:focus{outline:none;border-color:var(--gold)}
.tb{padding:7px 14px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-family:'Heebo';font-size:.78rem;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tb:hover{border-color:var(--gold)}
.tb svg{width:15px;height:15px;flex-shrink:0}
.tb.gen{background:var(--text);color:#fff;border-color:var(--text)}
.tb.gen:hover{background:#2A2A40}
.tb.gen:disabled{opacity:.5;cursor:not-allowed}
.tb.gen.loading{background:var(--gold)}
.tb.dl{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb.dl:hover{background:#C06058}

/* ===== SPLIT ===== */
.split{display:flex;flex:1;min-height:0}
.panel{width:340px;flex-shrink:0;border-left:1px solid var(--border);background:#fff;display:flex;flex-direction:column;overflow:hidden}
.panel-nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tab{flex:1;padding:9px 6px;text-align:center;font-size:.7rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;background:none;border-top:none;border-right:none;border-left:none;font-family:'Heebo';color:var(--muted)}
.panel-tab:hover{color:var(--text)}
.panel-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel-tab svg{width:15px;height:15px;display:block;margin:0 auto 2px}
.panel-body{flex:1;overflow-y:auto;padding:14px}

/* Sections */
.psec{margin-bottom:16px}
.psec-title{font-size:.78rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.psec-title svg{width:14px;height:14px;flex-shrink:0}

/* Layout picker */
.layout-row{display:flex;gap:6px}
.layout-opt{flex:1;border:2px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:.2s;background:var(--card)}
.layout-opt:hover{border-color:var(--gold)}
.layout-opt.sel{border-color:var(--accent);background:#FFF8F5}
.layout-opt svg{width:36px;height:26px;margin-bottom:3px}
.layout-opt span{font-size:.65rem;font-weight:600;display:block}

/* Count */
.count-row{display:flex;align-items:center;gap:12px;justify-content:center}
.cbtn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:1rem;font-weight:700;cursor:pointer;font-family:'Heebo'}
.cbtn:hover{border-color:var(--gold);background:#F0E6D3}
.cval{font-size:1.1rem;font-weight:900;min-width:20px;text-align:center}

/* Palette grid */
.pal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.pal-opt{border:2px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;background:var(--card)}
.pal-opt:hover{border-color:var(--gold)}
.pal-opt.sel{border-color:var(--accent);border-width:3px}
.pal-colors{display:flex;height:20px}
.pal-colors div{flex:1}
.pal-label{padding:4px 6px;font-size:.62rem;font-weight:600;text-align:center}

/* Font grid */
.fnt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.fnt-opt{border:2px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:.2s;background:var(--card);text-align:center}
.fnt-opt:hover{border-color:var(--gold)}
.fnt-opt.sel{border-color:var(--accent);border-width:3px}
.fnt-opt .fp{font-size:1.2rem;line-height:1.2;margin-bottom:2px}
.fnt-opt .fb{font-size:.68rem;color:var(--muted)}
.fnt-opt .fn{font-size:.58rem;color:var(--gold);margin-top:3px;font-family:'Heebo'}

/* Template grid */
.tpl-grid{display:grid;grid-template-columns:1fr;gap:10px}
.tpl-card{border:2px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.3s;background:var(--card)}
.tpl-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.tpl-card.sel{border-color:var(--accent);border-width:3px}
.tpl-preview{height:120px;padding:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden}
.tpl-info{padding:10px;border-top:1px solid var(--border)}
.tpl-name{font-weight:700;font-size:.82rem;margin-bottom:2px}
.tpl-desc{font-size:.7rem;color:var(--muted)}

/* Image upload */
.img-upload{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.img-upload:hover{border-color:var(--gold);background:#FAF0E0}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload svg{width:28px;height:28px;margin-bottom:6px;color:var(--muted)}
.img-upload p{font-size:.75rem;color:var(--muted)}
.img-preview{margin-top:8px;position:relative}
.img-preview img{width:100%;border-radius:8px;display:block}
.img-remove{position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Preview area */
.preview{flex:1;overflow:auto;padding:20px;background:#e8e4de;display:flex;justify-content:center;align-items:flex-start}
.preview-frame{width:800px;max-width:100%;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden;min-height:300px}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--muted);text-align:center;padding:40px}
.placeholder svg{width:60px;height:60px;margin-bottom:14px;opacity:.3}
.placeholder h3{font-size:1rem;margin-bottom:4px}
.placeholder p{font-size:.78rem}

/* ===== INFOGRAPHIC ===== */
.infographic{padding:40px 32px;direction:rtl}
.infographic *{direction:rtl}
.info-header{text-align:center;margin-bottom:28px}
.info-header-img{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:16px}
.info-title{line-height:1.2;margin-bottom:8px}
.info-subtitle{opacity:.7;line-height:1.6}

[contenteditable]{outline:none;cursor:text;border-radius:4px;transition:.2s}
[contenteditable]:hover{outline:2px dashed var(--gold)}
[contenteditable]:focus{outline:2px solid var(--accent);background:rgba(212,118,110,.05)}

/* Flow */
.info-flow .info-step{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;position:relative}
.info-flow .step-num{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;flex-shrink:0}
.info-flow .step-content{flex:1;padding-top:8px}
.info-flow .step-title{font-weight:700;font-size:1.1rem;margin-bottom:4px}
.info-flow .step-desc{font-size:.9rem;opacity:.75;line-height:1.7}
.info-flow .info-step:not(:last-child)::after{content:'';position:absolute;right:22px;top:46px;bottom:-24px;width:3px;border-radius:3px}

/* Grid */
.info-grid .info-steps{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.info-grid .info-step{padding:20px;border-radius:14px;text-align:center}
.info-grid .step-num{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.1rem;margin:0 auto 10px}
.info-grid .step-title{font-weight:700;font-size:1rem;margin-bottom:6px}
.info-grid .step-desc{font-size:.85rem;opacity:.7;line-height:1.6}

/* Zigzag */
.info-zigzag .info-step{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
.info-zigzag .info-step:nth-child(even){flex-direction:row-reverse}
.info-zigzag .info-step:nth-child(even) .step-content{text-align:left}
.info-zigzag .step-num{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;flex-shrink:0}
.info-zigzag .step-content{flex:1;padding-top:8px}
.info-zigzag .step-title{font-weight:700;font-size:1.1rem;margin-bottom:4px}
.info-zigzag .step-desc{font-size:.9rem;opacity:.75;line-height:1.7}

.info-footer{text-align:center;margin-top:28px;padding-top:16px;font-size:.78rem;opacity:.5}

/* Decorative styles for templates */
.tpl-decorated .info-header{position:relative;padding-bottom:20px}
.tpl-decorated .info-header::after{content:'';position:absolute;bottom:0;right:20%;left:20%;height:3px;border-radius:3px}
.tpl-cards .info-step{background:var(--card);border-radius:14px;padding:20px;border:1px solid rgba(0,0,0,.06);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tpl-cards .info-flow .info-step:not(:last-child)::after{display:none}
.tpl-cards .info-flow .info-step{margin-bottom:12px}
.tpl-ribbon .step-num{border-radius:8px!important;position:relative}
.tpl-ribbon .step-title{border-bottom:2px solid;padding-bottom:4px;display:inline-block}
.tpl-bubble .step-num{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.tpl-bubble .info-step{position:relative}
.tpl-bubble .step-content{background:rgba(255,255,255,.6);border-radius:12px;padding:12px 16px!important}

/* ===== WOW TEMPLATE: Zigzag Path ===== */
.tpl-zigpath{position:relative}
.tpl-zigpath .info-header{margin-bottom:36px}
.tpl-zigpath .info-steps-wrap{position:relative;padding:0 20px}
.tpl-zigpath .info-steps-wrap svg.path-line{position:absolute;top:0;right:0;width:100%;height:100%;pointer-events:none;z-index:0}
.tpl-zigpath .info-step{display:flex;align-items:center;gap:16px;margin-bottom:28px;position:relative;z-index:1}
.tpl-zigpath .info-step:nth-child(odd){justify-content:flex-start;padding-right:10%}
.tpl-zigpath .info-step:nth-child(even){justify-content:flex-end;padding-left:10%;flex-direction:row-reverse}
.tpl-zigpath .step-num{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;flex-shrink:0;border:3px solid;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.tpl-zigpath .step-chip{padding:10px 20px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.tpl-zigpath .step-title{font-weight:700;font-size:1rem;margin-bottom:2px}
.tpl-zigpath .step-desc{font-size:.82rem;opacity:.7;line-height:1.5}

/* ===== WOW TEMPLATE: Orbital ===== */
.tpl-orbital .info-header{margin-bottom:16px}
.tpl-orbital .orbit-wrap{position:relative;width:100%;padding-bottom:100%;max-width:500px;margin:0 auto}
.tpl-orbital .orbit-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;text-align:center;z-index:2;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.tpl-orbital .orbit-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:2px dashed;opacity:.25}
.tpl-orbital .orbit-ring.r1{width:70%;height:70%;transform:translate(-50%,-50%)}
.tpl-orbital .orbit-ring.r2{width:95%;height:95%;transform:translate(-50%,-50%)}
.tpl-orbital .orbit-step{position:absolute;z-index:2;display:flex;flex-direction:column;align-items:center;gap:4px}
.tpl-orbital .orbit-step .step-num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.tpl-orbital .orbit-step .step-chip{padding:4px 12px;border-radius:10px;font-size:.78rem;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.05)}

/* ===== WOW TEMPLATE: Bento Grid ===== */
.tpl-bento .bento-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tpl-bento .bento-grid .info-step{padding:22px 18px;border-radius:18px;position:relative;overflow:hidden}
.tpl-bento .bento-grid .info-step:nth-child(1){grid-column:span 2}
.tpl-bento .bento-grid .info-step:nth-child(4){grid-column:span 2}
.tpl-bento .bento-grid .step-num-badge{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:8px;display:inline-block;margin-bottom:8px;opacity:.8}
.tpl-bento .bento-grid .step-title{font-weight:700;font-size:1.05rem;margin-bottom:4px}
.tpl-bento .bento-grid .step-desc{font-size:.82rem;opacity:.65;line-height:1.6}
.tpl-bento .bento-grid .info-step::after{content:'';position:absolute;top:-20px;left:-20px;width:60px;height:60px;border-radius:50%;opacity:.08}

/* ===== WOW TEMPLATE: Floating Cards ===== */
.tpl-float .float-stack{display:flex;flex-direction:column;gap:14px;max-width:600px;margin:0 auto}
.tpl-float .info-step{background:#fff;border-radius:18px;padding:20px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);transition:transform .2s}
.tpl-float .info-step:hover{transform:translateY(-2px)}
.tpl-float .info-step:nth-child(odd){transform:translateX(12px)}
.tpl-float .info-step:nth-child(even){transform:translateX(-12px)}
.tpl-float .info-step:nth-child(odd):hover{transform:translateX(12px) translateY(-2px)}
.tpl-float .info-step:nth-child(even):hover{transform:translateX(-12px) translateY(-2px)}
.tpl-float .step-num{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.tpl-float .step-content{flex:1}
.tpl-float .step-title{font-weight:700;font-size:1.05rem;margin-bottom:3px}
.tpl-float .step-desc{font-size:.85rem;opacity:.65;line-height:1.6}

#exportBox{position:absolute;left:-9999px;top:0}

@media(max-width:800px){
  .split{flex-direction:column}
  .panel{width:100%;border-left:none;border-bottom:1px solid var(--border);max-height:45vh}
  .preview{min-height:50vh}
  .topbar{flex-wrap:wrap}
  .topbar input{min-width:120px}
}
</style>
</head>
<body>

<!-- Top bar with generate always visible -->
<div class="topbar">
  <h1>מחולל אינפוגרפיקה</h1>
  <div class="topbar-sep"></div>
  <input type="text" id="inpTopic" placeholder="על מה האינפוגרפיקה?">
  <textarea id="inpNotes" placeholder="בקשות מיוחדות..."></textarea>
  <button class="tb gen" id="genBtn" onclick="generate()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
    צור
  </button>
  <button class="tb dl" onclick="downloadPNG()" id="dlBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    הורדה
  </button>
</div>

<div class="split">
  <!-- Panel -->
  <div class="panel">
    <div class="panel-nav">
      <button class="panel-tab active" onclick="showTab('templates')" id="tab-templates">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        תבניות
      </button>
      <button class="panel-tab" onclick="showTab('colors')" id="tab-colors">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        צבעים
      </button>
      <button class="panel-tab" onclick="showTab('fonts')" id="tab-fonts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        גופנים
      </button>
      <button class="panel-tab" onclick="showTab('layout')" id="tab-layout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        לייאאוט
      </button>
      <button class="panel-tab" onclick="showTab('images')" id="tab-images">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        תמונה
      </button>
    </div>

    <div class="panel-body">

      <!-- TAB: TEMPLATES -->
      <div id="panelTemplates">
        <div class="psec">
          <div class="psec-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            ערכות עיצוב מוכנות
          </div>
          <div class="tpl-grid" id="tplGrid"></div>
        </div>
      </div>

      <!-- TAB: COLORS -->
      <div id="panelColors" style="display:none">
        <div class="psec">
          <div class="psec-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            פלטת צבעים
          </div>
          <div class="pal-grid" id="palGrid"></div>
        </div>
      </div>

      <!-- TAB: FONTS -->
      <div id="panelFonts" style="display:none">
        <div class="psec">

  document.getElementById('palGrid').innerHTML=palettes.map((p,i)=>`
    <div class="pal-opt ${i===0?'sel':''}" onclick="pickPalette(${i},this)">

    else if(t.layout==='orbital') miniPreview=`<svg width="100" height="80" viewBox="0 0 100 80" fill="none"><circle cx="50" cy="40" r="14" fill="${p.colors[0]}" opacity=".15"/><circle cx="50" cy="40" r="28" stroke="${p.colors[0]}" stroke-width="1" stroke-dasharray="3 2" fill="none" opacity=".3"/><circle cx="50" cy="12" r="6" fill="${p.colors[0]}" opacity=".3"/><circle cx="78" cy="32" r="6" fill="${p.colors[1]}" opacity=".3"/><circle cx="72" cy="60" r="6" fill="${p.colors[2]}" opacity=".3"/><circle cx="28" cy="60" r="6" fill="${p.colors[3]||p.colors[0]}" opacity=".3"/><circle cx="22" cy="32" r="6" fill="${p.colors[4]||p.colors[1]}" opacity=".3"/></svg>`;

    else if(t.layout==='float') miniPreview=`<div style="display:flex;flex-direction:column;gap:4px;width:110px"><div style="background:#fff;border-radius:8px;padding:5px 8px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:6px;transform:translateX(6px)"><div style="width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,${p.colors[0]},${p.colors[1]});display:flex;align-items:center;justify-content:center;color:#fff;font-size:.45rem;font-weight:900">1</div><span style="font-size:.5rem;font-weight:700;color:${p.text}">שלב ראשון</span></div><div style="background:#fff;border-radius:8px;padding:5px 8px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:6px;transform:translateX(-6px)"><div style="width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,${p.colors[1]},${p.colors[2]});display:flex;align-items:center;justify-content:center;color:#fff;font-size:.45rem;font-weight:900">2</div><span style="font-size:.5rem;font-weight:700;color:${p.text}">שלב שני</span></div></div>`;

function showTab(t){
  document.querySelectorAll('.panel-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  ['Templates','Colors','Fonts','Layout','Images'].forEach(n=>{
    document.getElementById('panel'+n).style.display=n.toLowerCase()===t?'block':'none';
  });
}

function pickLayout(l,el){
  S.layout=l;
  document.querySelectorAll('.layout-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  if(S.content) render();
}

function changeCount(d){
  S.stepCount=Math.max(3,Math.min(8,S.stepCount+d));
  document.getElementById('countVal').textContent=S.stepCount;
  if(S.content) render();
}

function pickPalette(i,el){
  S.paletteIdx=i;
  document.querySelectorAll('.pal-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  if(S.content) render();
}

function pickFont(i,el){
  S.fontIdx=i;
  document.querySelectorAll('.fnt-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  if(S.content) render();
}

function applyTemplate(i,el){
  const t=templates[i];
  S.templateIdx=i;
  S.paletteIdx=t.palIdx;
  S.fontIdx=t.fontIdx;
  S.layout=t.layout;
  document.querySelectorAll('.tpl-card').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  // Update other UI
  document.querySelectorAll('.pal-opt').forEach((e,j)=>{e.classList.toggle('sel',j===S.paletteIdx)});
  document.querySelectorAll('.fnt-opt').forEach((e,j)=>{e.classList.toggle('sel',j===S.fontIdx)});
  document.querySelectorAll('.layout-opt').forEach(e=>e.classList.remove('sel'));
  const layoutIdx=['flow','grid','zigzag'].indexOf(S.layout);
  if(layoutIdx>=0) document.querySelectorAll('.layout-opt')[layoutIdx]?.classList.add('sel');

  if(!S.content){
    // Create empty template content
    S.content={title:'כותרת האינפוגרפיקה',subtitle:'תת-כותרת מסבירה במשפט קצר',
      steps:Array.from({length:S.stepCount},(_,j)=>({title:`שלב ${j+1}`,desc:'לחצו כאן לכתוב הסבר'}))};
  }
  render();
}

// Image upload
function uploadHeaderImg(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    S.headerImg=e.target.result;
    document.getElementById('headerImgEl').src=S.headerImg;
    document.getElementById('headerImgPreview').style.display='block';
    document.getElementById('headerImgUpload').style.display='none';
    if(S.content) render();
  };
  reader.readAsDataURL(file);
}

function removeHeaderImg(){
  S.headerImg=null;
  document.getElementById('headerImgPreview').style.display='none';
  document.getElementById('headerImgUpload').style.display='block';
  document.getElementById('headerImgUpload').querySelector('input').value='';
  if(S.content) render();
}

// Generate with Gemini
async function generate(){
  const topic=document.getElementById('inpTopic').value.trim();
  if(!topic){document.getElementById('inpTopic').focus();return}
  S.topic=topic;
  S.notes=document.getElementById('inpNotes').value.trim();

  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.classList.add('loading');
  btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> מייצר...';

  const prompt=`צור תוכן לאינפוגרפיקה בעברית על הנושא: "${topic}"
${S.notes?'בקשות מיוחדות: '+S.notes:''}
יש ליצור בדיוק ${S.stepCount} שלבים.
החזר JSON בלבד (בלי markdown, בלי backticks) בפורמט:
{"title":"כותרת קצרה וקליטה","subtitle":"תת-כותרת במשפט אחד","steps":[{"title":"שם השלב","desc":"הסבר קצר 1-2 משפטים"}]}
כללים: שפה פשוטה, משפטים קצרים, כותרות עד 4 מילים, הסברים עד 20 מילים, תוכן מדויק`;

  try{
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AIzaSyDnSKgvxMHg9ZumnGQOoufw1zNbB3kAIbI',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:1024}})
    });
    const data=await res.json();
    let text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    text=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    S.content=JSON.parse(text);
  }catch(e){
    console.error(e);
    S.content={title:topic,subtitle:'לחצו לערוך',steps:Array.from({length:S.stepCount},(_,i)=>({title:`שלב ${i+1}`,desc:'לחצו כאן'}))};
  }
  render();
  btn.disabled=false;btn.classList.remove('loading');
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg> צור';
}

function render(){
  if(!S.content) return;
  const pal=palettes[S.paletteIdx],font=fontPairs[S.fontIdx],tw=font.tw||700,c=S.content;
  const frame=document.getElementById('previewFrame');
  const tplStyle=S.templateIdx>=0?templates[S.templateIdx].style:'';
  const steps=c.steps.slice(0,S.stepCount);

  // Header image
  const headerImgHTML=S.headerImg?`<img class="info-header-img" src="${S.headerImg}">`:'';

  let stepsHTML='';
  const gradients=[
    `linear-gradient(135deg,${pal.colors[0]},${pal.colors[1]})`,
    `linear-gradient(135deg,${pal.colors[1]},${pal.colors[2]})`,
    `linear-gradient(135deg,${pal.colors[2]},${pal.colors[0]})`,
    `linear-gradient(135deg,${pal.colors[3]||pal.colors[0]},${pal.colors[0]})`,
    `linear-gradient(135deg,${pal.colors[4]||pal.colors[1]},${pal.colors[1]})`,
    `linear-gradient(135deg,${pal.colors[0]},${pal.colors[4]||pal.colors[2]})`,
    `linear-gradient(135deg,${pal.colors[1]},${pal.colors[3]||pal.colors[0]})`,
    `linear-gradient(135deg,${pal.colors[2]},${pal.colors[4]||pal.colors[1]})`
  ];

  if(S.layout==='zigpath'){
    stepsHTML=`<div class="info-steps-wrap">${steps.map((s,i)=>`
      <div class="info-step">
        <div class="step-num" style="background:${pal.bg};color:${pal.colors[i%pal.colors.length]};border-color:${pal.colors[i%pal.colors.length]}">${i+1}</div>
        <div class="step-chip" style="background:${pal.stepBg}">
          <div class="step-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-weight:${tw};color:${pal.text}">${s.title}</div>
          <div class="step-desc" contenteditable="true" style="font-family:'${font.body}',sans-serif;color:${pal.text}">${s.desc}</div>
        </div>
      </div>`).join('')}</div>`;
  }else if(S.layout==='orbital'){
    // Position steps around a circle
    const positions=[
      {top:'2%',left:'45%'},{top:'18%',left:'80%'},{top:'55%',left:'85%'},
      {top:'78%',left:'55%'},{top:'72%',left:'18%'},{top:'35%',left:'5%'},
      {top:'8%',left:'15%'},{top:'50%',left:'50%'}
    ];
    stepsHTML=`<div class="orbit-wrap">
      <div class="orbit-ring r1" style="border-color:${pal.colors[0]}"></div>
      <div class="orbit-ring r2" style="border-color:${pal.colors[1]}"></div>
      <div class="orbit-center" style="background:${gradients[0]};color:${pal.bg}">
        <span contenteditable="true" style="font-family:'${font.title}',sans-serif;font-size:.85rem">${S.topic||'נושא'}</span>
      </div>
      ${steps.map((s,i)=>{
        const pos=positions[i%positions.length];
        return `<div class="orbit-step" style="top:${pos.top};left:${pos.left}">
          <div class="step-num" style="background:${gradients[i%gradients.length]};color:${pal.bg}">${i+1}</div>
          <div class="step-chip" style="background:${pal.stepBg}" contenteditable="true">${s.title}</div>
        </div>`;
      }).join('')}
    </div>`;
  }else if(S.layout==='bento'){
    const bentoColors=[
      pal.colors[0]+'18',pal.colors[1]+'18',pal.colors[2]+'18',
      pal.colors[3]?pal.colors[3]+'18':pal.colors[0]+'18',
      pal.colors[4]?pal.colors[4]+'18':pal.colors[1]+'18',
      pal.colors[0]+'15',pal.colors[1]+'15',pal.colors[2]+'15'
    ];
    stepsHTML=`<div class="bento-grid">${steps.map((s,i)=>`
      <div class="info-step" style="background:${bentoColors[i%bentoColors.length]}">
        <div class="step-num-badge" style="background:${pal.colors[i%pal.colors.length]}22;color:${pal.colors[i%pal.colors.length]};font-family:'${font.body}',sans-serif">0${i+1}</div>
        <div class="step-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-weight:${tw};color:${pal.text}">${s.title}</div>
        <div class="step-desc" contenteditable="true" style="font-family:'${font.body}',sans-serif;color:${pal.text}">${s.desc}</div>
      </div>`).join('')}</div>`;
  }else if(S.layout==='float'){
    stepsHTML=`<div class="float-stack">${steps.map((s,i)=>`
      <div class="info-step">
        <div class="step-num" style="background:${gradients[i%gradients.length]};color:${pal.bg}">${i+1}</div>
        <div class="step-content">
          <div class="step-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-weight:${tw};color:${pal.text}">${s.title}</div>
          <div class="step-desc" contenteditable="true" style="font-family:'${font.body}',sans-serif;color:${pal.text}">${s.desc}</div>
        </div>
      </div>`).join('')}</div>`;
  }else if(S.layout==='flow'){
    stepsHTML=`<div class="info-flow">${steps.map((s,i)=>`
      <div class="info-step">
        <div class="step-num" style="background:${pal.colors[i%pal.colors.length]};color:${pal.bg}">${i+1}</div>
        <div class="step-content">
          <div class="step-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-weight:${tw};color:${pal.text}">${s.title}</div>
          <div class="step-desc" contenteditable="true" style="font-family:'${font.body}',sans-serif;color:${pal.text}">${s.desc}</div>
        </div>
      </div>`).join('')}</div>`;
  }else if(S.layout==='grid'){
    stepsHTML=`<div class="info-grid"><div class="info-steps">${steps.map((s,i)=>`
      <div class="info-step" style="background:${pal.stepBg};border:1px solid ${pal.colors[i%pal.colors.length]}33">
        <div class="step-num" style="background:${pal.colors[i%pal.colors.length]};color:${pal.bg}">${i+1}</div>
        <div class="step-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-weight:${tw};color:${pal.text}">${s.title}</div>
        <div class="step-desc" contenteditable="true" style="font-family:'${font.body}',sans-serif;color:${pal.text}">${s.desc}</div>
      </div>`).join('')}</div></div>`;
  }else{
    stepsHTML=`<div class="info-zigzag">${steps.map((s,i)=>`
      <div class="info-step">
        <div class="step-num" style="background:${pal.colors[i%pal.colors.length]};color:${pal.bg}">${i+1}</div>
        <div class="step-content">
          <div class="step-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-weight:${tw};color:${pal.text}">${s.title}</div>
          <div class="step-desc" contenteditable="true" style="font-family:'${font.body}',sans-serif;color:${pal.text}">${s.desc}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  const lineCSS=S.layout==='flow'?`.info-flow .info-step:not(:last-child)::after{background:${pal.line}}`:'';
  const decoCSS=tplStyle==='tpl-decorated'?`.tpl-decorated .info-header::after{background:linear-gradient(90deg,transparent,${pal.accent},transparent)}`:'';

  frame.innerHTML=`<style>${lineCSS}${decoCSS}</style>
    <div class="infographic ${tplStyle}" style="background:${pal.bg}">
      <div class="info-header">
        ${headerImgHTML}
        <div class="info-title" contenteditable="true" style="font-family:'${font.title}',sans-serif;font-size:2.2rem;font-weight:${tw};color:${pal.text}">${c.title}</div>
        <div class="info-subtitle" contenteditable="true" style="font-family:'${font.body}',sans-serif;font-size:.95rem;color:${pal.text}">${c.subtitle}</div>
      </div>
      ${stepsHTML}
      <div class="info-footer" style="color:${pal.text};border-top:1px solid ${pal.line}">
        <span contenteditable="true" style="font-family:'${font.body}',sans-serif">Lerani -- למידה דיגיטלית</span>
      </div>
    </div>`;
}

function downloadPNG(){
  const source=document.querySelector('#previewFrame .infographic');
  if(!source){alert('קודם צרו אינפוגרפיקה');return}
  const btn=document.getElementById('dlBtn');
  btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> מייצא...';
  btn.disabled=true;

  const container=document.getElementById('exportBox');
  const clone=source.cloneNode(true);
  clone.querySelectorAll('[contenteditable]').forEach(el=>el.removeAttribute('contenteditable'));
  clone.style.width='900px';
  container.innerHTML='';container.appendChild(clone);

  const doIt=()=>{
    html2canvas(clone,{scale:2,useCORS:true,backgroundColor:null,width:900,windowWidth:900}).then(canvas=>{
      const a=document.createElement('a');
      a.download=`infographic-${(S.topic||'design').replace(/\s+/g,'-').substring(0,30)}.png`;
      a.href=canvas.toDataURL('image/png');a.click();
      container.innerHTML='';
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> הורדה';
      btn.disabled=false;
    }).catch(()=>{btn.innerHTML='שגיאה';btn.disabled=false;setTimeout(()=>{btn.innerHTML='הורדה'},2000)});
  };

  if(!window.html2canvas){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=doIt;document.head.appendChild(s);
  }else doIt();
}

init();
</script>
</body>
</html>
