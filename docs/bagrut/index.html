<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תרגול בגרויות – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F0F4F8;--card:#ffffff;
  --primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;
  --secondary:#E76F7A;--sec-l:#FDE8EA;
  --green:#52B788;--green-l:#D8F3DC;
  --blue:#4A90D9;--blue-l:#DBEAFE;
  --accent:#E9A319;--accent-l:#FEF3C7;
  --purple:#7C3AED;--purple-l:#F3E8FF;
  --pink:#DB2777;--pink-l:#FCE7F3;
  --orange:#EA580C;--orange-l:#FFF7ED;
  --dark:#1E293B;--gray:#64748B;--gray-l:#94A3B8;
  --border:rgba(0,0,0,.06);
  --shadow:0 2px 20px -4px rgba(0,0,0,.06);
  --shadow-md:0 8px 28px rgba(0,0,0,.07);
  --r:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{text-align:center;padding:48px 20px 32px}
.header-icon{width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,var(--primary-l),var(--blue-l));color:var(--primary-d);display:inline-flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:20px;box-shadow:0 4px 16px rgba(42,157,143,.15)}
.header h1{font-family:'Rubik',sans-serif;font-size:34px;font-weight:900;margin-bottom:6px}
.header p{color:var(--gray);font-size:16px;margin-bottom:8px;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.6}
.header .count{font-size:14px;color:var(--primary);font-weight:600;margin-top:8px}

/* CONTAINER */
.container{max-width:960px;margin:0 auto;padding:0 20px 60px}

/* FILTERS */
.filters{margin-bottom:28px}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:10px 20px;border:2px solid var(--border);border-radius:50px;background:white;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .3s;white-space:nowrap}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary)}

.search-wrap{margin-top:12px;position:relative}
.search-wrap input{width:100%;padding:14px 18px 14px 44px;border:2px solid var(--border);border-radius:14px;font-family:'Heebo',sans-serif;font-size:15px;color:var(--dark);background:white;transition:all .3s}
.search-wrap input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(42,157,143,.1)}
.search-wrap .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--gray-l)}

/* GRID */
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.5rem}

/* CARD */
.exam-card{background:var(--card);border-radius:var(--r);padding:28px;box-shadow:var(--shadow);transition:all .35s;animation:fadeUp .45s ease both;position:relative;overflow:hidden}
.exam-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-md)}
.exam-card .card-accent{position:absolute;top:0;right:0;left:0;height:4px}
.card-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}
.card-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.card-info{flex:1}
.card-name{font-family:'Rubik',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px}
.card-desc{font-size:13px;color:var(--gray);line-height:1.5}
.card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600}
.card-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--gray-l);margin-bottom:16px}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-bottom{display:flex;align-items:center;justify-content:flex-end}
.card-btn{padding:12px 28px;background:var(--primary);color:white;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block}
.card-btn:hover{background:var(--primary-d);transform:translateY(-2px)}

/* COMING SOON */
.coming-soon{text-align:center;padding:80px 20px;animation:fadeUp .45s ease}
.coming-soon .icon{font-size:64px;margin-bottom:20px}
.coming-soon h2{font-family:'Rubik',sans-serif;font-size:24px;font-weight:800;margin-bottom:12px}
.coming-soon p{color:var(--gray);font-size:16px;line-height:1.7;max-width:400px;margin:0 auto}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;animation:fadeUp .45s ease;display:none}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state p{color:var(--gray);font-size:16px}
.empty-state .reset-btn{margin-top:16px;padding:10px 24px;background:var(--primary-l);color:var(--primary-d);border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s}
.empty-state .reset-btn:hover{background:var(--primary);color:white}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .header h1{font-size:26px}
  .exam-grid{grid-template-columns:1fr}
  .exam-card{padding:22px}
  .card-bottom{flex-direction:column;align-items:stretch}
  .card-btn{text-align:center}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">📖</div>
  <h1>תרגול בגרויות</h1>
  <p>אורט בית הערבה – תרגלו שאלות בגרות אמיתיות עם הסברים ופתרונות מלאים</p>
  <div class="count" id="examCount"></div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-row" id="filterRow"></div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="&#1495;&#1497;&#1508;&#1493;&#1513; &#1500;&#1508;&#1497; &#1502;&#1511;&#1510;&#1493;&#1506;, &#1502;&#1493;&#1506;&#1491; &#1488;&#1493; &#1513;&#1504;&#1492;...">
    </div>
  </div>

  <!-- GRID -->
  <div class="exam-grid" id="examGrid"></div>

  <!-- EMPTY STATE (search/filter) -->
  <div class="empty-state" id="emptyState">
    <div class="icon">&#128270;</div>
    <p>&#1500;&#1488; &#1504;&#1502;&#1510;&#1488;&#1493; &#1514;&#1512;&#1490;&#1493;&#1500;&#1497;&#1501; &#1502;&#1514;&#1488;&#1497;&#1502;&#1497;&#1501;</p>
    <button class="reset-btn" onclick="resetFilters()">&#1492;&#1510;&#1497;&#1490;&#1493; &#1488;&#1514; &#1499;&#1500; &#1492;&#1514;&#1512;&#1490;&#1493;&#1500;&#1497;&#1501;</button>
  </div>

</div>

<!-- LOGO -->
<div style="position:fixed;bottom:18px;right:20px;z-index:200;opacity:.45;pointer-events:none">
  <img src="../logo.png" alt="Lerani" style="height:32px;width:auto">
</div>

<script>
// ===== EXAM PRACTICE REGISTRY =====
// כל תרגול בגרות חדש מתווסף כאן
const exams = [
  {
    id: 'tanach-1261-summer-2025',
    name: 'בגרות תנ"ך 1261 – קיץ 2025',
    subject: 'תנ"ך',
    session: 'קיץ 2025',
    questions: 47,
    description: 'שאלון 1261 – בראשית (שרי והגר, רבקה, יוסף ופוטיפר), שמות (קריעת ים סוף, עגל הזהב), שיבת ציון, נביא ונבואה, חוק וחברה, תהלים, איוב, אליהו הנביא',
    path: 'tanach-1261-summer-2025/index.html'
  },
  {
    id: 'math-371-summer-2025',
    name: 'בגרות מתמטיקה 371 – קיץ 2025',
    subject: 'מתמטיקה',
    session: 'קיץ 2025',
    questions: 25,
    description: 'שאלון 35371 – 3 יחידות לימוד. גידול וקיטון אחוזי, הסתברות, גיאומטריה (משולשים דומים), טריגונומטריה, סטטיסטיקה, פונקציות לינאריות',
    path: 'math-371-summer-2025/index.html'
  },
  {
    id: 'hebrew-summer-2025',
    name: 'בגרות עברית – קיץ 2025',
    subject: 'עברית',
    session: 'קיץ 2025',
    questions: 36,
    description: 'שאלון 11281 – הבנה והבעה, שם המספר ואותיות השימוש, מערכת הצורות. חשיבה ביקורתית ומידע שקרי ברשתות',
    path: 'hebrew-summer-2025/index.html'
  },
  {
    id: 'citizenship-summer-2025',
    name: 'בגרות אזרחות – קיץ 2025',
    subject: 'אזרחות',
    session: 'קיץ 2025',
    questions: 22,
    description: 'שאלון 34281 – פיקוח וביקורת, זכויות אדם, דמוקרטיה, ממשל פרלמנטרי, רשויות מקומיות, הגבלת השלטון',
    path: 'citizenship-summer-2025/index.html'
  },
  {
    id: 'history-summer-2025',
    name: 'בגרות היסטוריה – קיץ 2025',
    subject: 'היסטוריה',
    session: 'קיץ 2025',
    questions: 26,
    description: 'שאלון 22261 – מלחמת העולם השנייה והשואה, לאומיות וציונות, המאבק על הקמת מדינת ישראל, סוגיות נבחרות',
    path: 'history-summer-2025/index.html'
  }
];

// ===== SUBJECT COLORS =====
const subjectColors = {
  'מתמטיקה':     { bg: 'var(--sec-l)',    text: '#B44050', iconBg: '#FDE8EA',    accent: 'var(--secondary)' },
  'אזרחות':      { bg: 'var(--blue-l)',   text: '#1565C0', iconBg: '#DBEAFE',    accent: 'var(--blue)' },
  'היסטוריה':    { bg: 'var(--accent-l)', text: '#92400E', iconBg: '#FEF3C7',    accent: 'var(--accent)' },
  'עברית':       { bg: 'var(--purple-l)', text: '#7C3AED', iconBg: '#F3E8FF',    accent: 'var(--purple)' },
  'אנגלית':      { bg: '#E0F2FE',        text: '#0369A1', iconBg: '#E0F2FE',    accent: '#4A90D9' },
  'תנ"ך':        { bg: 'var(--accent-l)', text: '#92400E', iconBg: '#FEF3C7',    accent: '#D97706' },
  'ספרות':       { bg: 'var(--pink-l)',   text: '#DB2777', iconBg: '#FCE7F3',    accent: 'var(--pink)' },
  'ביולוגיה':    { bg: 'var(--green-l)',  text: '#2D6A4F', iconBg: '#D8F3DC',    accent: 'var(--green)' },
  'פיזיקה':      { bg: 'var(--orange-l)', text: '#EA580C', iconBg: '#FFF7ED',    accent: 'var(--orange)' },
  'גיאוגרפיה':   { bg: 'var(--primary-l)',text: 'var(--primary-d)', iconBg: 'var(--primary-l)', accent: 'var(--primary)' },
  'מדעי הבריאות':{ bg: 'var(--green-l)',  text: '#2D6A4F', iconBg: '#D8F3DC',    accent: '#52B788' },
  'חשבונאות':    { bg: 'var(--purple-l)', text: '#7C3AED', iconBg: '#F3E8FF',    accent: 'var(--purple)' }
};

const subjectIcons = {
  'מתמטיקה': '&#10006;&#8314;',
  'אזרחות': '&#9878;',
  'היסטוריה': '&#128220;',
  'עברית': '&#1488;',
  'אנגלית': 'A',
  'תנ"ך': '&#128214;',
  'ספרות': '&#128214;',
  'ביולוגיה': '&#129516;',
  'פיזיקה': '&#9883;',
  'גיאוגרפיה': '&#127758;',
  'מדעי הבריאות': '&#129657;',
  'חשבונאות': '&#128178;'
};

// Build subject list from actual data
function getSubjects() {
  const subs = [...new Set(exams.map(e => e.subject))];
  return ['הכל', ...subs];
}

// ===== STATE =====
let activeFilter = 'הכל';
let searchText = '';

// ===== RENDER FILTERS =====
function renderFilters() {
  const row = document.getElementById('filterRow');
  const subjects = getSubjects();
  row.innerHTML = subjects.map(s =>
    `<button class="filter-btn${s === activeFilter ? ' active' : ''}" onclick="setFilter('${s}')">${s}</button>`
  ).join('');
}

// ===== FILTER LOGIC =====
function setFilter(subject) {
  activeFilter = subject;
  renderFilters();
  renderCards();
}

function resetFilters() {
  activeFilter = 'הכל';
  searchText = '';
  document.getElementById('searchInput').value = '';
  renderFilters();
  renderCards();
}

function getFilteredExams() {
  return exams.filter(e => {
    if (activeFilter !== 'הכל' && e.subject !== activeFilter) return false;
    if (searchText) {
      const s = searchText.toLowerCase();
      const searchable = (e.name + ' ' + e.subject + ' ' + e.session + ' ' + e.description).toLowerCase();
      if (!searchable.includes(s)) return false;
    }
    return true;
  });
}

// ===== RENDER CARDS =====
function renderCards() {
  const filtered = getFilteredExams();
  const grid = document.getElementById('examGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('examCount');

  if (exams.length === 0) {
    countEl.textContent = '';
    grid.innerHTML = '';
    empty.style.display = 'none';
    grid.innerHTML = `
      <div style="grid-column:1/-1" class="coming-soon">
        <div class="icon">&#128218;</div>
        <h2>בקרוב! תרגולי בגרות</h2>
        <p>אנחנו מכינים עבורכם תרגולים אינטראקטיביים על שאלות בגרות אמיתיות, עם הסברים ופתרונות מלאים.<br><br>חזרו בקרוב!</p>
      </div>`;
    return;
  }

  countEl.textContent = exams.length + ' תרגולי בגרות במאגר';

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = filtered.map((e, i) => {
    const colors = subjectColors[e.subject] || { bg: 'var(--primary-l)', text: 'var(--primary-d)', iconBg: 'var(--primary-l)', accent: 'var(--primary)' };
    const icon = e.icon || subjectIcons[e.subject] || '&#128221;';
    return `
    <div class="exam-card" style="animation-delay:${i * 0.06}s">
      <div class="card-accent" style="background:${colors.accent}"></div>
      <div class="card-top">
        <div class="card-icon" style="background:${colors.iconBg};color:${colors.text}">${icon}</div>
        <div class="card-info">
          <div class="card-name">${e.name}</div>
          <div class="card-desc">${e.description}</div>
        </div>
      </div>
      <div class="card-tags">
        <span class="tag" style="background:${colors.bg};color:${colors.text}">${e.subject}</span>
        <span class="tag" style="background:var(--primary-l);color:var(--primary-d)">${e.session}</span>
      </div>
      <div class="card-meta">
        <span>${e.questions} שאלות</span>
      </div>
      <div class="card-bottom">
        <a href="${e.path}" class="card-btn">התחילו תרגול</a>
      </div>
    </div>`;
  }).join('');
}

// ===== SEARCH =====
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchText = this.value.trim();
    renderCards();
  }, 200);
});

// ===== INIT =====
renderFilters();
renderCards();
</script>
</body>
</html>
