<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניתוח נתונים – בתי ספר מקצועיים | דשבורד</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-card-hover: #222633;
  --bg-chat: #161922;
  --accent: #4ecdc4;
  --accent2: #45b7d1;
  --accent3: #96ceb4;
  --text: #e8eaf0;
  --text-dim: #8b8fa3;
  --text-bright: #ffffff;
  --border: #2a2e3d;
  --success: #4ecdc4;
  --warning: #f7dc6f;
  --danger: #e74c3c;
  --danger-dim: rgba(231,76,60,.15);
  --success-dim: rgba(78,205,196,.12);
  --warning-dim: rgba(247,220,111,.12);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo svg { width: 24px; height: 24px; fill: white; }

.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all .2s;
}

.back-link:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(78,205,196,.08);
}

.back-link svg { width: 16px; height: 16px; fill: currentColor; }

/* MAIN */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* FILTERS BAR */
.filters-bar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 180px;
}

.filter-group label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}

.filter-group select,
.filter-group input {
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}

.filter-group select:focus,
.filter-group input:focus {
  border-color: var(--accent);
}

.filter-group select option { background: var(--bg-card); }

.btn-filter {
  padding: 8px 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius-sm);
  color: #0f1117;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}

.btn-filter:hover { opacity: .85; }

.btn-reset {
  padding: 8px 20px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;
}

.btn-reset:hover {
  border-color: var(--danger);
  color: var(--danger);
}

/* SUMMARY STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

.stat-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
  background: rgba(78,205,196,.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stat-icon svg { width: 24px; height: 24px; fill: var(--accent); }

.stat-num {
  font-size: 36px;
  font-weight: 800;
  font-family: 'Rubik', sans-serif;
  color: var(--text-bright);
  line-height: 1.1;
}

.stat-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* SECTION */
.section {
  margin-bottom: 32px;
}

.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title svg { width: 22px; height: 22px; flex-shrink: 0; }

.section-title .red { fill: var(--danger); }
.section-title .green { fill: var(--success); }
.section-title .blue { fill: var(--accent2); }
.section-title .yellow { fill: var(--warning); }

/* CARD PANEL */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}

.panel-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-title .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.dot-red { background: var(--danger); }
.dot-green { background: var(--success); }
.dot-blue { background: var(--accent2); }
.dot-yellow { background: var(--warning); }

/* GRID PANELS */
.panels-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 16px;
}

/* RED FLAG CARDS */
.red-card {
  background: var(--danger-dim);
  border: 1px solid rgba(231,76,60,.25);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.red-card .name { font-weight: 600; font-size: 14px; }
.red-card .val { color: var(--danger); font-weight: 700; font-family: 'Rubik', sans-serif; }

/* GREEN CARDS */
.green-card {
  background: var(--success-dim);
  border: 1px solid rgba(78,205,196,.2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.green-card .name { font-weight: 600; font-size: 14px; }
.green-card .val { color: var(--success); font-weight: 700; font-family: 'Rubik', sans-serif; }

/* BAR */
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
}

.bar-label {
  min-width: 160px;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 24px;
  background: var(--bg);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width .6s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 8px;
  font-size: 11px;
  font-weight: 700;
  color: #0f1117;
  min-width: 36px;
}

.bar-fill.green { background: linear-gradient(90deg, var(--accent3), var(--accent)); }
.bar-fill.red { background: linear-gradient(90deg, #c0392b, var(--danger)); }
.bar-fill.blue { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
.bar-fill.yellow { background: linear-gradient(90deg, #d4ac0d, var(--warning)); }
.bar-fill.orange { background: linear-gradient(90deg, #e67e22, #f39c12); }

.bar-val {
  min-width: 48px;
  text-align: left;
  font-weight: 600;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  flex-shrink: 0;
}

/* DISTRIBUTION BLOCKS */
.dist-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 8px;
}

.dist-block {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 16px 12px;
  text-align: center;
}

.dist-block .range {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.dist-block .count {
  font-size: 28px;
  font-weight: 800;
  font-family: 'Rubik', sans-serif;
}

.dist-block.d0 .count { color: var(--danger); }
.dist-block.d1 .count { color: #e67e22; }
.dist-block.d2 .count { color: var(--warning); }
.dist-block.d3 .count { color: var(--success); }

.dist-block .pct {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* INSPECTOR TABLE */
.inspector-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.inspector-table th {
  background: var(--bg);
  padding: 10px 14px;
  text-align: right;
  font-weight: 600;
  color: var(--text-dim);
  font-size: 12px;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}

.inspector-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.inspector-table tr:hover td {
  background: var(--bg-card-hover);
}

.inspector-name {
  font-weight: 600;
  color: var(--accent);
}

.schools-list {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}

.mini-bar {
  display: inline-block;
  height: 6px;
  border-radius: 3px;
  margin-left: 4px;
  vertical-align: middle;
}

/* TREND ARROW */
.trend-up { color: var(--success); }
.trend-down { color: var(--danger); }
.trend-flat { color: var(--text-dim); }

/* EMPTY STATE */
.empty-msg {
  text-align: center;
  padding: 24px;
  color: var(--text-dim);
  font-size: 14px;
}

/* SCROLLABLE LIST */
.scroll-list {
  max-height: 400px;
  overflow-y: auto;
}

.scroll-list::-webkit-scrollbar { width: 6px; }
.scroll-list::-webkit-scrollbar-track { background: transparent; }
.scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .header { padding: 14px 16px; flex-wrap: wrap; gap: 12px; }
  .main { padding: 16px; }
  .filters-bar { padding: 14px; }
  .filter-group { min-width: 140px; }
  .panels-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .dist-row { grid-template-columns: repeat(2, 1fr); }
  .bar-label { min-width: 100px; font-size: 12px; }
}

@media (max-width: 600px) {
  .stats-row { grid-template-columns: 1fr; }
  .header h1 { font-size: 16px; }
  .dist-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-right">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </div>
    <h1>ניתוח נתונים ותובנות</h1>
  </div>
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M10 19l7-7-7-7v14z"/></svg>
    חזרה לדשבורד
  </a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- FILTERS -->
  <div class="filters-bar" id="filtersBar">
    <div class="filter-group">
      <label>מפקח</label>
      <select id="filterInspector"><option value="">הכל</option></select>
    </div>
    <div class="filter-group">
      <label>מינימום תלמידים</label>
      <input type="number" id="filterMinStudents" placeholder="0" min="0" value="">
    </div>
    <div class="filter-group">
      <label>תעסוקה מינימום %</label>
      <input type="number" id="filterMinEmployment" placeholder="0" min="0" max="100" value="">
    </div>
    <div class="filter-group">
      <label>תעסוקה מקסימום %</label>
      <input type="number" id="filterMaxEmployment" placeholder="100" min="0" max="100" value="">
    </div>
    <button class="btn-filter" onclick="applyFilters()">סינון</button>
    <button class="btn-reset" onclick="resetFilters()">איפוס</button>
    <span id="filterCount" style="font-size:13px;color:var(--text-dim);align-self:center;"></span>
  </div>

  <!-- SUMMARY STATS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- RED FLAGS -->
  <div class="section" id="redFlagsSection">
    <div class="section-title">
      <svg viewBox="0 0 24 24" class="red"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      בתי ספר שדורשים תשומת לב
    </div>
    <div class="panels-grid" id="redFlags"></div>
  </div>

  <!-- TOP PERFORMERS -->
  <div class="section" id="topSection">
    <div class="section-title">
      <svg viewBox="0 0 24 24" class="green"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      מצטיינים
    </div>
    <div class="panels-grid" id="topPerformers"></div>
  </div>

  <!-- TRENDS -->
  <div class="section" id="trendsSection">
    <div class="section-title">
      <svg viewBox="0 0 24 24" class="blue"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
      מגמות
    </div>
    <div class="panels-grid" id="trends"></div>
  </div>

  <!-- INSPECTOR BREAKDOWN -->
  <div class="section" id="inspectorSection">
    <div class="section-title">
      <svg viewBox="0 0 24 24" class="yellow"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      פירוט לפי מפקח
    </div>
    <div class="panel" id="inspectorPanel"></div>
  </div>

</div>

<script>
let allSchools = [];
let filteredSchools = [];

async function init() {
  try {
    const resp = await fetch('schools-data-detailed.json');
    const data = await resp.json();
    allSchools = Object.entries(data)
      .filter(([k]) => !k.startsWith('_'))
      .map(([k, v]) => ({ key: k, ...v }));
    filteredSchools = [...allSchools];
    populateInspectorFilter();
    render();
  } catch (e) {
    document.querySelector('.main').innerHTML = '<div class="empty-msg">שגיאה בטעינת הנתונים: ' + e.message + '</div>';
  }
}

function getStudentCount(s) {
  return s.committee?.studentCount || s.summary?.studentCount || 0;
}

function getEmploymentRate(s) {
  const r = s.committee?.employmentRate ?? s.summary?.employmentRate;
  if (r == null) return null;
  if (typeof r === 'string') return parseFloat(r) || null;
  return r;
}

function getVocationalCertRate(s) {
  // Try committee.vocationalCertRate first, then summary
  let v = s.committee?.vocationalCertRate ?? s.summary?.vocationalCertRate;
  if (v == null) return null;
  if (typeof v === 'string') {
    v = parseFloat(v) || null;
  }
  return v;
}

function getInspector(s) {
  return (s.committee?.inspector || '').trim();
}

function getStudentHistory(s) {
  return s.committee?.studentHistory || {};
}

function getStudentGrowth(s) {
  const h = getStudentHistory(s);
  const years = Object.keys(h).sort();
  if (years.length < 2) return null;
  const first = h[years[0]];
  const last = h[years[years.length - 1]];
  if (!first || !last) return null;
  return ((last - first) / first * 100);
}

function getLatestBagrutCertRate(s) {
  const bd = s.committee?.bagrutData;
  if (!bd) return null;
  const years = Object.keys(bd).filter(y => !y.includes('צפי')).sort();
  if (!years.length) return null;
  const latest = bd[years[years.length - 1]];
  if (!latest || !latest.graduates || latest.graduates === 0) return null;
  return (latest.vocationalCert / latest.graduates * 100);
}

function populateInspectorFilter() {
  const inspectors = [...new Set(allSchools.map(s => getInspector(s)).filter(Boolean))].sort();
  const sel = document.getElementById('filterInspector');
  inspectors.forEach(i => {
    const o = document.createElement('option');
    o.value = i; o.textContent = i;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const insp = document.getElementById('filterInspector').value;
  const minStu = parseInt(document.getElementById('filterMinStudents').value) || 0;
  const minEmp = parseInt(document.getElementById('filterMinEmployment').value) || 0;
  const maxEmp = parseInt(document.getElementById('filterMaxEmployment').value) || 100;

  filteredSchools = allSchools.filter(s => {
    if (insp && getInspector(s) !== insp) return false;
    if (getStudentCount(s) < minStu) return false;
    const emp = getEmploymentRate(s);
    if (emp != null) {
      if (emp < minEmp || emp > maxEmp) return false;
    }
    return true;
  });

  document.getElementById('filterCount').textContent = `מציג ${filteredSchools.length} מתוך ${allSchools.length} בתי ספר`;
  render();
}

function resetFilters() {
  document.getElementById('filterInspector').value = '';
  document.getElementById('filterMinStudents').value = '';
  document.getElementById('filterMinEmployment').value = '';
  document.getElementById('filterMaxEmployment').value = '';
  filteredSchools = [...allSchools];
  document.getElementById('filterCount').textContent = '';
  render();
}

function render() {
  renderStats();
  renderRedFlags();
  renderTopPerformers();
  renderTrends();
  renderInspectors();
}

function renderStats() {
  const schools = filteredSchools;
  const total = schools.length;
  const totalStudents = schools.reduce((s, sc) => s + getStudentCount(sc), 0);
  const avgStudents = total ? Math.round(totalStudents / total) : 0;
  const empRates = schools.map(s => getEmploymentRate(s)).filter(v => v != null);
  const avgEmp = empRates.length ? Math.round(empRates.reduce((a, b) => a + b, 0) / empRates.length) : 0;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg></div>
      <div class="stat-num">${total}</div>
      <div class="stat-label">בתי ספר</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
      <div class="stat-num">${totalStudents.toLocaleString()}</div>
      <div class="stat-label">סה"כ תלמידים</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
      <div class="stat-num">${avgStudents}</div>
      <div class="stat-label">ממוצע תלמידים לבי"ס</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg></div>
      <div class="stat-num">${avgEmp}%</div>
      <div class="stat-label">ממוצע שיעור תעסוקה</div>
    </div>
  `;
}

function renderRedFlags() {
  const schools = filteredSchools;
  let html = '';

  // Under 100 students
  const small = schools.filter(s => getStudentCount(s) > 0 && getStudentCount(s) < 100)
    .sort((a, b) => getStudentCount(a) - getStudentCount(b));
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-red"></span>פחות מ-100 תלמידים (${small.length})</div>`;
  if (small.length) {
    html += '<div class="scroll-list">';
    small.forEach(s => {
      html += `<div class="red-card"><span class="name">${s.name}</span><span class="val">${getStudentCount(s)} תלמידים</span></div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg">אין בתי ספר במצב זה</div>';
  }
  html += '</div>';

  // Employment under 60%
  const lowEmp = schools.filter(s => { const e = getEmploymentRate(s); return e != null && e < 60; })
    .sort((a, b) => getEmploymentRate(a) - getEmploymentRate(b));
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-red"></span>תעסוקה מתחת ל-60% (${lowEmp.length})</div>`;
  if (lowEmp.length) {
    html += '<div class="scroll-list">';
    lowEmp.forEach(s => {
      const emp = getEmploymentRate(s);
      html += `<div class="bar-row">
        <span class="bar-label">${s.name}</span>
        <div class="bar-track"><div class="bar-fill red" style="width:${emp}%">${emp}%</div></div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg">אין בתי ספר במצב זה</div>';
  }
  html += '</div>';

  // Declining student numbers
  const declining = schools.filter(s => {
    const g = getStudentGrowth(s);
    return g != null && g < 0;
  }).sort((a, b) => getStudentGrowth(a) - getStudentGrowth(b));
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-red"></span>ירידה במספר תלמידים (${declining.length})</div>`;
  if (declining.length) {
    html += '<div class="scroll-list">';
    declining.forEach(s => {
      const g = getStudentGrowth(s);
      const h = getStudentHistory(s);
      const years = Object.keys(h).sort();
      const first = h[years[0]];
      const last = h[years[years.length - 1]];
      html += `<div class="red-card">
        <span class="name">${s.name}</span>
        <span class="val trend-down">${first} → ${last} (${g.toFixed(0)}%)</span>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg">אין בתי ספר במצב זה</div>';
  }
  html += '</div>';

  // Low vocational cert rate
  const lowCert = schools.filter(s => {
    const v = getVocationalCertRate(s);
    return v != null && v > 0 && v < 80;
  }).sort((a, b) => (getVocationalCertRate(a) || 0) - (getVocationalCertRate(b) || 0));
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-red"></span>תעודה מקצועית מתחת ל-80% (${lowCert.length})</div>`;
  if (lowCert.length) {
    html += '<div class="scroll-list">';
    lowCert.forEach(s => {
      const v = getVocationalCertRate(s);
      html += `<div class="bar-row">
        <span class="bar-label">${s.name}</span>
        <div class="bar-track"><div class="bar-fill orange" style="width:${Math.min(v, 100)}%">${v.toFixed(0)}%</div></div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg">אין בתי ספר במצב זה</div>';
  }
  html += '</div>';

  document.getElementById('redFlags').innerHTML = html;
}

function renderTopPerformers() {
  const schools = filteredSchools;
  let html = '';

  // Top 10 by employment
  const byEmp = schools.filter(s => getEmploymentRate(s) != null)
    .sort((a, b) => getEmploymentRate(b) - getEmploymentRate(a))
    .slice(0, 10);
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-green"></span>Top 10 – שיעור תעסוקה</div>`;
  if (byEmp.length) {
    html += '<div class="scroll-list">';
    byEmp.forEach(s => {
      const emp = getEmploymentRate(s);
      html += `<div class="bar-row">
        <span class="bar-label">${s.name}</span>
        <div class="bar-track"><div class="bar-fill green" style="width:${emp}%">${emp}%</div></div>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // Top 10 by student growth
  const byGrowth = schools.filter(s => getStudentGrowth(s) != null && getStudentGrowth(s) > 0)
    .sort((a, b) => getStudentGrowth(b) - getStudentGrowth(a))
    .slice(0, 10);
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-green"></span>Top 10 – צמיחה בתלמידים</div>`;
  if (byGrowth.length) {
    html += '<div class="scroll-list">';
    const maxGrowth = byGrowth.length ? getStudentGrowth(byGrowth[0]) : 100;
    byGrowth.forEach(s => {
      const g = getStudentGrowth(s);
      const pct = Math.min((g / maxGrowth) * 100, 100);
      html += `<div class="bar-row">
        <span class="bar-label">${s.name}</span>
        <div class="bar-track"><div class="bar-fill green" style="width:${pct}%">+${g.toFixed(0)}%</div></div>
        <span class="bar-val trend-up">+${g.toFixed(0)}%</span>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg">אין נתונים</div>';
  }
  html += '</div>';

  // 100% vocational cert
  const perfect = schools.filter(s => {
    const v = getVocationalCertRate(s);
    return v != null && v >= 100;
  });
  html += `<div class="panel"><div class="panel-title"><span class="dot dot-green"></span>100% תעודה מקצועית (${perfect.length})</div>`;
  if (perfect.length) {
    html += '<div class="scroll-list">';
    perfect.forEach(s => {
      html += `<div class="green-card"><span class="name">${s.name}</span><span class="val">100%</span></div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg">אין בתי ספר במצב זה</div>';
  }
  html += '</div>';

  document.getElementById('topPerformers').innerHTML = html;
}

function renderTrends() {
  const schools = filteredSchools;
  let html = '';

  // Student growth/decline sorted
  const withGrowth = schools.filter(s => getStudentGrowth(s) != null)
    .sort((a, b) => getStudentGrowth(b) - getStudentGrowth(a));
  const maxAbsGrowth = withGrowth.length ? Math.max(...withGrowth.map(s => Math.abs(getStudentGrowth(s)))) : 100;

  html += `<div class="panel"><div class="panel-title"><span class="dot dot-blue"></span>שינוי במספר תלמידים (${withGrowth.length} בתי ספר)</div>`;
  if (withGrowth.length) {
    html += '<div class="scroll-list">';
    withGrowth.forEach(s => {
      const g = getStudentGrowth(s);
      const pct = Math.abs(g) / maxAbsGrowth * 100;
      const cls = g >= 0 ? 'green' : 'red';
      const sign = g >= 0 ? '+' : '';
      html += `<div class="bar-row">
        <span class="bar-label">${s.name}</span>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%">${sign}${g.toFixed(0)}%</div></div>
        <span class="bar-val ${g >= 0 ? 'trend-up' : 'trend-down'}">${sign}${g.toFixed(0)}%</span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // Employment distribution
  const empRates = schools.map(s => getEmploymentRate(s)).filter(v => v != null);
  const ranges = [
    { label: '0-30%', min: 0, max: 30 },
    { label: '30-60%', min: 30, max: 60 },
    { label: '60-80%', min: 60, max: 80 },
    { label: '80-100%', min: 80, max: 101 }
  ];
  const dist = ranges.map(r => ({
    ...r,
    count: empRates.filter(e => e >= r.min && e < r.max).length
  }));

  html += `<div class="panel"><div class="panel-title"><span class="dot dot-blue"></span>התפלגות שיעור תעסוקה (${empRates.length} בתי ספר עם נתונים)</div>`;
  html += '<div class="dist-row">';
  dist.forEach((d, i) => {
    const pctOfTotal = empRates.length ? (d.count / empRates.length * 100).toFixed(0) : 0;
    html += `<div class="dist-block d${i}">
      <div class="range">${d.label}</div>
      <div class="count">${d.count}</div>
      <div class="pct">${pctOfTotal}% מהבי"ס</div>
    </div>`;
  });
  html += '</div></div>';

  document.getElementById('trends').innerHTML = html;
}

function renderInspectors() {
  const schools = filteredSchools;
  const inspMap = {};
  schools.forEach(s => {
    const insp = getInspector(s);
    if (!insp) return;
    if (!inspMap[insp]) inspMap[insp] = [];
    inspMap[insp].push(s);
  });

  const inspectors = Object.entries(inspMap).sort((a, b) => b[1].length - a[1].length);

  if (!inspectors.length) {
    document.getElementById('inspectorPanel').innerHTML = '<div class="empty-msg">אין נתוני מפקחים</div>';
    return;
  }

  let html = '<div style="overflow-x:auto"><table class="inspector-table"><thead><tr>';
  html += '<th>מפקח</th><th>בתי ספר</th><th>סה"כ תלמידים</th><th>ממוצע תעסוקה</th><th>בתי ספר</th>';
  html += '</tr></thead><tbody>';

  inspectors.forEach(([name, schs]) => {
    const totalStu = schs.reduce((s, sc) => s + getStudentCount(sc), 0);
    const emps = schs.map(s => getEmploymentRate(s)).filter(v => v != null);
    const avgEmp = emps.length ? (emps.reduce((a, b) => a + b, 0) / emps.length).toFixed(0) : '-';
    const empColor = avgEmp !== '-' ? (avgEmp >= 80 ? 'var(--success)' : avgEmp >= 60 ? 'var(--warning)' : 'var(--danger)') : 'var(--text-dim)';
    const barW = avgEmp !== '-' ? avgEmp : 0;

    html += `<tr>
      <td><span class="inspector-name">${name}</span></td>
      <td style="text-align:center;font-weight:700;font-family:'Rubik',sans-serif">${schs.length}</td>
      <td style="text-align:center;font-family:'Rubik',sans-serif">${totalStu.toLocaleString()}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${barW}%;background:${empColor};border-radius:4px;"></div>
          </div>
          <span style="font-weight:700;color:${empColor};font-family:'Rubik',sans-serif;min-width:36px">${avgEmp}%</span>
        </div>
      </td>
      <td><div class="schools-list">${schs.map(s => s.name).join(' | ')}</div></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('inspectorPanel').innerHTML = html;
}

init();
</script>
</body>
</html>
