<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בתי ספר מקצועיים – משרד העבודה | דשבורד נתונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-card-hover: #222633;
  --bg-chat: #161922;
  --accent: #4ecdc4;
  --accent2: #45b7d1;
  --accent3: #96ceb4;
  --text: #e8eaf0;
  --text-dim: #8b8fa3;
  --text-bright: #ffffff;
  --border: #2a2e3d;
  --success: #4ecdc4;
  --warning: #f7dc6f;
  --danger: #e74c3c;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo svg { width: 26px; height: 26px; fill: white; }

.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-stats {
  display: flex;
  gap: 24px;
}

.header-stat {
  text-align: center;
}

.header-stat .num {
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
  font-family: 'Rubik', sans-serif;
}

.header-stat .label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ===== LAYOUT ===== */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  height: calc(100vh - 85px);
}

/* ===== MAIN PANEL ===== */
.main-panel {
  padding: 24px;
  overflow-y: auto;
}

/* Search */
.search-area {
  margin-bottom: 24px;
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 16px;
  font-family: 'Heebo', sans-serif;
  outline: none;
  transition: all .3s;
}

.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.15);
}

.search-box input::placeholder { color: var(--text-dim); }

.search-box svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  fill: var(--text-dim);
}

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 6px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-dim);
  font-size: 13px;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  transition: all .2s;
}

.filter-btn:hover, .filter-btn.active {
  background: rgba(78, 205, 196, 0.15);
  border-color: var(--accent);
  color: var(--accent);
}

/* Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* School Card */
.school-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}

.school-card::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0;
  transition: opacity .3s;
}

.school-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(78, 205, 196, 0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.school-card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.school-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.3;
}

.data-badge {
  display: flex;
  gap: 4px;
}

.data-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  opacity: 0.3;
}

.data-dot.active { opacity: 1; }
.data-dot.climate { background: #4ecdc4; }
.data-dot.kbs { background: #45b7d1; }
.data-dot.committee { background: #f7dc6f; }
.data-dot.threeyear { background: #96ceb4; }

.card-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.card-stat {
  text-align: center;
  padding: 8px 4px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
}

.card-stat .val {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Rubik', sans-serif;
}

.card-stat .val.na { color: var(--text-dim); font-size: 14px; }

.card-stat .lbl {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.card-supervisor {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-supervisor svg {
  width: 14px;
  height: 14px;
  fill: var(--text-dim);
}

/* ===== CHAT PANEL ===== */
.chat-panel {
  background: var(--bg-chat);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 85px);
}

.chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-header svg {
  width: 22px;
  height: 22px;
  fill: var(--accent);
}

.chat-header h2 {
  font-size: 16px;
  font-weight: 600;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 90%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  animation: msgIn .3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot {
  background: var(--bg-card);
  border: 1px solid var(--border);
  align-self: flex-start;
  border-bottom-right-radius: 4px;
}

.msg.user {
  background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(69, 183, 209, 0.2));
  border: 1px solid rgba(78, 205, 196, 0.3);
  align-self: flex-end;
  border-bottom-left-radius: 4px;
}

.msg table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
}

.msg th, .msg td {
  padding: 6px 10px;
  border: 1px solid var(--border);
  text-align: right;
}

.msg th {
  background: rgba(78, 205, 196, 0.1);
  font-weight: 600;
}

.msg strong { color: var(--accent); }
.msg .highlight { color: var(--warning); font-weight: 600; }

.chat-input-area {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.chat-input-box {
  display: flex;
  gap: 8px;
}

.chat-input-box input {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Heebo', sans-serif;
  outline: none;
  transition: border-color .2s;
}

.chat-input-box input:focus {
  border-color: var(--accent);
}

.chat-input-box input::placeholder { color: var(--text-dim); }

.chat-input-box button {
  padding: 12px 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: transform .2s;
}

.chat-input-box button:hover { transform: scale(1.05); }
.chat-input-box button svg { width: 20px; height: 20px; fill: white; }

.quick-questions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.quick-q {
  padding: 5px 10px;
  background: rgba(78, 205, 196, 0.08);
  border: 1px solid rgba(78, 205, 196, 0.2);
  border-radius: 8px;
  color: var(--accent);
  font-size: 12px;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  transition: all .2s;
}

.quick-q:hover {
  background: rgba(78, 205, 196, 0.15);
  border-color: var(--accent);
}

/* ===== DETAIL MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 800px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
  animation: modalIn .3s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.modal-close {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}

.modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.modal h2 {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.modal-section {
  margin-top: 24px;
}

.modal-section h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.modal-section h3 svg {
  width: 18px;
  height: 18px;
  fill: var(--accent);
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.detail-item {
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}

.detail-item .val {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Rubik', sans-serif;
}

.detail-item .lbl {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.climate-bars {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.climate-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}

.climate-bar .bar-label {
  width: 200px;
  font-size: 13px;
  color: var(--text);
  text-align: right;
  flex-shrink: 0;
}

.climate-bar .bar-track {
  flex: 1;
  height: 24px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.climate-bar .bar-fill {
  height: 100%;
  border-radius: 12px;
  transition: width .8s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 8px;
  font-size: 12px;
  font-weight: 600;
  color: white;
}

.climate-bar .bar-fill.good { background: linear-gradient(90deg, #4ecdc4, #45b7d1); }
.climate-bar .bar-fill.ok { background: linear-gradient(90deg, #f7dc6f, #f0c040); }
.climate-bar .bar-fill.low { background: linear-gradient(90deg, #e74c3c, #c0392b); }

.kbs-text {
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
}

/* ===== MODAL TABS ===== */
.modal-tabs {
  display: flex;
  gap: 4px;
  margin: 16px 0 0;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.modal-tabs::-webkit-scrollbar { display: none; }

.modal-tab {
  padding: 10px 18px;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  transition: all .25s;
  white-space: nowrap;
  margin-bottom: -2px;
  border-radius: 8px 8px 0 0;
}

.modal-tab:hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

.modal-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: rgba(78, 205, 196, 0.06);
  font-weight: 600;
}

.modal-tab-panel {
  display: none;
  animation: tabFadeIn .3s ease;
}

.modal-tab-panel.active {
  display: block;
}

@keyframes tabFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-tab-icon {
  width: 16px;
  height: 16px;
  fill: currentColor;
  vertical-align: -3px;
  margin-left: 6px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
  }
  .chat-panel {
    height: 50vh;
    border-right: none;
    border-top: 1px solid var(--border);
  }
  .header-stats { display: none; }
  .cards-grid {
    grid-template-columns: 1fr;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Loading */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
}

.loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-right">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
    </div>
    <div>
      <h1>בתי ספר מקצועיים – משרד העבודה</h1>
      <div style="font-size:12px; color:var(--text-dim)">דשבורד נתונים | תשפ"ו</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="header-stats" id="headerStats"></div>
    <button onclick="toggleAnalytics()" id="analyticsBtn" style="padding:8px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:white;font-family:Heebo,sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:transform .2s">
      <svg style="width:16px;height:16px;fill:white;vertical-align:middle;margin-left:6px" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
      ניתוח נתונים
    </button>
    <a href="admin.html" style="padding:8px 18px;background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:Heebo,sans-serif;font-size:13px;text-decoration:none;white-space:nowrap;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-dim)'">
      <svg style="width:14px;height:14px;fill:currentColor;vertical-align:middle;margin-left:4px" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      אדמין
    </a>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">
  <!-- MAIN -->
  <div class="main-panel">
    <div class="search-area">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="חיפוש בית ספר...">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

      <div class="filters" id="filters"></div>
    </div>
    <div class="cards-grid" id="cardsGrid">
      <div class="loading"><div class="spinner"></div>טוען נתונים...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
      <h2>שאלי אותי על בתי הספר</h2>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg bot">
        שלום! אני יכולה לענות על שאלות לגבי בתי הספר המקצועיים.
        <br><br>
        נסי לשאול למשל:
        <br>- "כמה תלמידים יש בתפן?"
        <br>- "מה נתוני האקלים של בית הערבה?"
        <br>- "איזה בית ספר הכי גדול?"
        <br>- "השוואה בין אשדוד לחיפה"
      </div>

    <div class="chat-input-area">
      <div class="chat-input-box">
        <input type="text" id="chatInput" placeholder="שאלי שאלה..." autocomplete="off">
        <button onclick="sendChat()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="quick-questions" id="quickQuestions"></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<!-- ANALYTICS PANEL -->
<div id="analyticsPanel" style="display:none;position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;padding:24px">
  <div style="max-width:1200px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2 style="font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">ניתוח נתונים</h2>
      <button onclick="toggleAnalytics()" style="padding:8px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Heebo;font-size:14px;cursor:pointer">חזרה לדשבורד</button>
    </div>
    <div id="analyticsContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let DATA = {};
let allSchools = [];

// Load data
async function init() {
  try {
    const resp = await fetch('schools-data-detailed.json');
    DATA = await resp.json();
    allSchools = Object.values(DATA).filter(s => !s._hidden).sort((a, b) => a.name.localeCompare(b.name, 'he'));
    renderHeader();
    renderFilters();
    renderCards(allSchools);
    renderQuickQuestions();
  } catch (e) {
    document.getElementById('cardsGrid').innerHTML =
      '<div class="loading" style="color:var(--danger)">שגיאה בטעינת הנתונים: ' + e.message + '</div>';
  }
}

function renderHeader() {
  const total = allSchools.length;
  const withStudents = allSchools.filter(s => s.summary?.studentCount).length;
  const withClimate = allSchools.filter(s => Object.keys(s.climate || {}).length).length;
  document.getElementById('headerStats').innerHTML = `
    <div class="header-stat"><div class="num">${total}</div><div class="label">בתי ספר</div></div>
    <div class="header-stat"><div class="num">${withClimate}</div><div class="label">שאלוני אקלים</div></div>
    <div class="header-stat"><div class="num">${allSchools.filter(s => s.committee?.slides || s.committee?.source).length}</div><div class="label">ועדות מלוות</div></div>
  `;
}

function renderFilters() {
  const sources = ['הכל', 'אקלים', 'קב"ס', 'ועדה מלווה', 'תלת שנתי'];
  const supervisors = [...new Set(allSchools.map(s => s.threeYear?.supervisor).filter(Boolean))];

  let html = sources.map(s =>
    `<button class="filter-btn ${s === 'הכל' ? 'active' : ''}" onclick="filterBySource('${s}', this)">${s}</button>`
  ).join('');

  if (supervisors.length) {
    html += '<span style="color:var(--text-dim); margin:0 4px">|</span>';
    html += supervisors.map(s =>
      `<button class="filter-btn" onclick="filterBySupervisor('${s}', this)">${s}</button>`
    ).join('');
  }

  document.getElementById('filters').innerHTML = html;
}

function filterBySource(source, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (source === 'הכל') {
    renderCards(allSchools);
    return;
  }

  const filtered = allSchools.filter(s => s.summary?.dataSources?.includes(source));
  renderCards(filtered);
}

function filterBySupervisor(supervisor, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = allSchools.filter(s => s.threeYear?.supervisor === supervisor);
  renderCards(filtered);
}

function renderCards(schools) {
  const grid = document.getElementById('cardsGrid');
  if (!schools.length) {
    grid.innerHTML = '<div class="loading">לא נמצאו בתי ספר</div>';
    return;
  }

  grid.innerHTML = schools.map(s => {
    const students = s.summary?.studentCount;
    const bagrut = s.summary?.bagrutRate;
    const employment = s.summary?.employmentRate;
    const sources = s.summary?.dataSources || [];

    return `
      <div class="school-card" data-id="${encodeURIComponent(s.id)}" onclick="openModal(decodeURIComponent(this.dataset.id))">
        <div class="card-header">
          <div class="school-name">${s.name}</div>
          <div class="data-badge">
            <div class="data-dot climate ${sources.includes('אקלים') ? 'active' : ''}" title="אקלים"></div>
            <div class="data-dot kbs ${sources.includes('קב"ס') ? 'active' : ''}" title="קב&quot;ס"></div>
            <div class="data-dot committee ${sources.includes('ועדה מלווה') ? 'active' : ''}" title="ועדה מלווה"></div>
            <div class="data-dot threeyear ${sources.includes('תלת שנתי') ? 'active' : ''}" title="תלת שנתי"></div>
          </div>
        </div>
        <div class="card-stats">
          <div class="card-stat">
            <div class="val ${students ? '' : 'na'}">${students || '--'}</div>
            <div class="lbl">תלמידים</div>
          </div>
          <div class="card-stat">
            <div class="val ${bagrut ? '' : 'na'}">${bagrut ? bagrut + '%' : '--'}</div>
            <div class="lbl">זכאות בגרות</div>
          </div>
          <div class="card-stat">
            <div class="val ${employment ? '' : 'na'}">${employment ? employment + '%' : '--'}</div>
            <div class="lbl">תעסוקה</div>
          </div>
        </div>
        ${s.threeYear?.supervisor ? `
          <div class="card-supervisor">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            ${s.threeYear.supervisor}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  if (!q) {
    renderCards(allSchools);
    return;
  }
  const filtered = allSchools.filter(s => {
    const searchable = [
      s.name,
      s.kbs?.principal || '',
      s.committee?.principal || '',
      s.threeYear?.supervisor || '',
      s.kbs?.tracks || '',
      ...(s.committee?.tracks || [])
    ].join(' ').toLowerCase();
    return searchable.includes(q.toLowerCase());
  });
  renderCards(filtered);
});

// ===== MODAL WITH TABS =====
function openModal(id) {
  const s = DATA[id];
  if (!s) return;

  // Determine which tabs have data
  const principal = s.committee?.principal || s.kbs?.principal;
  const hasGeneral = s.summary?.studentCount || principal || s.threeYear?.supervisor || s.committee?.classCount;
  const hasBagrut = (s.committee?.bagrutData && Object.keys(s.committee.bagrutData).length) || s.committee?.tracks?.length || s.summary?.bagrutRate || s.summary?.employmentRate;
  const hasClimate = Object.keys(s.climate || {}).length > 0;
  const hasPrides = s.committee?.prides || s.committee?.leaps;
  const hasStaff = s.committee?.teachersBA || s.committee?.teachersMA || s.committee?.adminStaff || s.committee?.teacherCount;
  const hasKbs = Object.keys(s.kbs || {}).filter(k => k !== 'fullText').length > 0;

  const tabs = [];
  tabs.push({ id: 'general', label: 'כללי', icon: '<svg class="modal-tab-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>' });
  if (hasBagrut) tabs.push({ id: 'bagrut', label: 'בגרות ותעסוקה', icon: '<svg class="modal-tab-icon" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>' });
  if (hasClimate) tabs.push({ id: 'climate', label: 'אקלים', icon: '<svg class="modal-tab-icon" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M15.5 11c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>' });
  if (hasPrides) tabs.push({ id: 'prides', label: 'גאוות וקפיצות', icon: '<svg class="modal-tab-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' });
  if (hasStaff) tabs.push({ id: 'staff', label: 'צוות', icon: '<svg class="modal-tab-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>' });
  if (hasKbs) tabs.push({ id: 'kbs', label: 'קב"ס', icon: '<svg class="modal-tab-icon" viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>' });

  let html = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>${s.name}</h2>
    <div style="color:var(--text-dim); font-size:13px; margin-bottom:4px">
      ${s.summary?.dataSources?.join(' | ') || ''}
      ${s.threeYear?.supervisor ? ' | מפקח: ' + s.threeYear.supervisor : ''}
    </div>
  `;

  // PDF notice
  if (s.committee?.source === 'pdf' && !s.committee?.slides) {
    html += `<div style="background:rgba(247,220,111,0.08);border:1px solid rgba(247,220,111,0.25);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--warning);display:flex;align-items:center;gap:8px">
      <svg style="width:18px;height:18px;fill:var(--warning);flex-shrink:0" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      ועדה מלווה בפורמט PDF – חלק מהנתונים לא זמינים. העלי גרסת PPTX לנתונים מלאים.
    </div>`;
  }

  // Tabs bar
  html += '<div class="modal-tabs">';
  for (let i = 0; i < tabs.length; i++) {
    html += `<button class="modal-tab ${i === 0 ? 'active' : ''}" onclick="switchTab('${tabs[i].id}', this)">${tabs[i].icon}${tabs[i].label}</button>`;
  }
  html += '</div>';

  // ===== TAB 1: General =====
  html += `<div class="modal-tab-panel active" id="tab-general">`;

  // Key stats
  const hasAnyStats = s.summary?.studentCount || s.committee?.classCount || s.committee?.teacherCount || s.summary?.bagrutRate || s.summary?.vocationalCertRate || s.summary?.employmentRate;
  if (hasAnyStats) {
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>נתונים מרכזיים</h3>
      <div class="detail-grid">
        ${statItem('תלמידים', s.summary?.studentCount)}
        ${statItem('כיתות', s.committee?.classCount)}
        ${statItem('מורים', s.committee?.teacherCount)}
        ${statItem('זכאות בגרות', s.summary?.bagrutRate, '%')}
        ${statItem('תעודת גמר', s.summary?.vocationalCertRate, '%')}
        ${statItem('תעסוקה', s.summary?.employmentRate, '%')}
        ${statItem('נשירה', s.summary?.dropoutRate, '%')}
      </div>
    </div>`;
  }

  // Principal & basic info
  if (principal) {
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>הנהלה</h3>
      <div style="font-size:14px;line-height:2">
        <div><strong style="color:var(--accent)">מנהל/ת:</strong> ${principal}</div>
        ${s.threeYear?.supervisor ? `<div><strong style="color:var(--accent)">מפקח/ת:</strong> ${s.threeYear.supervisor}</div>` : ''}
      </div>
    </div>`;
  }

  // Tracks listing (brief, in general tab)
  const allTracks = s.committee?.tracks?.filter(t => t.length > 2 && t.length < 40 && !t.includes('---')) || [];
  if (allTracks.length || s.kbs?.tracks) {
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/></svg>מגמות</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">`;
    if (allTracks.length) {
      for (const track of allTracks) {
        html += `<span style="background:rgba(78,205,196,0.12);border:1px solid rgba(78,205,196,0.3);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--accent)">${track}</span>`;
      }
    } else if (s.kbs?.tracks) {
      html += `<div style="font-size:14px;line-height:1.8">${s.kbs.tracks}</div>`;
    }
    html += '</div></div>';
  }

  // Population description (from committee or kbs)
  if (s.committee?.populationDesc || s.kbs?.uniqueness) {
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>אוכלוסייה</h3>
      <div style="font-size:14px;line-height:1.8;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:14px">
        ${s.committee?.populationDesc || s.kbs?.uniqueness || ''}
      </div>
    </div>`;
  }

  // Student history if available
  if (s.committee?.studentHistory && Object.keys(s.committee.studentHistory).length) {
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>היסטוריית תלמידים</h3>
      <div class="detail-grid">`;
    for (const [year, count] of Object.entries(s.committee.studentHistory)) {
      html += `<div class="detail-item"><div class="val">${count}</div><div class="lbl">${year}</div></div>`;
    }
    html += '</div></div>';
  }

  html += '</div>'; // end tab-general

  // ===== TAB 2: Bagrut & Employment =====
  if (hasBagrut) {
    html += `<div class="modal-tab-panel" id="tab-bagrut">`;

    // Bagrut rates summary
    if (s.summary?.bagrutRate || s.summary?.vocationalCertRate || s.summary?.employmentRate) {
      html += `<div class="modal-section">
        <h3><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>אחוזים עדכניים</h3>
        <div class="detail-grid">
          ${statItem('זכאות בגרות', s.summary?.bagrutRate, '%')}
          ${statItem('תעודת גמר', s.summary?.vocationalCertRate, '%')}
          ${statItem('תעסוקה', s.summary?.employmentRate, '%')}
          ${statItem('נשירה', s.summary?.dropoutRate, '%')}
        </div>
      </div>`;
    }

    // Bagrut history table
    if (s.committee?.bagrutData && Object.keys(s.committee.bagrutData).length) {
      html += `<div class="modal-section">
        <h3><svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>נתוני בגרות וגמר (השוואה רב-שנתית)</h3>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px">
        <tr style="background:rgba(78,205,196,0.1)">
          <th style="padding:8px;border:1px solid var(--border);text-align:right">שנה</th>
          <th style="padding:8px;border:1px solid var(--border)">בוגרים</th>
          <th style="padding:8px;border:1px solid var(--border)">תעודת מקצוע</th>
          <th style="padding:8px;border:1px solid var(--border)">בגרות טכנולוגית</th>
          <th style="padding:8px;border:1px solid var(--border)">בגרות מלאה</th>
        </tr>`;
      for (const [year, d] of Object.entries(s.committee.bagrutData)) {
        html += `<tr>
          <td style="padding:6px 8px;border:1px solid var(--border);font-weight:600">${year}</td>
          <td style="padding:6px 8px;border:1px solid var(--border);text-align:center">${d.graduates || '--'}</td>
          <td style="padding:6px 8px;border:1px solid var(--border);text-align:center">${d.vocationalCert ? d.vocationalCert + '%' : '--'}</td>
          <td style="padding:6px 8px;border:1px solid var(--border);text-align:center">${d.techBagrut ? d.techBagrut + '%' : '--'}</td>
          <td style="padding:6px 8px;border:1px solid var(--border);text-align:center">${d.fullBagrut ? d.fullBagrut + '%' : '--'}</td>
        </tr>`;
      }
      html += '</table></div></div>';
    }

    // Employment by track
    if (s.committee?.employmentData?.tracks?.length) {
      html += `<div class="modal-section">
        <h3><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>תעסוקה לפי מגמה</h3>
        <div style="font-size:13px;line-height:1.8">`;
      for (const t of s.committee.employmentData.tracks) {
        const pct = t.enrolled > 0 ? Math.round((t.employed / t.enrolled) * 100) : 0;
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="flex:1">${t.name}</span>
          <span style="color:var(--text-dim)">${t.employed}/${t.enrolled}</span>
          <div style="width:80px;height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${pct >= 70 ? 'var(--accent)' : pct >= 40 ? '#f7dc6f' : '#e74c3c'};border-radius:4px"></div>
          </div>
          <span style="width:35px;text-align:left;font-weight:600;color:var(--accent)">${pct}%</span>
        </div>`;
      }
      html += '</div></div>';
    }

    // Track tags
    if (allTracks.length) {
      html += `<div class="modal-section">
        <h3><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/></svg>מגמות</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px">`;
      for (const track of allTracks) {
        html += `<span style="background:rgba(78,205,196,0.12);border:1px solid rgba(78,205,196,0.3);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--accent)">${track}</span>`;
      }
      html += '</div></div>';
    }

    html += '</div>'; // end tab-bagrut
  }

  // ===== TAB 3: Climate =====
  if (hasClimate) {
    html += `<div class="modal-tab-panel" id="tab-climate">`;
    const climateTypes = Object.keys(s.climate);

    for (const type of climateTypes) {
      const data = s.climate[type];
      html += `<div class="modal-section"><div style="margin-bottom:16px"><strong style="color:var(--accent2);font-size:16px">${type}</strong>`;

      if (data.responseRate) html += ` <span style="color:var(--text-dim); font-size:12px">(היענות: ${data.responseRate})</span>`;
      if (data.respondents) html += ` <span style="color:var(--text-dim); font-size:12px">(${data.respondents} משיבים)</span>`;

      html += '<div class="climate-bars" style="margin-top:12px">';

      for (const [key, val] of Object.entries(data)) {
        if (key.startsWith('_') || key === 'responseRate' || key === 'respondents' || typeof val !== 'object' || !val.current) continue;
        const score = Math.round(val.current);
        const cls = score >= 70 ? 'good' : score >= 50 ? 'ok' : 'low';
        html += `
          <div class="climate-bar">
            <div class="bar-label">${key}</div>
            <div class="bar-track">
              <div class="bar-fill ${cls}" style="width:${score}%">${score}</div>
            </div>
          </div>`;
      }

      // If no parsed dimensions, show raw data
      const hasDimensions = Object.entries(data).some(([k, v]) => !k.startsWith('_') && k !== 'responseRate' && k !== 'respondents' && typeof v === 'object' && v.current);
      if (!hasDimensions && data._raw) {
        html += '<div style="font-size:12px; margin-top:8px">';
        for (const row of data._raw.slice(0, 20)) {
          const cells = row.filter(c => c !== '');
          if (cells.length > 1) {
            html += cells.join(' | ') + '<br>';
          }
        }
        html += '</div>';
      }

      html += '</div></div></div>';
    }

    html += '</div>'; // end tab-climate
  }

  // ===== TAB 4: Prides & Leaps =====
  if (hasPrides) {
    html += `<div class="modal-tab-panel" id="tab-prides">`;
    html += `<div class="modal-section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;

    if (s.committee.prides) {
      const prideItems = parsePridesLeaps(s.committee.prides);
      html += `<div style="background:linear-gradient(135deg,rgba(78,205,196,0.08),rgba(69,183,209,0.08));border:1px solid rgba(78,205,196,0.2);border-radius:14px;padding:16px">

          <svg style="width:18px;height:18px;fill:var(--accent);vertical-align:middle;margin-left:6px" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          גאוות ביה"ס
        </div>`;
      for (let i = 0; i < prideItems.length; i++) {
        html += `<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;line-height:1.6;display:flex;gap:10px;align-items:flex-start">
          <span style="background:var(--accent);color:white;min-width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${i + 1}</span>
          <span>${prideItems[i]}</span>
        </div>`;
      }
      html += '</div>';
    }

    if (s.committee.leaps) {
      const leapItems = parsePridesLeaps(s.committee.leaps);
      html += `<div style="background:linear-gradient(135deg,rgba(150,206,180,0.08),rgba(69,183,209,0.08));border:1px solid rgba(150,206,180,0.2);border-radius:14px;padding:16px">
        <div style="font-weight:700;color:var(--accent3);margin-bottom:10px;font-size:15px">
          <svg style="width:18px;height:18px;fill:var(--accent3);vertical-align:middle;margin-left:6px" viewBox="0 0 24 24"><path d="M13 5.08c3.06.44 5.48 2.86 5.92 5.92h3.03c-.47-4.72-4.23-8.48-8.95-8.95v3.03zM5.08 11c.44-3.06 2.86-5.48 5.92-5.92V2.05C6.28 2.52 2.52 6.28 2.05 11h3.03zM11 18.92c-3.06-.44-5.48-2.86-5.92-5.92H2.05c.47 4.72 4.23 8.48 8.95 8.95v-3.03zm7.92-5.92c-.44 3.06-2.86 5.48-5.92 5.92v3.03c4.72-.47 8.48-4.23 8.95-8.95h-3.03z"/></svg>
          קפיצות מדרגה
        </div>`;
      for (let i = 0; i < leapItems.length; i++) {
        html += `<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;line-height:1.6;display:flex;gap:10px;align-items:flex-start">
          <span style="background:var(--accent3);color:white;min-width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${i + 1}</span>
          <span>${leapItems[i]}</span>
        </div>`;
      }
      html += '</div>';
    }

    html += '</div></div></div>'; // end tab-prides
  }

  // ===== TAB 5: Staff =====
  if (hasStaff) {
    html += `<div class="modal-tab-panel" id="tab-staff">`;
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>צוות הוראה</h3>
      <div class="detail-grid">
        ${statItem('מורים', s.committee?.teacherCount)}
        ${statItem('עובדי מנהלה', s.committee?.adminStaff)}
        ${statItem('תואר ראשון', s.committee?.teachersBA)}
        ${statItem('תואר שני', s.committee?.teachersMA)}
        ${statItem('מוסמכים', s.committee?.teachersCertified)}
        ${statItem('מלמדים שלא בהסמכתם', s.committee?.teachersOutOfCert)}
      </div>
    </div>`;

    // Role holders if available
    if (s.committee?.roleHolders?.length) {
      html += `<div class="modal-section">
        <h3><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>בעלי תפקידים</h3>
        <div style="font-size:14px;line-height:2">`;
      for (const rh of s.committee.roleHolders) {
        html += `<div><strong style="color:var(--accent)">${rh.role || rh.name}:</strong> ${rh.name || rh.role}</div>`;
      }
      html += '</div></div>';
    }

    html += '</div>'; // end tab-staff
  }

  // ===== TAB 6: KBS =====
  if (hasKbs) {
    html += `<div class="modal-tab-panel" id="tab-kbs">`;
    html += `<div class="modal-section">
      <h3><svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>פרטי בית הספר (קב"ס)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;

    // Left column - key details
    html += '<div style="font-size:14px;line-height:2">';
    if (principal) html += `<div><strong style="color:var(--accent)">מנהל/ת:</strong> ${principal}</div>`;
    if (s.kbs?.address) html += `<div><strong style="color:var(--accent)">כתובת:</strong> ${s.kbs.address}</div>`;
    if (s.kbs?.phone) html += `<div><strong style="color:var(--accent)">טלפון:</strong> ${s.kbs.phone}</div>`;
    if (s.kbs?.email) html += `<div><strong style="color:var(--accent)">מייל:</strong> ${s.kbs.email}</div>`;
    if (s.kbs?.studentCount) html += `<div><strong style="color:var(--accent)">תלמידים:</strong> ${s.kbs.studentCount}</div>`;
    if (s.kbs?.website) html += `<div><strong style="color:var(--accent)">אתר:</strong> ${s.kbs.website}</div>`;
    html += '</div>';

    // Right column - descriptive
    html += '<div style="font-size:14px;line-height:1.8">';
    if (s.kbs?.tracks) html += `<div style="margin-bottom:8px"><strong style="color:var(--accent)">מגמות:</strong><br>${s.kbs.tracks}</div>`;
    if (s.kbs?.uniqueness) html += `<div style="margin-bottom:8px"><strong style="color:var(--accent)">ייחודיות:</strong><br>${s.kbs.uniqueness}</div>`;
    if (s.kbs?.transport) html += `<div style="margin-bottom:8px"><strong style="color:var(--accent)">הסעות:</strong><br>${s.kbs.transport}</div>`;
    if (s.kbs?.redLines) html += `<div style="margin-bottom:8px"><strong style="color:var(--warning)">קווים אדומים:</strong><br>${s.kbs.redLines}</div>`;
    html += '</div>';

    html += '</div></div></div>'; // end tab-kbs
  }

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function switchTab(tabId, btn) {
  // Deactivate all tabs
  const modal = document.getElementById('modalContent');
  modal.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  modal.querySelectorAll('.modal-tab-panel').forEach(p => p.classList.remove('active'));
  // Activate selected
  btn.classList.add('active');
  const panel = document.getElementById('tab-' + tabId);
  if (panel) panel.classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function statItem(label, value, suffix = '') {
  if (!value && value !== 0) return '';
  return `<div class="detail-item"><div class="val">${value}${suffix}</div><div class="lbl">${label}</div></div>`;
}

function formatSlideText(text) {
  return text.split('|').map(t => t.trim()).filter(Boolean).join('<br>');
}

function parsePridesLeaps(text) {
  // Extract meaningful items from pipe-separated slide text
  const parts = text.split('|').map(t => t.trim()).filter(Boolean);
  // Remove header/title parts
  const items = [];
  let current = '';
  for (const part of parts) {
    // Skip headers
    if (part.includes('גאים') || part.includes('גאווה') || part.includes('קפיצ') || part.includes('מדרגה') || part.includes('המשך') || part.length < 3) continue;
    // Number markers like "1.", "2.", "3."
    if (/^\d+\.?$/.test(part)) {
      if (current) items.push(current.trim());
      current = '';
      continue;
    }
    // If starts with a number followed by text
    if (/^\d+\.\s/.test(part)) {
      if (current) items.push(current.trim());
      current = part.replace(/^\d+\.\s*/, '');
      continue;
    }
    // Sentence boundaries
    if (part.endsWith('.') && current) {
      current += ' ' + part;
      items.push(current.trim());
      current = '';
      continue;
    }
    current += (current ? ' ' : '') + part;
  }
  if (current) items.push(current.trim());
  // Filter out very short items and duplicates
  return items.filter(i => i.length > 10).slice(0, 5);
}

// ===== CHATBOT =====
function renderQuickQuestions() {
  const questions = [
    'כמה בתי ספר יש?',
    'איזה ביס הכי גדול?',
    'נתוני תפן',
    'השוואת אקלים',
    'רשימת מפקחים'
  ];
  document.getElementById('quickQuestions').innerHTML = questions.map(q =>
    `<button class="quick-q" onclick="askQuestion('${q}')">${q}</button>`
  ).join('');
}

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendChat();
});

function askQuestion(q) {
  document.getElementById('chatInput').value = q;
  sendChat();
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;

  addMessage(q, 'user');
  input.value = '';

  setTimeout(() => {
    const answer = processQuery(q);
    addMessage(answer, 'bot');
  }, 300);
}

function addMessage(text, type) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function processQuery(q) {
  const ql = q.toLowerCase();

  // How many schools
  if (ql.includes('כמה בתי ספר') || ql.includes('כמה בי"ס')) {
    return `יש <strong>${allSchools.length}</strong> בתי ספר מקצועיים במערכת.`;
  }

  // Biggest school
  if (ql.includes('הכי גדול') || ql.includes('הגדול ביותר')) {
    const sorted = allSchools.filter(s => s.summary?.studentCount).sort((a, b) => b.summary.studentCount - a.summary.studentCount);
    if (!sorted.length) return 'אין מספיק נתוני תלמידים כרגע.';
    const top5 = sorted.slice(0, 5);
    let html = 'בתי הספר הגדולים ביותר:<br><table><tr><th>בית ספר</th><th>תלמידים</th></tr>';
    for (const s of top5) {
      html += `<tr><td>${s.name}</td><td>${s.summary.studentCount}</td></tr>`;
    }
    return html + '</table>';
  }

  // Smallest
  if (ql.includes('הכי קטן') || ql.includes('הקטן ביותר')) {
    const sorted = allSchools.filter(s => s.summary?.studentCount).sort((a, b) => a.summary.studentCount - b.summary.studentCount);
    if (!sorted.length) return 'אין מספיק נתוני תלמידים כרגע.';
    const top5 = sorted.slice(0, 5);
    let html = 'בתי הספר הקטנים ביותר:<br><table><tr><th>בית ספר</th><th>תלמידים</th></tr>';
    for (const s of top5) {
      html += `<tr><td>${s.name}</td><td>${s.summary.studentCount}</td></tr>`;
    }
    return html + '</table>';
  }

  // Supervisors list
  if (ql.includes('מפקח') || ql.includes('מפקחים')) {
    const sups = {};
    allSchools.forEach(s => {
      const sup = s.threeYear?.supervisor;
      if (sup) {
        if (!sups[sup]) sups[sup] = [];
        sups[sup].push(s.name);
      }
    });
    if (!Object.keys(sups).length) return 'אין נתוני מפקחים.';
    let html = '<table><tr><th>מפקח/ת</th><th>בתי ספר</th><th>כמות</th></tr>';
    for (const [sup, schools] of Object.entries(sups).sort((a, b) => b[1].length - a[1].length)) {
      html += `<tr><td><strong>${sup}</strong></td><td style="font-size:12px">${schools.join(', ')}</td><td>${schools.length}</td></tr>`;
    }
    return html + '</table>';
  }

  // Comparison
  if (ql.includes('השוו') || ql.includes('השוואה') || ql.includes('לעומת') || ql.includes(' בין ') || ql.includes(' ל')) {
    const found = findSchoolsInQuery(q);
    if (found.length >= 2) {
      return compareSchools(found.slice(0, 4));
    }
  }

  // Climate overview
  if (ql.includes('השוואת אקלים') || ql.includes('אקלים כולם')) {
    const withClimate = allSchools.filter(s => s.summary?.climateHighlights && Object.keys(s.summary.climateHighlights).length);
    if (!withClimate.length) return 'אין מספיק נתוני אקלים.';
    let html = 'סיכום אקלים (ממוצע ממדים):<br><table><tr><th>בית ספר</th>';
    const dims = new Set();
    withClimate.forEach(s => Object.keys(s.summary.climateHighlights).forEach(d => dims.add(d)));
    const dimList = [...dims].slice(0, 4);
    dimList.forEach(d => { html += `<th style="font-size:11px">${d.substring(0, 20)}</th>`; });
    html += '</tr>';
    for (const s of withClimate.slice(0, 15)) {
      html += `<tr><td>${s.name}</td>`;
      dimList.forEach(d => {
        const v = s.summary.climateHighlights[d];
        html += `<td>${v ? v : '--'}</td>`;
      });
      html += '</tr>';
    }
    return html + '</table>';
  }

  // Search for specific school
  const schoolMatch = findSchoolInQuery(q);
  if (schoolMatch) {
    return schoolInfo(schoolMatch, q);
  }

  // General stats
  if (ql.includes('סטטיסטיק') || ql.includes('סיכום') || ql.includes('כללי')) {
    const withStudents = allSchools.filter(s => s.summary?.studentCount);
    const totalStudents = withStudents.reduce((sum, s) => sum + s.summary.studentCount, 0);
    const avgStudents = withStudents.length ? Math.round(totalStudents / withStudents.length) : 0;
    return `<strong>סיכום כללי:</strong><br>
      - ${allSchools.length} בתי ספר במערכת<br>
      - ${withStudents.length} בתי ספר עם נתוני תלמידים<br>
      - סה"כ ${totalStudents} תלמידים (ב-${withStudents.length} ביס)<br>
      - ממוצע ${avgStudents} תלמידים לבית ספר<br>
      - ${allSchools.filter(s => Object.keys(s.climate).length).length} עם שאלוני אקלים<br>
      - ${allSchools.filter(s => s.committee?.slides).length} עם מצגת ועדה מלווה`;
  }

  // Fallback: try to find any school name in the query
  const anySchool = allSchools.find(s =>
    ql.includes(s.name.toLowerCase()) || s.name.includes(q)
  );
  if (anySchool) return schoolInfo(anySchool, q);

  return 'לא הצלחתי להבין את השאלה. נסי לשאול על בית ספר ספציפי, או לבקש השוואה, או לשאול שאלה כללית כמו "כמה בתי ספר יש?"';
}

function findSchoolInQuery(q) {
  const ql = q.toLowerCase();
  // Sort by name length (longest first) to match "אורט בית הערבה" before "בית"
  const sorted = [...allSchools].sort((a, b) => b.name.length - a.name.length);
  for (const s of sorted) {
    const nameParts = s.name.split(' ');
    // Full name match
    if (ql.includes(s.name.toLowerCase())) return s;
    // Partial match (at least 2 chars)
    for (const part of nameParts) {
      if (part.length >= 3 && ql.includes(part.toLowerCase())) return s;
    }
  }
  return null;
}

function findSchoolsInQuery(q) {
  const ql = q.toLowerCase();
  const found = [];
  const sorted = [...allSchools].sort((a, b) => b.name.length - a.name.length);
  for (const s of sorted) {
    if (ql.includes(s.name.toLowerCase())) {
      found.push(s);
    } else {
      const parts = s.name.split(' ');
      for (const part of parts) {
        if (part.length >= 3 && ql.includes(part.toLowerCase()) && !found.includes(s)) {
          found.push(s);
        }
      }
    }
  }
  return found;
}

function schoolInfo(s, q) {
  const ql = q.toLowerCase();
  let html = `<strong>${s.name}</strong><br>`;

  // Specific questions
  if (ql.includes('תלמידים') || ql.includes('כמה') || ql.includes('גודל')) {
    const count = s.summary?.studentCount;
    html += count ? `מספר תלמידים: <strong>${count}</strong>` : 'אין נתוני תלמידים';
    if (s.committee?.classCount) html += `<br>כיתות: <strong>${s.committee.classCount}</strong>`;
    return html;
  }

  if (ql.includes('אקלים')) {
    if (!Object.keys(s.climate).length) return html + 'אין נתוני אקלים לבית ספר זה.';
    for (const [type, data] of Object.entries(s.climate)) {
      html += `<br><strong>${type}:</strong><br>`;
      for (const [key, val] of Object.entries(data)) {
        if (key.startsWith('_') || typeof val !== 'object' || !val.current) continue;
        html += `${key}: <strong>${Math.round(val.current)}</strong>`;
        if (val.benchmark) html += ` (דומים: ${Math.round(val.benchmark)})`;
        html += '<br>';
      }
    }
    return html;
  }

  if (ql.includes('בגרות') || ql.includes('זכאות')) {
    html += s.summary?.bagrutRate ? `אחוז זכאות לבגרות: <strong>${s.summary.bagrutRate}%</strong>` : 'אין נתוני זכאות';
    if (s.summary?.vocationalCertRate) html += `<br>תעודת גמר: <strong>${s.summary.vocationalCertRate}%</strong>`;
    return html;
  }

  if (ql.includes('תעסוקה') || ql.includes('עבודה') || ql.includes('מועסק')) {
    html += s.summary?.employmentRate ? `שיעור תעסוקה: <strong>${s.summary.employmentRate}%</strong>` : 'אין נתוני תעסוקה';
    return html;
  }

  if (ql.includes('נשירה') || ql.includes('dropout')) {
    html += s.summary?.dropoutRate ? `שיעור נשירה: <strong>${s.summary.dropoutRate}%</strong>` : 'אין נתוני נשירה';
    return html;
  }

  if (ql.includes('מגמ') || ql.includes('track') || ql.includes('מסלול')) {
    const tracks = s.committee?.tracks || (s.kbs?.tracks ? [s.kbs.tracks] : []);
    html += tracks.length ? 'מגמות: ' + tracks.join(', ') : 'אין נתוני מגמות';
    return html;
  }

  if (ql.includes('מנהל')) {
    const principal = s.committee?.principal || s.kbs?.principal;
    html += principal ? `מנהל/ת: <strong>${principal}</strong>` : 'אין נתוני מנהל';
    return html;
  }

  if (ql.includes('מפקח')) {
    html += s.threeYear?.supervisor ? `מפקח/ת: <strong>${s.threeYear.supervisor}</strong>` : 'אין נתוני מפקח';
    return html;
  }

  // General info about the school
  html += '<br>';
  if (s.summary?.studentCount) html += `תלמידים: <strong>${s.summary.studentCount}</strong><br>`;
  if (s.committee?.classCount) html += `כיתות: <strong>${s.committee.classCount}</strong><br>`;
  if (s.committee?.teacherCount) html += `מורים: <strong>${s.committee.teacherCount}</strong><br>`;
  if (s.summary?.bagrutRate) html += `זכאות בגרות: <strong>${s.summary.bagrutRate}%</strong><br>`;
  if (s.summary?.vocationalCertRate) html += `תעודת גמר: <strong>${s.summary.vocationalCertRate}%</strong><br>`;
  if (s.summary?.employmentRate) html += `תעסוקה: <strong>${s.summary.employmentRate}%</strong><br>`;
  if (s.threeYear?.supervisor) html += `מפקח: ${s.threeYear.supervisor}<br>`;

  const principal = s.committee?.principal || s.kbs?.principal;
  if (principal) html += `מנהל/ת: ${principal}<br>`;

  if (s.summary?.dataSources) html += `<br><span style="font-size:12px; color:var(--text-dim)">מקורות: ${s.summary.dataSources.join(', ')}</span>`;

  return html;
}

function compareSchools(list) {
  let html = `<strong>השוואה:</strong><br><table><tr><th></th>`;
  list.forEach(s => { html += `<th>${s.name}</th>`; });
  html += '</tr>';

  const rows = [
    ['תלמידים', s => s.summary?.studentCount || '--'],
    ['כיתות', s => s.committee?.classCount || '--'],
    ['מורים', s => s.committee?.teacherCount || '--'],
    ['זכאות בגרות', s => s.summary?.bagrutRate ? s.summary.bagrutRate + '%' : '--'],
    ['תעודת גמר', s => s.summary?.vocationalCertRate ? s.summary.vocationalCertRate + '%' : '--'],
    ['תעסוקה', s => s.summary?.employmentRate ? s.summary.employmentRate + '%' : '--'],
    ['מפקח', s => s.threeYear?.supervisor || '--'],
  ];

  for (const [label, fn] of rows) {
    html += `<tr><td><strong>${label}</strong></td>`;
    list.forEach(s => { html += `<td>${fn(s)}</td>`; });
    html += '</tr>';
  }

  return html + '</table>';
}

// Keyboard shortcut
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ===== ANALYTICS =====
let analyticsOpen = false;
function toggleAnalytics() {
  analyticsOpen = !analyticsOpen;
  const panel = document.getElementById('analyticsPanel');
  if (analyticsOpen) {
    panel.style.display = 'block';
    renderAnalytics();
    document.getElementById('analyticsBtn').textContent = 'חזרה לדשבורד';
  } else {
    panel.style.display = 'none';
    document.getElementById('analyticsBtn').innerHTML = '<svg style="width:16px;height:16px;fill:white;vertical-align:middle;margin-left:6px" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>ניתוח נתונים';
  }
}

function renderAnalytics() {
  const schools = allSchools;
  const withStudents = schools.filter(s => s.committee?.studentCount);
  const totalStudents = withStudents.reduce((sum, s) => sum + s.committee.studentCount, 0);
  const withEmp = schools.filter(s => s.summary?.employmentRate);
  const avgEmp = withEmp.length ? Math.round(withEmp.reduce((s, x) => s + x.summary.employmentRate, 0) / withEmp.length) : 0;

  let html = '';

  // Summary row
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">';
  [{n:schools.length,l:'בתי ספר'},{n:totalStudents,l:'תלמידים'},{n:Math.round(totalStudents/withStudents.length),l:'ממוצע לביס'},{n:avgEmp+'%',l:'ממוצע תעסוקה'}].forEach(x => {
    html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center"><div style="font-size:32px;font-weight:800;color:var(--accent);font-family:Rubik">' + x.n + '</div><div style="font-size:13px;color:var(--text-dim);margin-top:4px">' + x.l + '</div></div>';
  });
  html += '</div>';

  // Red flags
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">';

  // Small schools
  const small = withStudents.filter(s => s.committee.studentCount < 100).sort((a,b) => a.committee.studentCount - b.committee.studentCount);
  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px"><h3 style="color:var(--danger);font-size:16px;margin-bottom:12px">פחות מ-100 תלמידים (' + small.length + ')</h3>';
  small.forEach(s => {
    const pct = Math.min(s.committee.studentCount, 100);
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:140px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + s.name + '</span><div style="flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:4px"><div style="width:' + pct + '%;height:100%;background:var(--danger);border-radius:4px"></div></div><span style="font-size:12px;color:var(--danger);width:30px;text-align:left">' + s.committee.studentCount + '</span></div>';
  });
  html += '</div>';

  // Low employment
  const lowEmp = withEmp.filter(s => s.summary.employmentRate < 60).sort((a,b) => a.summary.employmentRate - b.summary.employmentRate);
  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px"><h3 style="color:var(--warning);font-size:16px;margin-bottom:12px">תעסוקה מתחת ל-60% (' + lowEmp.length + ')</h3>';
  lowEmp.forEach(s => {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:140px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + s.name + '</span><div style="flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:4px"><div style="width:' + s.summary.employmentRate + '%;height:100%;background:var(--warning);border-radius:4px"></div></div><span style="font-size:12px;color:var(--warning);width:35px;text-align:left">' + s.summary.employmentRate + '%</span></div>';
  });
  html += '</div>';
  html += '</div>';

  // Top performers
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">';
  const topEmp = withEmp.sort((a,b) => b.summary.employmentRate - a.summary.employmentRate).slice(0, 10);
  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px"><h3 style="color:var(--success);font-size:16px;margin-bottom:12px">מובילים בתעסוקה</h3>';
  topEmp.forEach(s => {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:140px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + s.name + '</span><div style="flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:4px"><div style="width:' + s.summary.employmentRate + '%;height:100%;background:var(--success);border-radius:4px"></div></div><span style="font-size:12px;color:var(--success);width:35px;text-align:left">' + s.summary.employmentRate + '%</span></div>';
  });
  html += '</div>';

  // Growth
  const growth = withStudents.filter(s => s.committee?.studentHistory).map(s => {
    const vals = Object.values(s.committee.studentHistory).filter(v => typeof v === 'number');
    return { name: s.name, change: vals.length >= 2 ? Math.round((vals[vals.length-1]-vals[0])/vals[0]*100) : 0, first: vals[0], last: vals[vals.length-1] };
  }).filter(s => s.change !== 0).sort((a,b) => b.change - a.change);

  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px"><h3 style="color:var(--accent2);font-size:16px;margin-bottom:12px">צמיחה/ירידה בתלמידים</h3>';
  growth.slice(0,6).forEach(s => {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:130px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + s.name + '</span><span style="font-size:12px;color:var(--text-dim)">' + s.first + '→' + s.last + '</span><span style="font-size:12px;font-weight:700;color:var(--success)">+' + s.change + '%</span></div>';
  });
  html += '<div style="border-top:1px solid var(--border);margin:8px 0;padding-top:8px">';
  growth.filter(s => s.change < -10).forEach(s => {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:130px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + s.name + '</span><span style="font-size:12px;color:var(--text-dim)">' + s.first + '→' + s.last + '</span><span style="font-size:12px;font-weight:700;color:var(--danger)">' + s.change + '%</span></div>';
  });
  html += '</div></div>';
  html += '</div>';

  // Goals per school
  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px"><h3 style="color:var(--accent);font-size:18px;margin-bottom:16px">מטרות מומלצות לכל בית ספר</h3>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-height:600px;overflow-y:auto">';

  for (const s of withStudents.sort((a,b) => a.name.localeCompare(b.name,'he'))) {
    const goals = [];
    const students = s.committee.studentCount;
    const emp = s.summary?.employmentRate;
    const h = s.committee?.studentHistory;
    const bd = s.committee?.bagrutData;

    if (students < 80) goals.push({icon:'🔴', text:'גיוס: הגדלה ל-100+ (' + students + ' כרגע)'});
    else if (students < 120) goals.push({icon:'🟡', text:'שימור ויציבות, יעד ' + Math.round(students*1.15)});

    if (h) { const vals = Object.values(h).filter(v => typeof v==='number'); if (vals.length>=2 && (vals[vals.length-1]-vals[0])/vals[0]<-0.15) goals.push({icon:'🔴', text:'ירידה בתלמידים - תוכנית שימור'}); }

    if (emp !== undefined && emp !== null) {
      if (emp < 40) goals.push({icon:'🔴', text:'תעסוקה: ' + emp + '% → יעד 60%'});
      else if (emp < 60) goals.push({icon:'🟡', text:'תעסוקה: ' + emp + '% → יעד 75%'});
      else if (emp < 80) goals.push({icon:'🟢', text:'תעסוקה: ' + emp + '% → יעד 85%'});
      else goals.push({icon:'⭐', text:'תעסוקה מצוינת: ' + emp + '%'});
    }

    if (bd) { const yrs=Object.keys(bd).sort(); const l=bd[yrs[yrs.length-1]]; if(l?.graduates&&l?.vocationalCert){const p=Math.round(l.vocationalCert/l.graduates*100); if(p<60)goals.push({icon:'🔴',text:'זכאות מקצוע: '+p+'% → 75%'}); else if(p<80)goals.push({icon:'🟡',text:'זכאות מקצוע: '+p+'% → 90%'});}}

    if (goals.length) {
      const borderColor = goals.some(g=>g.icon==='🔴') ? 'rgba(231,76,60,0.3)' : goals.some(g=>g.icon==='🟡') ? 'rgba(247,220,111,0.3)' : 'rgba(78,205,196,0.2)';
      html += '<div style="background:rgba(255,255,255,0.02);border:1px solid ' + borderColor + ';border-radius:12px;padding:12px"><div style="font-weight:700;font-size:14px;margin-bottom:8px;color:var(--text-bright)">' + s.name + ' <span style="font-weight:400;color:var(--text-dim);font-size:12px">(' + students + ')</span></div>';
      goals.forEach(g => { html += '<div style="font-size:12px;line-height:1.8">' + g.icon + ' ' + g.text + '</div>'; });
      html += '</div>';
    }
  }
  html += '</div></div>';

  // Inspector breakdown
  const inspectors = {};
  schools.forEach(s => {
    const insp = s.committee?.inspector || 'לא ידוע';
    if (!inspectors[insp]) inspectors[insp] = [];
    inspectors[insp].push(s);
  });

  html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px"><h3 style="color:var(--accent2);font-size:18px;margin-bottom:16px">פילוח לפי מפקח</h3>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:rgba(78,205,196,0.1)"><th style="padding:8px;border:1px solid var(--border);text-align:right">מפקח</th><th style="padding:8px;border:1px solid var(--border)">בתי ספר</th><th style="padding:8px;border:1px solid var(--border)">תלמידים</th><th style="padding:8px;border:1px solid var(--border)">ממוצע תעסוקה</th></tr>';
  Object.entries(inspectors).sort((a,b) => b[1].length - a[1].length).forEach(([insp, list]) => {
    const totalSt = list.filter(s=>s.committee?.studentCount).reduce((s,x)=>s+x.committee.studentCount,0);
    const empList = list.filter(s=>s.summary?.employmentRate);
    const avgE = empList.length ? Math.round(empList.reduce((s,x)=>s+x.summary.employmentRate,0)/empList.length) : '--';
    html += '<tr><td style="padding:6px 8px;border:1px solid var(--border);font-weight:600">' + insp + '</td><td style="padding:6px 8px;border:1px solid var(--border);text-align:center">' + list.length + '</td><td style="padding:6px 8px;border:1px solid var(--border);text-align:center">' + totalSt + '</td><td style="padding:6px 8px;border:1px solid var(--border);text-align:center">' + (avgE !== '--' ? avgE + '%' : '--') + '</td></tr>';
  });
  html += '</table></div>';

  document.getElementById('analyticsContent').innerHTML = html;
}

// Init
init();
</script>
