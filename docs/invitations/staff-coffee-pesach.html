<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הזמנה – מפגש צוות לפסח</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Heebo:wght@300;400;700&family=Suez+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #e8e0d0;
    font-family: 'Heebo', sans-serif;
  }

  .invitation {
    width: 500px;
    height: 625px;
    position: relative;
    overflow: hidden;
    background: #faf6ee;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(120, 90, 50, .18);
  }

  /* Paper texture */
  .invitation::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 40% 30%, rgba(210, 180, 120, .1) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 75%, rgba(180, 160, 100, .08) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(160, 140, 100, .015) 4px, rgba(160, 140, 100, .015) 5px);
    pointer-events: none;
    z-index: 1;
  }

  /* Vintage border */
  .invitation::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1.5px solid rgba(160, 130, 80, .22);
    border-radius: 3px;
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    padding: 32px 36px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 625px;
  }

  /* Olive branches - top corners */
  .branch-left, .branch-right {
    position: absolute;
    z-index: 4;
    opacity: .55;
  }
  .branch-left { top: 18px; right: 18px; }
  .branch-right { top: 18px; left: 18px; transform: scaleX(-1); }

  /* Olive branches - bottom corners */
  .branch-bl, .branch-br {
    position: absolute;
    z-index: 4;
    opacity: .45;
  }
  .branch-bl { bottom: 18px; right: 18px; transform: scaleY(-1); }
  .branch-br { bottom: 18px; left: 18px; transform: scale(-1, -1); }

  .tag {
    display: inline-block;
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 2px;
    color: #8a7a5a;
    border: 1px solid rgba(160, 130, 80, .3);
    padding: 4px 20px;
    border-radius: 2px;
    margin-bottom: 22px;
    background: rgba(250, 240, 220, .5);
  }

  /* Passover illustration area */
  .pesach-illustration {
    width: 170px;
    height: 170px;
    margin-bottom: 22px;
    position: relative;
  }

  .main-title {
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: 56px;
    line-height: 1;
    color: #5a4a2a;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-family: 'Amatic SC', cursive;
    font-weight: 700;
    font-size: 34px;
    color: #2a8a7a;
    margin-bottom: 16px;
    line-height: 1.1;
  }

  .divider {
    width: 80px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #c4a860, transparent);
    margin: 0 auto 14px;
  }

  .description {
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    font-size: 14.5px;
    color: #6a5a3a;
    line-height: 1.8;
    margin-bottom: 18px;
    max-width: 400px;
  }

  .description strong {
    font-weight: 700;
    color: #5a4a2a;
  }

  .details-box {
    background: rgba(220, 200, 160, .12);
    border: 1px solid rgba(180, 160, 110, .18);
    border-radius: 4px;
    padding: 14px 24px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 360px;
  }

  .detail-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 7px 0;
    font-family: 'Heebo', sans-serif;
    font-size: 15.5px;
    color: #5a4a2a;
  }

  .detail-row + .detail-row {
    border-top: 1px solid rgba(180, 160, 110, .12);
  }

  .detail-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: #2a8a7a;
  }

  .detail-text strong {
    font-weight: 700;
  }

  .commitment {
    font-family: 'Suez One', serif;
    font-size: 19px;
    color: #5a4a2a;
    margin-bottom: 6px;
  }

  .small-note {
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: #2a8a7a;
    margin-top: 6px;
  }

  .bottom-accent {
    margin-top: auto;
    padding-top: 16px;
    opacity: .6;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content > * {
    animation: fadeUp .6s ease both;
  }
  .content > *:nth-child(1) { animation-delay: .1s; }
  .content > *:nth-child(2) { animation-delay: .25s; }
  .content > *:nth-child(3) { animation-delay: .4s; }
  .content > *:nth-child(4) { animation-delay: .5s; }
  .content > *:nth-child(5) { animation-delay: .55s; }
  .content > *:nth-child(6) { animation-delay: .65s; }
  .content > *:nth-child(7) { animation-delay: .75s; }
  .content > *:nth-child(8) { animation-delay: .85s; }
  .content > *:nth-child(9) { animation-delay: .95s; }
  .content > *:nth-child(10) { animation-delay: 1.05s; }

  @media (prefers-reduced-motion: reduce) {
    .content > * { animation: none; }
  }

  @media (max-width: 580px) {
    .invitation { width: 100%; min-height: 100vh; border-radius: 0; }
    .content { padding: 36px 24px 28px; }
    .main-title { font-size: 54px; }
    .subtitle { font-size: 34px; }
    .pesach-illustration { width: 180px; height: 180px; }
  }
</style>
</head>
<body>

<div class="invitation">

  <!-- Olive branch decorations - 4 corners -->
  <svg class="branch-left" width="110" height="90" viewBox="0 0 110 90" fill="none">
    <path d="M5 85 Q25 50 55 30 Q75 18 105 10" stroke="#8a9a6a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="58" rx="6" ry="12" transform="rotate(-35 30 58)" fill="#9aaa6a" opacity=".4"/>
    <ellipse cx="50" cy="38" rx="5.5" ry="11" transform="rotate(-25 50 38)" fill="#8a9a5a" opacity=".35"/>
    <ellipse cx="70" cy="24" rx="5" ry="10" transform="rotate(-15 70 24)" fill="#9aaa6a" opacity=".4"/>
    <ellipse cx="88" cy="15" rx="5" ry="9" transform="rotate(-8 88 15)" fill="#8a9a5a" opacity=".35"/>
    <ellipse cx="40" cy="48" rx="4" ry="8" transform="rotate(25 40 48)" fill="#a0aa70" opacity=".3"/>
    <ellipse cx="60" cy="30" rx="4.5" ry="9" transform="rotate(20 60 30)" fill="#a0aa70" opacity=".3"/>
    <ellipse cx="80" cy="18" rx="4" ry="8" transform="rotate(15 80 18)" fill="#a0aa70" opacity=".28"/>
    <!-- Small olives -->
    <circle cx="35" cy="52" r="2.5" fill="#6a7a4a" opacity=".35"/>
    <circle cx="55" cy="34" r="2.2" fill="#6a7a4a" opacity=".3"/>
    <circle cx="78" cy="20" r="2" fill="#6a7a4a" opacity=".3"/>
  </svg>

  <svg class="branch-right" width="110" height="90" viewBox="0 0 110 90" fill="none">
    <path d="M5 85 Q25 50 55 30 Q75 18 105 10" stroke="#8a9a6a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="58" rx="6" ry="12" transform="rotate(-35 30 58)" fill="#9aaa6a" opacity=".4"/>
    <ellipse cx="50" cy="38" rx="5.5" ry="11" transform="rotate(-25 50 38)" fill="#8a9a5a" opacity=".35"/>
    <ellipse cx="70" cy="24" rx="5" ry="10" transform="rotate(-15 70 24)" fill="#9aaa6a" opacity=".4"/>
    <ellipse cx="88" cy="15" rx="5" ry="9" transform="rotate(-8 88 15)" fill="#8a9a5a" opacity=".35"/>
    <ellipse cx="40" cy="48" rx="4" ry="8" transform="rotate(25 40 48)" fill="#a0aa70" opacity=".3"/>
    <ellipse cx="60" cy="30" rx="4.5" ry="9" transform="rotate(20 60 30)" fill="#a0aa70" opacity=".3"/>
    <ellipse cx="80" cy="18" rx="4" ry="8" transform="rotate(15 80 18)" fill="#a0aa70" opacity=".28"/>
    <circle cx="35" cy="52" r="2.5" fill="#6a7a4a" opacity=".35"/>
    <circle cx="55" cy="34" r="2.2" fill="#6a7a4a" opacity=".3"/>
    <circle cx="78" cy="20" r="2" fill="#6a7a4a" opacity=".3"/>
  </svg>

  <svg class="branch-bl" width="110" height="90" viewBox="0 0 110 90" fill="none">
    <path d="M5 85 Q25 50 55 30 Q75 18 105 10" stroke="#8a9a6a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="58" rx="6" ry="12" transform="rotate(-35 30 58)" fill="#9aaa6a" opacity=".35"/>
    <ellipse cx="50" cy="38" rx="5.5" ry="11" transform="rotate(-25 50 38)" fill="#8a9a5a" opacity=".3"/>
    <ellipse cx="70" cy="24" rx="5" ry="10" transform="rotate(-15 70 24)" fill="#9aaa6a" opacity=".35"/>
    <ellipse cx="40" cy="48" rx="4" ry="8" transform="rotate(25 40 48)" fill="#a0aa70" opacity=".25"/>
    <ellipse cx="60" cy="30" rx="4.5" ry="9" transform="rotate(20 60 30)" fill="#a0aa70" opacity=".25"/>
  </svg>

  <svg class="branch-br" width="110" height="90" viewBox="0 0 110 90" fill="none">
    <path d="M5 85 Q25 50 55 30 Q75 18 105 10" stroke="#8a9a6a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="58" rx="6" ry="12" transform="rotate(-35 30 58)" fill="#9aaa6a" opacity=".35"/>
    <ellipse cx="50" cy="38" rx="5.5" ry="11" transform="rotate(-25 50 38)" fill="#8a9a5a" opacity=".3"/>
    <ellipse cx="70" cy="24" rx="5" ry="10" transform="rotate(-15 70 24)" fill="#9aaa6a" opacity=".35"/>
    <ellipse cx="40" cy="48" rx="4" ry="8" transform="rotate(25 40 48)" fill="#a0aa70" opacity=".25"/>
    <ellipse cx="60" cy="30" rx="4.5" ry="9" transform="rotate(20 60 30)" fill="#a0aa70" opacity=".25"/>
  </svg>

  <div class="content">

    <div class="tag">צוות אורט בית הערבה</div>

    <!-- Passover Seder plate mandala illustration -->
    <div class="pesach-illustration">
      <svg width="220" height="220" viewBox="0 0 220 220" fill="none">
        <!-- Watercolor background circle -->
        <defs>
          <radialGradient id="wc" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#7eccc4" stop-opacity=".2"/>
            <stop offset="40%" stop-color="#5bb8af" stop-opacity=".15"/>
            <stop offset="70%" stop-color="#2a9d8f" stop-opacity=".08"/>
            <stop offset="100%" stop-color="#2a9d8f" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="wc2" cx="55%" cy="50%" r="45%">
            <stop offset="0%" stop-color="#d4b860" stop-opacity=".1"/>
            <stop offset="100%" stop-color="#d4b860" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="110" cy="110" r="100" fill="url(#wc)"/>
        <circle cx="110" cy="110" r="85" fill="url(#wc2)"/>

        <!-- Outer decorative ring -->
        <circle cx="110" cy="110" r="90" stroke="#c4a860" stroke-width=".8" fill="none" opacity=".4"/>
        <circle cx="110" cy="110" r="85" stroke="#2a9d8f" stroke-width=".5" fill="none" opacity=".3"/>

        <!-- Mandala pattern - outer petals -->
        <g opacity=".5">
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(0 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(30 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(60 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(90 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(120 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(150 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(180 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(210 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(240 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(270 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(300 110 110)"/>
          <ellipse cx="110" cy="30" rx="8" ry="18" fill="#2a9d8f" opacity=".25" transform="rotate(330 110 110)"/>
        </g>

        <!-- Inner petal ring -->
        <g opacity=".45">
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(15 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(45 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(75 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(105 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(135 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(165 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(195 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(225 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(255 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(285 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(315 110 110)"/>
          <ellipse cx="110" cy="50" rx="5" ry="14" fill="#c4a860" opacity=".3" transform="rotate(345 110 110)"/>
        </g>

        <!-- Concentric detail rings -->
        <circle cx="110" cy="110" r="60" stroke="#2a9d8f" stroke-width=".6" fill="none" opacity=".3"/>
        <circle cx="110" cy="110" r="45" stroke="#c4a860" stroke-width=".5" fill="none" opacity=".35"/>

        <!-- Seder plate circles (6 items) -->
        <g opacity=".55">
          <!-- Top - Egg (ביצה) -->
          <circle cx="110" cy="65" r="12" stroke="#c4a860" stroke-width=".8" fill="rgba(212,184,96,.1)"/>
          <circle cx="110" cy="65" r="7" fill="rgba(212,184,96,.15)"/>

          <!-- Top-right - Shank bone (זרוע) -->
          <circle cx="148" cy="87" r="12" stroke="#8a6a3a" stroke-width=".8" fill="rgba(138,106,58,.08)"/>
          <path d="M143 87 Q148 82 153 87" stroke="#8a6a3a" stroke-width=".8" fill="none" opacity=".4"/>

          <!-- Bottom-right - Charoset (חרוסת) -->
          <circle cx="148" cy="133" r="12" stroke="#a08050" stroke-width=".8" fill="rgba(160,128,80,.08)"/>
          <circle cx="148" cy="133" r="5" fill="rgba(160,128,80,.12)"/>

          <!-- Bottom - Karpas (כרפס) -->
          <circle cx="110" cy="155" r="12" stroke="#6a9a5a" stroke-width=".8" fill="rgba(106,154,90,.08)"/>
          <ellipse cx="110" cy="155" rx="3" ry="6" fill="rgba(106,154,90,.15)"/>

          <!-- Bottom-left - Maror (מרור) -->
          <circle cx="72" cy="133" r="12" stroke="#5a8a4a" stroke-width=".8" fill="rgba(90,138,74,.08)"/>
          <path d="M68 133 Q72 128 76 133" stroke="#5a8a4a" stroke-width=".8" fill="none" opacity=".4"/>

          <circle cx="72" cy="87" r="12" stroke="#4a8a5a" stroke-width=".8" fill="rgba(74,138,90,.08)"/>
          <ellipse cx="72" cy="87" rx="4" ry="5" fill="rgba(74,138,90,.12)"/>
        </g>

        <!-- Center mandala -->
        <circle cx="110" cy="110" r="18" stroke="#2a9d8f" stroke-width="1" fill="rgba(42,157,143,.06)"/>
        <circle cx="110" cy="110" r="10" stroke="#c4a860" stroke-width=".8" fill="rgba(196,168,96,.08)"/>
        <circle cx="110" cy="110" r="4" fill="rgba(42,157,143,.2)"/>

        <!-- Tiny dots around outer ring -->
        <g fill="#c4a860" opacity=".35">
          <circle cx="110" cy="20" r="1.5"/>
          <circle cx="155" cy="35" r="1.5"/>
          <circle cx="185" cy="75" r="1.5"/>
          <circle cx="195" cy="115" r="1.5"/>
          <circle cx="180" cy="155" r="1.5"/>
          <circle cx="150" cy="185" r="1.5"/>

          <circle cx="70" cy="185" r="1.5"/>
          <circle cx="40" cy="155" r="1.5"/>
          <circle cx="25" cy="115" r="1.5"/>
          <circle cx="35" cy="75" r="1.5"/>
          <circle cx="65" cy="35" r="1.5"/>

        <!-- Olive branch wreath under the plate -->
        <g opacity=".4">
          <!-- Left branch -->
          <path d="M40 170 Q60 150 80 145 Q95 140 110 142" stroke="#8a9a5a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="55" cy="158" rx="4" ry="8" transform="rotate(-40 55 158)" fill="#9aaa6a" opacity=".5"/>
          <ellipse cx="72" cy="148" rx="3.5" ry="7" transform="rotate(-25 72 148)" fill="#9aaa6a" opacity=".45"/>
          <ellipse cx="90" cy="143" rx="3.5" ry="7" transform="rotate(-10 90 143)" fill="#a0aa70" opacity=".4"/>

          <!-- Right branch -->
          <path d="M180 170 Q160 150 140 145 Q125 140 110 142" stroke="#8a9a5a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="165" cy="158" rx="4" ry="8" transform="rotate(40 165 158)" fill="#9aaa6a" opacity=".5"/>
          <ellipse cx="148" cy="148" rx="3.5" ry="7" transform="rotate(25 148 148)" fill="#9aaa6a" opacity=".45"/>
          <ellipse cx="130" cy="143" rx="3.5" ry="7" transform="rotate(10 130 143)" fill="#a0aa70" opacity=".4"/>
        </g>
      </svg>
    </div>

    <div class="main-title">הרמת כוסית</div>

    <div class="subtitle">לכבוד חג הפסח</div>

    <div class="divider"></div>

    <div class="description">
      עברנו תקופה לא פשוטה –<br>
      מלחמה, למידה מרחוק, מסכים במקום פרצופים.<br>
      <strong>הרבה זמן לא ישבנו יחד, פנים אל פנים.</strong><br>
      אז לפני שיוצאים לחופש – נפגשים.
    </div>

    <div class="details-box">
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>

        <span class="detail-text"><strong>יום ראשון</strong></span>
      </div>
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="detail-text"><strong>10:00</strong> בבוקר</span>
      </div>
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="detail-text"><strong>קפה גרג</strong> | קניון הדר</span>
      </div>
    </div>

    <div class="commitment">התחייבנו, אז כולם באים</div>

    <div class="small-note">פסח שמח ומשמעותי לכולנו</div>

    <div class="bottom-accent">
      <svg width="120" height="30" viewBox="0 0 120 30" fill="none">
        <!-- Small olive branch divider -->
        <path d="M15 20 Q35 10 60 15 Q85 10 105 20" stroke="#8a9a5a" stroke-width="1" fill="none" stroke-linecap="round" opacity=".5"/>
        <ellipse cx="40" cy="13" rx="3" ry="6" transform="rotate(-15 40 13)" fill="#9aaa6a" opacity=".3"/>
        <ellipse cx="60" cy="12" rx="2.5" ry="5.5" fill="#9aaa6a" opacity=".3"/>
        <ellipse cx="80" cy="13" rx="3" ry="6" transform="rotate(15 80 13)" fill="#9aaa6a" opacity=".3"/>
        <circle cx="60" cy="8" r="2" fill="#c4a860" opacity=".35"/>
      </svg>
    </div>

  </div>
</div>

</body>
</html>
