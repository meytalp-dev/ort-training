<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דוגמה – כוסות לחיים</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fdf6ef;
    flex-direction: column;
    gap: 40px;
  }
  h2 {
    font-family: sans-serif;
    color: #5a3a20;
    font-size: 24px;
  }
  .demo {
    background: #fef0e4;
    border-radius: 20px;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>
</head>
<body>

<h2>כוסות יין משיקות – לחיים!</h2>

<div class="demo">
  <svg width="300" height="280" viewBox="0 0 300 280" fill="none">
    <!-- Subtle sparkle background -->
    <g opacity=".2">
      <path d="M150 20 L151 16 L152 20 L156 21 L152 22 L151 26 L150 22 L146 21Z" fill="#d4b860"/>
      <path d="M120 40 L121 37 L122 40 L125 41 L122 42 L121 45 L120 42 L117 41Z" fill="#d4b860"/>
      <path d="M180 35 L181 32 L182 35 L185 36 L182 37 L181 40 L180 37 L177 36Z" fill="#d4b860"/>
      <path d="M140 55 L140.5 53 L141 55 L143 55.5 L141 56 L140.5 58 L140 56 L138 55.5Z" fill="#d4b860"/>
      <path d="M165 50 L165.5 48 L166 50 L168 50.5 L166 51 L165.5 53 L165 51 L163 50.5Z" fill="#d4b860"/>
    </g>

    <!-- Left glass - tilted right toward center -->
    <g transform="translate(120, 140) rotate(15)">
      <!-- Rim (top, open) -->
      <ellipse cx="0" cy="-55" rx="26" ry="5.5" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.15)"/>
      <!-- Bowl: wide at top (rim), narrows to stem -->
      <path d="M-26 -55 Q-28 -20 -4 5 L4 5 Q28 -20 26 -55" fill="rgba(180, 50, 70, .07)" stroke="#b8707a" stroke-width="1.2"/>
      <!-- Wine fill inside bowl (lower half) -->
      <path d="M-20 -30 Q-22 -10 -4 5 L4 5 Q22 -10 20 -30 Q10 -33 0 -33 Q-10 -33 -20 -30Z" fill="rgba(140, 30, 50, .18)"/>
      <!-- Wine surface -->
      <ellipse cx="0" cy="-30" rx="20" ry="4" fill="rgba(160, 40, 55, .12)"/>
      <!-- Stem -->
      <line x1="0" y1="5" x2="0" y2="55" stroke="#b8707a" stroke-width="1.3"/>
      <!-- Base -->
      <ellipse cx="0" cy="57" rx="16" ry="4" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.1)"/>
      <!-- Glass shine -->
      <path d="M-16 -50 Q-12 -35 -6 -15" stroke="rgba(255,255,255,.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Right glass - tilted left toward center -->
    <g transform="translate(180, 140) rotate(-15)">
      <!-- Rim (top, open) -->
      <ellipse cx="0" cy="-55" rx="26" ry="5.5" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.15)"/>
      <!-- Bowl -->
      <path d="M-26 -55 Q-28 -20 -4 5 L4 5 Q28 -20 26 -55" fill="rgba(180, 50, 70, .07)" stroke="#b8707a" stroke-width="1.2"/>
      <!-- Wine fill -->
      <path d="M-20 -30 Q-22 -10 -4 5 L4 5 Q22 -10 20 -30 Q10 -33 0 -33 Q-10 -33 -20 -30Z" fill="rgba(140, 30, 50, .18)"/>
      <!-- Wine surface -->
      <ellipse cx="0" cy="-30" rx="20" ry="4" fill="rgba(160, 40, 55, .12)"/>
      <!-- Stem -->
      <line x1="0" y1="5" x2="0" y2="55" stroke="#b8707a" stroke-width="1.3"/>
      <!-- Base -->
      <ellipse cx="0" cy="57" rx="16" ry="4" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.1)"/>
      <!-- Glass shine -->
      <path d="M-16 -50 Q-12 -35 -6 -15" stroke="rgba(255,255,255,.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Sparkles at the clink point (where rims touch) -->
    <g opacity=".55">
      <path d="M150 85 L152 78 L154 85 L161 87 L154 89 L152 96 L150 89 L143 87Z" fill="#d4b860"/>
      <path d="M138 78 L139 75 L140 78 L143 79 L140 80 L139 83 L138 80 L135 79Z" fill="#d4b860" opacity=".5"/>
      <path d="M164 80 L165 77 L166 80 L169 81 L166 82 L165 85 L164 82 L161 81Z" fill="#d4b860" opacity=".5"/>
      <circle cx="145" cy="72" r="1.5" fill="#d4b860" opacity=".4"/>
      <circle cx="158" cy="74" r="1.2" fill="#d4b860" opacity=".35"/>
      <circle cx="150" cy="97" r="1.2" fill="#d4b860" opacity=".3"/>
      <circle cx="135" cy="85" r="1" fill="#d4b860" opacity=".3"/>
      <circle cx="168" cy="83" r="1" fill="#d4b860" opacity=".3"/>
    </g>

    <!-- "לחיים" text -->
    <text x="150" y="240" text-anchor="middle" font-family="serif" font-size="32" fill="#5a3a20" opacity=".6">לחיים!</text>
  </svg>
</div>

</body>
</html>
