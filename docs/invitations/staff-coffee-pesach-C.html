<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הזמנה – מפגש צוות לפסח | סגנון C</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #d8d0c8;
    font-family: 'Heebo', sans-serif;
  }

  .invitation {
    width: 500px;
    height: 625px;
    position: relative;
    overflow: hidden;
    background: #f8f4f0;
    border-radius: 8px;
    box-shadow: 0 12px 50px rgba(100, 80, 60, .15);
  }

  .content {
    position: relative;
    z-index: 5;
    padding: 36px 40px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 625px;
  }

  /* ===== ABSTRACT ORGANIC BLOBS ===== */
  .blob {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
  }

  /* Pink/coral blobs */
  .blob-1 {
    width: 180px; height: 160px;
    top: -40px; right: -50px;
    background: radial-gradient(ellipse, rgba(220, 150, 140, .25) 0%, rgba(220, 150, 140, .05) 70%, transparent 100%);
    border-radius: 60% 40% 55% 45% / 55% 60% 40% 45%;
  }

  .blob-2 {
    width: 120px; height: 100px;
    bottom: 120px; left: -30px;
    background: radial-gradient(ellipse, rgba(210, 140, 150, .2) 0%, rgba(210, 140, 150, .03) 70%, transparent 100%);
    border-radius: 45% 55% 40% 60% / 50% 45% 55% 50%;
  }

  /* Sage/mint blobs */
  .blob-3 {
    width: 140px; height: 130px;
    top: 200px; left: -40px;
    background: radial-gradient(ellipse, rgba(140, 180, 150, .2) 0%, rgba(140, 180, 150, .04) 70%, transparent 100%);
    border-radius: 55% 45% 50% 50% / 45% 55% 45% 55%;
  }

  .blob-4 {
    width: 160px; height: 140px;
    bottom: -30px; right: -40px;
    background: radial-gradient(ellipse, rgba(150, 190, 160, .22) 0%, rgba(150, 190, 160, .04) 70%, transparent 100%);
    border-radius: 50% 50% 45% 55% / 55% 45% 50% 50%;
  }

  /* Warm mustard blob */
  .blob-5 {
    width: 100px; height: 90px;
    top: 100px; right: -20px;
    background: radial-gradient(ellipse, rgba(220, 190, 120, .18) 0%, rgba(220, 190, 120, .03) 70%, transparent 100%);
    border-radius: 40% 60% 50% 50% / 55% 45% 55% 45%;
  }

  /* Soft blue blob */
  .blob-6 {
    width: 110px; height: 100px;
    bottom: 250px; right: 40px;
    background: radial-gradient(ellipse, rgba(140, 170, 200, .15) 0%, rgba(140, 170, 200, .03) 70%, transparent 100%);
    border-radius: 50% 50% 40% 60% / 45% 55% 50% 50%;
  }

  /* Small decorative dots */
  .dots {
    position: absolute;
    z-index: 2;
    pointer-events: none;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Rubik', sans-serif;
    font-weight: 400;
    font-size: 12.5px;
    letter-spacing: 1px;
    color: #8a8070;
    padding: 6px 20px;
    border-radius: 24px;
    margin-bottom: 24px;
    background: rgba(255, 255, 255, .6);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(180, 170, 150, .15);
  }

  /* Modern Pesach icon cluster */
  .pesach-modern {
    margin-bottom: 24px;
    position: relative;
  }

  .main-title {
    font-family: 'Heebo', sans-serif;
    font-weight: 900;
    font-size: 36px;
    line-height: 1.15;
    color: #3a3028;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-family: 'Rubik', sans-serif;
    font-weight: 300;
    font-size: 20px;
    color: #8a9a7a;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .divider-modern {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .divider-line {
    width: 40px;
    height: 1px;
    background: rgba(150, 140, 120, .25);
  }
  .divider-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(180, 160, 130, .35);
  }

  .description {
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: #5a5040;
    line-height: 1.8;
    margin-bottom: 18px;
    max-width: 380px;
  }

  .description strong {
    font-weight: 700;
    color: #3a3028;
  }

  .details-box {
    background: rgba(255, 255, 255, .55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(180, 170, 150, .12);
    border-radius: 20px;
    padding: 14px 24px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 4px 20px rgba(100, 80, 60, .04);
  }

  .detail-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 0;
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    color: #4a4038;
  }

  .detail-row + .detail-row {
    border-top: 1px solid rgba(180, 170, 150, .1);
  }

  .detail-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: #8a9a7a;
  }

  .detail-text strong {
    font-weight: 700;
  }

  .commitment {
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #3a3028;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .small-note {
    font-family: 'Rubik', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: #8a9a7a;
  }

  .bottom-art {
    margin-top: auto;
    padding-top: 20px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(8px, -8px); }
  }

  .content > * {
    animation: fadeUp .6s ease both;
  }
  .content > *:nth-child(1) { animation-delay: .1s; }
  .content > *:nth-child(2) { animation-delay: .25s; }
  .content > *:nth-child(3) { animation-delay: .4s; }
  .content > *:nth-child(4) { animation-delay: .5s; }
  .content > *:nth-child(5) { animation-delay: .55s; }
  .content > *:nth-child(6) { animation-delay: .65s; }
  .content > *:nth-child(7) { animation-delay: .75s; }
  .content > *:nth-child(8) { animation-delay: .85s; }
  .content > *:nth-child(9) { animation-delay: .95s; }
  .content > *:nth-child(10) { animation-delay: 1.05s; }
  .content > *:nth-child(11) { animation-delay: 1.1s; }

  .blob { animation: blobFloat 8s ease-in-out infinite; }
  .blob-2 { animation-delay: -2s; animation-duration: 10s; }
  .blob-3 { animation-delay: -4s; animation-duration: 9s; }
  .blob-4 { animation-delay: -1s; animation-duration: 11s; }
  .blob-5 { animation-delay: -3s; animation-duration: 7s; }
  .blob-6 { animation-delay: -5s; animation-duration: 9s; }

  @media (prefers-reduced-motion: reduce) {
    .content > *, .blob { animation: none; }
  }

  @media (max-width: 580px) {
    .invitation { width: 100%; min-height: 100vh; border-radius: 0; }
    .content { padding: 40px 28px 30px; }
    .main-title { font-size: 34px; }
  }
</style>
</head>
<body>

<div class="invitation">

  <!-- Abstract organic blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="blob blob-6"></div>

  <!-- Decorative dots -->
  <svg class="dots" width="540" height="780" viewBox="0 0 540 780" fill="none" style="position:absolute;inset:0;z-index:2;">
    <circle cx="60" cy="50" r="4" fill="#dc968c" opacity=".2"/>
    <circle cx="480" cy="90" r="3" fill="#8cb496" opacity=".2"/>
    <circle cx="90" cy="200" r="5" fill="#dcbe78" opacity=".15"/>
    <circle cx="460" cy="280" r="3.5" fill="#dc968c" opacity=".18"/>
    <circle cx="70" cy="450" r="4" fill="#8caac8" opacity=".15"/>
    <circle cx="490" cy="500" r="3" fill="#dcbe78" opacity=".18"/>
    <circle cx="50" cy="650" r="3.5" fill="#8cb496" opacity=".2"/>
    <circle cx="470" cy="700" r="4" fill="#dc968c" opacity=".15"/>
    <circle cx="200" cy="750" r="3" fill="#8caac8" opacity=".15"/>
    <circle cx="380" cy="60" r="2.5" fill="#8cb496" opacity=".18"/>
    <circle cx="150" cy="730" r="2.5" fill="#dcbe78" opacity=".15"/>
  </svg>

  <div class="content">

    <div class="tag">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2L15 9 22 9 16 14 18 22 12 17 6 22 8 14 2 9 9 9Z"/></svg>
      צוות אורט בית הערבה
    </div>

    <!-- Modern: Candles + open Haggadah + olive branches -->
    <div class="pesach-modern">
      <svg width="190" height="155" viewBox="0 0 220 180" fill="none">
        <!-- Soft glow behind candles -->
        <radialGradient id="glow1" cx="50%" cy="30%">
          <stop offset="0%" stop-color="#dcbe78" stop-opacity=".12"/>
          <stop offset="100%" stop-color="#dcbe78" stop-opacity="0"/>
        </radialGradient>
        <ellipse cx="110" cy="60" rx="90" ry="55" fill="url(#glow1)"/>

        <!-- Open Haggadah book -->
        <g opacity=".55">
          <!-- Left page -->
          <path d="M60 85 L60 145 Q90 138 110 145 L110 85 Q90 78 60 85Z" fill="#f8f4ee" stroke="#c8b890" stroke-width=".8"/>
          <!-- Right page -->
          <path d="M110 85 L110 145 Q130 138 160 145 L160 85 Q130 78 110 85Z" fill="#faf6f0" stroke="#c8b890" stroke-width=".8"/>
          <!-- Spine -->
          <line x1="110" y1="82" x2="110" y2="148" stroke="#b8a878" stroke-width="1.2"/>
          <!-- Text lines - left page -->
          <line x1="70" y1="95" x2="105" y2="93" stroke="#c8b890" stroke-width=".6" opacity=".4"/>
          <line x1="70" y1="102" x2="105" y2="100" stroke="#c8b890" stroke-width=".6" opacity=".35"/>
          <line x1="70" y1="109" x2="100" y2="107" stroke="#c8b890" stroke-width=".6" opacity=".3"/>
          <line x1="70" y1="116" x2="105" y2="114" stroke="#c8b890" stroke-width=".6" opacity=".35"/>
          <line x1="70" y1="123" x2="98" y2="121" stroke="#c8b890" stroke-width=".6" opacity=".3"/>
          <line x1="70" y1="130" x2="105" y2="128" stroke="#c8b890" stroke-width=".6" opacity=".3"/>
          <!-- Text lines - right page -->
          <line x1="115" y1="93" x2="152" y2="95" stroke="#c8b890" stroke-width=".6" opacity=".4"/>
          <line x1="115" y1="100" x2="152" y2="102" stroke="#c8b890" stroke-width=".6" opacity=".35"/>
          <line x1="115" y1="107" x2="148" y2="109" stroke="#c8b890" stroke-width=".6" opacity=".3"/>
          <line x1="115" y1="114" x2="152" y2="116" stroke="#c8b890" stroke-width=".6" opacity=".35"/>
          <line x1="115" y1="121" x2="145" y2="123" stroke="#c8b890" stroke-width=".6" opacity=".3"/>
          <line x1="115" y1="128" x2="152" y2="130" stroke="#c8b890" stroke-width=".6" opacity=".3"/>
          <!-- Small decorative circle on right page -->
          <circle cx="133" cy="120" r="8" stroke="#8cb496" stroke-width=".5" fill="rgba(140,180,150,.06)" opacity=".4"/>
        </g>

        <!-- Left candle -->
        <g opacity=".6">
          <rect x="72" y="38" width="8" height="44" rx="3" fill="#f0ece4" stroke="#d8d0c0" stroke-width=".6"/>
          <!-- Wick -->
          <line x1="76" y1="38" x2="76" y2="32" stroke="#5a4a38" stroke-width=".8"/>
          <!-- Flame -->
          <ellipse cx="76" cy="26" rx="4" ry="8" fill="#f0c040" opacity=".5"/>
          <ellipse cx="76" cy="24" rx="2.5" ry="5.5" fill="#f8e060" opacity=".6"/>
          <ellipse cx="76" cy="22" rx="1.2" ry="3" fill="#fff8e0" opacity=".7"/>
          <!-- Warm glow -->
          <circle cx="76" cy="26" r="12" fill="#f0c040" opacity=".08"/>
        </g>

        <!-- Right candle (taller) -->
        <g opacity=".6">
          <rect x="140" y="32" width="8" height="50" rx="3" fill="#f0ece4" stroke="#d8d0c0" stroke-width=".6"/>
          <line x1="144" y1="32" x2="144" y2="26" stroke="#5a4a38" stroke-width=".8"/>
          <ellipse cx="144" cy="20" rx="4.5" ry="8.5" fill="#f0c040" opacity=".5"/>
          <ellipse cx="144" cy="18" rx="2.8" ry="6" fill="#f8e060" opacity=".6"/>
          <ellipse cx="144" cy="16" rx="1.3" ry="3.5" fill="#fff8e0" opacity=".7"/>
          <circle cx="144" cy="20" r="13" fill="#f0c040" opacity=".08"/>
        </g>

        <!-- Olive branch - left -->
        <g opacity=".45">
          <path d="M20 120 Q35 100 55 95 Q65 92 72 90" stroke="#7a9a5a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="32" cy="108" rx="4" ry="8" transform="rotate(-35 32 108)" fill="#8cb496" opacity=".5"/>
          <ellipse cx="48" cy="98" rx="3.5" ry="7" transform="rotate(-20 48 98)" fill="#8cb496" opacity=".45"/>
          <ellipse cx="62" cy="93" rx="3" ry="6.5" transform="rotate(-5 62 93)" fill="#a0c8a8" opacity=".4"/>
          <circle cx="38" cy="104" r="2" fill="#6a8a4a" opacity=".3"/>
          <circle cx="55" cy="96" r="1.8" fill="#6a8a4a" opacity=".25"/>
        </g>

        <!-- Olive branch - right -->
        <g opacity=".45">
          <path d="M200 120 Q185 100 165 95 Q155 92 148 90" stroke="#7a9a5a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="188" cy="108" rx="4" ry="8" transform="rotate(35 188 108)" fill="#8cb496" opacity=".5"/>
          <ellipse cx="172" cy="98" rx="3.5" ry="7" transform="rotate(20 172 98)" fill="#8cb496" opacity=".45"/>
          <ellipse cx="158" cy="93" rx="3" ry="6.5" transform="rotate(5 158 93)" fill="#a0c8a8" opacity=".4"/>
          <circle cx="182" cy="104" r="2" fill="#6a8a4a" opacity=".3"/>
          <circle cx="165" cy="96" r="1.8" fill="#6a8a4a" opacity=".25"/>
        </g>

        <!-- Small stars/sparkles around candles -->
        <g opacity=".25">
          <path d="M90 20 L91 16 L92 20 L96 21 L92 22 L91 26 L90 22 L86 21Z" fill="#dcbe78"/>
          <path d="M130 12 L131 9 L132 12 L135 13 L132 14 L131 17 L130 14 L127 13Z" fill="#dcbe78"/>
          <path d="M160 38 L160.5 36 L161 38 L163 38.5 L161 39 L160.5 41 L160 39 L158 38.5Z" fill="#dcbe78"/>
          <path d="M60 28 L60.5 26 L61 28 L63 28.5 L61 29 L60.5 31 L60 29 L58 28.5Z" fill="#dcbe78"/>
        </g>

        <!-- Small matzah piece near book -->
        <g transform="translate(170, 140)" opacity=".3">
          <rect x="0" y="0" width="22" height="16" rx="2" fill="#e8d8b8" stroke="#c8b890" stroke-width=".5"/>
          <line x1="3" y1="4" x2="19" y2="4" stroke="#c8b890" stroke-width=".4" opacity=".4"/>
          <line x1="3" y1="8" x2="19" y2="8" stroke="#c8b890" stroke-width=".4" opacity=".4"/>
          <line x1="3" y1="12" x2="19" y2="12" stroke="#c8b890" stroke-width=".4" opacity=".4"/>
          <circle cx="7" cy="6" r="1" fill="#c8b890" opacity=".3"/>
          <circle cx="15" cy="6" r="1" fill="#c8b890" opacity=".3"/>
          <circle cx="11" cy="10" r="1" fill="#c8b890" opacity=".3"/>
        </g>
      </svg>
    </div>

    <div class="main-title">הרמת כוסית</div>

    <div class="subtitle">לכבוד חג הפסח</div>

    <div class="divider-modern">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="description">
      עברנו תקופה לא פשוטה –<br>
      מלחמה, למידה מרחוק, מסכים במקום פרצופים.<br>
      <strong>הרבה זמן לא ישבנו יחד, פנים אל פנים.</strong><br>
      אז לפני שיוצאים לחופש – נפגשים.
    </div>

    <div class="details-box">
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="detail-text"><strong>יום ראשון</strong></span>
      </div>
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="detail-text"><strong>10:00</strong> בבוקר</span>
      </div>
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="detail-text"><strong>קפה גרג</strong> | קניון הדר</span>
      </div>
    </div>

    <div class="commitment">התחייבנו, אז כולם באים</div>

    <div class="small-note">פסח שמח ומשמעותי לכולנו</div>

    <div class="bottom-art">
      <svg width="80" height="25" viewBox="0 0 80 25" fill="none">
        <circle cx="20" cy="12" r="3" fill="#dc968c" opacity=".2"/>
        <circle cx="35" cy="10" r="2.5" fill="#8cb496" opacity=".25"/>
        <circle cx="48" cy="13" r="2" fill="#dcbe78" opacity=".2"/>
        <circle cx="60" cy="10" r="3" fill="#8caac8" opacity=".2"/>
      </svg>
    </div>

  </div>
</div>

</body>
</html>
