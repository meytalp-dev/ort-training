<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הזמנה – הרמת כוסית לפסח</title>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Heebo:wght@300;400;700;900&family=Secular+One&family=Playpen+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #e8ddd0;
    font-family: 'Heebo', sans-serif;
  }

  .invitation {
    width: 1080px;
    height: 1200px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(175deg, #fef0e4 0%, #fdf6ef 35%, #fef8f0 100%);
  }

  .invitation::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 85%, rgba(244, 162, 130, .15) 0%, transparent 45%),
      radial-gradient(ellipse at 80% 90%, rgba(244, 180, 130, .12) 0%, transparent 40%);
    pointer-events: none;
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 3;
    padding: 30px 60px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 1200px;
  }

  .flowers-top {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
  }

  .flowers-bottom {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
  }

  .tag {
    font-family: 'Heebo', sans-serif;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 2px;
    color: #c47a50;
    padding: 8px 36px;
    border-radius: 30px;
    margin-bottom: 10px;
    margin-top: 70px;
    background: rgba(244, 180, 130, .15);
    border: 1px solid rgba(200, 140, 90, .2);
  }

  .pesach-art { margin-bottom: 6px; }

  .main-title {
    font-family: 'Secular One', sans-serif;
    font-size: 72px;
    line-height: 1.1;
    color: #5a3a20;
    margin-bottom: 0;
  }

  .subtitle {
    font-family: 'Playpen Sans Hebrew', cursive;
    font-weight: 700;
    font-size: 40px;
    color: #c47a50;
    margin-bottom: 14px;
    line-height: 1;
  }

  .description {
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    font-size: 24px;
    color: #6a4a30;
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .description strong {
    font-weight: 700;
    color: #5a3a20;
  }

  .details-box {
    background: rgba(255, 255, 255, .5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(200, 160, 120, .2);
    border-radius: 24px;
    padding: 14px 50px;
    margin-bottom: 16px;
    max-width: 700px;
    width: 100%;
  }

  .detail-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 10px 0;
    font-family: 'Heebo', sans-serif;
    font-size: 34px;
    color: #5a3a20;
  }

  .detail-row + .detail-row {
    border-top: 1px solid rgba(200, 160, 120, .12);
  }

  .detail-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    color: #c47a50;
  }

  .detail-text strong { font-weight: 700; }

  .commitment {
    font-family: 'Secular One', sans-serif;
    font-size: 36px;
    color: #5a3a20;
    margin-bottom: 6px;
  }

  .small-note {
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    font-size: 28px;
    color: #c47a50;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .content > * { animation: fadeUp .5s ease both; }
  .content > *:nth-child(1) { animation-delay: .1s; }
  .content > *:nth-child(2) { animation-delay: .2s; }
  .content > *:nth-child(3) { animation-delay: .3s; }
  .content > *:nth-child(4) { animation-delay: .35s; }
  .content > *:nth-child(5) { animation-delay: .4s; }
  .content > *:nth-child(6) { animation-delay: .5s; }
  .content > *:nth-child(7) { animation-delay: .6s; }
  .content > *:nth-child(8) { animation-delay: .7s; }
  .content > *:nth-child(9) { animation-delay: .8s; }

  @media (prefers-reduced-motion: reduce) { .content > * { animation: none; } }
</style>
</head>
<body>

<div class="invitation">

  <!-- Top wildflower border -->
  <svg class="flowers-top" width="1080" height="100" viewBox="0 0 1080 100" fill="none">
    <g opacity=".6">
      <path d="M0 90 Q120 60 240 72 Q360 52 480 66 Q600 48 720 62 Q840 50 960 68 Q1020 60 1080 72" stroke="#7a9a5a" stroke-width="2" fill="none"/>
      <ellipse cx="160" cy="68" rx="12" ry="6" transform="rotate(-20 160 68)" fill="#8aaa5a" opacity=".4"/>
      <ellipse cx="430" cy="58" rx="10" ry="5" transform="rotate(15 430 58)" fill="#7a9a5a" opacity=".35"/>
      <ellipse cx="750" cy="56" rx="12" ry="6" transform="rotate(-10 750 56)" fill="#8aaa5a" opacity=".4"/>
    </g>
    <g opacity=".75">
      <circle cx="120" cy="42" r="14" fill="#e06050" opacity=".6"/>
      <circle cx="120" cy="42" r="7" fill="#c04030" opacity=".4"/>
      <path d="M120 56 L120 78" stroke="#7a9a5a" stroke-width="1.5"/>

      <ellipse cx="270" cy="32" rx="6" ry="12" fill="#f0c040" opacity=".5" transform="rotate(0 270 32)"/>
      <ellipse cx="270" cy="32" rx="6" ry="12" fill="#f0c040" opacity=".5" transform="rotate(60 270 32)"/>
      <ellipse cx="270" cy="32" rx="6" ry="12" fill="#f0c040" opacity=".5" transform="rotate(120 270 32)"/>
      <circle cx="270" cy="32" r="5" fill="#e0a020" opacity=".6"/>
      <path d="M270 44 L270 68" stroke="#7a9a5a" stroke-width="1.2"/>

      <circle cx="420" cy="36" r="6" fill="#9070b0" opacity=".5"/>
      <circle cx="428" cy="30" r="5" fill="#a080c0" opacity=".45"/>
      <circle cx="413" cy="30" r="4.5" fill="#8060a0" opacity=".5"/>
      <path d="M420 42 L420 64" stroke="#7a9a5a" stroke-width="1.2"/>

      <circle cx="600" cy="32" r="14" fill="#f0a050" opacity=".5"/>
      <circle cx="600" cy="32" r="7" fill="#e08030" opacity=".4"/>
      <path d="M600 46 L602 66" stroke="#7a9a5a" stroke-width="1.2"/>

      <ellipse cx="770" cy="28" rx="7" ry="13" fill="#e8a0b0" opacity=".45" transform="rotate(0 770 28)"/>
      <ellipse cx="770" cy="28" rx="7" ry="13" fill="#e8a0b0" opacity=".45" transform="rotate(72 770 28)"/>
      <ellipse cx="770" cy="28" rx="7" ry="13" fill="#e8a0b0" opacity=".45" transform="rotate(144 770 28)"/>
      <circle cx="770" cy="28" r="5" fill="#d08090" opacity=".5"/>
      <path d="M770 41 L769 62" stroke="#7a9a5a" stroke-width="1.2"/>

      <circle cx="930" cy="38" r="8" fill="#70a0c8" opacity=".5"/>
      <circle cx="930" cy="38" r="4" fill="#5080a8" opacity=".4"/>
      <path d="M930 46 L929 64" stroke="#7a9a5a" stroke-width="1.2"/>
    </g>
  </svg>

  <!-- Bottom wildflower border -->
  <svg class="flowers-bottom" width="1080" height="80" viewBox="0 0 1080 80" fill="none">
    <g opacity=".5" transform="scale(1,-1) translate(0,-80)">
      <path d="M0 70 Q140 48 280 58 Q420 40 560 54 Q700 38 840 52 Q950 44 1080 58" stroke="#7a9a5a" stroke-width="2" fill="none"/>
      <circle cx="140" cy="30" r="12" fill="#e8a0b0" opacity=".4"/>
      <circle cx="140" cy="30" r="6" fill="#d08090" opacity=".3"/>
      <path d="M140 42 L140 60" stroke="#7a9a5a" stroke-width="1.2"/>
      <circle cx="360" cy="26" r="10" fill="#f0c040" opacity=".4"/>
      <path d="M360 36 L360 55" stroke="#7a9a5a" stroke-width="1.2"/>
      <circle cx="600" cy="24" r="13" fill="#e06050" opacity=".4"/>
      <circle cx="600" cy="24" r="6" fill="#c04030" opacity=".3"/>
      <path d="M600 37 L601 55" stroke="#7a9a5a" stroke-width="1.2"/>
      <circle cx="850" cy="30" r="10" fill="#70a0c8" opacity=".4"/>
      <path d="M850 40 L850 55" stroke="#7a9a5a" stroke-width="1.2"/>
    </g>
  </svg>

  <div class="content">

    <div class="tag">צוות אורט בית הערבה</div>

    <!-- Almond branch + cheers wine glasses -->
    <div class="pesach-art">
      <svg width="280" height="180" viewBox="0 0 420 280" fill="none">
        <!-- Soft watercolor background -->
        <ellipse cx="210" cy="140" rx="190" ry="130" fill="#fce8d8" opacity=".25"/>

        <!-- Almond branch behind glasses -->
        <g opacity=".5">
          <path d="M60 230 Q100 190 160 160 Q210 140 270 130 Q330 120 380 115" stroke="#8a6a4a" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M160 160 Q145 135 140 110" stroke="#8a6a4a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M270 130 Q275 110 280 95" stroke="#8a6a4a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- Blossoms on branch -->
          <g transform="translate(140, 108)" opacity=".65">
            <ellipse cx="0" cy="-6" rx="3" ry="5.5" fill="#f8c8d0"/>
            <ellipse cx="5" cy="-2" rx="3" ry="5.5" fill="#f0b8c0" transform="rotate(72)"/>
            <ellipse cx="3" cy="4" rx="3" ry="5.5" fill="#f8c8d0" transform="rotate(144)"/>
            <ellipse cx="-3" cy="4" rx="3" ry="5.5" fill="#f0b8c0" transform="rotate(216)"/>
            <ellipse cx="-5" cy="-2" rx="3" ry="5.5" fill="#f8c8d0" transform="rotate(288)"/>
            <circle cx="0" cy="0" r="2.5" fill="#e8a070" opacity=".5"/>
          </g>
          <g transform="translate(280, 93)" opacity=".6">
            <ellipse cx="0" cy="-5.5" rx="3" ry="5" fill="#fcd0d8"/>
            <ellipse cx="5" cy="-2" rx="3" ry="5" fill="#f4c0c8" transform="rotate(72)"/>
            <ellipse cx="3" cy="4" rx="3" ry="5" fill="#fcd0d8" transform="rotate(144)"/>
            <ellipse cx="-3" cy="4" rx="3" ry="5" fill="#f4c0c8" transform="rotate(216)"/>
            <ellipse cx="-5" cy="-2" rx="3" ry="5" fill="#fcd0d8" transform="rotate(288)"/>
            <circle cx="0" cy="0" r="2" fill="#e8a070" opacity=".5"/>
          </g>
          <g transform="translate(365, 113)" opacity=".55">
            <ellipse cx="0" cy="-5" rx="2.5" ry="4.5" fill="#f8c8d0"/>
            <ellipse cx="4" cy="-1.5" rx="2.5" ry="4.5" fill="#f0b8c0" transform="rotate(72)"/>
            <ellipse cx="2.5" cy="3.5" rx="2.5" ry="4.5" fill="#f8c8d0" transform="rotate(144)"/>
            <ellipse cx="-2.5" cy="3.5" rx="2.5" ry="4.5" fill="#f0b8c0" transform="rotate(216)"/>
            <ellipse cx="-4" cy="-1.5" rx="2.5" ry="4.5" fill="#f8c8d0" transform="rotate(288)"/>
            <circle cx="0" cy="0" r="2" fill="#e8a070" opacity=".45"/>
          </g>
          <ellipse cx="100" cy="200" rx="4" ry="9" transform="rotate(25 100 200)" fill="#8aaa5a" opacity=".3"/>
          <ellipse cx="200" cy="145" rx="3.5" ry="8" transform="rotate(-15 200 145)" fill="#7a9a5a" opacity=".3"/>
          <ellipse cx="330" cy="120" rx="3" ry="7" transform="rotate(10 330 120)" fill="#8aaa5a" opacity=".25"/>
        </g>

        <!-- Left wine glass - tilted right -->
        <g transform="translate(170, 160) rotate(15)">
          <ellipse cx="0" cy="-55" rx="26" ry="5.5" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.15)"/>
          <path d="M-26 -55 Q-28 -20 -4 5 L4 5 Q28 -20 26 -55" fill="rgba(180, 50, 70, .07)" stroke="#b8707a" stroke-width="1.2"/>
          <path d="M-20 -30 Q-22 -10 -4 5 L4 5 Q22 -10 20 -30 Q10 -33 0 -33 Q-10 -33 -20 -30Z" fill="rgba(140, 30, 50, .18)"/>
          <ellipse cx="0" cy="-30" rx="20" ry="4" fill="rgba(160, 40, 55, .12)"/>
          <line x1="0" y1="5" x2="0" y2="55" stroke="#b8707a" stroke-width="1.3"/>
          <ellipse cx="0" cy="57" rx="16" ry="4" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.1)"/>
          <path d="M-16 -50 Q-12 -35 -6 -15" stroke="rgba(255,255,255,.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Right wine glass - tilted left -->
        <g transform="translate(250, 160) rotate(-15)">
          <ellipse cx="0" cy="-55" rx="26" ry="5.5" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.15)"/>
          <path d="M-26 -55 Q-28 -20 -4 5 L4 5 Q28 -20 26 -55" fill="rgba(180, 50, 70, .07)" stroke="#b8707a" stroke-width="1.2"/>
          <path d="M-20 -30 Q-22 -10 -4 5 L4 5 Q22 -10 20 -30 Q10 -33 0 -33 Q-10 -33 -20 -30Z" fill="rgba(140, 30, 50, .18)"/>
          <ellipse cx="0" cy="-30" rx="20" ry="4" fill="rgba(160, 40, 55, .12)"/>
          <line x1="0" y1="5" x2="0" y2="55" stroke="#b8707a" stroke-width="1.3"/>
          <ellipse cx="0" cy="57" rx="16" ry="4" stroke="#b8707a" stroke-width="1" fill="rgba(255,255,255,.1)"/>
          <path d="M-16 -50 Q-12 -35 -6 -15" stroke="rgba(255,255,255,.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Clink sparkles -->
        <g opacity=".55">
          <path d="M210 105 L212 97 L214 105 L222 107 L214 109 L212 117 L210 109 L202 107Z" fill="#d4b860"/>
          <path d="M196 96 L197 93 L198 96 L201 97 L198 98 L197 101 L196 98 L193 97Z" fill="#d4b860" opacity=".5"/>
          <path d="M226 99 L227 96 L228 99 L231 100 L228 101 L227 104 L226 101 L223 100Z" fill="#d4b860" opacity=".5"/>
          <circle cx="200" cy="90" r="1.5" fill="#d4b860" opacity=".4"/>
          <circle cx="222" cy="93" r="1.3" fill="#d4b860" opacity=".35"/>
          <circle cx="210" cy="118" r="1.2" fill="#d4b860" opacity=".3"/>
          <circle cx="190" cy="103" r="1" fill="#d4b860" opacity=".3"/>
          <circle cx="232" cy="104" r="1" fill="#d4b860" opacity=".3"/>
        </g>

        <!-- Butterfly -->
        <g transform="translate(85, 130)" opacity=".5">
          <ellipse cx="-5" cy="-3" rx="7" ry="5" fill="#f0a050" opacity=".5" transform="rotate(-20 -5 -3)"/>
          <ellipse cx="5" cy="-3" rx="7" ry="5" fill="#e09040" opacity=".5" transform="rotate(20 5 -3)"/>
          <ellipse cx="-4" cy="2.5" rx="4.5" ry="3.5" fill="#f0c040" opacity=".4" transform="rotate(-10 -4 2.5)"/>
          <ellipse cx="4" cy="2.5" rx="4.5" ry="3.5" fill="#e0b030" opacity=".4" transform="rotate(10 4 2.5)"/>
          <ellipse cx="0" cy="0" rx="1" ry="5" fill="#5a3a20" opacity=".4"/>
        </g>
      </svg>
    </div>

    <div class="main-title">הרמת כוסית</div>
    <div class="subtitle">לכבוד חג הפסח</div>

    <div class="description">
      עברנו תקופה לא פשוטה – מלחמה, למידה מרחוק, מסכים במקום פרצופים.<br>
      <strong>הרבה זמן לא ישבנו יחד, פנים אל פנים.</strong><br>
      אז לפני שיוצאים לחופש – נפגשים.
    </div>

    <div class="details-box">
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="detail-text"><strong>יום ראשון</strong></span>
      </div>
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="detail-text"><strong>10:00</strong> בבוקר</span>
      </div>
      <div class="detail-row">
        <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="detail-text"><strong>קפה גרג</strong> | קניון הדר</span>
      </div>
    </div>

    <div class="commitment">התחייבנו, אז כולם באים</div>
    <div class="small-note">פסח שמח ומשמעותי לכולנו</div>

  </div>
</div>

</body>
</html>
