<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מלחמה ומה עכשיו? | אורט בית הערבה</title>
<meta property="og:title" content="מלחמה ומה עכשיו? מפגש להורים">
<meta property="og:description" content="אורט בית הערבה | יום שלישי 17.3 בשעה 9:30 בזום">
<meta property="og:image" content="https://meytalp-dev.github.io/ort-training/zoom-parents/logo-ort.png">
<meta property="og:url" content="https://meytalp-dev.github.io/ort-training/zoom-parents/">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&family=Rubik:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,.08), 0 4px 20px rgba(0,0,0,.04);
  max-width: 480px;
  width: 100%;
  overflow: hidden;
  text-align: center;
}

.header {
  background: linear-gradient(135deg, #1a3a5c 0%, #1e4d7a 100%);
  padding: 32px 24px 28px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 0; right: 0;
  height: 40px;
  background: #fff;
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}

.logo {
  width: 160px;
  margin-bottom: 16px;
  background: #fff;
  border-radius: 16px;
  padding: 10px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
}

.badge {
  display: inline-block;
  background: rgba(255,255,255,.15);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}

.body {
  padding: 28px 28px 36px;
}

.emoji-top {
  font-size: 48px;
  margin-bottom: 8px;
}

h1 {
  font-family: 'Rubik', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: #1e293b;
  line-height: 1.3;
  margin-bottom: 6px;
}

.subtitle {
  color: #64748b;
  font-size: 17px;
  margin-bottom: 28px;
}

.info-grid {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}

.info-box {
  flex: 1;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 16px 12px;
}
.info-box .icon {
  font-size: 28px;
  margin-bottom: 6px;
}
.info-box .label {
  font-size: 12px;
  color: #94a3b8;
  font-weight: 600;
  margin-bottom: 2px;
}
.info-box .value {
  font-family: 'Rubik', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #1e293b;
}
.info-box .extra {
  font-size: 13px;
  color: #64748b;
  margin-top: 2px;
}

.zoom-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 18px 24px;
  background: linear-gradient(135deg, #2D8CFF, #1a6fdf);
  color: #fff;
  font-family: 'Heebo', sans-serif;
  font-size: 20px;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  text-decoration: none;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 6px 24px rgba(45,140,255,.35);
}
.zoom-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(45,140,255,.45);
}
.zoom-btn:active {
  transform: translateY(0);
}
.zoom-btn svg {
  width: 28px;
  height: 28px;
  fill: #fff;
}

.note {
  margin-top: 20px;
  font-size: 14px;
  color: #94a3b8;
  line-height: 1.6;
}

.divider {
  height: 1px;
  background: #e2e8f0;
  margin: 24px 0;
}

.footer {
  padding: 0 28px 28px;
  text-align: center;
}
.footer p {
  font-size: 13px;
  color: #94a3b8;
}

/* pulse animation for the button */
@keyframes pulse {
  0%, 100% { box-shadow: 0 6px 24px rgba(45,140,255,.35); }
  50% { box-shadow: 0 6px 32px rgba(45,140,255,.55); }
}
.zoom-btn { animation: pulse 2.5s ease-in-out infinite; }
.zoom-btn:hover { animation: none; }

@media (max-width: 500px) {
  .card { border-radius: 20px; }
  .header { padding: 24px 20px 22px; }
  .body { padding: 24px 20px 32px; }
  h1 { font-size: 26px; }
  .info-box .value { font-size: 16px; }
}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <img src="logo-ort.png" alt="אורט בית הערבה" class="logo">
    <div class="badge">הזמנה להורים</div>
  </div>

  <div class="body">
    <div class="emoji-top">📚</div>
    <h1>מלחמה. ומה עם הבגרויות/המבחנים?</h1>
    <p class="subtitle">עדכון ומחשבות להמשך &bull; מפגש זום להורים</p>

    <div class="info-grid">
      <div class="info-box">
        <div class="icon">📅</div>
        <div class="label">תאריך</div>
        <div class="value">יום שלישי</div>
        <div class="extra">17.3.2026</div>
      </div>
      <div class="info-box">
        <div class="icon">🕐</div>
        <div class="label">שעה</div>
        <div class="value">9:30</div>
        <div class="extra">בבוקר</div>
      </div>
    </div>

    <a href="https://edu-il.zoom.us/j/7543577500?pwd=TzI3WDJhYlYwWXFzL2V0MUdOTExIQT09" target="_blank" class="zoom-btn">
      <svg viewBox="0 0 24 24"><path d="M4 3h12a3 3 0 013 3v6a3 3 0 01-3 3H8l-4 4V6a3 3 0 013-3zm17 4v6l-4-3 4-3z"/></svg>
      הצטרפו לזום
    </a>

    <p class="note">הקישור יהיה פעיל ביום המפגש.<br>מומלץ להיכנס כמה דקות לפני.</p>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <p>אורט בית הערבה &bull; מכינים אותך לחיים</p>
  </div>
</div>

</body>
</html>
