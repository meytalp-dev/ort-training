<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צוות תשפ״ו — אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: #f0f4f3;
  color: #2d3436;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0a8f7f 0%, #2ebfad 50%, #5cc5b8 100%);
  color: white;
  padding: 28px 24px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(10,143,127,0.25);
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 900;
  margin-bottom: 4px;
}
.header p {
  font-size: 0.95rem;
  opacity: 0.9;
  font-weight: 300;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  background: white;
  border-bottom: 2px solid #e0e8e6;
  position: sticky;
  top: 76px;
  z-index: 99;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1;
  min-width: 100px;
  padding: 14px 12px;
  border: none;
  background: white;
  font-family: 'Heebo', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: #637373;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  white-space: nowrap;
}
.tab-btn:hover { color: #0a8f7f; background: #f0faf8; }
.tab-btn.active {
  color: #0a8f7f;
  font-weight: 700;
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  right: 0;
  left: 0;
  height: 3px;
  background: #0a8f7f;
  border-radius: 3px 3px 0 0;
}
.tab-badge {
  display: inline-block;
  background: #e0f5f1;
  color: #0a8f7f;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  margin-right: 4px;
}
.tab-btn.active .tab-badge {
  background: #0a8f7f;
  color: white;
}

/* Search & Actions Bar */
.actions-bar {
  padding: 16px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 40px 10px 14px;
  border: 2px solid #dde5e3;
  border-radius: 12px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.9rem;
  background: white;
  transition: border-color 0.3s;
}
.search-box input:focus {
  outline: none;
  border-color: #0a8f7f;
}
.search-box .search-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  opacity: 0.4;
}
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-email {
  background: #0a8f7f;
  color: white;
}
.btn-email:hover { background: #078272; transform: translateY(-1px); }
.btn-email:disabled {
  background: #b0cec8;
  cursor: not-allowed;
  transform: none;
}
.btn-select-all {
  background: #e0f5f1;
  color: #0a8f7f;
}
.btn-select-all:hover { background: #c8ede6; }

.selected-count {
  font-size: 0.85rem;
  color: #637373;
  font-weight: 500;
}

/* Content */
.tab-content { display: none; padding: 0 20px 100px; }
.tab-content.active { display: block; }

/* Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  padding-top: 4px;
}

/* Staff Card */
.staff-card {
  background: white;
  border-radius: 16px;
  padding: 18px;
  transition: all 0.3s;
  border: 2px solid transparent;
  cursor: pointer;
  position: relative;
}
.staff-card:hover {
  box-shadow: 0 4px 16px rgba(10,143,127,0.12);
  transform: translateY(-2px);
}
.staff-card.selected {
  border-color: #0a8f7f;
  background: #f0faf8;
}
.staff-card .checkbox {
  position: absolute;
  top: 14px;
  left: 14px;
  width: 22px;
  height: 22px;
  border: 2px solid #cdd8d5;
  border-radius: 6px;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.staff-card.selected .checkbox {
  background: #0a8f7f;
  border-color: #0a8f7f;
}
.staff-card.selected .checkbox::after {
  content: '';
  width: 6px;
  height: 10px;
  border: solid white;
  border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.avatar {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  overflow: hidden;
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: #1a2d2a;
}
.card-role {
  font-size: 0.8rem;
  color: #637373;
  font-weight: 400;
  margin-top: 1px;
}
.card-role .role-tag {
  display: inline-block;
  background: #e8f4f1;
  color: #0a8f7f;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
}

.card-details {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}
.card-detail {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: #4a5d5a;
}
.card-detail svg {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
  opacity: 0.5;
}
.card-detail a {
  color: #0a8f7f;
  text-decoration: none;
}
.card-detail a:hover { text-decoration: underline; }

.card-class {
  display: inline-block;
  background: #fff3e0;
  color: #e67e22;
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
}

.card-traits {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #eef3f1;
  font-size: 0.82rem;
  color: #637373;
  line-height: 1.6;
}

/* Pesach greeting */
.card-greeting {
  margin-top: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #fef9f0 0%, #fdf3e3 100%);
  border-radius: 12px;
  border: 1px solid #f0e0c4;
  font-size: 0.82rem;
  color: #6b5a3e;
  line-height: 1.7;
  display: none;
}
.card-greeting.show { display: block; }
.card-greeting .greeting-title {
  font-weight: 700;
  color: #c5963a;
  margin-bottom: 4px;
  font-size: 0.78rem;
}
.toggle-greeting {
  margin-top: 8px;
  background: none;
  border: 1px solid #d4c4a0;
  color: #9a7d3e;
  font-family: 'Heebo', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
}
.toggle-greeting:hover {
  background: #f5ecd8;
}

/* Email Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white;
  border-radius: 20px;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
}
.modal h2 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.modal .modal-sub {
  font-size: 0.85rem;
  color: #637373;
  margin-bottom: 20px;
}
.modal label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: #4a5d5a;
  margin-bottom: 6px;
  margin-top: 14px;
}
.modal input, .modal textarea {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #dde5e3;
  border-radius: 10px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.9rem;
  transition: border-color 0.3s;
  direction: rtl;
}
.modal input:focus, .modal textarea:focus {
  outline: none;
  border-color: #0a8f7f;
}
.modal textarea { min-height: 120px; resize: vertical; line-height: 1.7; }
.modal .recipients-list {
  background: #f0f4f3;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.82rem;
  color: #4a5d5a;
  max-height: 100px;
  overflow-y: auto;
  line-height: 1.8;
}
.modal .recipients-list span {
  display: inline-block;
  background: white;
  padding: 2px 8px;
  border-radius: 6px;
  margin: 2px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-start;
}
.btn-cancel {
  background: #f0f4f3;
  color: #637373;
}
.btn-cancel:hover { background: #e0e8e6; }
.btn-send {
  background: #0a8f7f;
  color: white;
}
.btn-send:hover { background: #078272; }

/* Greeting toggle global */
.greeting-toggle-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 0 10px;
}
.greeting-switch {
  position: relative;
  width: 42px;
  height: 24px;
  background: #cdd8d5;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.3s;
}
.greeting-switch.on { background: #c5963a; }
.greeting-switch .knob {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform 0.3s;
}
.greeting-switch.on .knob { transform: translateX(-18px); }
.greeting-label {
  font-size: 0.82rem;
  color: #9a7d3e;
  font-weight: 600;
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: #a0b0ad;
  font-size: 0.95rem;
}

/* Responsive */
@media (max-width: 640px) {
  .header h1 { font-size: 1.4rem; }
  .cards-grid { grid-template-columns: 1fr; }
  .tab-btn { font-size: 0.78rem; padding: 12px 8px; }
  .actions-bar { padding: 12px 14px; }
}
</style>
</head>

  <p>אורט בית הערבה</p>
</div>

<div id="tabContents">

  <div class="tab-content" data-tab="counselors"><div class="cards-grid" id="grid-counselors"></div></div>

  <div class="tab-content" data-tab="coordinators"><div class="cards-grid" id="grid-coordinators"></div></div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">

    <label>נושא</label>
    <input type="text" id="emailSubject" placeholder="נושא ההודעה">
    <label>תוכן</label>
    <textarea id="emailBody" placeholder="כתבי את ההודעה..."></textarea>

      <button class="btn btn-send" onclick="sendEmail()">

      </button>
      <button class="btn btn-cancel" onclick="closeEmailModal()">ביטול</button>
    </div>
  </div>
</div>

const COLORS = ['#0a8f7f','#2e86ab','#a23b72','#e67e22','#27ae60','#8e44ad','#c0392b','#16a085','#d4a017','#5b6abf'];
const selected = new Set();
let showGreetings = false;
let currentTab = 'all';

function getInitials(name) {
  const parts = name.replace(/[()]/g,'').split(' ').filter(Boolean);
  return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0][0];
}

function getColor(name) {
  let hash = 0;
  for (let c of name) hash = c.charCodeAt(0) + ((hash << 5) - hash);
  return COLORS[Math.abs(hash) % COLORS.length];
}

function createCard(person, idx) {
  const isSelected = selected.has(idx);
  const color = getColor(person.name);
  const phoneFormatted = person.phone ? '0' + person.phone : '';

  let html = `<div class="staff-card ${isSelected ? 'selected' : ''}" data-idx="${idx}" onclick="toggleSelect(${idx})">
    <div class="checkbox"></div>
    <div class="card-header">
      <div class="avatar" style="background:${color}">${person.photo ? `<img src="https://drive.google.com/thumbnail?id=${person.photo}&sz=w200" alt="${person.name}" onerror="this.remove();this.parentElement.textContent='${getInitials(person.name)}'">` : person.localPhoto ? `<img src="staff-photos/${person.localPhoto}" alt="${person.name}" onerror="this.remove();this.parentElement.textContent='${getInitials(person.name)}'">` : getInitials(person.name)}</div>
      <div>
        <div class="card-name">${person.name}</div>
        <div class="card-role"><span class="role-tag">${person.role}</span></div>
      </div>
    </div>
    <div class="card-details">`;

  if (person.email) {
    html += `<div class="card-detail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <a href="mailto:${person.email}" onclick="event.stopPropagation()">${person.email}</a>
    </div>`;
  }

  if (person.phone) {
    html += `<div class="card-detail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <a href="tel:${phoneFormatted}" onclick="event.stopPropagation()">${phoneFormatted}</a>
    </div>`;
  }

  if (person.klass) {
    html += `<div class="card-detail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      <span class="card-class">כיתה ${person.klass}</span>
    </div>`;
  }

  html += `</div>`;

  if (person.traits) {
    html += `<div class="card-traits">${person.traits}</div>`;
  }

  if (person.greeting) {
    html += `<div class="card-greeting ${showGreetings ? 'show' : ''}">
      <div class="greeting-title">ברכת פסח</div>
      ${person.greeting.replace(/\n/g, '<br>')}
    </div>`;
  }

  html += `</div>`;
  return html;
}

function getFilteredStaff(tab) {
  return STAFF.map((p, i) => ({ ...p, idx: i })).filter(p => p.category.includes(tab));
}

function render() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  ['all','educators','counselors','therapeutic','coordinators'].forEach(tab => {
    const grid = document.getElementById('grid-' + tab);
    let items = getFilteredStaff(tab);

    if (search) {
      items = items.filter(p =>
        p.name.includes(search) ||
        p.role.includes(search) ||
        p.klass.includes(search) ||
        p.traits.toLowerCase().includes(search) ||
        p.email.toLowerCase().includes(search)
      );
    }

    if (items.length === 0) {
      grid.innerHTML = '<div class="no-results">לא נמצאו תוצאות</div>';
    } else {
      grid.innerHTML = items.map(p => createCard(p, p.idx)).join('');
    }

    document.getElementById('badge-' + tab).textContent = items.length;
  });

  updateSelectionUI();
}

function toggleSelect(idx) {
  if (selected.has(idx)) selected.delete(idx);
  else selected.add(idx);
  render();
}

function toggleSelectAll() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  let items = getFilteredStaff(currentTab);
  if (search) {
    items = items.filter(p =>
      p.name.includes(search) || p.role.includes(search) ||
      p.klass.includes(search) || p.traits.toLowerCase().includes(search)
    );
  }

  const allSelected = items.every(p => selected.has(p.idx));
  items.forEach(p => {
    if (allSelected) selected.delete(p.idx);
    else selected.add(p.idx);
  });
  render();
}

function updateSelectionUI() {
  const count = selected.size;
  const emailBtn = document.getElementById('emailBtn');
  const countEl = document.getElementById('selectedCount');

  emailBtn.disabled = count === 0;
  countEl.textContent = count > 0 ? `${count} נבחרו` : '';

  const selectBtn = document.getElementById('selectAllBtn');
  const items = getFilteredStaff(currentTab);
  const allSelected = items.length > 0 && items.every(p => selected.has(p.idx));
  selectBtn.textContent = allSelected ? 'ביטול בחירה' : 'בחירת הכל';
}

function toggleGreetings() {
  showGreetings = !showGreetings;
  const sw = document.getElementById('greetingSwitch');
  sw.classList.toggle('on', showGreetings);
  render();
}

function openEmailModal() {
  const recipients = [...selected].map(i => STAFF[i]).filter(p => p.email);
  if (recipients.length === 0) {
    alert('לא נמצאו כתובות מייל לנבחרים');
    return;
  }

  const list = document.getElementById('recipientsList');
  list.innerHTML = recipients.map(p => `<span>${p.name}</span>`).join(' ');

  document.getElementById('emailModal').classList.add('show');
}

function closeEmailModal() {
  document.getElementById('emailModal').classList.remove('show');
}

function sendEmail() {
  const recipients = [...selected].map(i => STAFF[i]).filter(p => p.email);
  const emails = recipients.map(p => p.email).join(',');
  const subject = encodeURIComponent(document.getElementById('emailSubject').value);
  const body = encodeURIComponent(document.getElementById('emailBody').value);

  window.open(`https://mail.google.com/mail/?view=cm&to=${emails}&su=${subject}&body=${body}`, '_blank');
  closeEmailModal();
}

// Tab switching
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  document.querySelector(`.tab-content[data-tab="${currentTab}"]`).classList.add('active');
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', render);

// Close modal on overlay click
document.getElementById('emailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEmailModal();
});

// Init
render();
</script>
</body>
</html>
