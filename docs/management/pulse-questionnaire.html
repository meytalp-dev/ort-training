<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>פולס | אורט בית הערבה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:Heebo,sans-serif;color:#fff;
  display:flex;align-items:center;justify-content:center;
  background:#111;-webkit-user-select:none;user-select:none;
}

/* ==================== FRAME ==================== */
.frame{
  width:100%;max-width:420px;height:100vh;max-height:780px;
  overflow:hidden;position:relative;
}
@media(min-width:500px){
  .frame{border-radius:36px;height:92vh;box-shadow:0 20px 60px rgba(0,0,0,.4)}
}

/* ==================== PROGRESS ==================== */
.bars{
  position:absolute;top:8px;left:8px;right:8px;z-index:20;
  display:flex;gap:3px;padding:0 4px;
}
.bar{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.2);overflow:hidden}
.bar .fill{height:100%;width:0;background:#fff;border-radius:3px;transition:width .3s}
.bar.done .fill{width:100%}
.bar.now .fill{width:100%;transition:none}

/* ==================== SCREEN ==================== */
.scr{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:48px 24px 48px;
  text-align:center;opacity:0;pointer-events:none;
  transition:opacity .4s,transform .4s;transform:translateX(-30px);
}
.scr.on{opacity:1;pointer-events:auto;transform:translateX(0)}

/* ==================== INTRO ==================== */
.intro-icon{
  width:72px;height:72px;border-radius:24px;display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
}
h1{font-size:1.6rem;font-weight:900;margin-bottom:8px}
.sub{font-size:.9rem;opacity:.6;line-height:1.5;margin-bottom:28px}
.pill{
  padding:14px 48px;border:none;border-radius:50px;font-family:Heebo;
  font-size:1rem;font-weight:700;color:#fff;cursor:pointer;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,.2);transition:all .2s;
}
.pill:active{transform:scale(.96)}
.tag{font-size:.7rem;opacity:.3;margin-top:14px}

/* ==================== THIS OR THAT ==================== */
.tot-label{font-size:.85rem;opacity:.5;margin-bottom:12px;font-weight:600}
.tot-q{font-size:1.15rem;font-weight:700;margin-bottom:24px;line-height:1.4}
.tot-vs{
  display:flex;gap:12px;width:100%;max-width:340px;height:200px;
}
.tot-side{
  flex:1;border-radius:20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;cursor:pointer;
  border:2px solid rgba(255,255,255,.1);transition:all .35s;
  position:relative;overflow:hidden;padding:16px 12px;
}
.tot-side::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;
  border-radius:18px;
}
.tot-side:active{transform:scale(.97)}
.tot-side.picked{border-color:#fff}
.tot-side.picked::before{opacity:1}
.tot-side.not-picked{opacity:.35;transform:scale(.94)}
.tot-emoji{font-size:2.8rem;position:relative;z-index:1;transition:transform .3s}
.tot-side.picked .tot-emoji{transform:scale(1.15)}
.tot-text{font-size:.88rem;font-weight:600;position:relative;z-index:1;line-height:1.4}
.tot-pct{
  position:absolute;bottom:10px;font-size:1.8rem;font-weight:900;
  opacity:0;transition:opacity .4s;z-index:1;
}
.tot-side.picked .tot-pct,.tot-side.not-picked .tot-pct{opacity:.7}
.tot-divider{
  display:flex;align-items:center;font-size:.75rem;font-weight:800;
  opacity:.3;writing-mode:vertical-rl;letter-spacing:2px;
}

/* ==================== CLASS SELECT ==================== */
.cls-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:300px}
.cls-btn{
  padding:14px 8px;border:2px solid rgba(255,255,255,.12);border-radius:16px;
  background:rgba(255,255,255,.04);color:#fff;font-family:Heebo;
  font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s;
}
.cls-btn:active{transform:scale(.95)}
.cls-btn.sel{border-color:#fff;background:rgba(255,255,255,.15)}

/* ==================== EMOJI SLIDER ==================== */
.q-num{font-size:.75rem;font-weight:600;opacity:.4;margin-bottom:10px;letter-spacing:1px}
.q-text{font-size:1.3rem;font-weight:700;line-height:1.45;margin-bottom:32px;max-width:320px}

.slider-wrap{width:100%;max-width:300px;position:relative;padding:0 8px}
.slider-face{
  font-size:3.5rem;margin-bottom:16px;transition:transform .15s;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));
}
.slider-track{
  width:100%;height:8px;border-radius:8px;position:relative;
  background:linear-gradient(to left,rgba(126,207,160,.5),rgba(240,216,122,.4),rgba(240,144,144,.5));
}
.slider-input{
  -webkit-appearance:none;appearance:none;width:100%;height:8px;
  background:transparent;position:absolute;top:0;left:0;margin:0;cursor:pointer;
}
.slider-input::-webkit-slider-thumb{
  -webkit-appearance:none;width:32px;height:32px;border-radius:50%;
  background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3);cursor:grab;
  border:3px solid rgba(255,255,255,.8);opacity:.2;transition:opacity .3s;
}
.slider-input.touched::-webkit-slider-thumb{opacity:1}
.slider-input::-moz-range-thumb{
  width:32px;height:32px;border-radius:50%;
  background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3);cursor:grab;
  border:3px solid rgba(255,255,255,.8);opacity:.2;transition:opacity .3s;
}
.slider-input.touched::-moz-range-thumb{opacity:1}
.slider-labels{display:flex;justify-content:space-between;margin-top:10px}
.slider-labels span{font-size:.7rem;opacity:.4;font-weight:500}
.slider-val{
  font-size:1rem;font-weight:700;margin-top:14px;opacity:0;
  transition:opacity .3s;
}
.slider-val.show{opacity:.8}
.btn-next{
  margin-top:20px;padding:10px 36px;border:none;border-radius:50px;
  font-family:Heebo;font-size:.88rem;font-weight:700;color:#fff;
  cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);
}
.btn-next.show{opacity:1;pointer-events:auto}
.btn-next:active{transform:scale(.96)}

/* ==================== ALERTNESS ==================== */
.alert-icon{font-size:2.8rem;margin-bottom:12px}
.alert-q{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.alert-sub{font-size:.85rem;opacity:.5;margin-bottom:24px}
.alert-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:280px}
.alert-btn{
  padding:16px;border:2px solid rgba(255,255,255,.12);border-radius:16px;
  background:rgba(255,255,255,.04);color:#fff;font-family:Heebo;
  font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;
}
.alert-btn:active{transform:scale(.95)}
.alert-btn.yes{border-color:#7ecfa0;background:rgba(126,207,160,.2)}
.alert-btn.no{border-color:#f09090;background:rgba(240,144,144,.15);opacity:.4}

/* ==================== DONE ==================== */
.done-icon{
  width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
  animation:pop .5s ease;
}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.done-stats{display:flex;gap:28px;margin:20px 0}
.done-stat{text-align:center}
.done-stat .v{font-size:2rem;font-weight:900}
.done-stat .l{font-size:.7rem;opacity:.4}

/* Confetti */
.confetti-box{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:10}
.cft{
  position:absolute;border-radius:2px;
  animation:cfall linear forwards;
}
@keyframes cfall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* Blobs */
.blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
</style>
</head>

const params = new URLSearchParams(location.search);
let dim = params.get('dim') || 'belong';
let pType = params.get('type') || 'pre';

let cur = 0, total = 0, ans = {}, cls = isStaff ? 'staff' : preClass, alertOk = null;

// ============================================
// BUILD
// ============================================

function init() {
  const d = D[dim], qs = isStaff ? Q_STAFF[dim] : Q[dim], tots = isStaff ? TOT_STAFF[dim] : TOT[dim], al = ALERT[dim];
  const fr = document.getElementById('frame');
  fr.style.background = d.g;

  document.getElementById('b2').style.background = d.c;

  // Dynamic screen layout based on question count
  // intro(0), tot1(1), tot2(2), class(3), questions..., alertness, more questions..., done

  const alertAfter = Math.ceil(qCount / 2); // alertness after half the questions
  // total screens: 4 fixed (intro, tot1, tot2, class) + qCount questions + 1 alertness + 1 done
  total = 4 + qCount + 1 + 1;
  const alertScreenIdx = 4 + alertAfter;
  const doneScreenIdx = total - 1;

  // Store for navigation logic
  window._alertIdx = alertScreenIdx;
  window._doneIdx = doneScreenIdx;
  window._alertAfter = alertAfter;
  window._qCount = qCount;

  // Map: qi → screen index, and qi → what to do after ("next screen" or "alert" or "finish")
  window._qScreens = {};

  for (let i = 0; i < qCount; i++) {
    if (i === alertAfter) tmpSi++; // skip alertness screen
    window._qScreens[i] = tmpSi;

  // 0 — Intro

    <div class="intro-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">${d.ic}</svg></div>
    <h1>פולס ${d.n}</h1>

        <div class="tot-label">נכון או לא נכון? ${ti+1}/${tots.length}</div>

            <span class="tot-emoji" style="font-size:2rem">&#128077;</span>
            <span class="tot-text">נכון</span>
            <span class="tot-pct" style="font-size:1rem">${t.answer ? '' : ''}</span>
          </div>
          <div class="tot-divider">?</div>
          <div class="tot-side" onclick="pickTot(${1+ti},'b',this)" style="background:rgba(255,255,255,.05)">
            <span class="tot-emoji" style="font-size:2rem">&#128078;</span>
            <span class="tot-text">לא נכון</span>
            <span class="tot-pct" style="font-size:1rem"></span>

        <div class="trivia-result" id="totResult${1+ti}" style="margin-top:16px;font-size:.85rem;opacity:0;transition:opacity .4s;line-height:1.5">${t.answer || ''}</div>
      </div>`;
    } else if (mode === 'scenario') {
      // "What would you do?" scenario
      h += `<div class="scr" data-i="${1+ti}">
        <div class="tot-label">מה הייתם עושים? ${ti+1}/${tots.length}</div>
        <div class="tot-q" style="font-size:1.05rem;line-height:1.5;margin-bottom:20px">${t.fact}</div>
        <div class="tot-vs">
          <div class="tot-side" onclick="pickTot(${1+ti},'a',this)" style="background:rgba(255,255,255,.05)">
            <span class="tot-emoji">${t.a.split(' ')[0]}</span>

          </div>
          <div class="tot-divider">?</div>
          <div class="tot-side" onclick="pickTot(${1+ti},'b',this)" style="background:rgba(255,255,255,.05)">
            <span class="tot-emoji">${t.b.split(' ')[0]}</span>
            <span class="tot-text">${t.b.split(' ').slice(1).join(' ')}</span>
            <span class="tot-pct">${t.bp}%</span>
          </div>
        </div>
      </div>`;
    } else if (mode === 'guess') {
      // Guess the number
      h += `<div class="scr" data-i="${1+ti}">
        <div class="tot-label">מה לדעתכם? ${ti+1}/${tots.length}</div>
        <div class="tot-q" style="font-size:1.05rem;line-height:1.5;margin-bottom:20px">${t.fact}</div>

    } else {
      // Default: This or That
      h += `<div class="scr" data-i="${1+ti}">

          <div class="tot-side" onclick="pickTot(${1+ti},'a',this)" style="background:rgba(255,255,255,.05)">
            <span class="tot-emoji">${t.a.split(' ')[0]}</span>
            <span class="tot-text">${t.a.split(' ').slice(1).join(' ')}</span>
            <span class="tot-pct">${t.ap}%</span>
          </div>
          <div class="tot-divider">VS</div>
          <div class="tot-side" onclick="pickTot(${1+ti},'b',this)" style="background:rgba(255,255,255,.05)">

            <span class="tot-text">${t.b.split(' ').slice(1).join(' ')}</span>

  if (!preClass && !isStaff) {

      <div class="cls-grid">
        ${Object.entries(CLASS_LABELS).map(([id, label]) =>
          `<button class="cls-btn" onclick="pickCls('${id}',this)">${label}</button>`
        ).join('')}
      </div>
    </div>`;
  } else {
    h += `<div class="scr" data-i="3"></div>`;
  }

  // Questions before alertness (first half)
  let si = 4;
  for (let i = 0; i < alertAfter; i++) {
    h += sliderScreen(i, si, qs[i], qCount);
    si++;
  }

  // Alertness check
  h += `<div class="scr" data-i="${si}">
    <div class="alert-icon">&#9889;</div>
    <div class="alert-q">${al.q}</div>
    <div class="alert-sub">רגע, רק בודקים שאתם איתנו</div>
    <div class="alert-opts" id="alOpts">
      ${al.o.map((o,i) => `<button class="alert-btn" onclick="checkAl(${i},this)">${o}</button>`).join('')}
    </div>
  </div>`;
  si++;

  // Questions after alertness (second half)
  for (let i = alertAfter; i < qCount; i++) {
    h += sliderScreen(i, si, qs[i], qCount);
    si++;
  }

  // Done
  h += `<div class="scr" data-i="${si}">
    <div class="confetti-box" id="cft"></div>

    <p class="sub">${isStaff ? 'תודה על ההשתתפות<br>ביחד אנחנו בונים צוות חזק יותר' : 'תודה שהשתתפתם<br>ביחד אנחנו עושים את זה טוב יותר'}</p>

  document.getElementById('screens').innerHTML = h;

}

function sliderScreen(qi, si, txt, total) {
  return `<div class="scr" data-i="${si}">
    <div class="q-num">${qi+1} / ${total}</div>
    <div class="q-text">${txt}</div>
    <div class="slider-wrap">
      <div class="slider-face" id="face${si}" style="opacity:.3">&#128528;</div>
      <div style="font-size:.75rem;opacity:.4;margin-bottom:8px">גררו את העיגול</div>
      <div class="slider-track">
        <input type="range" class="slider-input" id="sl${si}" min="1" max="5" step="1" value="3"
          oninput="onSlide(${si},${qi},this.value)"
          onchange="onSlide(${si},${qi},this.value)">
      </div>
      <div class="slider-labels"><span>ממש לא</span><span>לגמרי!</span></div>
      <div class="slider-val" id="val${si}"></div>
      <button class="btn-next" id="btn${si}" onclick="confirmQ(${si},${qi})">
        ${qi===total-1 ? 'סיום' : 'הבא'}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:4px;vertical-align:middle"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
  </div>`;
}

// ============================================
// INTERACTIONS
// ============================================

function pickTot(si, side, el) {
  const parent = el.closest('.tot-vs');
  const sides = parent.querySelectorAll('.tot-side');
  sides.forEach(s => {
    if (s === el) { s.classList.add('picked'); s.classList.remove('not-picked'); }
    else { s.classList.add('not-picked'); s.classList.remove('picked'); }
  });
  // Show result text if exists (for fact/guess modes)
  const resultEl = document.getElementById('totResult' + si);
  if (resultEl) resultEl.style.opacity = '1';
  // Auto advance — skip empty class screen if class already set
  const next = si + 1;
  const delay = resultEl ? 2500 : 1200; // longer delay when showing fact
  setTimeout(() => go((next === 3 && (preClass || isStaff)) ? 4 : next), delay);
}

function pickCls(c, el) {
  cls = c;
  document.querySelectorAll('.cls-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(() => go(4), 400);
}

let sliderTouched = {};
function onSlide(si, qi, val) {
  val = parseInt(val);
  const face = document.getElementById('face' + si);
  face.innerHTML = FACES[val - 1];
  face.style.opacity = '1';
  document.getElementById('val' + si).textContent = FACE_LABELS[val - 1];
  document.getElementById('val' + si).classList.add('show');
  document.getElementById('btn' + si).classList.add('show');
  sliderTouched[si] = true;
  ans[qi] = val;
  document.getElementById('sl' + si).classList.add('touched');

  // Animate face
  face.style.transform = 'scale(1.2)';
  setTimeout(() => face.style.transform = 'scale(1)', 150);
}

function confirmQ(si, qi) {
  if (!sliderTouched[si]) {
    const wrap = document.getElementById('face' + si).parentElement;
    wrap.style.animation = 'none'; wrap.offsetHeight;
    wrap.style.animation = 'shake .4s ease';
    return;
  }
  // Last question → finish
  if (qi === window._qCount - 1) {
    finish();
  }
  // Last question before alertness → go to alertness
  else if (qi === window._alertAfter - 1) {
    go(window._alertIdx);
  }
  // Otherwise → next question's screen
  else {
    const nextQi = qi + 1;
    go(window._qScreens[nextQi]);
  }
}

function checkAl(i, el) {
  const correct = ALERT[dim].c;
  alertOk = (i === correct);
  const btns = el.closest('.alert-opts').querySelectorAll('.alert-btn');
  btns.forEach((b, bi) => {
    b.style.pointerEvents = 'none';
    if (bi === correct) b.classList.add('yes');
    else if (bi === i && i !== correct) b.classList.add('no');
  });
  const nextScreen = window._alertIdx + 1;
  setTimeout(() => go(nextScreen), 1000);
}

// ============================================
// NAV
// ============================================

function go(i) {
  document.querySelectorAll('.scr').forEach(s => {
    const si = +s.dataset.i;
    if (si === cur) { s.classList.remove('on'); }
    if (si === i) { s.classList.add('on'); }
  });
  cur = i;
  bars();
}

function bars() {
  document.querySelectorAll('.bar').forEach((b, i) => {
    b.classList.remove('done', 'now');
    if (i < cur) b.classList.add('done');
    if (i === cur) b.classList.add('now');
    const f = b.querySelector('.fill');
    f.style.width = i <= cur ? '100%' : '0%';
  });
}

function finish() {
  const v = Object.values(ans);
  const a = v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1) : '—';
  setTimeout(() => {
    document.getElementById('avg').textContent = a;
    go(window._doneIdx);
    confetti();
    save();
  }, 400);
}

function save() {
  if (!API) return;
  fetch(API, {
    method:'POST',
    body:JSON.stringify({action:'savePulse',pulse:{dim,type:pType,class:cls,answers:ans,role:role,alertness:alertOk}}),
    headers:{'Content-Type':'text/plain'}
  }).catch(()=>{});
}

function confetti() {
  const box = document.getElementById('cft');
  const cols = [D[dim].c,'#fff','#FFD700','#FF6B8A','#7ecfa0','#a0c4ff'];
  for (let i=0;i<50;i++) {
    const e = document.createElement('div');
    e.className = 'cft';
    e.style.background = cols[~~(Math.random()*cols.length)];
    e.style.left = Math.random()*100+'%';
    e.style.width = (4+Math.random()*8)+'px';
    e.style.height = (4+Math.random()*8)+'px';
    e.style.animationDuration = (1.5+Math.random()*2)+'s';
    e.style.animationDelay = (Math.random()*.8)+'s';
    e.style.borderRadius = Math.random()>.5?'50%':'2px';
    box.appendChild(e);
  }
}

// Touch — block back on intro, trivia, alertness, done (dynamic)
const noBack = new Set([0, 1, 2, 3, window._alertIdx, window._doneIdx]);
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
