<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד תכנון שנתי — אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;--card:#FFFDF8;--primary:#7AADAD;--primary-dark:#5E9191;
  --text:#4A3F35;--muted:#8B7E74;--border:#D5CAB8;--radius:12px;
  --danger:#C0392B;--success:#27AE60;--warn:#E67E22;
}
body{font-family:Heebo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:14px 24px;background:var(--card);border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(74,63,53,.08)}
.hdr h1{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px}
.badge{background:rgba(122,173,173,.15);padding:3px 12px;border-radius:20px;font-size:11px;
  font-weight:600;color:var(--primary-dark);border:1px solid rgba(122,173,173,.25)}
.hdr-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border:none;border-radius:8px;font-family:Heebo;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

/* Content */
.content{max-width:1100px;margin:0 auto;padding:24px}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
  box-shadow:0 2px 8px rgba(74,63,53,.04);text-align:center}
.summary-card .sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px}
.summary-card .sc-icon svg{width:20px;height:20px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.summary-card .sc-num{font-size:32px;font-weight:800;color:var(--primary-dark);line-height:1}
.summary-card .sc-label{font-size:12px;font-weight:600;color:var(--muted);margin-top:4px}

/* Section */
.dash-section{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(74,63,53,.04)}
.dash-section-title{font-size:17px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.dash-section-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.sec-icon{width:28px;height:28px;border-radius:8px;background:rgba(122,173,173,.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-icon svg{width:16px;height:16px;stroke:var(--primary-dark);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Role cards grid */
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.role-card{background:#FAFAF6;border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;transition:all .15s}
.role-card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(122,173,173,.12)}
.role-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.role-card-name{font-size:15px;font-weight:700}
.role-card-stats{display:flex;gap:12px;font-size:11px;color:var(--muted);font-weight:600}
.role-card-stat{display:flex;align-items:center;gap:4px}
.role-areas-list{margin-top:8px}
.role-area-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #EDEAE3;font-size:12px}
.role-area-row:last-child{border-bottom:none}
.area-name{font-weight:600;flex:1}
.area-goals-count{color:var(--muted);font-size:11px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-green{background:var(--success)}
.status-yellow{background:var(--warn)}
.status-gray{background:#D5CAB8}
.expand-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:Heebo;font-size:11px;
  font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.expand-btn:hover{border-color:var(--primary);color:var(--primary)}
.role-details{display:none;margin-top:12px;padding-top:12px;border-top:1.5px solid var(--border)}
.role-details.open{display:block}
.goal-mini{background:#F0ECE3;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:12px;line-height:1.6}
.goal-mini strong{color:var(--primary-dark)}
.goal-mini .goal-events{margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);font-size:11px;color:var(--muted)}

/* Timeline */
.timeline-wrap{overflow-x:auto;padding-bottom:8px}
.timeline{display:flex;gap:0;min-width:900px}
.timeline-month{flex:1;min-width:80px;text-align:center;border-left:1px solid var(--border)}
.timeline-month:last-child{border-left:none}
.timeline-month-name{font-size:12px;font-weight:700;padding:8px 4px;background:#EDEAE3;border-bottom:1px solid var(--border)}
.timeline-events{padding:8px 4px;min-height:60px;display:flex;flex-direction:column;gap:3px;align-items:center}
.timeline-pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}

/* Role colors */
.role-color-ravit{background:#E0F5F5;color:#1A5E5E}
.role-color-yaakov{background:#EDE0F7;color:#4A1D8C}
.role-color-counselor{background:#BFDBFE;color:#1E3A5F}
.role-color-ofira{background:#FDF0D5;color:#7C4A0D}
.role-color-homeroom{background:#FDE0E0;color:#7A1A1A}
.role-border-ravit{border-right:4px solid #7AADAD}
.role-border-yaakov{border-right:4px solid #9B5DE5}
.role-border-counselor{border-right:4px solid #3B82F6}
.role-border-ofira{border-right:4px solid #D47A35}
.role-border-homeroom{border-right:4px solid #E05050}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:180px;padding:0 12px;margin-top:12px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px 6px 0 0;transition:height .4s ease;min-height:2px}
.bar-label{font-size:10px;font-weight:700;color:var(--muted)}
.bar-count{font-size:11px;font-weight:800}
.bar-green{background:linear-gradient(180deg,#6BCB77,#27AE60)}
.bar-yellow{background:linear-gradient(180deg,#FFD93D,#E67E22)}
.bar-red{background:linear-gradient(180deg,#FF6B6B,#C0392B)}

/* Principles */
.principles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.principle-card{border-radius:10px;padding:14px 16px}
.principle-card .p-name{font-size:13px;font-weight:700;margin-bottom:4px}
.principle-card .p-count{font-size:24px;font-weight:800;line-height:1}
.principle-card .p-label{font-size:11px;font-weight:600;margin-top:2px}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px}
.empty-state p{font-size:14px;font-weight:500}
.empty-state a{color:var(--primary-dark);font-weight:700}

/* Print */
@media print{
  .hdr,.btn{display:none!important}
  body{background:#fff}
  .content{padding:0}
  .dash-section,.summary-card,.role-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  .role-details{display:block!important}
}

@media(max-width:600px){
  .content{padding:12px}
  .summary-grid{grid-template-columns:1fr 1fr}
  .role-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <h1>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      דשבורד תכנון שנתי
      <span class="badge">תשפ"ז -- אורט בית הערבה</span>
    </h1>
  </div>
  <div class="hdr-btns">
    <a class="btn btn-outline" href="planning-form.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      טופס תכנון
    </a>
    <a class="btn btn-outline" href="gantt.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      לוח גאנט
    </a>
    <button class="btn btn-outline" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      הדפסה
    </button>
  </div>
</div>

<div class="content" id="dashContent">
  <!-- Populated by JS -->
</div>

<script>
const ROLE_KEYS = ['ravit', 'yaakov', 'counselor', 'ofira', 'homeroom'];
const ROLE_LABELS = {
  ravit: 'רוית -- סגנית/רכזת פדגוגית',
  yaakov: 'יעקב -- רכז חברתי',
  counselor: 'יועצת',
  ofira: 'אופירה -- שורשי ישראל',
  homeroom: 'מחנכת'
};

const PRINCIPLE_LABELS = {
  human: 'האדם במרכז',
  relevance: 'רלוונטיות',
  tikkun: 'תיקון הלב ותיקון עולם',
  dual: 'למידה דואלית ומיומנויות',
  leadership: 'הובלה מקצועית'
};

const PRINCIPLE_COLORS = {
  human: { bg: '#E0F5F5', color: '#1A5E5E', border: '#7AADAD' },
  relevance: { bg: '#FDF0D5', color: '#7C4A0D', border: '#D47A35' },
  tikkun: { bg: '#EDE0F7', color: '#4A1D8C', border: '#9B5DE5' },
  dual: { bg: '#FDE0E0', color: '#7A1A1A', border: '#E05050' },
  leadership: { bg: '#DDEEDD', color: '#1A5C1A', border: '#6A9F6A' }
};

const MONTHS_ORDER = ['ספטמבר','אוקטובר','נובמבר','דצמבר','ינואר','פברואר','מרץ','אפריל','מאי','יוני'];

function loadAllData() {
  const allData = {};
  ROLE_KEYS.forEach(role => {
    try {
      const raw = localStorage.getItem('planning_' + role);
      if (raw) {
        const d = JSON.parse(raw);
        if (d && (d.areas || d.goals || d.name)) {
          allData[role] = d;
        }
      }
    } catch(e) {}
  });
  return allData;
}

function getAllGoals(data) {
  const goals = [];
  Object.keys(data).forEach(role => {
    const d = data[role];
    if (d.areas) {
      Object.keys(d.areas).forEach(area => {
        (d.areas[area].goals || []).forEach(g => {
          goals.push({ ...g, role, area });
        });
      });
    }
  });
  return goals;
}

function getAllEvents(data) {
  const events = [];
  const goals = getAllGoals(data);
  goals.forEach(g => {
    (g.events || []).forEach(ev => {
      if (ev && (ev.date || ev.desc)) {
        events.push({ ...ev, role: g.role, area: g.area, goalWhat: g.what });
      }
    });
  });
  // Also check activities in trimester tables
  Object.keys(data).forEach(role => {
    const d = data[role];
    if (d.activities) {
      ['A','B','C'].forEach(trim => {
        (d.activities[trim] || []).forEach(act => {
          if (act.activity) {
            events.push({ desc: act.activity, role, month: act.month, fromTrimester: true });
          }
        });
      });
    }
  });
  return events;
}

function getEventMonth(ev) {
  if (ev.month) return ev.month;
  if (ev.date) {
    const d = new Date(ev.date);
    const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    return monthNames[d.getMonth()] || '';
  }
  return '';
}

function render() {
  const data = loadAllData();
  const container = document.getElementById('dashContent');
  const roleCount = Object.keys(data).length;

  if (roleCount === 0) {
    container.innerHTML = '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>' +
      '<p>אין נתוני תכנון עדיין</p>' +
      '<p style="margin-top:8px"><a href="planning-form.html">מלאו את טופס התכנון</a> כדי לראות את הדשבורד</p>' +
      '</div>';
    return;
  }

  const allGoals = getAllGoals(data);
  const allEvents = getAllEvents(data);
  const goalEvents = allEvents.filter(e => !e.fromTrimester);
  const totalBudget = calcTotalBudget(data);
  const goalsWithEvents = allGoals.filter(g => (g.events || []).some(e => e && (e.date || e.desc)));
  const completionPct = allGoals.length > 0 ? Math.round((goalsWithEvents.length / allGoals.length) * 100) : 0;

  let html = '';

  // ============ SUMMARY CARDS ============
  html += '<div class="summary-grid">';
  html += summaryCard('rgba(122,173,173,.12)', 'var(--primary-dark)',
    '<svg viewBox="0 0 24 24" stroke="var(--primary-dark)"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    allGoals.length, 'מטרות שנתיות');
  html += summaryCard('rgba(155,93,229,.12)', '#4A1D8C',
    '<svg viewBox="0 0 24 24" stroke="#4A1D8C"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    goalEvents.length, 'אירועים מתוכננים');
  html += summaryCard('rgba(39,174,96,.12)', '#1E8449',
    '<svg viewBox="0 0 24 24" stroke="#1E8449"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
    totalBudget > 0 ? totalBudget.toLocaleString() + ' &#8362;' : 'לא הוגדר', 'תקציב כולל');
  html += summaryCard('rgba(230,126,34,.12)', '#7C4A0D',
    '<svg viewBox="0 0 24 24" stroke="#7C4A0D"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    completionPct + '%', 'מטרות עם אירועים');
  html += '</div>';

  // ============ ROLES SECTION ============
  html += '<div class="dash-section">';
  html += '<div class="dash-section-title"><div class="sec-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>לפי תפקיד</div>';
  html += '<div class="dash-section-sub">סיכום מטרות ותחומים לכל בעל תפקיד</div>';
  html += '<div class="role-grid">';

  Object.keys(data).forEach(role => {
    const d = data[role];
    const areas = d.selectedAreas || (d.areas ? Object.keys(d.areas) : []);
    const roleGoals = allGoals.filter(g => g.role === role);
    const roleEvents = goalEvents.filter(e => e.role === role);

    html += '<div class="role-card role-border-' + role + '">';
    html += '<div class="role-card-header">';
    html += '<div class="role-card-name">' + (d.name || ROLE_LABELS[role]) + '</div>';
    html += '<div class="role-card-stats">';
    html += '<div class="role-card-stat"><span style="font-weight:800;color:var(--primary-dark)">' + areas.length + '</span> תחומים</div>';
    html += '<div class="role-card-stat"><span style="font-weight:800;color:var(--primary-dark)">' + roleGoals.length + '</span> מטרות</div>';
    html += '</div></div>';

    // Areas list
    if (d.areas) {
      html += '<div class="role-areas-list">';
      Object.keys(d.areas).forEach(area => {
        const areaGoals = d.areas[area].goals || [];
        const hasEvents = areaGoals.some(g => (g.events || []).some(e => e && (e.date || e.desc)));
        const hasWhat = areaGoals.some(g => g.what && g.what.trim());
        let statusClass = 'status-gray';
        if (hasEvents) statusClass = 'status-green';
        else if (hasWhat) statusClass = 'status-yellow';
        html += '<div class="role-area-row">';
        html += '<div class="status-dot ' + statusClass + '"></div>';
        html += '<div class="area-name">' + area + '</div>';
        html += '<div class="area-goals-count">' + areaGoals.length + ' מטרות</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Expand button
    html += '<button class="expand-btn" onclick="toggleRoleDetails(this)" style="margin-top:10px">הצג פירוט</button>';
    html += '<div class="role-details">';

    // Show goals detail
    if (d.areas) {
      Object.keys(d.areas).forEach(area => {
        (d.areas[area].goals || []).forEach((g, i) => {
          if (!g.what) return;
          html += '<div class="goal-mini">';
          html += '<strong>' + area + ' | מטרה ' + (i + 1) + ':</strong> ' + g.what;
          if (g.measures) html += '<br><span style="color:var(--muted)">מדדים: ' + g.measures + '</span>';
          const filledEvents = (g.events || []).filter(e => e && e.desc);
          if (filledEvents.length > 0) {
            html += '<div class="goal-events">';
            filledEvents.forEach(ev => {
              html += '<div>' + (ev.date || '') + ' ' + (ev.day || '') + ' ' + (ev.time || '') + ' ' + (ev.class || '') + ' - ' + ev.desc + '</div>';
            });
            html += '</div>';
          }
          html += '</div>';
        });
      });
    }

    html += '</div>'; // role-details
    html += '</div>'; // role-card
  });

  html += '</div></div>';

  // ============ TIMELINE ============
  html += '<div class="dash-section">';
  html += '<div class="dash-section-title"><div class="sec-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>ציר זמן חודשי</div>';
  html += '<div class="dash-section-sub">כל האירועים והפעילויות מכל התפקידים, לפי חודש</div>';
  html += '<div class="timeline-wrap"><div class="timeline">';

  const monthEvents = {};
  MONTHS_ORDER.forEach(m => { monthEvents[m] = []; });
  allEvents.forEach(ev => {
    const m = getEventMonth(ev);
    if (monthEvents[m]) monthEvents[m].push(ev);
  });

  MONTHS_ORDER.forEach(m => {
    html += '<div class="timeline-month">';
    html += '<div class="timeline-month-name">' + m + '</div>';
    html += '<div class="timeline-events">';
    monthEvents[m].forEach(ev => {
      const desc = ev.desc || ev.activity || '';
      if (!desc) return;
      html += '<div class="timeline-pill role-color-' + (ev.role || 'ravit') + '" title="' + desc.replace(/"/g, '&quot;') + '">' + truncate(desc, 18) + '</div>';
    });
    if (monthEvents[m].length === 0) {
      html += '<div style="font-size:10px;color:var(--border);margin-top:16px">--</div>';
    }
    html += '</div></div>';
  });

  html += '</div></div></div>';

  // ============ WORKLOAD BAR CHART ============
  html += '<div class="dash-section">';
  html += '<div class="dash-section-title"><div class="sec-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>מבט על עומסים</div>';
  html += '<div class="dash-section-sub">מספר אירועים בכל חודש -- ירוק: עד 5, צהוב: 6-10, אדום: 11+</div>';

  let maxEvents = 1;
  MONTHS_ORDER.forEach(m => { if (monthEvents[m].length > maxEvents) maxEvents = monthEvents[m].length; });

  html += '<div class="bar-chart">';
  MONTHS_ORDER.forEach(m => {
    const count = monthEvents[m].length;
    const heightPct = Math.max(5, (count / maxEvents) * 100);
    let barClass = 'bar-green';
    if (count > 10) barClass = 'bar-red';
    else if (count > 5) barClass = 'bar-yellow';
    html += '<div class="bar-col">';
    html += '<div class="bar-count">' + count + '</div>';
    html += '<div class="bar ' + barClass + '" style="height:' + heightPct + '%"></div>';
    html += '<div class="bar-label">' + m.substring(0, 3) + '</div>';
    html += '</div>';
  });
  html += '</div></div>';

  // ============ PRINCIPLES ============
  html += '<div class="dash-section">';
  html += '<div class="dash-section-title"><div class="sec-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>לפי עקרון עבודה</div>';
  html += '<div class="dash-section-sub">כמה מטרות מחוברות לכל אחד מ-5 עקרונות העבודה</div>';

  const principleCount = {};
  Object.keys(PRINCIPLE_LABELS).forEach(p => { principleCount[p] = 0; });
  allGoals.forEach(g => {
    if (g.principle && principleCount[g.principle] !== undefined) {
      principleCount[g.principle]++;
    }
  });

  html += '<div class="principles-grid">';
  Object.keys(PRINCIPLE_LABELS).forEach(p => {
    const c = PRINCIPLE_COLORS[p];
    html += '<div class="principle-card" style="background:' + c.bg + ';border-right:4px solid ' + c.border + '">';
    html += '<div class="p-name" style="color:' + c.color + '">' + PRINCIPLE_LABELS[p] + '</div>';
    html += '<div class="p-count" style="color:' + c.color + '">' + principleCount[p] + '</div>';
    html += '<div class="p-label" style="color:' + c.color + '">מטרות מחוברות</div>';
    html += '</div>';
  });
  html += '</div></div>';

  container.innerHTML = html;
}

function summaryCard(iconBg, iconColor, iconSvg, value, label) {
  return '<div class="summary-card">' +
    '<div class="sc-icon" style="background:' + iconBg + '">' + iconSvg + '</div>' +
    '<div class="sc-num" style="color:' + iconColor + '">' + value + '</div>' +
    '<div class="sc-label">' + label + '</div></div>';
}

function calcTotalBudget(data) {
  let total = 0;
  Object.keys(data).forEach(role => {
    const d = data[role];
    // From global budget field
    if (d.budget && !isNaN(parseInt(d.budget))) {
      total += parseInt(d.budget);
    }
    // From goal-level budgets
    if (d.areas) {
      Object.keys(d.areas).forEach(area => {
        (d.areas[area].goals || []).forEach(g => {
          if (g.budget) {
            const num = parseInt(g.budget.replace(/[^\d]/g, ''));
            if (!isNaN(num)) total += num;
          }
        });
      });
    }
  });
  return total;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '...' : str;
}

function toggleRoleDetails(btn) {
  const details = btn.nextElementSibling;
  details.classList.toggle('open');
  btn.textContent = details.classList.contains('open') ? 'הסתר פירוט' : 'הצג פירוט';
}

// Initialize
document.addEventListener('DOMContentLoaded', render);
</script>
