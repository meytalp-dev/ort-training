<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>משרות פתוחות — אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;--card:#FFFDF8;--primary:#7AADAD;--primary-dark:#5E9191;--primary-light:#96C5C5;
  --accent:#D4A574;--text:#4A3F35;--muted:#8B7E74;--border:#E8DDD0;
  --success:#6A9F6A;--blue:#0EA5E9;--blue-dark:#0284C7;
  --radius:18px;--shadow:0 4px 20px rgba(74,63,53,.08),0 2px 6px rgba(74,63,53,.04);
}
body{font-family:Heebo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 32px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;height:70px;
  box-shadow:0 2px 12px rgba(74,63,53,.06);
}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--blue),var(--accent))}
.logo{display:flex;align-items:center;gap:12px}
.logo-badge{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));display:flex;align-items:center;justify-content:center}
.logo-text h1{font-size:1.05rem;font-weight:800;color:var(--text)}
.logo-text p{font-size:.75rem;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:10px}
.filter-select{padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-family:Heebo;font-size:.87rem;background:var(--card);color:var(--text);cursor:pointer}
.search-input{padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-family:Heebo;font-size:.87rem;background:var(--card);color:var(--text);width:200px}
.search-input::placeholder{color:var(--muted)}

/* Hero */
.hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);color:#fff;padding:52px 32px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:28px 28px}
.hero h2{font-size:2rem;font-weight:900;margin-bottom:10px;position:relative}
.hero p{font-size:1rem;opacity:.85;position:relative;max-width:500px;margin:0 auto 28px}
.hero-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;position:relative}
.hero-stat{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px 24px;text-align:center}
.hero-stat .num{font-size:1.8rem;font-weight:900;line-height:1}
.hero-stat .label{font-size:.75rem;opacity:.8;margin-top:2px}

/* Main */
.main{max-width:1080px;margin:0 auto;padding:40px 24px}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:var(--card);font-family:Heebo;font-size:.87rem;font-weight:500;cursor:pointer;transition:all .2s;color:var(--muted)}
.filter-chip:hover{border-color:var(--primary);color:var(--primary-dark)}
.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.filter-count{font-size:.78rem;color:var(--muted);margin-right:auto}

/* Job Cards */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.job-card{
  background:var(--card);border-radius:var(--radius);
  border:2px solid var(--border);box-shadow:var(--shadow);
  transition:transform .25s,box-shadow .25s,border-color .25s;
  cursor:pointer;overflow:hidden;
}
.job-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(74,63,53,.12);border-color:var(--blue)}
.job-card-accent{height:5px;background:linear-gradient(90deg,var(--blue),var(--primary))}
.job-card-body{padding:22px}
.job-dept-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.job-dept{font-size:.75rem;font-weight:700;color:var(--blue-dark);background:rgba(14,165,233,.1);padding:3px 10px;border-radius:20px}
.job-type{font-size:.75rem;color:var(--muted);background:rgba(74,63,53,.06);padding:3px 10px;border-radius:20px}
.job-title{font-size:1.08rem;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.35}
.job-desc{font-size:.85rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:16px}
.job-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.job-meta-item{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--muted)}
.job-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.job-scope-badge{font-size:.78rem;font-weight:700;color:var(--primary-dark);background:rgba(122,173,173,.1);padding:4px 12px;border-radius:20px;border:1px solid rgba(122,173,173,.25)}
.btn-apply{padding:8px 20px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border:none;border-radius:10px;font-family:Heebo;font-size:.87rem;font-weight:700;cursor:pointer;transition:opacity .2s;text-decoration:none;display:inline-block}
.btn-apply:hover{opacity:.88}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(74,63,53,.5);backdrop-filter:blur(4px);z-index:100;padding:24px;overflow-y:auto}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--card);border-radius:24px;max-width:660px;width:100%;margin:auto;box-shadow:0 24px 80px rgba(74,63,53,.18);overflow:hidden;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-accent{height:6px;background:linear-gradient(90deg,var(--blue),var(--primary),var(--accent))}
.modal-body{padding:32px}
.modal-close{position:absolute;top:20px;left:20px;background:rgba(74,63,53,.08);border:none;width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-close:hover{background:rgba(74,63,53,.15)}
.modal-dept-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.modal-title{font-size:1.5rem;font-weight:900;color:var(--text);margin-bottom:20px;line-height:1.3}
.modal-section{margin-bottom:20px}
.modal-section h4{font-size:.82rem;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.modal-section p,.modal-section li{font-size:.92rem;color:var(--text);line-height:1.75}
.modal-section ul{padding-right:18px}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.modal-info-item{background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.12);border-radius:12px;padding:12px 14px}
.modal-info-item .info-label{font-size:.73rem;font-weight:700;color:var(--blue-dark);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.modal-info-item .info-val{font-size:.92rem;font-weight:600;color:var(--text)}
.modal-contact{background:rgba(122,173,173,.08);border:1px solid rgba(122,173,173,.2);border-radius:14px;padding:18px 20px;margin-bottom:24px}
.modal-contact h4{font-size:.82rem;font-weight:700;color:var(--primary-dark);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.contact-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-contact{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:12px;border:none;font-family:Heebo;font-size:.88rem;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .2s}
.btn-email{background:var(--primary);color:#fff}
.btn-phone{background:var(--success);color:#fff}
.btn-contact:hover{opacity:.85}
.modal-deadline{font-size:.85rem;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:6px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-close-modal{padding:10px 22px;background:rgba(74,63,53,.07);border:none;border-radius:12px;font-family:Heebo;font-size:.9rem;font-weight:600;cursor:pointer;color:var(--text)}
.btn-close-modal:hover{background:rgba(74,63,53,.12)}

/* Empty state */
.empty{text-align:center;padding:80px 24px;color:var(--muted)}
.empty svg{opacity:.2;margin-bottom:16px}
.empty h3{font-size:1.1rem;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty p{font-size:.9rem}

/* Responsive */
@media(max-width:600px){
  .header{padding:0 16px;height:60px}
  .hero{padding:36px 16px}
  .hero h2{font-size:1.5rem}
  .main{padding:24px 16px}
  .modal-info-grid{grid-template-columns:1fr}
  .search-input{width:140px}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>אורט בית הערבה</h1>
      <p>משרות פתוחות</p>
    </div>
  </div>
  <div class="header-right">
    <input class="search-input" type="text" id="searchInput" placeholder="חיפוש משרה..." oninput="applyFilters()">
    <select class="filter-select" id="deptFilter" onchange="applyFilters()">
      <option value="">כל המגמות</option>
    </select>
  </div>
</header>

<section class="hero">
  <h2>הצטרפו לצוות שלנו</h2>
  <p>אורט בית הערבה — בית ספר מקצועי-טכנולוגי מוביל בעמק הירדן</p>
  <div class="hero-stats" id="heroStats">
    <div class="hero-stat"><div class="num" id="hs-open">0</div><div class="label">משרות פתוחות</div></div>
    <div class="hero-stat"><div class="num" id="hs-depts">0</div><div class="label">מגמות</div></div>
  </div>
</section>

<main class="main">
  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" onclick="setTypeFilter('')" data-type="">הכל</button>
  </div>
  <div class="filter-count" id="filterCount"></div>
  <div class="jobs-grid" id="jobsGrid"></div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-accent"></div>
    <div class="modal-body" style="position:relative">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<script>
let allJobs=[];
let typeFilter='';

function init(){
  allJobs=JSON.parse(localStorage.getItem('ort-jobs')||'[]').filter(j=>j.status==='פתוחה');
  buildDeptFilter();
  buildTypeChips();
  applyFilters();
  updateStats();
}

function updateStats(){
  document.getElementById('hs-open').textContent=allJobs.length;
  const depts=new Set(allJobs.map(j=>j.dept).filter(Boolean));
  document.getElementById('hs-depts').textContent=depts.size;
  // Populate dept dropdown
  const sel=document.getElementById('deptFilter');
  sel.innerHTML='<option value="">כל המגמות</option>';
  [...depts].sort().forEach(d=>{
    const o=document.createElement('option');
    o.value=d;o.textContent=d;sel.appendChild(o);
  });
}

function buildDeptFilter(){
  const depts=new Set(allJobs.map(j=>j.dept).filter(Boolean));
  const sel=document.getElementById('deptFilter');
  sel.innerHTML='<option value="">כל המגמות</option>';
  [...depts].sort().forEach(d=>{
    const o=document.createElement('option');
    o.value=d;o.textContent=d;sel.appendChild(o);
  });
}

function buildTypeChips(){
  const types=[...new Set(allJobs.map(j=>j.type).filter(Boolean))];
  const bar=document.getElementById('filterBar');
  bar.innerHTML=`<button class="filter-chip active" onclick="setTypeFilter('')" data-type="">הכל</button>`;
  types.forEach(t=>{
    const b=document.createElement('button');
    b.className='filter-chip';
    b.setAttribute('data-type',t);
    b.textContent=t;
    b.onclick=()=>setTypeFilter(t);
    bar.appendChild(b);
  });
}

function setTypeFilter(t){
  typeFilter=t;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active',c.getAttribute('data-type')===t);
  });
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  const dept=document.getElementById('deptFilter')?.value||'';
  let list=allJobs;
  if(dept)list=list.filter(j=>j.dept===dept);
  if(typeFilter)list=list.filter(j=>j.type===typeFilter);
  if(q)list=list.filter(j=>(j.title+j.dept+j.type+j.desc+j.req).toLowerCase().includes(q));
  renderJobs(list);
  document.getElementById('filterCount').textContent=list.length?`${list.length} משרות נמצאו`:'';
}

function fmtDate(d){
  if(!d)return null;
  const [y,m,day]=d.split('-');
  return `${day}/${m}/${y}`;
}

function renderJobs(list){
  const el=document.getElementById('jobsGrid');
  if(!list.length){
    el.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      <h3>לא נמצאו משרות</h3>
      <p>נסה לשנות את הסינון או לחפש מילה אחרת</p>
    </div>`;
    return;
  }
  el.innerHTML=list.map(j=>`
    <div class="job-card" onclick="openModal('${j.id}')">
      <div class="job-card-accent"></div>
      <div class="job-card-body">
        <div class="job-dept-row">
          <span class="job-dept">${j.dept}</span>
          <span class="job-type">${j.type}</span>
        </div>
        <div class="job-title">${j.title}</div>
        ${j.desc?`<div class="job-desc">${j.desc}</div>`:''}
        <div class="job-meta">
${j.contact?`<div class="job-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${j.contact}</div>`:''}
        </div>
        <div class="job-footer">
          <span class="job-scope-badge">${j.scope}</span>
          <span style="font-size:.82rem;font-weight:600;color:var(--blue)">לפרטים נוספים ←</span>
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id){
  const j=allJobs.find(x=>x.id===id);
  if(!j)return;
  const reqLines=j.req?j.req.split('\n').filter(Boolean):'';
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-dept-row">
      <span style="font-size:.78rem;font-weight:700;color:var(--blue-dark);background:rgba(14,165,233,.1);padding:4px 12px;border-radius:20px">${j.dept}</span>
      <span style="font-size:.78rem;color:var(--muted);background:rgba(74,63,53,.06);padding:4px 12px;border-radius:20px">${j.type}</span>
    </div>
    <div class="modal-title">${j.title}</div>
    <div class="modal-info-grid" style="grid-template-columns:1fr">
      <div class="modal-info-item"><div class="info-label">היקף משרה</div><div class="info-val">${j.scope}</div></div>
    </div>
    ${j.desc?`<div class="modal-section"><h4>על המשרה</h4><p>${j.desc.replace(/\n/g,'<br>')}</p></div>`:''}
    ${j.req?`<div class="modal-section"><h4>דרישות</h4>${reqLines.length>1?`<ul>${reqLines.map(r=>`<li>${r}</li>`).join('')}</ul>`:`<p>${j.req.replace(/\n/g,'<br>')}</p>`}</div>`:''}
    ${(j.contact||j.email||j.phone)?`
    <div class="modal-contact">
      <h4>יצירת קשר</h4>
      ${j.contact?`<p style="font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--text)">${j.contact}</p>`:''}
      <div class="contact-btns">
        ${j.email?`<a class="btn-contact btn-email" href="mailto:${j.email}?subject=מועמדות למשרת ${encodeURIComponent(j.title)}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          שלח קורות חיים
        </a>`:''}
        ${j.phone?`<a class="btn-contact btn-phone" href="tel:${j.phone}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.22a2 2 0 0 1 1.97-2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          ${j.phone}
        </a>`:''}
      </div>
    </div>`:''}
    <div style="margin-top:20px;padding-top:18px;border-top:2px solid rgba(14,165,233,.15)">
      <button onclick="showApplyForm('${j.id}')" id="applyToggle" style="width:100%;padding:14px;background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;border:none;border-radius:14px;font-family:Heebo;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        הגשת מועמדות
      </button>
      <div id="applyForm-${j.id}" style="display:none;margin-top:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label style="font-size:.8rem;font-weight:600;color:#666;display:block;margin-bottom:4px">שם מלא *</label><input id="ap_name_${j.id}" required style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-family:Heebo;font-size:.9rem;box-sizing:border-box" placeholder="שם מלא"></div>
          <div><label style="font-size:.8rem;font-weight:600;color:#666;display:block;margin-bottom:4px">טלפון *</label><input id="ap_phone_${j.id}" required dir="ltr" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-family:Heebo;font-size:.9rem;box-sizing:border-box" placeholder="050-0000000"></div>
          <div style="grid-column:1/-1"><label style="font-size:.8rem;font-weight:600;color:#666;display:block;margin-bottom:4px">מייל *</label><input id="ap_email_${j.id}" type="email" required dir="ltr" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-family:Heebo;font-size:.9rem;box-sizing:border-box" placeholder="your@email.com"></div>
          <div style="grid-column:1/-1"><label style="font-size:.8rem;font-weight:600;color:#666;display:block;margin-bottom:4px">כמה מילים על עצמי</label><textarea id="ap_about_${j.id}" rows="3" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-family:Heebo;font-size:.9rem;box-sizing:border-box;resize:vertical" placeholder="ספר/י לנו קצת על עצמך, הניסיון שלך, ולמה המשרה מדברת אליך..."></textarea></div>
          <div><label style="font-size:.8rem;font-weight:600;color:#666;display:block;margin-bottom:4px">קורות חיים</label><input type="file" id="ap_cv_${j.id}" accept=".pdf,.doc,.docx" style="font-family:Heebo;font-size:.85rem"></div>
          <div><label style="font-size:.8rem;font-weight:600;color:#666;display:block;margin-bottom:4px">המלצות</label><input type="file" id="ap_rec_${j.id}" accept=".pdf,.doc,.docx" style="font-family:Heebo;font-size:.85rem"></div>
        </div>
        <button onclick="submitApplication('${j.id}','${j.title.replace(/'/g,"\\'")}')" style="margin-top:16px;width:100%;padding:13px;background:linear-gradient(135deg,#0EA5E9,#0284C7);color:#fff;border:none;border-radius:12px;font-family:Heebo;font-size:.95rem;font-weight:700;cursor:pointer">שלח מועמדות</button>
        <p style="font-size:.75rem;color:#999;text-align:center;margin-top:8px">קורות חיים והמלצות יישלחו כקבצים מצורפים למייל</p>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-close-modal" onclick="closeModal()">סגור</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function showApplyForm(id){
  const el=document.getElementById('applyForm-'+id);
  if(!el)return;
  const btn=document.getElementById('applyToggle');
  if(el.style.display==='none'){
    el.style.display='';
    if(btn)btn.style.display='none';
  }else{
    el.style.display='none';
    if(btn)btn.style.display='';
  }
}

function submitApplication(id,title){
  const g=f=>document.getElementById(f)?.value?.trim()||'';
  const name=g('ap_name_'+id);
  const phone=g('ap_phone_'+id);
  const email=g('ap_email_'+id);
  const about=g('ap_about_'+id);
  if(!name||!phone||!email){alert('יש למלא שם, טלפון ומייל');return}

  const subject=encodeURIComponent('מועמדות למשרת '+title+' — '+name);
  const body=encodeURIComponent(
    'שם: '+name+'\n'+
    'טלפון: '+phone+'\n'+
    'מייל: '+email+'\n\n'+
    (about?'על עצמי:\n'+about+'\n\n':'')+
    'נשלח מדף המשרות של אורט בית הערבה\n'+
    '---\n'+
    'יש לצרף קורות חיים והמלצות למייל זה'
  );
  window.open('mailto:meytalp@bethaarava.ort.org.il?subject='+subject+'&body='+body,'_blank');

  // Save locally too
  const apps=JSON.parse(localStorage.getItem('ort-job-applications')||'[]');
  apps.push({jobId:id,jobTitle:title,name,phone,email,about,date:new Date().toISOString()});
  localStorage.setItem('ort-job-applications',JSON.stringify(apps));

  alert('תודה '+name+'! מייל נפתח — צרפ/י את קורות החיים וההמלצות ושלח/י.');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

init();
</script>
</body>
</html>
