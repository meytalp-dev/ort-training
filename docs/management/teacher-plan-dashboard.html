<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד תוכניות למידה שנתיות — אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;--card:#FFFDF8;--primary:#7AADAD;--primary-dark:#5E9191;
  --text:#4A3F35;--muted:#8B7E74;--border:#D5CAB8;--radius:12px;
  --danger:#C0392B;--success:#27AE60;--warn:#E67E22;--info:#3498DB;
}
body{font-family:Heebo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:14px 24px;background:rgba(90,140,105,.08);border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(74,63,53,.08);position:relative}
.hdr::before{content:'';position:absolute;top:0;right:0;left:0;height:4px;
  background:linear-gradient(90deg,#5A8C69,#7BAE88,#5A8C69,#4A7357)}
.hdr h1{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px}
.badge{background:rgba(122,173,173,.15);padding:3px 12px;border-radius:20px;font-size:11px;
  font-weight:600;color:var(--primary-dark);border:1px solid rgba(122,173,173,.25)}
.hdr-btns{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:8px;font-family:Heebo;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

.content{max-width:1100px;margin:0 auto;padding:24px}

/* Summary */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;
  box-shadow:0 2px 8px rgba(74,63,53,.04)}
.summary-card .sc-num{font-size:32px;font-weight:800;line-height:1}
.summary-card .sc-label{font-size:12px;font-weight:600;color:var(--muted);margin-top:4px}
.sc-draft{color:var(--muted)}
.sc-submitted{color:var(--warn)}
.sc-reviewed{color:var(--info)}
.sc-approved{color:var(--success)}

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-tab{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;
  font-size:13px;font-weight:600;font-family:Heebo;background:var(--card);color:var(--muted);transition:all .15s}
.filter-tab:hover{border-color:var(--primary);color:var(--primary)}
.filter-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* Teacher cards */
.teacher-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.teacher-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:20px;box-shadow:0 2px 8px rgba(74,63,53,.04);transition:all .15s}
.teacher-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(122,173,173,.12)}
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tc-name{font-size:16px;font-weight:700}
.tc-subject{font-size:13px;color:var(--muted);font-weight:500}
.tc-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.status-draft{background:#F0F0F0;color:#999}
.status-submitted{background:#FFF3CD;color:#856404}
.status-reviewed{background:#D1ECF1;color:#0C5460}
.status-approved{background:#D4EDDA;color:#155724}
.status-returned{background:#F8D7DA;color:#721C24}

.tc-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;font-size:12px}
.tc-detail{display:flex;flex-direction:column;gap:2px}
.tc-detail-label{font-weight:700;color:var(--muted);font-size:11px}
.tc-detail-value{font-weight:600}

.tc-topics{margin:12px 0;padding:10px 14px;background:#FAFAF6;border-radius:8px;font-size:12px}
.tc-topics-title{font-weight:700;margin-bottom:4px;font-size:11px;color:var(--muted)}
.tc-topic-item{display:flex;align-items:center;gap:6px;padding:2px 0}
.tc-topic-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tc-trim-a{background:var(--primary)}
.tc-trim-b{background:#9B7DC9}
.tc-trim-c{background:#D47A35}

.tc-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tc-actions .btn{font-size:12px;padding:6px 14px}

/* Expanded view */
.tc-expanded{display:none;margin-top:16px;padding-top:16px;border-top:1.5px solid var(--border)}
.tc-expanded.open{display:block}
.tc-week-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.tc-week-table th{background:#EDEAE3;font-weight:700;padding:6px;text-align:right;border:1px solid var(--border)}
.tc-week-table td{padding:4px 6px;border:1px solid var(--border)}
.tc-week-table tr.holiday{background:#F0F0F0;opacity:.6}
.tc-week-table tr.exam{background:#FADBD8}

/* Trim tabs inside card */
.tc-trim-tabs{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}
.tc-trim-tab{flex:1;padding:6px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;
  background:var(--card);border-left:1px solid var(--border)}
.tc-trim-tab:last-child{border-left:none}
.tc-trim-tab.active{background:rgba(122,173,173,.12);color:var(--primary-dark)}
.tc-trim-content{display:none}
.tc-trim-content.active{display:block}

/* Approval modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;
  background:rgba(74,63,53,.45);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-card{background:var(--card);border-radius:16px;padding:28px;max-width:480px;width:100%;
  box-shadow:0 8px 32px rgba(74,63,53,.18)}
.modal-card h3{font-size:18px;font-weight:800;margin-bottom:12px}
.modal-card textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-family:Heebo;font-size:14px;min-height:100px;resize:vertical;margin:8px 0 16px}
.modal-card label{font-size:12px;font-weight:700;color:var(--muted)}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#1E8449}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#A93226}

@media(max-width:768px){
  .content{padding:16px}
  .teacher-grid{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#5A8C69;flex-shrink:0"></span>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    דשבורד תוכניות למידה
    <span class="badge">תשפ"ז</span>
  </h1>
  <div class="hdr-btns">
    <select id="roleFilter" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:Heebo;font-size:13px">
      <option value="all">כל התפקידים</option>
      <option value="meytal">מיטל — מנהלת</option>
      <option value="ravit">רוית — סגנית</option>
    </select>
    <a href="teacher-plan.html" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      תוכנית חדשה
    </a>
  </div>
</div>

<div class="content">
  <!-- Summary -->
  <div class="summary-grid" id="summaryCards">
    <div class="summary-card"><div class="sc-num sc-draft" id="countTotal">—</div><div class="sc-label">סה"כ תוכניות</div></div>
    <div class="summary-card"><div class="sc-num sc-submitted" id="countSubmitted">—</div><div class="sc-label">ממתינות לבדיקה</div></div>
    <div class="summary-card"><div class="sc-num sc-reviewed" id="countReviewed">—</div><div class="sc-label">נבדקו ע"י רוית</div></div>
    <div class="summary-card"><div class="sc-num sc-approved" id="countApproved">—</div><div class="sc-label">אושרו</div></div>
  </div>

  <!-- Filters -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterPlans('all',event)">הכל</button>
    <button class="filter-tab" onclick="filterPlans('submitted',event)">ממתינות לבדיקה</button>
    <button class="filter-tab" onclick="filterPlans('reviewed',event)">נבדקו</button>
    <button class="filter-tab" onclick="filterPlans('approved',event)">אושרו</button>
    <button class="filter-tab" onclick="filterPlans('draft',event)">טיוטה</button>
    <button class="filter-tab" onclick="filterPlans('returned',event)">הוחזרו</button>
  </div>

  <!-- Teacher cards -->
  <div class="teacher-grid" id="teacherGrid">
    <div class="loading" id="loadingMsg">טוען תוכניות...</div>
  </div>
</div>

<!-- Approval Modal -->
<div class="modal-overlay" id="approvalModal">
  <div class="modal-card">
    <h3 id="modalTitle">בדיקת תוכנית</h3>
    <p id="modalTeacher" style="font-size:14px;color:var(--muted);margin-bottom:12px"></p>
    <label>הערות</label>
    <textarea id="modalNotes" placeholder="הערות לבדיקה / סיבת החזרה..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-success" id="modalApproveBtn" onclick="doApproval('approved')">אישור סופי</button>
      <button class="btn btn-primary" id="modalReviewBtn" onclick="doApproval('reviewed')">אישור רוית</button>
      <button class="btn btn-danger" id="modalReturnBtn" onclick="doApproval('returned')">החזרה לתיקון</button>
      <button class="btn btn-outline" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby14CoNHIjAqIaCw9WqSWXoAvbl0FDJk9v7G-7l2_e2t01eBqmFVzrUjgBwNZiDjCWokQ/exec';

var allPlans = {};
var currentFilter = 'all';
var currentTeacherId = '';

// ============================================
// LOAD ALL PLANS
// ============================================

function loadPlans() {
  if (!APPS_SCRIPT_URL) {
    document.getElementById('loadingMsg').innerHTML = '<div class="empty-state"><h3>לא מחובר לענן</h3><p>יש להגדיר APPS_SCRIPT_URL</p></div>';
    return;
  }

  var callbackName = 'cb_dash_' + Date.now();
  window[callbackName] = function(response) {
    delete window[callbackName];
    var script = document.getElementById('jsonp_' + callbackName);
    if (script) script.remove();

    if (response && response.result === 'success' && response.plans) {
      allPlans = response.plans;
      renderPlans();
    } else {
      document.getElementById('loadingMsg').innerHTML = '<div class="empty-state"><h3>אין תוכניות עדיין</h3><p>מורים עדיין לא הגישו תוכניות.</p></div>';
    }
  };

  var script = document.createElement('script');
  script.id = 'jsonp_' + callbackName;
  script.src = APPS_SCRIPT_URL + '?action=getAllTeacherPlans&callback=' + callbackName;
  document.body.appendChild(script);

  // Timeout
  setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      document.getElementById('loadingMsg').innerHTML = '<div class="empty-state"><h3>אין תוכניות עדיין</h3><p>מורים עדיין לא הגישו תוכניות. ברגע שמורה ישלח — התוכנית תופיע כאן.</p></div>';
    }
  }, 10000);
}

// ============================================
// RENDER
// ============================================

function renderPlans() {
  var grid = document.getElementById('teacherGrid');
  var keys = Object.keys(allPlans);

  if (keys.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>אין תוכניות עדיין</h3><p>ברגע שמורה ישמור תוכנית — היא תופיע כאן.</p></div>';
    updateCounts();
    return;
  }

  var html = '';
  keys.forEach(function(id) {
    var p = allPlans[id];
    var status = (p.status && p.status.status) || 'draft';

    if (currentFilter !== 'all' && status !== currentFilter) return;

    var statusLabel = { draft: 'טיוטה', submitted: 'ממתינה לבדיקה', reviewed: 'נבדקה', approved: 'אושרה', returned: 'הוחזרה' };
    var statusClass = 'status-' + status;

    html += '<div class="teacher-card" data-status="' + status + '" id="card_' + id.replace(/[^a-zA-Z0-9_]/g, '') + '">';
    html += '<div class="tc-header">';
    html += '<div><div class="tc-name">' + esc(p.name || id) + '</div>';
    html += '<div class="tc-subject">' + esc(p.subject || '') + ' — ' + esc(p.grades || '') + '</div></div>';
    html += '<span class="tc-status ' + statusClass + '">' + (statusLabel[status] || status) + '</span>';
    html += '</div>';

    // Details
    html += '<div class="tc-details">';
    if (p.status && p.status.submittedAt) {
      html += '<div class="tc-detail"><span class="tc-detail-label">תאריך שליחה</span><span class="tc-detail-value">' + formatDate(p.status.submittedAt) + '</span></div>';
    }
    if (p.status && p.status.reviewedBy) {
      html += '<div class="tc-detail"><span class="tc-detail-label">בודק/ת</span><span class="tc-detail-value">' + esc(p.status.reviewedBy) + '</span></div>';
    }
    if (p.status && p.status.reviewNotes) {
      html += '<div class="tc-detail full"><span class="tc-detail-label">הערות בדיקה</span><span class="tc-detail-value">' + esc(p.status.reviewNotes) + '</span></div>';
    }
    html += '</div>';

    // Actions
    html += '<div class="tc-actions">';
    html += '<button class="btn btn-outline" onclick="viewPlan(\'' + esc(id) + '\')">צפייה בתוכנית</button>';
    if (status === 'submitted') {
      html += '<button class="btn btn-primary" onclick="openApproval(\'' + esc(id) + '\',\'' + esc(p.name || '') + '\',\'review\')">בדיקת רוית</button>';
    }
    if (status === 'reviewed') {
      html += '<button class="btn btn-success" onclick="openApproval(\'' + esc(id) + '\',\'' + esc(p.name || '') + '\',\'approve\')">אישור מיטל</button>';
    }
    if (status === 'submitted' || status === 'reviewed') {
      html += '<button class="btn btn-danger" style="font-size:12px;padding:6px 14px" onclick="openApproval(\'' + esc(id) + '\',\'' + esc(p.name || '') + '\',\'return\')">החזרה</button>';
    }
    html += '</div>';

    html += '</div>';
  });

  grid.innerHTML = html || '<div class="empty-state"><h3>אין תוכניות בסינון הזה</h3></div>';
  updateCounts();
}

function updateCounts() {
  var keys = Object.keys(allPlans);
  var counts = { total: keys.length, draft: 0, submitted: 0, reviewed: 0, approved: 0, returned: 0 };
  keys.forEach(function(id) {
    var s = (allPlans[id].status && allPlans[id].status.status) || 'draft';
    if (counts[s] !== undefined) counts[s]++;
  });
  document.getElementById('countTotal').textContent = counts.total;
  document.getElementById('countSubmitted').textContent = counts.submitted;
  document.getElementById('countReviewed').textContent = counts.reviewed;
  document.getElementById('countApproved').textContent = counts.approved;
}

function filterPlans(status, e) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
  if (e && e.target) e.target.classList.add('active');
  renderPlans();
}

// ============================================
// VIEW PLAN
// ============================================

function viewPlan(teacherId) {
  window.open('teacher-plan.html?teacher=' + encodeURIComponent(teacherId), '_blank');
}

// ============================================
// APPROVAL
// ============================================

function openApproval(teacherId, name, mode) {
  currentTeacherId = teacherId;
  document.getElementById('modalTeacher').textContent = name + ' — ' + (allPlans[teacherId] ? allPlans[teacherId].subject : '');
  document.getElementById('modalNotes').value = '';

  var approveBtn = document.getElementById('modalApproveBtn');
  var reviewBtn = document.getElementById('modalReviewBtn');
  var returnBtn = document.getElementById('modalReturnBtn');

  approveBtn.style.display = mode === 'approve' ? '' : 'none';
  reviewBtn.style.display = mode === 'review' ? '' : 'none';
  returnBtn.style.display = 'inline-flex';

  if (mode === 'return') {
    approveBtn.style.display = 'none';
    reviewBtn.style.display = 'none';
    document.getElementById('modalTitle').textContent = 'החזרה לתיקון';
  } else if (mode === 'review') {
    document.getElementById('modalTitle').textContent = 'בדיקת רוית';
  } else {
    document.getElementById('modalTitle').textContent = 'אישור סופי — מיטל';
  }

  document.getElementById('approvalModal').classList.add('open');
}

function closeModal() {
  document.getElementById('approvalModal').classList.remove('open');
  currentTeacherId = '';
}

function doApproval(status) {
  if (!currentTeacherId) return;

  var role = document.getElementById('roleFilter').value;
  var reviewer = role === 'ravit' ? 'רוית' : 'מיטל';
  var notes = document.getElementById('modalNotes').value;

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'updateApproval',
      teacherId: currentTeacherId,
      status: status,
      reviewer: reviewer,
      notes: notes
    })
  }).then(function() {
    // Update local state
    if (allPlans[currentTeacherId] && allPlans[currentTeacherId].status) {
      allPlans[currentTeacherId].status.status = status;
      allPlans[currentTeacherId].status.reviewedBy = reviewer;
      allPlans[currentTeacherId].status.reviewNotes = notes;
    }
    closeModal();
    renderPlans();
    showToast(status === 'approved' ? 'התוכנית אושרה' : status === 'reviewed' ? 'נבדקה ע"י רוית' : 'הוחזרה לתיקון');
  }).catch(function() {
    showToast('שגיאה — נסי שוב');
  });
}

// ============================================
// UTILS
// ============================================

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function formatDate(d) {
  if (!d) return '';
  try {
    var date = new Date(d);
    return date.getDate() + '/' + (date.getMonth() + 1) + '/' + date.getFullYear();
  } catch(e) { return String(d); }
}

function showToast(msg) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#155724;color:#fff;' +
    'padding:12px 24px;border-radius:10px;font-family:Heebo;font-size:14px;font-weight:600;z-index:9999;' +
    'box-shadow:0 4px 12px rgba(0,0,0,.2)';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// ============================================
// INIT
// ============================================

loadPlans();
</script>
</body>
</html>
