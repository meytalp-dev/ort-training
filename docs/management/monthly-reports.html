<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>דוחות חודשיים — אורט בית הערבה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Shuneet3';src:url('fonts/Shuneet3 Medium.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Shuneet3 Bold';src:url('fonts/Shuneet3 Square Bold.ttf') format('truetype');font-weight:700;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;--card:#FFFDF8;--primary:#7AADAD;--primary-dark:#5E9191;--primary-light:#96C5C5;
  --accent:#D4A574;--accent-dark:#B8885A;--text:#4A3F35;--muted:#8B7E74;--border:#E8DDD0;
  --success:#6A9F6A;--success-bg:#E8F3E8;--warn:#C4944A;--warn-bg:#FDF3E4;
  --danger:#C0605A;--danger-bg:#FAE8E6;--radius:20px;
  --sage:#A8B5A0;--dusty-rose:#C9A0A0;--warm-gold:#D4A574;
  --shadow-sm:0 2px 8px rgba(74,63,53,.05),0 1px 3px rgba(74,63,53,.04);
  --shadow-md:0 4px 20px rgba(74,63,53,.07),0 2px 6px rgba(74,63,53,.04);
  --shadow-lg:0 12px 40px rgba(74,63,53,.09),0 4px 12px rgba(74,63,53,.04);
}
body{font-family:Heebo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:500px;background:linear-gradient(180deg,#FFF8F0 0%,#F5F0E8 100%);z-index:-2;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(74,63,53,.03) 1px,transparent 1px);background-size:24px 24px;z-index:-1;pointer-events:none}
h1,h2,h3,h4{font-family:'Shuneet3 Bold','Shuneet3',Heebo,sans-serif}

/* ===== LOGIN SCREEN ===== */
.login-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  animation:fadeIn .5s ease;
}
.login-card{
  background:var(--card);border-radius:28px;border:1px solid var(--border);
  box-shadow:var(--shadow-lg);padding:48px 44px;max-width:520px;width:100%;text-align:center;
  animation:slideUp .5s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-card .logo{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:20px;border:3px solid var(--border)}
.login-card h1{font-size:1.3rem;margin-bottom:6px;font-weight:800;font-family:Heebo}
.login-card .subtitle{color:var(--muted);font-size:.88rem;margin-bottom:32px}
.login-card .role-label{font-size:.92rem;font-weight:600;margin-bottom:16px;display:block}
.role-cards{display:flex;gap:14px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.role-card{
  flex:1;min-width:130px;max-width:160px;padding:22px 14px 18px;border-radius:18px;
  border:2px solid var(--border);cursor:pointer;transition:.25s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.role-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.role-card.selected{border-width:3px}
.role-card.role-teacher{background:rgba(212,165,116,.08)}
.role-card.role-teacher.selected{border-color:var(--warm-gold);background:rgba(212,165,116,.16)}
.role-card.role-counselor{background:rgba(201,160,160,.08)}
.role-card.role-counselor.selected{border-color:var(--dusty-rose);background:rgba(201,160,160,.16)}
.role-card.role-principal{background:rgba(122,173,173,.08)}
.role-card.role-principal.selected{border-color:var(--primary);background:rgba(122,173,173,.16)}
.role-card svg{width:32px;height:32px;flex-shrink:0}
.role-card .role-name{font-size:.9rem;font-weight:700}
.login-name-area{margin-bottom:24px;text-align:right;display:none}
.login-name-area.visible{display:block;animation:fadeIn .3s ease}
.login-name-area label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px}
.login-name-area select{
  width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:14px;
  font-family:Heebo;font-size:.92rem;color:var(--text);background:var(--card);
  cursor:pointer;outline:none;transition:border-color .2s;
}
.login-name-area select:focus{border-color:var(--primary)}
.login-btn{
  width:100%;padding:14px;border:none;border-radius:14px;background:var(--primary);
  color:#fff;font-family:Heebo;font-size:1rem;font-weight:700;cursor:pointer;
  transition:.2s;opacity:.5;pointer-events:none;
}
.login-btn.ready{opacity:1;pointer-events:auto}
.login-btn.ready:hover{background:var(--primary-dark)}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(180deg, rgba(168,155,201,.08) 0%, #FFFDF8 100%);color:var(--text);padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;min-height:64px;
  border-bottom:2px solid var(--border);box-shadow:0 2px 12px rgba(74,63,53,.06);
}
.header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#A89BC9,#BFB3D9,#A89BC9,#8D7EB5);pointer-events:none}
.header-right{display:flex;align-items:center;gap:14px}
.header-right img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.header-right h1{font-size:1.05rem;font-weight:800;font-family:Heebo;letter-spacing:-.2px}
.header-right .back-link,.switch-user{color:var(--muted);text-decoration:none;font-size:.82rem;font-weight:500;transition:color .2s;display:flex;align-items:center;gap:4px;cursor:pointer;background:none;border:none;font-family:Heebo}
.header-right .back-link:hover,.switch-user:hover{color:var(--primary-dark)}
.header-left{display:flex;align-items:center;gap:12px}
.month-select{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px 14px;
  font-family:Heebo;font-size:.85rem;color:var(--text);cursor:pointer;font-weight:500;
  outline:none;transition:border-color .2s;
}
.month-select:focus{border-color:var(--primary)}

/* Nav tabs */
.nav{display:flex;gap:2px;padding:0;background:transparent}
.nav button{
  background:transparent;border:none;color:var(--muted);padding:20px 16px;border-radius:0;
  font-family:Heebo;font-size:.87rem;font-weight:500;cursor:pointer;transition:color .2s;position:relative;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.nav button:hover{color:var(--text)}
.nav button.active{color:var(--primary-dark);font-weight:700}
.nav button.active::after{content:'';position:absolute;bottom:-1px;left:6px;right:6px;height:2.5px;background:linear-gradient(90deg,var(--primary),var(--warm-gold));border-radius:2px 2px 0 0}
.nav button svg{width:16px;height:16px;flex-shrink:0}

/* Container */
.container{max-width:1340px;margin:0 auto;padding:28px}

/* Sections */
.section{display:none}
.section.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.card-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:1rem;font-weight:700}
.card-body{padding:24px}

/* Form elements */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:12px;
  font-family:Heebo;font-size:.88rem;color:var(--text);background:var(--card);
  transition:border-color .2s;outline:none;direction:rtl;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(122,173,173,.12)}
.form-group input[readonly]{background:rgba(122,173,173,.06);cursor:default}
.form-group textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:10px;margin-top:6px}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;position:absolute;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#ddd;border-radius:24px;transition:.3s}
.toggle .slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;right:3px;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle input:checked+.slider{background:var(--primary)}
.toggle input:checked+.slider::before{transform:translateX(-20px)}
.toggle-label{font-size:.85rem;color:var(--muted)}

/* Colored sections */
.section-colored{border-radius:16px;padding:20px 24px;margin-bottom:20px}
.section-colored h4{font-size:.95rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-colored h4 svg{width:18px;height:18px}
.section-gold{background:rgba(212,165,116,.08);border:1px solid rgba(212,165,116,.2)}
.section-rose{background:rgba(201,160,160,.08);border:1px solid rgba(201,160,160,.2)}
.section-teal{background:rgba(122,173,173,.08);border:1px solid rgba(122,173,173,.2)}
.section-sage{background:rgba(168,181,160,.08);border:1px solid rgba(168,181,160,.2)}

/* Status radio */
.status-radios{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.status-radio{display:flex;align-items:center;gap:6px;cursor:pointer}
.status-radio input{display:none}
.status-radio .dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:.2s}
.status-radio input:checked+.dot{border-width:3px}
.status-radio.green .dot{border-color:var(--success)}
.status-radio.green input:checked+.dot{background:var(--success-bg);border-color:var(--success)}
.status-radio.green input:checked+.dot::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--success)}
.status-radio.yellow .dot{border-color:var(--warn)}
.status-radio.yellow input:checked+.dot{background:var(--warn-bg);border-color:var(--warn)}
.status-radio.yellow input:checked+.dot::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--warn)}
.status-radio.red .dot{border-color:var(--danger)}
.status-radio.red input:checked+.dot{background:var(--danger-bg);border-color:var(--danger)}
.status-radio.red input:checked+.dot::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--danger)}
.status-radio span:last-child{font-size:.83rem;font-weight:500}

/* Tables */
.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.85rem}
.data-table th{background:rgba(122,173,173,.06);padding:10px 14px;font-weight:600;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(122,173,173,.03)}
.data-table tr.current-month td{background:rgba(212,165,116,.08)}
.data-table input,.data-table textarea{width:100%;border:1px solid transparent;background:transparent;padding:4px 8px;border-radius:8px;font-family:Heebo;font-size:.84rem;color:var(--text);transition:.2s;resize:none}
.data-table input:focus,.data-table textarea:focus{border-color:var(--primary);background:var(--card);outline:none}

/* Traffic light */
.traffic-light{display:flex;gap:4px;align-items:center}
.tl-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:.2s;opacity:.35}
.tl-dot:hover{opacity:.7}
.tl-dot.active{opacity:1;border-color:transparent;box-shadow:0 0 6px rgba(0,0,0,.1)}
.tl-green{background:var(--success)}
.tl-yellow{background:var(--warn)}
.tl-red{background:var(--danger)}

/* Buttons */
.btn{padding:10px 24px;border:none;border-radius:12px;font-family:Heebo;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-sm{padding:6px 14px;font-size:.8rem;border-radius:10px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary-dark)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#a84e49}

/* Selector bar */
.selector-bar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:24px;padding:16px 20px;background:var(--card);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.selector-bar label{font-size:.85rem;font-weight:600;white-space:nowrap}
.selector-bar select{padding:8px 14px;border:1px solid var(--border);border-radius:12px;font-family:Heebo;font-size:.88rem;color:var(--text);background:var(--card);cursor:pointer;min-width:140px;outline:none}
.selector-bar select:focus{border-color:var(--primary)}

/* Student cards grid */
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.student-card{
  background:var(--card);border-radius:16px;border:1px solid var(--border);padding:20px;
  cursor:pointer;transition:.2s;position:relative;overflow:hidden;
}
.student-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary-light);transform:translateY(-2px)}
.student-card .student-name{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.student-card .student-track{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.student-card .student-meta{display:flex;align-items:center;justify-content:space-between}
.student-card .update-date{font-size:.72rem;color:var(--muted)}
.status-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.status-dot.green{background:var(--success)}
.status-dot.yellow{background:var(--warn)}
.status-dot.red{background:var(--danger)}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;margin-left:4px}
.badge-attendance{background:var(--warn-bg);color:var(--warn)}
.badge-intervention{background:var(--danger-bg);color:var(--danger)}
.badge-track{background:rgba(122,173,173,.12);color:var(--primary-dark)}
.badge-submitted{background:var(--success-bg);color:var(--success)}
.badge-missing{background:var(--danger-bg);color:var(--danger)}
.student-card .badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

/* Summary bar */
.summary-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.summary-stat{
  background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px 22px;
  display:flex;align-items:center;gap:14px;flex:1;min-width:160px;box-shadow:var(--shadow-sm);
}
.summary-stat .stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.summary-stat .stat-icon.green{background:var(--success-bg)}
.summary-stat .stat-icon.yellow{background:var(--warn-bg)}
.summary-stat .stat-icon.red{background:var(--danger-bg)}
.summary-stat .stat-icon.blue{background:rgba(122,173,173,.12)}
.summary-stat .stat-num{font-size:1.6rem;font-weight:800;line-height:1;font-family:Heebo}
.summary-stat .stat-label{font-size:.72rem;color:var(--muted)}

/* Pie chart */
.pie-container{display:flex;align-items:center;gap:24px;justify-content:center;padding:16px}
.pie-legend{display:flex;flex-direction:column;gap:8px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:.82rem}
.pie-legend-item .dot{width:12px;height:12px;border-radius:50%}

/* Dashboard */
.flags-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:28px}
.flag-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.flag-card-header{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.flag-card-header svg{width:20px;height:20px;flex-shrink:0}
.flag-card-header .flag-count{margin-right:auto;background:var(--danger-bg);color:var(--danger);padding:2px 10px;border-radius:10px;font-size:.78rem;font-weight:700}
.flag-card-header h4{font-size:.9rem;font-weight:700}
.flag-card-body{padding:14px 20px;max-height:200px;overflow-y:auto}
.flag-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(232,221,208,.5);font-size:.82rem}
.flag-item:last-child{border-bottom:none}
.flag-item .class-badge{font-size:.7rem;background:rgba(122,173,173,.1);color:var(--primary-dark);padding:1px 8px;border-radius:6px;font-weight:500}

/* Bar chart */
.bar-chart{margin-top:24px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.bar-label{width:50px;font-size:.82rem;font-weight:600;text-align:center;flex-shrink:0}
.bar-track{flex:1;height:28px;background:var(--border);border-radius:14px;overflow:hidden;display:flex;position:relative}
.bar-seg{height:100%;transition:width .4s ease}
.bar-seg.green{background:var(--success)}
.bar-seg.yellow{background:var(--warn)}
.bar-seg.red{background:var(--danger)}
.bar-pct{font-size:.68rem;color:var(--muted);width:40px;text-align:center;flex-shrink:0}

/* Class table */
.class-summary-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.85rem}
.class-summary-table th{background:rgba(122,173,173,.06);padding:12px 14px;font-weight:600;text-align:right;border-bottom:2px solid var(--border)}
.class-summary-table td{padding:12px 14px;border-bottom:1px solid var(--border)}
.class-summary-table tr:hover td{background:rgba(122,173,173,.04)}
.class-summary-table tr{cursor:pointer;transition:.15s}
.class-row-mini{display:flex;gap:3px;align-items:center}
.class-row-mini .mini-dot{width:8px;height:8px;border-radius:50%}

/* Homeroom report status table */
.hr-status-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.85rem}
.hr-status-table th{background:rgba(212,165,116,.06);padding:10px 14px;font-weight:600;text-align:right;border-bottom:2px solid var(--border)}
.hr-status-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.hr-status-table tr:hover td{background:rgba(212,165,116,.04)}

/* Visit row */
.visit-row{display:grid;grid-template-columns:1fr 120px 2fr 40px;gap:10px;align-items:start;margin-bottom:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.visit-row input,.visit-row textarea{
  width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:10px;
  font-family:Heebo;font-size:.85rem;color:var(--text);background:var(--card);outline:none;
}
.visit-row textarea{resize:vertical;min-height:44px}
.visit-row input:focus,.visit-row textarea:focus{border-color:var(--primary)}

/* Student tracking table */
.st-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.84rem}
.st-table th{background:rgba(168,181,160,.08);padding:10px 12px;font-weight:600;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;font-size:.78rem}
.st-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.st-table tr:hover td{background:rgba(168,181,160,.04)}
.st-table .st-name{font-weight:600;white-space:nowrap;font-size:.88rem}
.st-table input[type="text"],.st-table textarea{width:100%;padding:6px 10px;border:1px solid transparent;background:transparent;border-radius:8px;font-family:Heebo;font-size:.82rem;color:var(--text);transition:.2s;resize:none}
.st-table input[type="text"]:focus,.st-table textarea:focus{border-color:var(--primary);background:var(--card);outline:none}
.st-check-cell{text-align:center;width:90px}
.st-check-cell input[type="checkbox"]{width:20px;height:20px;accent-color:var(--primary);cursor:pointer}
.st-goals-cell{min-width:180px}
.st-achieved-cell{text-align:center;width:110px}
.st-achieved-select{padding:5px 8px;border:1px solid var(--border);border-radius:8px;font-family:Heebo;font-size:.8rem;color:var(--text);background:var(--card);cursor:pointer;outline:none}
.st-achieved-select:focus{border-color:var(--primary)}
.st-prev-goal{font-size:.72rem;color:var(--muted);margin-top:2px;font-style:italic}
.st-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st-count{font-size:.78rem;color:var(--muted);font-weight:400}

/* Comments section */
.comments-section{margin-top:24px}
.comments-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.comment-bubble{padding:14px 18px;border-radius:16px;font-size:.86rem;line-height:1.5;position:relative;max-width:85%}
.comment-bubble .comment-meta{font-size:.72rem;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.comment-bubble .comment-meta strong{color:var(--text);font-weight:600}
.comment-principal{background:rgba(122,173,173,.1);border:1px solid rgba(122,173,173,.2);border-radius:16px 16px 4px 16px;align-self:flex-start}
.comment-teacher{background:rgba(212,165,116,.1);border:1px solid rgba(212,165,116,.2);border-radius:16px 16px 16px 4px;align-self:flex-end}
.comment-input-area{display:flex;gap:10px;align-items:flex-end}
.comment-input-area textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:14px;font-family:Heebo;font-size:.88rem;color:var(--text);background:var(--card);resize:none;min-height:44px;outline:none;transition:border-color .2s}
.comment-input-area textarea:focus{border-color:var(--primary)}
.comment-send-btn{padding:10px 18px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-family:Heebo;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.comment-send-btn:hover{background:var(--primary-dark)}
.comment-badge{display:inline-flex;align-items:center;gap:4px;background:var(--warn-bg);color:var(--warn);padding:2px 8px;border-radius:8px;font-size:.7rem;font-weight:600;margin-right:8px}

/* Homeroom summary in class view */
.hr-summary-card{background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.2);border-radius:16px;padding:20px 24px;margin-bottom:24px}
.hr-summary-card h4{font-size:.95rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hr-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.hr-summary-item{font-size:.84rem}
.hr-summary-item strong{display:block;margin-bottom:2px;color:var(--accent-dark)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--success);color:#fff;padding:12px 28px;border-radius:14px;
  font-size:.88rem;font-weight:600;z-index:999;transition:.3s;opacity:0;pointer-events:none;
  box-shadow:0 8px 24px rgba(106,159,106,.3);display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Save btn */
.save-area{display:flex;justify-content:center;margin-top:24px;gap:12px}

/* Student form top selectors */
.student-selector-area{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}

/* Scroll helper */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* App wrapper — hide until logged in */
#appMain{display:none}

/* Responsive */
@media(max-width:900px){
  .header{padding:0 16px;height:auto;min-height:56px;flex-direction:column;align-items:stretch;gap:4px;padding-top:10px;padding-bottom:4px}
  .header-right{justify-content:space-between}
  .nav{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .container{padding:16px}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .summary-bar{flex-direction:column}
  .flags-grid{grid-template-columns:1fr}
  .students-grid{grid-template-columns:1fr 1fr}
  .selector-bar{flex-direction:column;align-items:stretch}
  .bar-label{width:36px;font-size:.72rem}
  .login-card{padding:32px 24px}
  .role-cards{flex-direction:column;align-items:stretch}
  .role-card{max-width:100%}
  .visit-row{grid-template-columns:1fr;gap:8px}
  .hv-cards-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .students-grid{grid-template-columns:1fr}
}

/* Home Visit Cards */
.hv-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px}
.hv-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px 20px;box-shadow:var(--shadow-sm);transition:.2s;position:relative}
.hv-card:hover{box-shadow:var(--shadow-md)}
.hv-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hv-card-header .hv-student-name{font-size:.95rem;font-weight:700}
.hv-card-header .hv-date{font-size:.78rem;color:var(--muted)}
.hv-card-insight{font-size:.84rem;color:var(--text);margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hv-card-footer{display:flex;align-items:center;justify-content:space-between}
.hv-badge-followup{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:600;background:var(--warn-bg);color:var(--warn)}
.hv-badge-ok{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:600;background:var(--success-bg);color:var(--success)}
.hv-card-actions{display:flex;gap:6px}
.hv-card-actions button{background:none;border:none;cursor:pointer;padding:4px;border-radius:8px;transition:.2s}
.hv-card-actions button:hover{background:rgba(122,173,173,.1)}
.hv-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9rem}
.hv-empty svg{display:block;margin:0 auto 12px;opacity:.4}
.hv-form-overlay{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-md);padding:28px;margin-bottom:24px;animation:fadeIn .3s ease}
.hv-checkbox-group{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.hv-checkbox-group label{display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:10px;transition:.2s}
.hv-checkbox-group label:has(input:checked){background:rgba(168,181,160,.15);border-color:var(--sage)}
.hv-checkbox-group input[type="checkbox"]{width:16px;height:16px;accent-color:var(--sage)}
.hv-summary-card{background:rgba(168,181,160,.06);border:1px solid rgba(168,181,160,.2);border-radius:14px;padding:14px 18px;margin-bottom:10px}
.hv-summary-card .hv-s-name{font-weight:700;font-size:.88rem}
.hv-summary-card .hv-s-date{font-size:.76rem;color:var(--muted);margin-right:8px}
.hv-summary-card .hv-s-insight{font-size:.82rem;margin-top:4px;color:var(--text)}

/* Print */
@media print{
  .header,.nav,.selector-bar,.save-area,.month-select,.btn,.toast,.back-link,.switch-user,.login-screen{display:none!important}
  body{background:#fff!important}
  body::before,body::after{display:none!important}

  .card,.section-colored,.student-card,.flag-card,.summary-stat{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}
  .section{display:block!important}
  .section:not(.active){display:none!important}
  @page{margin:1.5cm}
}

<script>
// ==================== STAFF DATA ====================
const STAFF = {
  teachers: [
    {name:'משהצברי', class:'ט1'},
    {name:'אושר אהרוני', class:'ט2'},
    {name:'רעיה יצחקי', class:'י1'},
    {name:'אופירה מלכה', class:'י2'},
    {name:'פרלה שאזו', class:'י3'},
    {name:'יעקב גרונספלד', class:'יא1'},
    {name:'נעמה קוסטן', class:'יא2'},
    {name:'גיא נתנאל', class:'יא3'},
    {name:'יוסי רובבשי', class:'יב1'},
    {name:'יואב רוט', class:'יב2'},
    {name:'מנו דהאן', class:'יב3'}
  ],
  counselors: [
    {name:'צהיי גטהון', classes:['ט1','יב1','יב2','יב3']},
    {name:'ליאת רוזנר', classes:['יא1','יא2','יא3','ט2']},
    {name:'דורית ויגדור', classes:['י1','י2','י3']}
  ],
  principal: {name:'מיטל פלג'}
};

const CLASSES = ['ט1','ט2','י1','י2','י3','יא1','יא2','יא3','יב1','יב2','יב3'];
const TRACKS = ['עיצוב שיער','אוטוטרוניקה','מחשבים'];
const MONTHS_HE = {'2025-09':'ספטמבר','2025-10':'אוקטובר','2025-11':'נובמבר','2025-12':'דצמבר','2026-01':'ינואר','2026-02':'פברואר','2026-03':'מרץ','2026-04':'אפריל'};
const MONTH_KEYS = Object.keys(MONTHS_HE);
const LIFE_SKILLS = ['תקשורת אפקטיבית','אחריות ויוזמה','יצירתיות וחדשנות','ניהול זמן ועצמי','תיקון עולם'];
const DIMENSIONS = ['שייכות','כבוד','מוטיבציה','מסוגלות','אוטונומיה'];
const FAMILY_STATUSES = ['שלם','גרושים','חד הורי','אומנה'];
const ECON_STATUSES = ['תקין','מאתגר','קשה'];
const ATTEND_STATUSES = ['סדירה','חלקית','בעייתית'];
const PARENT_CONTACTS = ['קשר טוב','קשר חלקי','אין קשר'];
const AUTHORITY_OPTS = ['מקבל','חלקית','מתקשה'];

const FIRST_NAMES_M = ['אור','דניאל','איתן','יובל','עומר','נועם','אביב','רון','תומר','שי','עידו','אלון','גיל','ניר','ליאם','עמית','אריאל','מתן','דור','אדם','ינון','אסף','רועי','יונתן','אלעד'];
const FIRST_NAMES_F = ['נועה','מאיה','שירה','ליאור','תמר','יעל','דנה','הילה','רוני','אגם','עדן','ליה','שלי','מור','לין','גלי','סהר','הדר','ענבל','אלה','רותם','טליה','נגה','יפעת','מיכל'];
const LAST_NAMES = ['כהן','לוי','מזרחי','אברהם','דוד','ביטון','חדד','פרץ','גבאי','אוחנה','שלום','עמר','דהן','מלכה','אזולאי','בן דוד','חיים','יוסף','זרקא','סויסה','בוזגלו','אלון','נחום','סבג','אטיאס'];

function randomPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randomInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function getTeacherForClass(cls){
  return STAFF.teachers.find(t=>t.class===cls);
}
function getCounselorForClass(cls){
  return STAFF.counselors.find(c=>c.classes.includes(cls));
}
function isUpperClass(cls){
  return cls.startsWith('יא') || cls.startsWith('יב');
}

// ==================== DEMO DATA GENERATION ====================
function generateStudents(className, count){
  const students = [];
  for(let i=0;i<count;i++){
    const isFemale = Math.random()>.45;
    const first = isFemale ? randomPick(FIRST_NAMES_F) : randomPick(FIRST_NAMES_M);
    const last = randomPick(LAST_NAMES);
    const statusRnd = Math.random();
    const status = statusRnd<.70?'green':statusRnd<.90?'yellow':'red';
    const attendance = status==='red'?(Math.random()>.5?'בעייתית':'חלקית'):status==='yellow'?randomPick(['חלקית','סדירה']):'סדירה';
    const track = randomPick(TRACKS);
    const id = String(200000000+randomInt(1000000,99999999));
    const year = randomInt(2007,2011);
    const month = String(randomInt(1,12)).padStart(2,'0');
    const day = String(randomInt(1,28)).padStart(2,'0');
    const birthDate = `${year}-${month}-${day}`;

    const lifeSkills = {};
    LIFE_SKILLS.forEach(sk => {
      const r = Math.random();
      lifeSkills[sk] = {status:r<.6?'green':r<.85?'yellow':'red', notes:''};
    });

    const monthlyData = {};
    MONTH_KEYS.forEach(mk => { monthlyData[mk] = {done:'',goals:'',notes:''}; });
    const pastMonths = MONTH_KEYS.slice(0,randomInt(2,5));
    pastMonths.forEach(mk => {
      monthlyData[mk] = {
        done:randomPick(['שיחה אישית','מעקב נוכחות','פגישה עם הורים','תכנית התערבות','שיחת מוטיבציה','הפניה לייעוץ','']),
        goals:randomPick(['שיפור נוכחות','העלאת ציונים','חיזוק מוטיבציה','שיפור התנהגות','חיבור למגמה','']),
        notes:''
      };
    });

    const meetings = [];
    if(Math.random()>.4){
      meetings.push({
        date:`2026-0${randomInt(1,3)}-${String(randomInt(1,28)).padStart(2,'0')}`,
        summary:randomPick(['שיחה על נוכחות','עדכון הורים','תכנון יעדים','מעקב אחרי אירוע','שיחת חיזוק']),
        nextSteps:randomPick(['המשך מעקב','פגישה חוזרת','שיחה עם הורים','הפניה ליועצת',''])
      });
    }

    students.push({
      id:`${className}_${i}`, name:`${first} ${last}`, className, track, birthDate,
      idNumber:id, familyStatus:randomPick(FAMILY_STATUSES),
      address:randomPick(['ערד','דימונה','באר שבע','ירוחם','אשדוד','אילת']),
      economicStatus:status==='red'?randomPick(['מאתגר','קשה']):randomPick(ECON_STATUSES),
      employed:Math.random()>.7,
      prevSchool:randomPick(['חטיבת אופקים','יסודי רמון','חטיבת ניצנים','בית ספר אלון','חטיבת דקל']),
      strengths:randomPick(['חברותי/ת ומובילה','יצירתי/ת','מוטיבציה גבוהה','כישורים טכניים','אמפתי/ת','']),
      attendance, parentContact:randomPick(PARENT_CONTACTS),
      significantFigure:randomPick(['מחנכ/ת','יועצ/ת','הורה','מדריכ/ת','']),
      authority:randomPick(AUTHORITY_OPTS),
      diagnoses:status!=='green'?randomPick(['הפרעות קשב','דיסלקציה','חרדה','','']):'',
      placementCommittee:Math.random()>.85,
      therapist:status==='red'?randomPick(['ד"ר כהן','גב\' לוי','מר אברהם','']):'',
      emotionalTherapy:status==='red'?Math.random()>.4:false,
      openCases:status==='red'?randomPick(['תיק רווחה','מב"ת','','']):'',
      monthlyData, meetings, lifeSkills, overallStatus:status,
      lastUpdate:`2026-0${randomInt(3,4)}-${String(randomInt(1,28)).padStart(2,'0')}`
    });
  }
  return students;
}

function generateHomeroomReports(){
  const reports = {};
  STAFF.teachers.forEach(t => {
    reports[t.class] = {};
    // Generate reports for some past months
    const filledMonths = MONTH_KEYS.slice(0, randomInt(2,5));
    filledMonths.forEach(mk => {
      const dim = DIMENSIONS[MONTH_KEYS.indexOf(mk) % DIMENSIONS.length];
      const hasAttendanceIssue = Math.random()>.6;
      const isUpper = isUpperClass(t.class);
      reports[t.class][mk] = {
        teacherName: t.name,
        className: t.class,
        month: mk,
        classOverall: randomPick([
          'הכיתה מתפקדת היטב, אווירה חיובית ושיתוף פעולה טוב',
          'יש שיפור בנוכחות אך עדיין יש אתגרים במוטיבציה',
          'כיתה חזקה עם מעורבות טובה בשיעורים',
          'קשיים באווירה הכיתתית, צריך להשקיע בבניית קבוצה',
          'תפקוד סביר, יש מספר תלמידים שדורשים תשומת לב מיוחדת'
        ]),
        currentDimension: dim,
        educationLessonsCount: randomInt(2,6),
        educationLessonsDesc: randomPick([
          'עבדנו על שייכות דרך פעילות קבוצתית',
          'שיחה על כבוד הדדי בעקבות אירוע בכיתה',
          'פעילות יצירתית על מוטיבציה ומטרות',
          'סדנת עבודת צוות ואוטונומיה',

function generateHomeVisits(studentData){
  const homeVisits = {};
  const visitInsights = [
    'הבית מסודר, תנאי למידה טובים. ההורים מעורבים ותומכים',
    'מצב כלכלי קשה, חסרים ספרי לימוד. צריך לבדוק אפשרות לסיוע',
    'האם מספרת על קשיים רגשיים של התלמידה בבית. מומלץ שיחה עם יועצת',
    'משפחה חמה ותומכת. האב שואל על אפשרויות למידה נוספות',
    'דירה קטנה, אין פינת למידה. התלמיד לומד בסלון עם הסחות דעת',
    'ההורים מודאגים מהנוכחות. סיכמנו על מעקב שבועי',
    'אווירה טובה בבית, תקשורת פתוחה עם ההורים',
    'האם חד-הורית, מתקשה כלכלית. התלמיד עוזר בבית הרבה'
  ];
  const visitConditions = [
    'דירה מרווחת ומסודרת, יש חדר פרטי לתלמיד/ה',
    'דירה קטנה, 3 חדרים ל-6 נפשות',
    'בית פרטי, תנאים טובים',
    'דירת שיכון, תנאים סבירים',
    'דירה שכורה, מצב תחזוקה בינוני'
  ];
  const neighborhoods = ['שכונה א\'','שכונה ב\'','שכונה ג\'','מרכז העיר','שכונת הפרחים','רמת חן'];

  STAFF.teachers.forEach(t => {
    homeVisits[t.class] = {};
    const students = studentData[t.class] || [];
    // Generate visits for some past months
    const filledMonths = MONTH_KEYS.slice(0, randomInt(2,4));
    filledMonths.forEach(mk => {
      const visits = [];
      const numVisits = randomInt(0,3);
      for(let i=0;i<numVisits;i++){
        const student = randomPick(students);
        if(!student) continue;
        const needsFollowup = Math.random() > 0.6;
        const presentArr = ['אמא'];
        if(Math.random()>.4) presentArr.push('אבא');
        if(Math.random()>.7) presentArr.push('אח/אחות');
        if(Math.random()>.85) presentArr.push('סב/סבתא');
        visits.push({
          id: Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2,6),
          studentId: student.id,
          studentName: student.name,
          date: `2026-0${mk.endsWith('01')?'1':mk.endsWith('02')?'2':mk.endsWith('03')?'3':'4'}-${String(randomInt(1,28)).padStart(2,'0')}`,
          address: randomPick(neighborhoods),
          present: presentArr,
          presentOther: '',
          conditions: randomPick(visitConditions),
          insights: randomPick(visitInsights),
          needsFollowup,
          followupDetails: needsFollowup ? randomPick(['שיחה עם יועצת','פגישה עם הורים בבית הספר','הפניה לרווחה','מעקב חודשי']) : '',
          notes: ''
        });
      }
      if(visits.length) homeVisits[t.class][mk] = visits;
    });
  });
  return homeVisits;
}

function generateDemoData(){
  const studentData = {};
  const classSizes = {'ט1':20,'ט2':18,'י1':22,'י2':20,'י3':19,'יא1':17,'יא2':16,'יא3':18,'יב1':15,'יב2':17,'יב3':16};
  CLASSES.forEach(c => { studentData[c] = generateStudents(c, classSizes[c]||18); });
  const hrReports = generateHomeroomReports();
  // Populate studentTracking with demo data
  CLASSES.forEach(function(c){
    const students = studentData[c] || [];
    Object.keys(hrReports[c] || {}).forEach(function(mk){
      const tracking = {};
      students.forEach(function(s){
        tracking[s.id] = {
          conversation: Math.random()>.5,
          positiveWord: Math.random()>.6,
          goals: randomPick(['שיפור נוכחות','העלאת ציונים','חיזוק מוטיבציה','חיבור למגמה','שיפור התנהגות','','']),
          achieved: randomPick(['yes','partial','no','',''])
        };
      });
      hrReports[c][mk].studentTracking = tracking;
    });
  });
  return {

    homeVisits: generateHomeVisits(studentData)
  };
}

// ==================== DATA LAYER ====================
const LS_KEY = 'ort_monthly_reports_v2';
const LS_SESSION = 'ort_reports_session';
let DATA = {};

function loadData(){
  const stored = localStorage.getItem(LS_KEY);
  if(stored){
    try{
      DATA = JSON.parse(stored);
      if(DATA.students && DATA.homeroomReports){
        // Ensure homeVisits exists (migration for old data)
        if(!DATA.homeVisits) DATA.homeVisits = generateHomeVisits(DATA.students);
        return;
      }
    } catch(e){}
  }
  DATA = generateDemoData();
  saveData();
}

function saveData(){
  localStorage.setItem(LS_KEY, JSON.stringify(DATA));
}

function getAllStudents(){
  const all = [];
  Object.values(DATA.students).forEach(arr => all.push(...arr));
  return all;
}

function getStudent(classId, studentId){
  if(!DATA.students[classId]) return null;
  return DATA.students[classId].find(s => s.id === studentId);
}

function getHomeroomReport(classId, month){
  if(!DATA.homeroomReports[classId]) return null;
  return DATA.homeroomReports[classId][month] || null;
}

function setHomeroomReport(classId, month, report){
  if(!DATA.homeroomReports[classId]) DATA.homeroomReports[classId] = {};
  DATA.homeroomReports[classId][month] = report;
  saveData();
}

function getHomeVisits(classId, month){
  if(!DATA.homeVisits) DATA.homeVisits = {};
  if(!DATA.homeVisits[classId]) DATA.homeVisits[classId] = {};
  return DATA.homeVisits[classId][month] || [];
}

function setHomeVisits(classId, month, visits){
  if(!DATA.homeVisits) DATA.homeVisits = {};
  if(!DATA.homeVisits[classId]) DATA.homeVisits[classId] = {};
  DATA.homeVisits[classId][month] = visits;
  saveData();
}

function addHomeVisit(classId, month, visit){
  const visits = getHomeVisits(classId, month);
  visits.push(visit);
  setHomeVisits(classId, month, visits);
}

function updateHomeVisit(classId, month, visitId, updatedVisit){
  const visits = getHomeVisits(classId, month);
  const idx = visits.findIndex(v => v.id === visitId);
  if(idx >= 0){ visits[idx] = updatedVisit; setHomeVisits(classId, month, visits); }
}

function deleteHomeVisit(classId, month, visitId){
  const visits = getHomeVisits(classId, month).filter(v => v.id !== visitId);
  setHomeVisits(classId, month, visits);
}

function getAllHomeVisitsForMonth(month){
  if(!DATA.homeVisits) return [];
  const all = [];
  Object.entries(DATA.homeVisits).forEach(([cls, months]) => {
    if(months[month]) months[month].forEach(v => all.push({...v, className:cls}));
  });
  return all;
}

let selectedRole = '';
function onLoginNameChange(){
  updateLoginBtn();
}
function updateLoginBtn(){
  const name = document.getElementById('loginNameSelect').value;
  document.getElementById('loginBtn').classList.toggle('ready', !!name && !!selectedRole);
}

function doLogin(){
  const name = document.getElementById('loginNameSelect').value;
  if(!name || !selectedRole) return;

  if(selectedRole==='teacher'){
    const t = STAFF.teachers.find(x=>x.name===name);
    currentUser = {role:'teacher', name:t.name, class:t.class};
  } else if(selectedRole==='counselor'){
    const c = STAFF.counselors.find(x=>x.name===name);
    currentUser = {role:'counselor', name:c.name, classes:c.classes};
  } else {
    currentUser = {role:'principal', name:STAFF.principal.name};
  }

  sessionStorage.setItem(LS_SESSION, JSON.stringify(currentUser));
  enterApp();
}

function logout(){
  sessionStorage.removeItem(LS_SESSION);
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appMain').style.display = 'none';
  // Reset login form
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('loginNameArea').classList.remove('visible');
  document.getElementById('loginNameSelect').value = '';
  document.getElementById('loginBtn').classList.remove('ready');
  selectedRole = '';
}

function tryRestoreSession(){
  const stored = sessionStorage.getItem(LS_SESSION);
  if(stored){
    try{
      currentUser = JSON.parse(stored);
      if(currentUser && currentUser.role && currentUser.name){
        enterApp();
        return true;
      }
    } catch(e){}
  }
  return false;
}

let currentView = '';

function switchView(view){
  currentView = view;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

  const viewMap = {
    'homeroomForm':'viewHomeroomForm',
    'homeVisits':'viewHomeVisits',

    'dashboard':'viewDashboard',
    'homeroomReports':'viewHomeroomReports',
    'counselorReports':'viewCounselorReports'
  };

  const el = document.getElementById(viewMap[view]);
  if(el) el.classList.add('active');

  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.view===view));

  if(view==='homeroomForm') renderHomeroomForm();

}

    if(currentView==='counselorForm') collectCounselorFormData();
    saveData();
    showToast('נשמר אוטומטית');

}

function attachAutoSaveToContainer(container){
  if(!container) return;
  container.querySelectorAll('input, select, textarea').forEach(el => {
    el.removeEventListener('change', autoSave);
    el.addEventListener('change', autoSave);
    // Update tracking count when student tracking checkboxes change
    if(el.dataset.stfield === 'conversation' || el.dataset.stfield === 'positiveWord'){
      el.addEventListener('change', updateTrackingCount);
    }
    if(el.tagName==='TEXTAREA' || (el.tagName==='INPUT' && (el.type==='text' || el.type==='number'))){
      el.removeEventListener('input', autoSave);
      el.addEventListener('input', autoSave);
    }
  });
}

function updateTrackingCount(){
  const rows = document.querySelectorAll('#studentTrackingBody tr');
  let convCount = 0, wordCount = 0;
  rows.forEach(function(row){
    if(row.querySelector('[data-stfield="conversation"]')?.checked) convCount++;
    if(row.querySelector('[data-stfield="positiveWord"]')?.checked) wordCount++;
  });
  const total = rows.length;
  const el = document.getElementById('stTrackingCount');
  if(el) el.textContent = convCount + '/' + total + ' שיחות | ' + wordCount + '/' + total + ' מילה טובה';
}

function toggleAttendanceSection(){
  const show = document.getElementById('hrAttendanceToggle').checked;
  document.getElementById('hrAttendanceDetails').style.display = show ? 'block' : 'none';
}

function onHrClassChange(){
  const container = document.getElementById('viewHomeroomForm');
  container.dataset.selectedClass = document.getElementById('hrClassSelect').value;
  renderHomeroomForm();
}

function collectHomeroomForm(){
  let cls;
  if(currentUser.role==='teacher'){
    cls = currentUser.class;
  } else {
    cls = document.getElementById('hrClassSelect')?.value || CLASSES[0];
  }
  const month = document.getElementById('monthSelect').value;
  const teacher = getTeacherForClass(cls);

  // Home visits are now stored separately — pull count from homeVisits data
  const hvList = getHomeVisits(cls, month);

  const report = {
    teacherName: teacher?.name || '',
    className: cls,
    month,
    classOverall: document.getElementById('hrClassOverall')?.value || '',
    currentDimension: document.getElementById('hrDimension')?.value || '',
    educationLessonsCount: parseInt(document.getElementById('hrEduCount')?.value) || 0,
    educationLessonsDesc: document.getElementById('hrEduDesc')?.value || '',
    hasAttendanceIssues: document.getElementById('hrAttendanceToggle')?.checked || false,
    attendanceStudents: document.getElementById('hrAttendanceStudents')?.value || '',
    attendanceAbsences: parseInt(document.getElementById('hrAbsences')?.value) || 0,
    homeVisits: hvList.length,
    homeVisitsDetails: hvList.map(function(v){ return {name:v.studentName, date:v.date, notes:v.insights}; }),
    studentTracking: (function(){
      const st = {};
      document.querySelectorAll('#studentTrackingBody tr').forEach(function(row){
        const inputs = row.querySelectorAll('[data-stid]');
        if(!inputs.length) return;
        const sid = inputs[0].dataset.stid;
        st[sid] = {
          conversation: row.querySelector('[data-stfield="conversation"]')?.checked || false,
          positiveWord: row.querySelector('[data-stfield="positiveWord"]')?.checked || false,
          goals: row.querySelector('[data-stfield="goals"]')?.value || '',
          achieved: row.querySelector('[data-stfield="achieved"]')?.value || ''
        };
      });
      return st;
    })(),
    trackDifficultyStudents: document.getElementById('hrTrackStudents')?.value || '',
    trackDifficultyDesc: document.getElementById('hrTrackDesc')?.value || '',
    employmentIssues: document.getElementById('hrEmployment')?.value || '',
    flagsForManagement: document.getElementById('hrFlags')?.value || '',
    successes: document.getElementById('hrSuccesses')?.value || '',
    goalNextMonth: document.getElementById('hrGoal')?.value || '',
    submitted: true,
    submittedDate: new Date().toISOString().slice(0,10),
    comments: (getHomeroomReport(cls, month)?.comments || [])
  };

  setHomeroomReport(cls, month, report);
}

function saveHomeroomReport(){
  collectHomeroomForm();
  showToast('דוח מחנך/ת נשמר בהצלחה');
}

function addHrComment(cls, month){
  const input = document.getElementById('hrNewComment');
  const text = (input?.value || '').trim();
  if(!text) return;

  const report = getHomeroomReport(cls, month);
  if(!report){
    showToast('אין דוח לחודש זה');
    return;
  }

  if(!report.comments) report.comments = [];
  report.comments.push({
    id: 'c_' + Date.now(),
    role: currentUser.role,
    name: currentUser.name,
    text: text,
    date: new Date().toLocaleDateString('he-IL'),
    read: false
  });

  setHomeroomReport(cls, month, report);
  input.value = '';
  showToast('ההערה נשמרה');
  renderHomeroomForm();
}

function closeHomeVisitForm(){
  document.getElementById('hvFormArea').innerHTML = '';
  hvEditingId = null;
}

function saveHomeVisitForm(){
  const cls = currentUser.class;
  const month = document.getElementById('monthSelect').value;
  const studentSelect = document.getElementById('hvStudent');
  const studentId = studentSelect.value;
  if(!studentId){ showToast('יש לבחור תלמיד/ה'); return; }
  const studentName = studentSelect.options[studentSelect.selectedIndex].dataset.name;

  const present = [];
  document.querySelectorAll('[name="hvPresent"]:checked').forEach(cb => present.push(cb.value));
  const presentOther = document.getElementById('hvPresentOtherText').value;

  const visit = {
    id: hvEditingId || (Date.now() + '_' + Math.random().toString(36).slice(2,6)),
    studentId,
    studentName,
    date: document.getElementById('hvDate').value,
    address: document.getElementById('hvAddress').value,
    present,
    presentOther,
    conditions: document.getElementById('hvConditions').value,
    insights: document.getElementById('hvInsights').value,
    needsFollowup: document.getElementById('hvFollowupToggle').checked,
    followupDetails: document.getElementById('hvFollowupText').value,
    notes: document.getElementById('hvNotes').value
  };

  if(hvEditingId){
    updateHomeVisit(cls, month, hvEditingId, visit);
    showToast('ביקור עודכן בהצלחה');
  } else {
    addHomeVisit(cls, month, visit);
    showToast('ביקור בית נשמר בהצלחה');
  }

  hvEditingId = null;
  renderHomeVisitsView();
}

function editHomeVisit(visitId){
  const cls = currentUser.class;
  const month = document.getElementById('monthSelect').value;
  const visits = getHomeVisits(cls, month);
  const visit = visits.find(v => v.id === visitId);
  if(visit) openHomeVisitForm(visit);
}

function confirmDeleteHomeVisit(visitId){
  if(!confirm('למחוק את הביקור?')) return;
  const cls = currentUser.class;
  const month = document.getElementById('monthSelect').value;
  deleteHomeVisit(cls, month, visitId);
  showToast('ביקור נמחק');
  renderHomeVisitsView();
}

function collectCounselorFormData(){
  const s = getStudent(currentCounselorClass, currentCounselorStudent);
  if(!s) return;

  const fieldMap = {
    track:'track',birthDate:'birthDate',idNumber:'idNumber',familyStatus:'familyStatus',
    address:'address',economicStatus:'economicStatus',prevSchool:'prevSchool',
    attendance:'attendance',parentContact:'parentContact',significantFigure:'significantFigure',
    authority:'authority',strengths:'strengths',diagnoses:'diagnoses',therapist:'therapist',
    openCases:'openCases'
  };
  Object.entries(fieldMap).forEach(([field, key]) => {
    const el = document.querySelector(`[data-cfield="${key}"]`);
    if(el) s[field] = el.value;
  });

  ['employed','placementCommittee','emotionalTherapy'].forEach(f => {
    const el = document.querySelector(`[data-cfield="${f}"]`);
    if(el) s[f] = el.checked;
  });

  // Monthly data
  document.querySelectorAll('#cMonthlyTableBody tr').forEach(row => {
    const mk = row.dataset.month;
    if(mk && s.monthlyData[mk]){
      const inputs = row.querySelectorAll('textarea');
      s.monthlyData[mk].done = inputs[0]?.value || '';
      s.monthlyData[mk].goals = inputs[1]?.value || '';
      s.monthlyData[mk].notes = inputs[2]?.value || '';
    }
  });

  // Meetings
  s.meetings = [];
  document.querySelectorAll('#cMeetingsTableBody tr').forEach(row => {
    const inputs = row.querySelectorAll('input');
    if(inputs.length >= 3){
      s.meetings.push({date:inputs[0].value, summary:inputs[1].value, nextSteps:inputs[2].value});
    }
  });

  // Life skills
  LIFE_SKILLS.forEach((sk, i) => {
    const row = document.querySelectorAll('#cLifeSkillsBody tr')[i];
    if(row){
      let status = 'green';
      row.querySelectorAll('.tl-dot').forEach(d => { if(d.classList.contains('active')) status = d.dataset.color; });
      const noteInput = row.querySelector('input[type="text"]');
      s.lifeSkills[sk] = {status, notes:noteInput?.value||''};
    }
  });

  // Overall status
  const checked = document.querySelector('[name="cOverallStatus"]:checked');
  if(checked) s.overallStatus = checked.value;

  s.lastUpdate = new Date().toISOString().slice(0,10);
}

function saveCounselorForm(){
  collectCounselorFormData();
  saveData();
  showToast('הדוח נשמר בהצלחה');

function renderPieChart(counts, total){
  if(!total) return '';
  const size = 120;
  const cx = size/2, cy = size/2, r = 48;
  const colors = {green:'#6A9F6A', yellow:'#C4944A', red:'#C0605A'};
  const data = [{key:'green',val:counts.green},{key:'yellow',val:counts.yellow},{key:'red',val:counts.red}].filter(d => d.val > 0);

  let startAngle = -90;
  const paths = data.map(d => {
    const pct = d.val/total;
    const angle = pct*360;
    const endAngle = startAngle+angle;
    const largeArc = angle>180?1:0;
    const x1 = cx+r*Math.cos(startAngle*Math.PI/180);
    const y1 = cy+r*Math.sin(startAngle*Math.PI/180);
    const x2 = cx+r*Math.cos(endAngle*Math.PI/180);
    const y2 = cy+r*Math.sin(endAngle*Math.PI/180);
    const path = `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`;
    startAngle = endAngle;
    return `<path d="${path}" fill="${colors[d.key]}" opacity=".85"/>`;
  });

  const labels = {green:'ירוק',yellow:'צהוב',red:'אדום'};
  const legendItems = data.map(d => `<div class="pie-legend-item"><span class="dot" style="background:${colors[d.key]}"></span>${labels[d.key]}: ${d.val} (${Math.round(d.val/total*100)}%)</div>`).join('');

  return `<div class="pie-container"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths.join('')}</svg><div class="pie-legend">${legendItems}</div></div>`;
}

function openStudentFromClassView(classId, studentId){

  // Counselor or principal — open counselor form
  currentCounselorClass = classId;
  currentCounselorStudent = studentId;
  switchView(currentUser.role==='counselor'?'counselorForm':'counselorReports');
}

      <td>${submitted?(hr.classOverall||'').substring(0,50)+(hr.classOverall?.length>50?'...':''):'---'}</td>
      <td>${submitted && hr.flagsForManagement?'<span style="color:var(--danger);font-weight:600">'+hr.flagsForManagement.substring(0,40)+'</span>':'---'}</td>
      <td><svg width="14" height="14" fill="none" stroke="var(--muted)" stroke-width="2" style="transform:scaleX(-1)"><path d="M5 1l6 6-6 6"/></svg></td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>דוחות מחנכים — ${MONTHS_HE[month]}</h3></div>
      <div class="card-body">
        <div class="table-scroll">
          <table class="hr-status-table">
            <thead><tr><th>כיתה</th><th>מחנך/ת</th><th>סטטוס</th><th>מצב כיתה</th><th>דגלים</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function openHomeroomReportForClass(cls){
  const container = document.getElementById('viewHomeroomForm');
  container.dataset.selectedClass = cls;
  switchView('homeroomForm');
}

// ==================== COUNSELOR REPORTS VIEW (Principal) ====================
function renderCounselorReportsView(){
  const container = document.getElementById('viewCounselorReports');

  let classOptions = CLASSES;
  const selectedClass = container.dataset.selectedClass || classOptions[0];

  const students = DATA.students[selectedClass] || [];
  const counselor = getCounselorForClass(selectedClass);

  const sortedStudents = [...students].sort((a,b) => {
    const order = {red:0,yellow:1,green:2};
    return order[a.overallStatus] - order[b.overallStatus];
  });

  const rows = sortedStudents.map(s => {
    return `<tr onclick="openStudentCounselorReport('${s.className}','${s.id}')" style="cursor:pointer">
      <td><span class="status-dot ${s.overallStatus}" style="display:inline-block;vertical-align:middle;margin-left:8px"></span>${s.name}</td>
      <td>${s.track}</td>
      <td>${s.attendance}</td>
      <td>${s.lastUpdate||'---'}</td>
      <td><svg width="14" height="14" fill="none" stroke="var(--muted)" stroke-width="2" style="transform:scaleX(-1)"><path d="M5 1l6 6-6 6"/></svg></td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="selector-bar">
      <label>כיתה:</label>
      <select id="cReportsClassSelect" onchange="onCReportsClassChange()">
        ${classOptions.map(c => `<option value="${c}" ${c===selectedClass?'selected':''}>${c} — ${getCounselorForClass(c)?.name||''}</option>`).join('')}
      </select>
      ${counselor?`<span style="font-size:.85rem;color:var(--muted)">יועצת: ${counselor.name}</span>`:''}
    </div>
    <div class="card">
      <div class="card-header"><h3>דוחות יועצת — כיתה ${selectedClass}</h3></div>
      <div class="card-body">
        <div class="table-scroll">
          <table class="data-table">
            <thead><tr><th>שם תלמיד/ה</th><th>מגמה</th><th>נוכחות</th><th>עדכון אחרון</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function onCReportsClassChange(){
  const container = document.getElementById('viewCounselorReports');
  container.dataset.selectedClass = document.getElementById('cReportsClassSelect').value;
  renderCounselorReportsView();
}

function openStudentCounselorReport(classId, studentId){
  currentCounselorClass = classId;
  currentCounselorStudent = studentId;
  switchView('counselorReports');
  // Re-render as form
  setTimeout(()=>{
    const container = document.getElementById('viewCounselorReports');
    container.dataset.selectedClass = classId;
    // Show the counselor form in a special way for principal
    renderPrincipalStudentView(classId, studentId);
  }, 50);
}

function renderPrincipalStudentView(classId, studentId){
  const s = getStudent(classId, studentId);
  if(!s) return;
  const container = document.getElementById('viewCounselorReports');
  const currentMonth = document.getElementById('monthSelect').value;
  const counselor = getCounselorForClass(classId);

  container.innerHTML = `
    <div style="margin-bottom:16px">
      <button class="btn btn-outline" onclick="renderCounselorReportsView()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 1l6 6-6 6"/></svg>
        חזרה לרשימה
      </button>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <h3>${s.name} — ${s.className} — ${s.track}</h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="status-dot ${s.overallStatus}"></span>
          <span style="font-size:.85rem;font-weight:600">${s.overallStatus==='green'?'תקין':s.overallStatus==='yellow'?'דרוש מעקב':'דרוש התערבות'}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="form-row" style="margin-bottom:16px">
          <div><strong style="font-size:.82rem;color:var(--muted)">מצב משפחתי:</strong> ${s.familyStatus}</div>
          <div><strong style="font-size:.82rem;color:var(--muted)">כתובת:</strong> ${s.address}</div>
          <div><strong style="font-size:.82rem;color:var(--muted)">מצב כלכלי:</strong> ${s.economicStatus}</div>
        </div>
        <div class="form-row" style="margin-bottom:16px">
          <div><strong style="font-size:.82rem;color:var(--muted)">נוכחות:</strong> ${s.attendance}</div>
          <div><strong style="font-size:.82rem;color:var(--muted)">קשר עם הורים:</strong> ${s.parentContact}</div>
          <div><strong style="font-size:.82rem;color:var(--muted)">חוזקות:</strong> ${s.strengths||'---'}</div>
        </div>
        ${s.diagnoses?`<div style="margin-bottom:12px"><strong style="font-size:.82rem;color:var(--muted)">אבחונים:</strong> ${s.diagnoses}</div>`:''}
        ${s.therapist?`<div style="margin-bottom:12px"><strong style="font-size:.82rem;color:var(--muted)">גורם מטפל:</strong> ${s.therapist}</div>`:''}
        ${counselor?`<div style="margin-bottom:12px"><strong style="font-size:.82rem;color:var(--muted)">יועצת:</strong> ${counselor.name}</div>`:''}
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h3>מעקב חודשי</h3></div>
      <div class="card-body">
        <div class="table-scroll">
          <table class="data-table">
            <thead><tr><th>חודש</th><th>מה נעשה</th><th>יעדים</th><th>הערות</th></tr></thead>
            <tbody>
              ${MONTH_KEYS.map(mk => {
                const d = s.monthlyData[mk]||{done:'',goals:'',notes:''};
                const isCurrent = mk===currentMonth;
                return `<tr class="${isCurrent?'current-month':''}">
                  <td style="font-weight:${isCurrent?700:400};white-space:nowrap">${MONTHS_HE[mk]}</td>
                  <td>${d.done||'---'}</td>
                  <td>${d.goals||'---'}</td>
                  <td>${d.notes||'---'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h3>יומן פגישות</h3></div>
      <div class="card-body">
        ${s.meetings && s.meetings.length ? `
        <div class="table-scroll">
          <table class="data-table">
            <thead><tr><th>תאריך</th><th>סיכום</th><th>צעדים הבאים</th></tr></thead>
            <tbody>${s.meetings.map(m=>`<tr><td>${m.date||'---'}</td><td>${m.summary||'---'}</td><td>${m.nextSteps||'---'}</td></tr>`).join('')}</tbody>
          </table>
        </div>` : '<p style="color:var(--muted);text-align:center;padding:12px">אין פגישות</p>'}
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h3>כישורי חיים</h3></div>
      <div class="card-body">
        <div class="table-scroll">
          <table class="data-table">
            <thead><tr><th>כישור</th><th style="width:110px">סטטוס</th><th>הערות</th></tr></thead>
            <tbody>
              ${LIFE_SKILLS.map(sk => {
                const d = s.lifeSkills[sk]||{status:'green',notes:''};
                const color = d.status==='green'?'var(--success)':d.status==='yellow'?'var(--warn)':'var(--danger)';
                const label = d.status==='green'?'תקין':d.status==='yellow'?'מעקב':'התערבות';
                return `<tr>
                  <td style="font-weight:600">${sk}</td>
                  <td><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:50%;background:${color};display:inline-block"></span>${label}</span></td>
                  <td>${d.notes||'---'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>

    </div>

}

// ==================== MONTH CHANGE ====================
function onMonthChange(){
  // Re-render current view
  if(currentView==='homeroomForm') renderHomeroomForm();
  if(currentView==='homeVisits') renderHomeVisitsView();
  if(currentView==='counselorForm' && currentCounselorStudent) fillCounselorForm();
  if(currentView==='class') renderClassView();
  if(currentView==='dashboard') renderDashboard();
  if(currentView==='homeroomReports') renderHomeroomReportsView();
  if(currentView==='counselorReports') renderCounselorReportsView();
}

// ==================== INIT ====================
// ==================== DIRECT REPORT VIEW (no login) ====================
function checkDirectReportLink(){
  const params = new URLSearchParams(window.location.search);
  const reportClass = params.get('report');
  const reportMonth = params.get('month');
  if(!reportClass || !reportMonth) return false;

  // Show the report in read-only mode without login
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appMain').style.display = 'block';

  // Set month selector
  const monthSel = document.getElementById('monthSelect');
  monthSel.value = reportMonth;

  // Build a minimal header
  const teacher = getTeacherForClass(reportClass);
  document.getElementById('headerTitle').textContent = 'דוח חודשי — ' + (teacher?.name||'') + ' — כיתה ' + reportClass + ' — ' + (MONTHS_HE[reportMonth]||reportMonth);

  // Hide nav and switch-user
  document.getElementById('mainNav').style.display = 'none';
  document.querySelector('.switch-user').style.display = 'none';

  // Set a readonly "viewer" user
  currentUser = {role:'viewer', name:'צפייה', class:reportClass};

  // Render the report as readonly
  renderDirectReportView(reportClass, reportMonth);
  return true;
}

function renderDirectReportView(cls, month){
  const container = document.getElementById('viewHomeroomForm');
  container.classList.add('active');
  const report = getHomeroomReport(cls, month);
  if(!report){
    container.innerHTML = '<div class="card"><div class="card-body" style="text-align:center;padding:60px"><h3 style="margin-bottom:8px">אין דוח לחודש זה</h3><p style="color:var(--muted)">הדוח טרם הוגש</p></div></div>';
    return;
  }

  const teacher = getTeacherForClass(cls);
  const students = DATA.students[cls] || [];
  const hvList = getHomeVisits(cls, month);
  const comments = report.comments || [];
  const showEmployment = isUpperClass(cls);

  // Build student tracking summary
  const tracking = report.studentTracking || {};
  let convCount = 0, wordCount = 0, totalStudents = students.length;
  students.forEach(function(s){
    if(tracking[s.id]?.conversation) convCount++;
    if(tracking[s.id]?.positiveWord) wordCount++;
  });

  let trackingRows = students.map(function(s, i){
    const st = tracking[s.id] || {};
    return '<tr>' +
      '<td style="color:var(--muted);font-size:.78rem">' + (i+1) + '</td>' +
      '<td class="st-name">' + s.name + '</td>' +
      '<td class="st-check-cell">' + (st.conversation ? '<svg width="18" height="18" fill="none" stroke="var(--success)" stroke-width="2.5"><path d="M4 9l4 4 8-8"/></svg>' : '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td class="st-check-cell">' + (st.positiveWord ? '<svg width="18" height="18" fill="none" stroke="var(--success)" stroke-width="2.5"><path d="M4 9l4 4 8-8"/></svg>' : '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td>' + (st.goals || '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td class="st-achieved-cell">' + (st.achieved==='yes'?'<span style="color:var(--success);font-weight:600">הושגו</span>':st.achieved==='partial'?'<span style="color:var(--warn);font-weight:600">חלקית</span>':st.achieved==='no'?'<span style="color:var(--danger);font-weight:600">לא</span>':'<span style="color:var(--muted)">—</span>') + '</td>' +
    '</tr>';
  }).join('');

  let commentsHTML = comments.length ? comments.map(function(c){
    const isPrincipal = c.role==='principal';
    return '<div class="comment-bubble ' + (isPrincipal?'comment-principal':'comment-teacher') + '" style="' + (isPrincipal?'border-right:3px solid var(--primary)':'') + '">' +
      '<div class="comment-meta"><strong>' + c.name + '</strong><span>' + c.date + '</span></div>' +
      '<div>' + c.text + '</div></div>';
  }).join('') : '';

  container.innerHTML = `
    <div class="section-colored section-gold" style="margin-bottom:20px">
      <h4><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-dark)" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg> דוח חודשי — ${teacher?.name||''} — כיתה ${cls}</h4>
      <div class="form-row-3">
        <div><strong style="font-size:.82rem;color:var(--muted)">חודש:</strong> ${MONTHS_HE[month]||month}</div>
        <div><strong style="font-size:.82rem;color:var(--muted)">הוגש:</strong> ${report.submittedDate||'---'}</div>
        <div><strong style="font-size:.82rem;color:var(--muted)">ממד:</strong> ${report.currentDimension||'---'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px"><div class="card-header"><h3>מצב כיתה כללי</h3></div>
      <div class="card-body"><p style="font-size:.9rem;line-height:1.7">${report.classOverall||'לא מולא'}</p></div></div>

    <div class="card" style="margin-bottom:20px"><div class="card-header"><h3>מעקב תלמידים</h3><span class="st-count">${convCount}/${totalStudents} שיחות | ${wordCount}/${totalStudents} מילה טובה</span></div>
      <div class="card-body" style="padding:12px"><div class="table-scroll">
        <table class="st-table"><thead><tr><th>#</th><th>שם</th><th class="st-check-cell">שיחה</th><th class="st-check-cell">מילה טובה</th><th>מטרות</th><th class="st-achieved-cell">הושגו?</th></tr></thead>
        <tbody>${trackingRows}</tbody></table></div></div></div>

    <div class="card" style="margin-bottom:20px"><div class="card-header"><h3>שיעורי חינוך</h3></div>
      <div class="card-body"><p><strong>${report.educationLessonsCount}</strong> שיעורים התקיימו</p><p style="margin-top:6px;color:var(--muted)">${report.educationLessonsDesc||''}</p></div></div>

    ${report.hasAttendanceIssues?`<div class="card" style="margin-bottom:20px;border-color:rgba(196,148,74,.3)"><div class="card-header" style="background:var(--warn-bg)"><h3 style="color:var(--warn)">בעיות נוכחות</h3></div>
      <div class="card-body"><p>${report.attendanceStudents||''}</p><p style="margin-top:6px;color:var(--muted)">היעדרויות בולטות: ${report.attendanceAbsences}</p></div></div>`:''}

    ${hvList.length?`<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>ביקורי בית (${hvList.length})</h3></div>
      <div class="card-body">${hvList.map(function(v){ return '<div style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>'+v.studentName+'</strong> <span style="color:var(--muted);font-size:.8rem">'+v.date+'</span>'+(v.needsFollowup?' <span class="hv-badge-followup" style="font-size:.7rem">המשך טיפול</span>':'')+'<p style="font-size:.85rem;margin-top:4px">'+v.insights+'</p></div>'; }).join('')}</div></div>`:''}

    ${report.trackDifficultyStudents?`<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>חיבור למגמה</h3></div>
      <div class="card-body"><p><strong>תלמידים:</strong> ${report.trackDifficultyStudents}</p><p style="margin-top:6px">${report.trackDifficultyDesc||''}</p></div></div>`:''}

    ${showEmployment && report.employmentIssues?`<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>תעסוקה</h3></div>
      <div class="card-body"><p>${report.employmentIssues}</p></div></div>`:''}

    ${report.flagsForManagement?`<div class="card" style="margin-bottom:20px;border-color:rgba(192,96,90,.3)"><div class="card-header" style="background:var(--danger-bg)"><h3 style="color:var(--danger)">דגלים להנהלה</h3></div>
      <div class="card-body"><p>${report.flagsForManagement}</p></div></div>`:''}

    <div class="card" style="margin-bottom:20px"><div class="card-header"><h3>הצלחות</h3></div>
      <div class="card-body"><p>${report.successes||'---'}</p></div></div>

    <div class="card" style="margin-bottom:20px"><div class="card-header"><h3>מטרה לחודש הבא</h3></div>
      <div class="card-body"><p>${report.goalNextMonth||'---'}</p></div></div>

    ${commentsHTML?`<div class="card" style="border-color:var(--primary);border-width:2px"><div class="card-header" style="background:rgba(122,173,173,.08)"><h3 style="display:flex;align-items:center;gap:8px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-dark)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> הערות מהמנהלת</h3></div>
      <div class="card-body"><div class="comments-list">${commentsHTML}</div></div></div>`:''}
  `;
}

// ==================== SEND REPORT TO TEACHER ====================
function sendReportToTeacher(cls, month){
  const teacher = getTeacherForClass(cls);
  const baseUrl = window.location.href.split('?')[0];
  const reportUrl = baseUrl + '?report=' + encodeURIComponent(cls) + '&month=' + encodeURIComponent(month);
  const teacherName = teacher?.name || '';
  const monthName = MONTHS_HE[month] || month;

  const message = 'שלום ' + teacherName + ',\\nקראתי את הדוח החודשי שלך (' + monthName + ') והוספתי הערות.\\nלחצ/י על הקישור לצפייה:\\n' + reportUrl;

  // Try to copy to clipboard
  if(navigator.clipboard){
    navigator.clipboard.writeText(message.replace(/\\n/g, '\n')).then(function(){
      showToast('הקישור וההודעה הועתקו — שלח/י בוואטסאפ');
    });
  }

  // Also open WhatsApp if possible
  const waUrl = 'https://wa.me/?text=' + encodeURIComponent(message.replace(/\\n/g, '\n'));
  window.open(waUrl, '_blank');
}

function init(){
  loadData();
  // Check for direct report link first
  if(checkDirectReportLink()) return;
  if(!tryRestoreSession()){
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appMain').style.display = 'none';
  }
}

init();
</script>
