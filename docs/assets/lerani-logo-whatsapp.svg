<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="leftCircle" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8c8f0"/>
      <stop offset="50%" stop-color="#7babd4"/>
      <stop offset="100%" stop-color="#5a93c0"/>
    </radialGradient>
    <radialGradient id="rightCircle" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="50%" stop-color="#7dd4ac"/>
      <stop offset="100%" stop-color="#5abf92"/>
    </radialGradient>
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2c3e5060"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clipRight"><circle cx="290" cy="200" r="100"/></clipPath>
  </defs>

  <!-- White background -->
  <rect width="500" height="500" fill="white"/>

  <!-- Left circle -->
  <circle cx="210" cy="200" r="100" fill="url(#leftCircle)" opacity="0.75" filter="url(#softShadow)"/>
  <!-- Right circle -->
  <circle cx="290" cy="200" r="100" fill="url(#rightCircle)" opacity="0.75" filter="url(#softShadow)"/>
  <!-- Overlap -->
  <circle cx="210" cy="200" r="100" fill="url(#overlapGrad)" clip-path="url(#clipRight)" opacity="0.5"/>
  <!-- Ring accents -->
  <circle cx="210" cy="200" r="100" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="290" cy="200" r="100" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>

  <!-- Sparkles -->
  <g opacity="0.45">
    <path d="M250 75 L252.5 83 L260 86 L252.5 89 L250 97 L247.5 89 L240 86 L247.5 83 Z" fill="#7babd4"/>
    <path d="M140 155 L142 159 L146 161 L142 163 L140 167 L138 163 L134 161 L138 159 Z" fill="#a8c8f0"/>
    <path d="M360 145 L362 149 L366 151 L362 153 L360 157 L358 153 L354 151 L358 149 Z" fill="#a8e6cf"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="155" cy="140" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="345" cy="140" r="3" fill="#fff" opacity="0.5"/>

  <!-- Main text -->
  <text x="250" y="215" text-anchor="middle" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#1e3a5f" letter-spacing="1" filter="url(#textGlow)">Lerani</text>

  <!-- Hebrew subtitle -->
  <text x="250" y="350" text-anchor="middle" font-family="'Heebo', 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#4a6a8a" letter-spacing="1" opacity="0.85" direction="rtl">חינוך · בינה מלאכותית · הגשמת חלומות</text>

  <!-- Decorative line -->
  <line x1="145" y1="365" x2="355" y2="365" stroke="url(#overlapGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>