<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" width="360" height="200">
  <defs>
    <!-- Gradient for left circle -->
    <radialGradient id="leftCircle" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8c8f0"/>
      <stop offset="50%" stop-color="#7babd4"/>
      <stop offset="100%" stop-color="#5a93c0"/>
    </radialGradient>

    <!-- Gradient for right circle -->
    <radialGradient id="rightCircle" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="50%" stop-color="#7dd4ac"/>
      <stop offset="100%" stop-color="#5abf92"/>
    </radialGradient>

    <!-- Overlap blend gradient -->
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Subtle shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e3a5f40"/>
    </filter>

    <!-- Glow for text -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for overlap effect -->
    <clipPath id="clipRight">
      <circle cx="218" cy="78" r="72"/>
    </clipPath>
  </defs>

  <!-- Left circle -->
  <circle cx="142" cy="78" r="72" fill="url(#leftCircle)" opacity="0.8" filter="url(#softShadow)"/>

  <!-- Right circle -->
  <circle cx="218" cy="78" r="72" fill="url(#rightCircle)" opacity="0.8" filter="url(#softShadow)"/>

  <!-- Overlap area -->
  <circle cx="142" cy="78" r="72" fill="url(#overlapGrad)" clip-path="url(#clipRight)" opacity="0.5"/>

  <!-- Decorative ring accents -->
  <circle cx="142" cy="78" r="72" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>
  <circle cx="218" cy="78" r="72" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>

  <!-- Small decorative dots -->
  <circle cx="100" cy="28" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="260" cy="28" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="180" cy="14" r="2" fill="#ffffff" opacity="0.4"/>

  <!-- Sparkle accents -->
  <g opacity="0.5">
    <path d="M180 6 L181.5 11 L186.5 12.5 L181.5 14 L180 19 L178.5 14 L173.5 12.5 L178.5 11 Z" fill="#7babd4"/>
    <path d="M82 62 L83.5 65 L86.5 66.5 L83.5 68 L82 71 L80.5 68 L77.5 66.5 L80.5 65 Z" fill="#a8c8f0"/>
    <path d="M278 55 L279.5 58 L282.5 59.5 L279.5 61 L278 64 L276.5 61 L273.5 59.5 L276.5 58 Z" fill="#a8e6cf"/>
  </g>

  <!-- Main text: Learni -->
  <text x="180" y="90" text-anchor="middle" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#1e3a5f" letter-spacing="2" filter="url(#textGlow)">Learni</text>

  <!-- Subtitle - Hebrew -->
  <text x="180" y="172" text-anchor="middle" font-family="'Heebo', 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#4a6a8a" letter-spacing="1.5" opacity="0.9" direction="rtl">חינוך · בינה מלאכותית · הגשמת חלומות</text>

  <!-- Decorative line under subtitle -->
  <line x1="100" y1="184" x2="260" y2="184" stroke="url(#overlapGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>