<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Lerani Logo Download - 500x500</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Heebo:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Heebo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafb; gap: 2rem; padding: 2rem; }
canvas { border-radius: 20px; box-shadow: 0 4px 24px rgba(30,58,95,0.1); }
button { padding: 1rem 3rem; background: linear-gradient(135deg, #7babd4, #5abf92); color: white; border: none; border-radius: 16px; font-family: 'Heebo', sans-serif; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 16px rgba(90,191,146,0.3); transition: transform 0.2s; }
button:hover { transform: scale(1.05); }
.info { color: #4a6a8a; font-size: 0.9rem; }
</style>
</head>
<body>
<h2 style="color:#1e3a5f;">תמונת פרופיל Lerani – 500x500</h2>
<canvas id="logo" width="500" height="500"></canvas>
<button onclick="download()">⬇️ הורידו PNG (500x500)</button>
<p class="info">גודל: 500 × 500 פיקסלים – מתאים לטיקטוק, אינסטגרם, וואטסאפ</p>

<script>
const canvas = document.getElementById('logo');
const ctx = canvas.getContext('2d');

function drawLogo() {
    // Background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 500, 500);

    // Left circle (blue)
    const grdBlue = ctx.createRadialGradient(210, 200, 10, 210, 200, 100);
    grdBlue.addColorStop(0, '#a8c8f0');
    grdBlue.addColorStop(0.5, '#7babd4');
    grdBlue.addColorStop(1, '#5a93c0');
    ctx.globalAlpha = 0.75;
    ctx.beginPath();
    ctx.arc(210, 200, 100, 0, Math.PI * 2);
    ctx.fillStyle = grdBlue;
    ctx.fill();

    // Right circle (green)
    const grdGreen = ctx.createRadialGradient(290, 200, 10, 290, 200, 100);
    grdGreen.addColorStop(0, '#a8e6cf');
    grdGreen.addColorStop(0.5, '#7dd4ac');
    grdGreen.addColorStop(1, '#5abf92');
    ctx.beginPath();
    ctx.arc(290, 200, 100, 0, Math.PI * 2);
    ctx.fillStyle = grdGreen;
    ctx.fill();

    // Overlap area
    ctx.globalAlpha = 0.35;
    ctx.save();
    ctx.beginPath();
    ctx.arc(290, 200, 100, 0, Math.PI * 2);
    ctx.clip();
    const grdOverlap = ctx.createLinearGradient(160, 150, 340, 250);
    grdOverlap.addColorStop(0, '#7babd4');
    grdOverlap.addColorStop(1, '#7dd4ac');
    ctx.beginPath();
    ctx.arc(210, 200, 100, 0, Math.PI * 2);
    ctx.fillStyle = grdOverlap;
    ctx.fill();
    ctx.restore();

    // Circle borders
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(210, 200, 100, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(290, 200, 100, 0, Math.PI * 2);
    ctx.stroke();

    // Sparkles
    ctx.globalAlpha = 0.45;
    drawSparkle(250, 85, 8, '#7babd4');
    drawSparkle(140, 155, 5, '#a8c8f0');
    drawSparkle(360, 145, 5, '#a8e6cf');

    // Text "Lerani"
    ctx.globalAlpha = 1;
    ctx.font = '700 48px Poppins, sans-serif';
    ctx.fillStyle = '#1e3a5f';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Text glow
    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 6;
    ctx.fillText('Lerani', 250, 215);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '400 18px Heebo, sans-serif';
    ctx.fillStyle = '#4a6a8a';
    ctx.globalAlpha = 0.85;
    ctx.fillText('חינוך · בינה מלאכותית · הגשמת חלומות', 250, 350);

    // Decorative line
    ctx.globalAlpha = 0.6;
    const grdLine = ctx.createLinearGradient(145, 0, 355, 0);
    grdLine.addColorStop(0, '#7babd4');
    grdLine.addColorStop(1, '#7dd4ac');
    ctx.strokeStyle = grdLine;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(145, 370);
    ctx.lineTo(355, 370);
    ctx.stroke();
}

function drawSparkle(x, y, size, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size * 0.3, y - size * 0.3);
    ctx.lineTo(x + size, y);
    ctx.lineTo(x + size * 0.3, y + size * 0.3);
    ctx.lineTo(x, y + size);
    ctx.lineTo(x - size * 0.3, y + size * 0.3);
    ctx.lineTo(x - size, y);
    ctx.lineTo(x - size * 0.3, y - size * 0.3);
    ctx.closePath();
    ctx.fill();
}

function download() {
    const a = document.createElement('a');
    a.download = 'lerani-profile-500x500.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
}

// Wait for fonts to load
document.fonts.ready.then(() => {
    drawLogo();
});
</script>
</body>
</html>
