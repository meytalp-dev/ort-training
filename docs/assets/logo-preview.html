<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lerani Logo Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8fafb;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 1.5rem;
            color: #4a6a8a;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            max-width: 1200px;
            padding: 2rem;
            width: 100%;
        }

        .preview-card {
            background: white;
            border-radius: 20px;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 4px 24px rgba(30, 58, 95, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(30, 58, 95, 0.12);
        }

        .logo-container {
            width: 400px;
            max-width: 100%;
        }

        .logo-container svg {
            width: 100%;
            height: auto;
        }

        .footer {
            margin-top: 3rem;
            padding: 2rem;
            text-align: center;
            color: #7a9ab8;
            font-size: 0.85rem;
        }

        .color-palette {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .color-swatch {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }

        .color-swatch::after {
            content: attr(data-color);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: #7a9ab8;
            white-space: nowrap;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>תצוגה מקדימה – לוגו Lerani</h1>

    <div class="preview-card">
        <div class="logo-container">
                <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="lg1" cx="40%" cy="40%" r="60%">
                            <stop offset="0%" stop-color="#a8c8f0"/>
                            <stop offset="50%" stop-color="#7babd4"/>
                            <stop offset="100%" stop-color="#5a93c0"/>
                        </radialGradient>
                        <radialGradient id="rg1" cx="60%" cy="40%" r="60%">
                            <stop offset="0%" stop-color="#a8e6cf"/>
                            <stop offset="50%" stop-color="#7dd4ac"/>
                            <stop offset="100%" stop-color="#5abf92"/>
                        </radialGradient>
                        <linearGradient id="og1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
                            <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
                        </linearGradient>
                        <filter id="ss1" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2c3e5080"/>
                        </filter>
                        <filter id="tg1">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
                            <feFlood flood-color="#ffffff" flood-opacity="0.4" result="color"/>
                            <feComposite in="color" in2="blur" operator="in" result="glow"/>
                            <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                        <clipPath id="cr1"><circle cx="240" cy="115" r="85"/></clipPath>
                    </defs>
                    <circle cx="160" cy="115" r="85" fill="url(#lg1)" opacity="0.75" filter="url(#ss1)"/>
                    <circle cx="240" cy="115" r="85" fill="url(#rg1)" opacity="0.75" filter="url(#ss1)"/>
                    <circle cx="160" cy="115" r="85" fill="url(#og1)" clip-path="url(#cr1)" opacity="0.5"/>
                    <circle cx="160" cy="115" r="85" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
                    <circle cx="240" cy="115" r="85" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
                    <circle cx="110" cy="75" r="3" fill="#fff" opacity="0.5"/>
                    <circle cx="290" cy="75" r="3" fill="#fff" opacity="0.5"/>
                    <circle cx="200" cy="50" r="2" fill="#fff" opacity="0.4"/>
                    <text x="200" y="125" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="42" font-weight="700" fill="#1e3a5f" letter-spacing="1" filter="url(#tg1)">Lerani</text>
                    <text x="200" y="228" text-anchor="middle" font-family="'Heebo', sans-serif" font-size="14" font-weight="400" fill="#4a6a8a" letter-spacing="1" opacity="0.85" direction="rtl">חינוך · בינה מלאכותית · הגשמת חלומות</text>
                    <line x1="120" y1="240" x2="280" y2="240" stroke="url(#og1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                    <g opacity="0.45">
                        <path d="M200 38 L202 44 L208 46 L202 48 L200 54 L198 48 L192 46 L198 44 Z" fill="#7babd4"/>
                        <path d="M98 100 L99.5 103 L102.5 104.5 L99.5 106 L98 109 L96.5 106 L93.5 104.5 L96.5 103 Z" fill="#a8c8f0"/>
                        <path d="M302 90 L303.5 93 L306.5 94.5 L303.5 96 L302 99 L300.5 96 L297.5 94.5 L300.5 93 Z" fill="#a8e6cf"/>
                    </g>
                </svg>
        </div>
    </div>

    <div class="preview-card" style="margin-top: 2rem;">
        <span style="font-size: 0.85rem; color: #7a9ab8; letter-spacing: 1px;">WhatsApp — 500x500</span>
        <div style="width: 200px; height: 200px; border-radius: 50%; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
            <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
                <defs>
                    <radialGradient id="lg2" cx="40%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#a8c8f0"/>
                        <stop offset="50%" stop-color="#7babd4"/>
                        <stop offset="100%" stop-color="#5a93c0"/>
                    </radialGradient>
                    <radialGradient id="rg2" cx="60%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#a8e6cf"/>
                        <stop offset="50%" stop-color="#7dd4ac"/>
                        <stop offset="100%" stop-color="#5abf92"/>
                    </radialGradient>
                    <linearGradient id="og2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
                        <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
                    </linearGradient>
                    <filter id="ss2" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2c3e5060"/>
                    </filter>
                    <filter id="tg2">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
                        <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
                        <feComposite in="color" in2="blur" operator="in" result="glow"/>
                        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <clipPath id="cr2"><circle cx="290" cy="200" r="100"/></clipPath>
                </defs>
                <rect width="500" height="500" fill="white"/>
                <circle cx="210" cy="200" r="100" fill="url(#lg2)" opacity="0.75" filter="url(#ss2)"/>
                <circle cx="290" cy="200" r="100" fill="url(#rg2)" opacity="0.75" filter="url(#ss2)"/>
                <circle cx="210" cy="200" r="100" fill="url(#og2)" clip-path="url(#cr2)" opacity="0.5"/>
                <circle cx="210" cy="200" r="100" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
                <circle cx="290" cy="200" r="100" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
                <g opacity="0.45">
                    <path d="M250 75 L252.5 83 L260 86 L252.5 89 L250 97 L247.5 89 L240 86 L247.5 83 Z" fill="#7babd4"/>
                    <path d="M140 155 L142 159 L146 161 L142 163 L140 167 L138 163 L134 161 L138 159 Z" fill="#a8c8f0"/>
                    <path d="M360 145 L362 149 L366 151 L362 153 L360 157 L358 153 L354 151 L358 149 Z" fill="#a8e6cf"/>
                </g>
                <text x="250" y="215" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="48" font-weight="700" fill="#1e3a5f" letter-spacing="1" filter="url(#tg2)">Lerani</text>
                <text x="250" y="350" text-anchor="middle" font-family="'Heebo', sans-serif" font-size="18" font-weight="400" fill="#4a6a8a" letter-spacing="1" opacity="0.85" direction="rtl">חינוך · בינה מלאכותית · הגשמת חלומות</text>
                <line x1="145" y1="365" x2="355" y2="365" stroke="url(#og2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
            </svg>
        </div>
        <span style="font-size: 0.75rem; color: #aaa;">ככה זה נראה בוואטסאפ (חיתוך עיגולי)</span>
        <button onclick="downloadAsPNG()" style="
            margin-top: 0.5rem;
            padding: 0.7rem 2rem;
            background: linear-gradient(135deg, #7babd4, #5abf92);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(90, 191, 146, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            Download PNG for WhatsApp
        </button>
    </div>

    <div class="footer">
        Lerani — חינוך · בינה מלאכותית · הגשמת חלומות<br>
        <small>SVG file: <code>docs/assets/lerani-logo.svg</code></small>
    </div>

<script>
function downloadAsPNG() {
    const svgEl = document.querySelectorAll('svg')[1];
    const svgData = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = function () {
        const canvas = document.createElement('canvas');
        canvas.width = 500;
        canvas.height = 500;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, 500, 500);
        ctx.drawImage(img, 0, 0, 500, 500);
        URL.revokeObjectURL(url);

        const a = document.createElement('a');
        a.download = 'lerani-whatsapp.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
    };
    img.src = url;
}
</script>
</body>
</html>
