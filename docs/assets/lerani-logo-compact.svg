<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <defs>
    <radialGradient id="leftCircle" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8c8f0"/>
      <stop offset="50%" stop-color="#7babd4"/>
      <stop offset="100%" stop-color="#5a93c0"/>
    </radialGradient>
    <radialGradient id="rightCircle" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="50%" stop-color="#7dd4ac"/>
      <stop offset="100%" stop-color="#5abf92"/>
    </radialGradient>
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e3a5f40"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b7ed8" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#9b7ed8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9b7ed8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clipRight"><circle cx="186" cy="64" r="58"/></clipPath>
  </defs>

  <circle cx="114" cy="64" r="58" fill="url(#leftCircle)" opacity="0.8" filter="url(#softShadow)"/>
  <circle cx="186" cy="64" r="58" fill="url(#rightCircle)" opacity="0.8" filter="url(#softShadow)"/>
  <circle cx="114" cy="64" r="58" fill="url(#overlapGrad)" clip-path="url(#clipRight)" opacity="0.5"/>
  <circle cx="114" cy="64" r="58" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
  <circle cx="186" cy="64" r="58" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>

  <!-- Lavender star accent -->
  <g opacity="0.85">
    <circle cx="150" cy="10" r="12" fill="url(#starGlow)"/>
    <path d="M150 3 L151.3 8 L156.5 10 L151.3 12 L150 17 L148.7 12 L143.5 10 L148.7 8 Z" fill="#9b7ed8"/>
    <path d="M150 5 L150.8 8.5 L154 10 L150.8 11.5 L150 15 L149.2 11.5 L146 10 L149.2 8.5 Z" fill="#c4b5e0" opacity="0.5" transform="rotate(45,150,10)"/>
    <circle cx="150" cy="10" r="1" fill="#fff" opacity="0.95"/>
  </g>
  <g opacity="0.45">
    <path d="M68 38 L69.2 40.5 L71.7 41.7 L69.2 42.9 L68 45.4 L66.8 42.9 L64.3 41.7 L66.8 40.5 Z" fill="#c4b5e0"/>
    <path d="M232 32 L233.2 34.5 L235.7 35.7 L233.2 36.9 L232 39.4 L230.8 36.9 L228.3 35.7 L230.8 34.5 Z" fill="#c4b5e0"/>
  </g>

  <text x="150" y="76" text-anchor="middle" font-family="'Caveat', 'Segoe UI', cursive" font-size="42" font-weight="700" fill="#1e3a5f" letter-spacing="1" filter="url(#textGlow)">Learni</text>
</svg>