<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <defs>
    <radialGradient id="leftCircle" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8c8f0"/>
      <stop offset="50%" stop-color="#7babd4"/>
      <stop offset="100%" stop-color="#5a93c0"/>
    </radialGradient>
    <radialGradient id="rightCircle" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="50%" stop-color="#7dd4ac"/>
      <stop offset="100%" stop-color="#5abf92"/>
    </radialGradient>
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e3a5f40"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clipRight">
      <circle cx="186" cy="64" r="58"/>
    </clipPath>
  </defs>

  <!-- Left circle -->
  <circle cx="114" cy="64" r="58" fill="url(#leftCircle)" opacity="0.8" filter="url(#softShadow)"/>

  <!-- Right circle -->
  <circle cx="186" cy="64" r="58" fill="url(#rightCircle)" opacity="0.8" filter="url(#softShadow)"/>

  <!-- Overlap area -->
  <circle cx="114" cy="64" r="58" fill="url(#overlapGrad)" clip-path="url(#clipRight)" opacity="0.5"/>

  <!-- Decorative rings -->
  <circle cx="114" cy="64" r="58" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
  <circle cx="186" cy="64" r="58" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>

  <!-- Sparkles -->
  <g opacity="0.5">
    <path d="M150 8 L151.5 12 L155.5 13.5 L151.5 15 L150 19 L148.5 15 L144.5 13.5 L148.5 12 Z" fill="#7babd4"/>
    <path d="M68 38 L69.2 40.5 L71.7 41.7 L69.2 42.9 L68 45.4 L66.8 42.9 L64.3 41.7 L66.8 40.5 Z" fill="#a8c8f0"/>
    <path d="M232 32 L233.2 34.5 L235.7 35.7 L233.2 36.9 L232 39.4 L230.8 36.9 L228.3 35.7 L230.8 34.5 Z" fill="#a8e6cf"/>
  </g>

  <!-- Main text: Lerani -->
  <text x="150" y="76" text-anchor="middle" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="#1e3a5f" letter-spacing="2" filter="url(#textGlow)">Lerani</text>
</svg>