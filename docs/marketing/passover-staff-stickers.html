const PALETTES = [
  { bg1: "#E0F7F0", bg2: "#B2DFDB", accent: "#2E8B7A", border: "#80CBC4" },
  { bg1: "#EDE7F6", bg2: "#D1C4E9", accent: "#7E57C2", border: "#B39DDB" },
  { bg1: "#FFF3E0", bg2: "#FFE0B2", accent: "#E68A00", border: "#FFCC80" },
  { bg1: "#E3F2FD", bg2: "#BBDEFB", accent: "#1976D2", border: "#90CAF9" },
  { bg1: "#FCE4EC", bg2: "#F8BBD0", accent: "#C2185B", border: "#F48FB1" },
  { bg1: "#E8F5E9", bg2: "#C8E6C9", accent: "#388E3C", border: "#A5D6A7" },
];

const FALLBACK_COLORS = ["#43A69B","#7E57C2","#E68A00","#1976D2","#C2185B","#388E3C","#5C6BC0","#00897B"];

function getPhotoUrl(id) {
  return `https://lh3.googleusercontent.com/d/${id}=s512`;
}

function getInitials(name) {
  const parts = name.split(" ");
  if (parts.length >= 2) return parts[0][0] + parts[1][0];
  return name[0];
}

function firstName(name) {
  // Hebrew names: "משפחה פרטי" — first name is last word
  // But some have parentheses like "אושר (מורה מקצועית)" — take first word
  const clean = name.replace(/\(.*\)/, "").trim();
  const parts = clean.split(" ").filter(Boolean);
  if (parts.length <= 1) return parts[0] || name;
  // For names like "כהן אדיר" — return "אדיר" (last word)
  return parts[parts.length - 1];
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Failed to load"));
    img.src = url;
  });
}

/* ---- Canvas drawing helpers ---- */

function drawGradientBg(ctx, w, h, palette) {
  ctx.fillStyle = "#ffffff";
  // rounded rect fill
  const r = 32;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(w - r, 0);
  ctx.quadraticCurveTo(w, 0, w, r);
  ctx.lineTo(w, h - r);
  ctx.quadraticCurveTo(w, h, w - r, h);
  ctx.lineTo(r, h);
  ctx.quadraticCurveTo(0, h, 0, h - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
}

function drawRoundedBorder(ctx, w, h, palette) {
  const cx = w / 2, cy = h / 2;
  const rx = w / 2 - 14, ry = h / 2 - 14;
  const points = 80;
  ctx.strokeStyle = palette.border;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= points; i++) {
    const angle = (Math.PI * 2 / points) * i;
    // wobbly organic oval
    const wobble = 1 + 0.012 * Math.sin(angle * 5) + 0.008 * Math.cos(angle * 7);
    const x = cx + Math.cos(angle) * rx * wobble;
    const y = cy + Math.sin(angle) * ry * wobble;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawSmallFlower(ctx, cx, cy, size, color) {
  ctx.save();
  ctx.fillStyle = color;
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
    const px = cx + Math.cos(angle) * size * 0.5;
    const py = cy + Math.sin(angle) * size * 0.5;
    ctx.beginPath();
    ctx.arc(px, py, size * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
  // center
  ctx.fillStyle = "#FFFDE7";
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawLeaf(ctx, cx, cy, size, angle, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size * 0.3, -size * 0.6, size * 0.8, -size * 0.5, size, 0);
  ctx.bezierCurveTo(size * 0.8, size * 0.5, size * 0.3, size * 0.6, 0, 0);
  ctx.fill();
  // leaf vein
  ctx.strokeStyle = "rgba(255,255,255,0.4)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size * 0.85, 0);
  ctx.stroke();
  ctx.restore();
}

function drawOliveBranch(ctx, startX, startY, length, angle, leafColor) {
  ctx.save();
  ctx.translate(startX, startY);
  ctx.rotate(angle);
  // stem
  ctx.strokeStyle = "#8D6E63";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(length * 0.3, -6, length * 0.6, 6, length, 0);
  ctx.stroke();
  // leaves along the stem
  for (let i = 0; i < 4; i++) {
    const t = 0.2 + i * 0.2;
    const lx = length * t;
    const ly = (i % 2 === 0 ? -1 : 1) * 3;
    const la = (i % 2 === 0 ? -0.5 : 0.5);
    drawLeaf(ctx, lx, ly, 12, la, leafColor);
  }
  ctx.restore();
}

function drawCornerDecorations(ctx, w, h, palette) {
  // Simple elegant corner dots
  const dotColor = palette.border;
  const corners = [[24, 24], [w - 24, 24], [24, h - 24], [w - 24, h - 24]];
  corners.forEach(([x, y]) => {
    ctx.fillStyle = dotColor;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawSpringDecorationsAroundPhoto(ctx, cx, cy, radius, palette) {
  // Subtle small dots scattered around photo for a playful feel
  const positions = [
    [-0.7, -0.9, 3.5], [0.8, -0.85, 2.5], [-0.95, 0.3, 3], [0.9, 0.4, 2.8],
    [0.1, -1.05, 2], [-0.5, 0.95, 2.5], [0.6, 0.9, 2]
  ];
  positions.forEach(([dx, dy, size]) => {
    const px = cx + dx * (radius + 20);
    const py = cy + dy * (radius + 20);
    ctx.fillStyle = palette.accent + "33";
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function blobPath(ctx, cx, cy, radius, seed) {
  // Organic blob shape — slightly wobbly circle
  const points = 8;
  ctx.beginPath();
  for (let i = 0; i <= points; i++) {
    const angle = (Math.PI * 2 / points) * i;
    const wobble = 0.92 + 0.08 * Math.sin(angle * 3 + seed);
    const r = radius * wobble;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      const prevAngle = (Math.PI * 2 / points) * (i - 0.5);
      const cpWobble = 0.92 + 0.08 * Math.sin(prevAngle * 3 + seed);
      const cpR = radius * cpWobble * 1.06;
      const cpx = cx + Math.cos(prevAngle) * cpR;
      const cpy = cy + Math.sin(prevAngle) * cpR;
      ctx.quadraticCurveTo(cpx, cpy, x, y);
    }
  }
  ctx.closePath();
}

function drawPhotoCircle(ctx, img, cx, cy, radius) {
  const seed = cx * 0.1 + cy * 0.2; // varies per sticker position

  // soft shadow
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.08)";
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 6;
  blobPath(ctx, cx, cy, radius + 4, seed);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.restore();

  // clip with blob shape and draw image
  ctx.save();
  blobPath(ctx, cx, cy, radius, seed);
  ctx.clip();

  // fit image — crop from top third (faces are usually near top)
  const minDim = Math.min(img.width, img.height);
  const sx = (img.width - minDim) / 2;
  const sy = img.height > img.width ? (img.height - minDim) * 0.15 : (img.height - minDim) / 2;
  ctx.drawImage(img, sx, sy, minDim, minDim, cx - radius, cy - radius, radius * 2, radius * 2);
  ctx.restore();
}

function drawFallbackAvatar(ctx, cx, cy, radius, initials, colorIndex) {
  const seed = cx * 0.1 + cy * 0.2;

  // shadow
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.08)";
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 6;
  blobPath(ctx, cx, cy, radius + 4, seed);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.restore();

  // colored blob
  blobPath(ctx, cx, cy, radius, seed);
  ctx.fillStyle = FALLBACK_COLORS[colorIndex % FALLBACK_COLORS.length];
  ctx.fill();

  // initials
  ctx.fillStyle = "#fff";
  ctx.font = "bold 64px 'Rubik'";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(initials, cx, cy + 4);
}

// Spring/Passover icons — drawn at edges, not on face
const SPRING_ICONS = [
  // פרח אביבי — top-right corner
  function(ctx, S, palette) {
    const x = S - 55, y = 50;
    ctx.save();
    ctx.fillStyle = "#f9a8d4";
    for (let i = 0; i < 5; i++) {
      const a = (Math.PI * 2 / 5) * i - Math.PI / 2;
      const px = x + Math.cos(a) * 14;
      const py = y + Math.sin(a) * 14;
      ctx.beginPath();
      ctx.arc(px, py, 9, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = "#fbbf24";
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fill();
    // stem
    ctx.strokeStyle = "#86efac";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x, y + 14);
    ctx.quadraticCurveTo(x + 8, y + 35, x - 2, y + 50);
    ctx.stroke();
    // small leaf on stem
    ctx.fillStyle = "#86efac";
    ctx.beginPath();
    ctx.moveTo(x + 3, y + 30);
    ctx.quadraticCurveTo(x + 18, y + 25, x + 15, y + 35);
    ctx.quadraticCurveTo(x + 8, y + 35, x + 3, y + 30);
    ctx.fill();
    ctx.restore();
  },
  // פרפר — top-left corner
  function(ctx, S, palette) {
    const x = 55, y = 55;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-0.2);
    // upper wings
    ctx.fillStyle = palette.accent + "99";
    ctx.beginPath();
    ctx.ellipse(-14, -6, 16, 12, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(14, -6, 16, 12, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // lower wings
    ctx.fillStyle = palette.accent + "66";
    ctx.beginPath();
    ctx.ellipse(-10, 8, 10, 8, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10, 8, 10, 8, 0.4, 0, Math.PI * 2);
    ctx.fill();
    // body
    ctx.fillStyle = "#5d4037";
    ctx.beginPath();
    ctx.ellipse(0, 0, 2.5, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // antennae
    ctx.strokeStyle = "#5d4037";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-1, -10);
    ctx.quadraticCurveTo(-8, -22, -12, -20);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1, -10);
    ctx.quadraticCurveTo(8, -22, 12, -20);
    ctx.stroke();
    ctx.restore();
  },
  // עלה ירוק — bottom-left
  function(ctx, S, palette) {
    const x = 50, y = S - 60;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(0.3);
    ctx.fillStyle = "#6dcf8a";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(12, -28, 35, -25, 40, 0);
    ctx.bezierCurveTo(35, 10, 12, 8, 0, 0);
    ctx.fill();
    // leaf vein
    ctx.strokeStyle = "#fff";
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(35, -2);
    ctx.stroke();
    // side veins
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(12, -1);
    ctx.lineTo(18, -10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(22, -1);
    ctx.lineTo(28, -12);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  },
  // ציפור על ענף — bottom-right
  function(ctx, S, palette) {
    const x = S - 60, y = S - 55;
    ctx.save();
    // branch
    ctx.strokeStyle = "#a0845c";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x - 30, y + 5);
    ctx.quadraticCurveTo(x, y - 2, x + 35, y + 8);
    ctx.stroke();
    // bird body
    ctx.fillStyle = palette.accent + "cc";
    ctx.beginPath();
    ctx.ellipse(x, y - 10, 12, 9, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.arc(x + 10, y - 16, 7, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = "#f59e0b";
    ctx.beginPath();
    ctx.moveTo(x + 17, y - 16);
    ctx.lineTo(x + 23, y - 14);
    ctx.lineTo(x + 17, y - 13);
    ctx.closePath();
    ctx.fill();
    // eye
    ctx.fillStyle = "#2d2a26";
    ctx.beginPath();
    ctx.arc(x + 12, y - 17, 1.8, 0, Math.PI * 2);
    ctx.fill();
    // tail
    ctx.fillStyle = palette.accent + "88";
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 10);
    ctx.lineTo(x - 22, y - 20);
    ctx.lineTo(x - 18, y - 8);
    ctx.closePath();
    ctx.fill();
    // legs
    ctx.strokeStyle = "#5d4037";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 3, y - 2);
    ctx.lineTo(x - 3, y + 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 4, y - 2);
    ctx.lineTo(x + 4, y + 4);
    ctx.stroke();
    ctx.restore();
  },
  // קשת בענן — top-left corner
  function(ctx, S, palette) {
    const x = 50, y = 35;
    ctx.save();
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    const colors = ["#ef4444","#f59e0b","#fbbf24","#34d399","#60a5fa","#a78bfa"];
    colors.forEach((c, i) => {
      ctx.strokeStyle = c;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(x, y + 15, 28 - i * 3.5, Math.PI * 1.2, Math.PI * 0.1);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
    // small cloud
    ctx.fillStyle = "#e8e4df";
    ctx.beginPath();
    ctx.arc(x + 26, y + 16, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 20, y + 18, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  },
];

function renderSticker(canvas, person, img, index) {
  const S = 512;
  canvas.width = S;
  canvas.height = S;
  const ctx = canvas.getContext("2d");
  const palette = PALETTES[index % PALETTES.length];
  const photoRadius = 130;
  const photoCY = 185;
  const photoCX = S / 2;
  const first = firstName(person.name);

  // Background
  drawGradientBg(ctx, S, S, palette);

  // Border
  drawRoundedBorder(ctx, S, S, palette);

  // Corner decorations
  drawCornerDecorations(ctx, S, S, palette);

  // Photo (bigger, more prominent)
  if (img) {
    drawPhotoCircle(ctx, img, photoCX, photoCY, photoRadius);
  } else {
    drawFallbackAvatar(ctx, photoCX, photoCY, photoRadius, getInitials(person.name), index);
  }

  // Two spring icons per sticker
  const icon1 = SPRING_ICONS[index % SPRING_ICONS.length];
  const icon2 = SPRING_ICONS[(index + 2) % SPRING_ICONS.length];
  icon1(ctx, S, palette);
  icon2(ctx, S, palette);

  // Greeting — Gveret Levin, diagonal and light
  ctx.save();
  ctx.fillStyle = palette.accent;
  ctx.font = "44px 'GveretLevin', 'Amatic SC', cursive";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.translate(photoCX, 370);
  ctx.rotate(-0.08); // diagonal tilt
  ctx.fillText("חג פסח שמח", 0, 0);
  ctx.restore();

  // Name below greeting — smaller, casual
  ctx.save();
  ctx.fillStyle = "#2d2a26";
  ctx.font = "28px 'GveretLevin', 'Amatic SC', cursive";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.translate(photoCX, 425);
  ctx.rotate(-0.05); // slight tilt to match
  ctx.fillText(first, 0, 0);
  ctx.restore();
}

function downloadCanvas(canvas, name) {
  const link = document.createElement("a");
  link.download = `sticker-${name}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

async function downloadAll() {
  const btn = document.getElementById("downloadAll");
  btn.textContent = "מכין ZIP...";
  btn.disabled = true;

  // Force reload font before export
  try {
    await document.fonts.load("44px 'GveretLevin'");
    await document.fonts.load("28px 'GveretLevin'");
  } catch(e) {}
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 200));

  const files = [];

  for (let i = 0; i < STAFF_WITH_PHOTOS.length; i++) {
    btn.textContent = `מכין ZIP... (${i+1}/${STAFF_WITH_PHOTOS.length})`;
    // Re-render on fresh canvas to guarantee font
    const exportCanvas = document.createElement("canvas");
    const img = window._loadedImages ? window._loadedImages[i] : null;
    renderSticker(exportCanvas, STAFF_WITH_PHOTOS[i], img, i);
    try {
      const blob = await new Promise((resolve, reject) => {
        try {
          exportCanvas.toBlob(b => b ? resolve(b) : reject("no blob"), "image/png");
        } catch(e) {
          reject(e);
        }
      });
      const buf = await blob.arrayBuffer();
      files.push({ name: `sticker-${STAFF_WITH_PHOTOS[i].name}.png`, data: new Uint8Array(buf) });
    } catch(e) {
      console.warn(`Skipped ${STAFF_WITH_PHOTOS[i].name}:`, e);
    }
  }

  const zip = buildZip(files);
  const blob = new Blob([zip], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "מדבקות-פסח-צוות.zip";
  a.click();
  URL.revokeObjectURL(url);

  btn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> הורדה של כל המדבקות (ZIP)`;
  btn.disabled = false;
}

// Minimal ZIP builder — no dependencies
function buildZip(files) {
  const localHeaders = [];
  const centralHeaders = [];
  let offset = 0;

  files.forEach(f => {
    const nameBytes = new TextEncoder().encode(f.name);
    const crc = crc32(f.data);
    const size = f.data.length;

    // Local file header
    const local = new Uint8Array(30 + nameBytes.length + size);
    const lv = new DataView(local.buffer);
    lv.setUint32(0, 0x04034b50, true); // signature
    lv.setUint16(4, 20, true); // version
    lv.setUint16(6, 0, true); // flags
    lv.setUint16(8, 0, true); // compression (store)
    lv.setUint16(10, 0, true); // mod time
    lv.setUint16(12, 0, true); // mod date
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true); // compressed
    lv.setUint32(22, size, true); // uncompressed
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true); // extra length
    local.set(nameBytes, 30);
    local.set(f.data, 30 + nameBytes.length);
    localHeaders.push(local);

    // Central directory header
    const central = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(central.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0x20, true);
    cv.setUint32(42, offset, true);
    central.set(nameBytes, 46);
    centralHeaders.push(central);

    offset += local.length;
  });

  const centralSize = centralHeaders.reduce((s, c) => s + c.length, 0);
  const endRecord = new Uint8Array(22);
  const ev = new DataView(endRecord.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, offset, true);
  ev.setUint16(20, 0, true);

  const total = offset + centralSize + 22;
  const result = new Uint8Array(total);
  let pos = 0;
  localHeaders.forEach(h => { result.set(h, pos); pos += h.length; });
  centralHeaders.forEach(h => { result.set(h, pos); pos += h.length; });
  result.set(endRecord, pos);
  return result;
}

function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc ^= data[i];
    for (let j = 0; j < 8; j++) {
      crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
    }
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

async function init() {
  const loadingEl = document.getElementById("loadingOverlay");
  const gridEl = document.getElementById("grid");
  const downloadAllBtn = document.getElementById("downloadAll");

  // Load all images — all local
  const LOCAL_PHOTO_PATH = "staff-photos/";
  const imagePromises = STAFF_WITH_PHOTOS.map(p =>
    loadImage(LOCAL_PHOTO_PATH + p.localPhoto)
  );

  const results = await Promise.allSettled(imagePromises);

  // Force load GveretLevin font for Canvas
  try {
    await document.fonts.load("44px 'GveretLevin'");
  } catch(e) {}
  await document.fonts.ready;
  // Extra delay for font rendering
  await new Promise(r => setTimeout(r, 300));

  // Build grid
  loadingEl.style.display = "none";
  gridEl.style.display = "";

  // Store loaded images globally for re-rendering during export
  window._loadedImages = results.map(r => r.status === "fulfilled" ? r.value : null);

  STAFF_WITH_PHOTOS.forEach((person, i) => {
    const card = document.createElement("div");
    card.className = "card";

    const canvas = document.createElement("canvas");
    const img = window._loadedImages[i];
    renderSticker(canvas, person, img, i);

    const nameDiv = document.createElement("div");
    nameDiv.className = "card-name";
    nameDiv.textContent = person.name;

    const btn = document.createElement("button");
    btn.className = "btn-download";
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> הורדה';
    btn.addEventListener("click", () => downloadCanvas(canvas, person.name));

    card.appendChild(canvas);
    card.appendChild(nameDiv);
    card.appendChild(btn);
    gridEl.appendChild(card);
  });

  downloadAllBtn.disabled = false;
  downloadAllBtn.addEventListener("click", downloadAll);
}

init();
</script>
