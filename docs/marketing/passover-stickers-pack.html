<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ערכת מדבקות פסח | Learni</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Amatic+SC:wght@400;700&family=Secular+One&family=Varela+Round&family=Karantina:wght@300;400;700&family=Suez+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #fdf8f0 0%, #fef6e8 50%, #f9f0e0 100%);
            color: #333;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 50px 20px 30px;
        }
        .header h1 {
            font-family: 'Secular One', sans-serif;
            font-size: 2.8rem;
            color: #5a3e1b;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2rem;
            color: #8b6f47;
            font-weight: 300;
        }
        .download-all-wrap {
            text-align: center;
            margin: 20px 0 30px;
        }
        .btn-download-all {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, #b8860b, #daa520, #b8860b);
            color: #fff;
            font-family: 'Heebo', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(184,134,11,.35);
            transition: transform .2s, box-shadow .2s;
        }
        .btn-download-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(184,134,11,.45);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px 40px;
        }
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,.07);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform .2s;
        }
        .card:hover { transform: translateY(-4px); }
        .card canvas {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 12px;
        }
        .card .label {
            margin-top: 12px;
            font-weight: 500;
            font-size: .95rem;
            color: #5a3e1b;
        }
        .btn-download {
            margin-top: 10px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #7c5cbf, #9b7fd4);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-family: 'Heebo', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-download:hover { background: linear-gradient(135deg, #6a4aad, #8b6fc4); }
        .instructions {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,.06);
        }
        .instructions h2 {
            font-family: 'Secular One', sans-serif;
            font-size: 1.5rem;
            color: #5a3e1b;
            margin-bottom: 16px;
        }
        .instructions ol {
            padding-right: 20px;
            line-height: 2;
            color: #555;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: .85rem;
        }
        footer span { color: #9b7fd4; font-weight: 700; }
    </style>
</head>
<body>

<div class="header">
    <h1>ערכת מדבקות פסח</h1>
    <p>מתנה לצוות — חג פסח תשפ״ו</p>
</div>

<div class="download-all-wrap">
    <button class="btn-download-all" onclick="downloadAll()">הורדה של כל המדבקות</button>
</div>

<div class="grid" id="grid"></div>

<div class="instructions">
    <h2>איך מוסיפים לוואטסאפ?</h2>
    <ol>
        <li>הורידו את המדבקות למכשיר</li>
        <li>פתחו אפליקציית <strong>Sticker Maker</strong> (חינמית בחנות)</li>
        <li>צרו חבילה חדשה והוסיפו את התמונות</li>
        <li>לחצו "הוסף לוואטסאפ" — וזהו!</li>
    </ol>
</div>

<footer>נוצר באהבה על ידי <span>Learni</span></footer>

<script>
const STICKERS = [
    { name: 'חג פסח שמח!', file: 'passover-chag-sameach' },
    { name: 'חג שמח ומבורך', file: 'passover-mevorach' },
    { name: 'פסח כשר ושמח', file: 'passover-kasher' },
    { name: 'חירות שמחה!', file: 'passover-cherut' },
    { name: 'מועדים לשמחה', file: 'passover-moadim' },
    { name: 'שנה הבאה בירושלים', file: 'passover-jerusalem' },
    { name: 'חג אביב שמח', file: 'passover-aviv' },
    { name: 'תודה רבה!', file: 'passover-toda' },
    { name: 'חג פסח שמח לכל הצוות!', file: 'passover-team' },
    { name: 'לשנה טובה ומתוקה', file: 'passover-sweet' }
];

const grid = document.getElementById('grid');

STICKERS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    canvas.id = 'sticker-' + i;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = s.name;
    const btn = document.createElement('button');
    btn.className = 'btn-download';
    btn.textContent = 'הורדה';
    btn.onclick = () => downloadSticker(i);
    card.appendChild(canvas);
    card.appendChild(label);
    card.appendChild(btn);
    grid.appendChild(card);
});

/* ===== Utility helpers ===== */
function drawRoundedRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawStar(ctx, cx, cy, r, points, innerRatio) {
    points = points || 5;
    innerRatio = innerRatio || 0.4;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
        const angle = (Math.PI / points) * i - Math.PI / 2;
        const radius = i % 2 === 0 ? r : r * innerRatio;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
    }
    ctx.closePath();
}

function drawHeart(ctx, cx, cy, size) {
    ctx.beginPath();
    ctx.moveTo(cx, cy + size * 0.3);
    ctx.bezierCurveTo(cx, cy - size * 0.1, cx - size * 0.5, cy - size * 0.4, cx - size * 0.5, cy - size * 0.1);
    ctx.bezierCurveTo(cx - size * 0.5, cy + size * 0.15, cx, cy + size * 0.5, cx, cy + size * 0.7);
    ctx.bezierCurveTo(cx, cy + size * 0.5, cx + size * 0.5, cy + size * 0.15, cx + size * 0.5, cy - size * 0.1);
    ctx.bezierCurveTo(cx + size * 0.5, cy - size * 0.4, cx, cy - size * 0.1, cx, cy + size * 0.3);
    ctx.closePath();
}

function drawSparkle(ctx, x, y, size, color) {
    ctx.save();
    ctx.fillStyle = color || '#fff';
    ctx.globalAlpha = 0.9;
    drawStar(ctx, x, y, size, 4, 0.25);
    ctx.fill();
    ctx.restore();
}

/* ===== STICKER RENDERERS ===== */

function render0(ctx) {
    // "חג פסח שמח!" — golden gradient + matzah border + stars
    const g = ctx.createRadialGradient(256, 256, 50, 256, 256, 360);
    g.addColorStop(0, '#fff4d6');
    g.addColorStop(0.5, '#f0c040');
    g.addColorStop(1, '#b8860b');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // soft glow center
    const glow = ctx.createRadialGradient(256, 230, 0, 256, 230, 200);
    glow.addColorStop(0, 'rgba(255,255,230,.5)');
    glow.addColorStop(1, 'rgba(255,255,230,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, 512, 512);

    // Matzah crosshatch border
    ctx.strokeStyle = 'rgba(139,100,40,.25)';
    ctx.lineWidth = 2;
    const margin = 35;
    for (let i = 0; i < 512; i += 18) {
        // top
        ctx.beginPath(); ctx.moveTo(i, margin - 12); ctx.lineTo(i + 12, margin + 8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i + 12, margin - 12); ctx.lineTo(i, margin + 8); ctx.stroke();
        // bottom
        ctx.beginPath(); ctx.moveTo(i, 512 - margin - 8); ctx.lineTo(i + 12, 512 - margin + 12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i + 12, 512 - margin - 8); ctx.lineTo(i, 512 - margin + 12); ctx.stroke();
        // left
        ctx.beginPath(); ctx.moveTo(margin - 12, i); ctx.lineTo(margin + 8, i + 12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(margin - 12, i + 12); ctx.lineTo(margin + 8, i); ctx.stroke();
        // right
        ctx.beginPath(); ctx.moveTo(512 - margin - 8, i); ctx.lineTo(512 - margin + 12, i + 12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(512 - margin - 8, i + 12); ctx.lineTo(512 - margin + 12, i); ctx.stroke();
    }

    // border frame
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 4;
    drawRoundedRect(ctx, 28, 28, 456, 456, 20);
    ctx.stroke();

    // stars
    const starPositions = [[80,80],[430,90],[90,430],[420,420],[256,60],[256,460],[60,256],[460,256]];
    starPositions.forEach(([x,y]) => {
        ctx.fillStyle = 'rgba(255,255,255,.7)';
        drawStar(ctx, x, y, 12, 5, 0.4);
        ctx.fill();
    });

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#5a3000';
    ctx.shadowColor = 'rgba(0,0,0,.15)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 4;
    ctx.font = '700 82px "Secular One"';
    ctx.fillText('חג פסח', 256, 220);
    ctx.fillText('שמח!', 256, 310);
    ctx.shadowBlur = 0;
}

function render1(ctx) {
    // "חג שמח ומבורך" — lavender-pink + grape vine + wine glass
    const g = ctx.createLinearGradient(0, 0, 512, 512);
    g.addColorStop(0, '#e8d5f5');
    g.addColorStop(0.5, '#f0d0e8');
    g.addColorStop(1, '#f5c8d8');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // Grape vine border
    ctx.strokeStyle = '#7b4f8a';
    ctx.lineWidth = 3;
    // top vine curve
    ctx.beginPath();
    ctx.moveTo(40, 60);
    ctx.bezierCurveTo(150, 20, 362, 20, 472, 60);
    ctx.stroke();
    // bottom vine
    ctx.beginPath();
    ctx.moveTo(40, 452);
    ctx.bezierCurveTo(150, 492, 362, 492, 472, 452);
    ctx.stroke();

    // grapes (circles along vine)
    const grapeColor = '#8e44ad';
    [[80,50],[150,35],[230,28],[310,28],[390,35],[440,50]].forEach(([x,y]) => {
        ctx.fillStyle = grapeColor;
        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x - 8, y + 12, 10, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 8, y + 12, 10, 0, Math.PI * 2); ctx.fill();
    });
    // bottom grapes
    [[80,462],[150,477],[230,484],[310,484],[390,477],[440,462]].forEach(([x,y]) => {
        ctx.fillStyle = grapeColor;
        ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x - 8, y - 12, 10, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 8, y - 12, 10, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // leaves
    function drawLeaf(cx, cy, angle) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.fillStyle = '#6a9b3a';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(10, -15, 25, -15, 20, 0);
        ctx.bezierCurveTo(25, 15, 10, 15, 0, 0);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
    }
    drawLeaf(120, 38, -0.5);
    drawLeaf(270, 24, 0.3);
    drawLeaf(350, 30, -0.8);

    // Wine glass silhouette at bottom center
    ctx.fillStyle = '#6b2d5b';
    ctx.globalAlpha = 0.35;
    // bowl
    ctx.beginPath();
    ctx.ellipse(256, 390, 40, 55, 0, Math.PI, 0);
    ctx.fill();
    // stem
    ctx.fillRect(252, 390, 8, 40);
    // base
    ctx.beginPath();
    ctx.ellipse(256, 432, 28, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // wine in glass
    ctx.fillStyle = '#8e2060';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.ellipse(256, 370, 32, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#4a1a5e';
    ctx.shadowColor = 'rgba(0,0,0,.12)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 3;
    ctx.font = '700 72px "Suez One"';
    ctx.fillText('חג שמח', 256, 190);
    ctx.fillText('ומבורך', 256, 280);
    ctx.shadowBlur = 0;
}

function render2(ctx) {
    // "פסח כשר ושמח" — teal-mint + seder plate + olives
    const g = ctx.createRadialGradient(256, 256, 40, 256, 256, 380);
    g.addColorStop(0, '#e0f7f0');
    g.addColorStop(0.6, '#a8e6cf');
    g.addColorStop(1, '#4db6ac');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // circular pattern background
    ctx.strokeStyle = 'rgba(255,255,255,.2)';
    ctx.lineWidth = 1.5;
    for (let r = 40; r < 400; r += 40) {
        ctx.beginPath(); ctx.arc(256, 256, r, 0, Math.PI * 2); ctx.stroke();
    }

    // Seder plate at bottom
    const plateY = 370;
    ctx.strokeStyle = '#2e7d6a';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(256, plateY, 90, 0, Math.PI * 2); ctx.stroke();
    // inner circle
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(256, plateY, 70, 0, Math.PI * 2); ctx.stroke();
    // 5 item circles
    const itemAngles = [0, 72, 144, 216, 288].map(a => a * Math.PI / 180);
    itemAngles.forEach(a => {
        const ix = 256 + Math.cos(a - Math.PI / 2) * 50;
        const iy = plateY + Math.sin(a - Math.PI / 2) * 50;
        ctx.fillStyle = 'rgba(46,125,106,.25)';
        ctx.beginPath(); ctx.arc(ix, iy, 16, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#2e7d6a';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    });
    // center item
    ctx.fillStyle = 'rgba(46,125,106,.15)';
    ctx.beginPath(); ctx.arc(256, plateY, 14, 0, Math.PI * 2); ctx.fill();
    ctx.stroke();

    // Olive branches - left and right
    function drawOliveBranch(startX, startY, dir) {
        ctx.strokeStyle = '#5a8a4a';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(startX + dir * 30, startY - 50, startX + dir * 20, startY - 100, startX + dir * 40, startY - 130);
        ctx.stroke();
        // leaves
        for (let t = 0; t < 5; t++) {
            const lx = startX + dir * (5 + t * 7);
            const ly = startY - 20 - t * 25;
            ctx.fillStyle = '#6fa85a';
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.ellipse(lx + dir * 8, ly - 5, 12, 5, dir * 0.5, 0, Math.PI * 2);
            ctx.fill();
            // olive
            if (t % 2 === 0) {
                ctx.fillStyle = '#4a7a3a';
                ctx.beginPath(); ctx.arc(lx + dir * 3, ly + 5, 5, 0, Math.PI * 2); ctx.fill();
            }
        }
        ctx.globalAlpha = 1;
    }
    drawOliveBranch(70, 420, 1);
    drawOliveBranch(442, 420, -1);

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#1a5245';
    ctx.shadowColor = 'rgba(0,0,0,.12)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 3;
    ctx.font = '700 78px "Karantina"';
    ctx.fillText('פסח כשר', 256, 140);
    ctx.fillText('ושמח', 256, 230);
    ctx.shadowBlur = 0;
}

function render3(ctx) {
    // "חירות שמחה!" — coral-yellow + dove + chains
    const g = ctx.createLinearGradient(0, 0, 512, 512);
    g.addColorStop(0, '#ff8a65');
    g.addColorStop(0.5, '#ffb74d');
    g.addColorStop(1, '#ffe082');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // soft rays from center
    ctx.save();
    ctx.translate(256, 200);
    for (let i = 0; i < 12; i++) {
        ctx.rotate(Math.PI / 6);
        ctx.fillStyle = 'rgba(255,255,255,.08)';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-30, -300);
        ctx.lineTo(30, -300);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();

    // Dove silhouette
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.save();
    ctx.translate(256, 150);
    ctx.scale(1.3, 1.3);
    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, 40, 25, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // head
    ctx.beginPath(); ctx.arc(-30, -18, 16, 0, Math.PI * 2); ctx.fill();
    // beak
    ctx.beginPath();
    ctx.moveTo(-46, -18);
    ctx.lineTo(-55, -14);
    ctx.lineTo(-44, -14);
    ctx.closePath();
    ctx.fill();
    // wing
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.bezierCurveTo(20, -50, 60, -60, 50, -20);
    ctx.bezierCurveTo(45, -5, 20, 0, 0, -10);
    ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(35, -5);
    ctx.lineTo(65, -20);
    ctx.lineTo(60, 5);
    ctx.closePath();
    ctx.fill();
    // olive branch in beak
    ctx.strokeStyle = '#6a9b3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-52, -14);
    ctx.bezierCurveTo(-60, -5, -70, 0, -65, -10);
    ctx.stroke();
    ctx.fillStyle = '#6a9b3a';
    ctx.beginPath(); ctx.ellipse(-65, -8, 6, 3, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-58, -6, 6, 3, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Open chain links
    function drawChainLink(x, y, angle, open) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.strokeStyle = 'rgba(120,60,0,.3)';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        if (open) {
            ctx.arc(0, 0, 20, 0.3, Math.PI * 2 - 0.8);
        } else {
            ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
        }
        ctx.stroke();
        ctx.restore();
    }
    // broken chains left
    drawChainLink(80, 380, 0.3, true);
    drawChainLink(110, 400, -0.2, true);
    drawChainLink(60, 410, 0.5, true);
    // broken chains right
    drawChainLink(432, 380, -0.3, true);
    drawChainLink(402, 400, 0.2, true);
    drawChainLink(452, 410, -0.5, true);

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(120,40,0,.3)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 4;
    ctx.font = '700 100px "Amatic SC"';
    ctx.fillText('חירות', 256, 310);
    ctx.fillText('שמחה!', 256, 400);
    ctx.shadowBlur = 0;
}

function render4(ctx) {
    // "מועדים לשמחה" — deep blue-gold night sky
    const g = ctx.createLinearGradient(0, 0, 0, 512);
    g.addColorStop(0, '#0d1b3e');
    g.addColorStop(0.5, '#1a2a5e');
    g.addColorStop(1, '#2c1810');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // stars background
    const rng = (seed) => { let s = seed; return () => { s = (s * 16807) % 2147483647; return s / 2147483647; }; };
    const rand = rng(42);
    for (let i = 0; i < 80; i++) {
        const x = rand() * 512;
        const y = rand() * 512;
        const size = rand() * 3 + 1;
        ctx.fillStyle = `rgba(255,255,200,${rand() * 0.5 + 0.2})`;
        ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
    }

    // crescent moon
    ctx.fillStyle = '#ffd700';
    ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.arc(400, 90, 45, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0d1b3e';
    ctx.beginPath(); ctx.arc(418, 78, 38, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    // bright stars
    [[100, 80], [340, 140], [80, 200], [450, 240]].forEach(([x, y]) => {
        ctx.fillStyle = '#ffd700';
        drawStar(ctx, x, y, 10, 4, 0.25);
        ctx.fill();
    });

    // golden glow at bottom
    const bottomGlow = ctx.createRadialGradient(256, 512, 0, 256, 512, 300);
    bottomGlow.addColorStop(0, 'rgba(218,165,32,.2)');
    bottomGlow.addColorStop(1, 'rgba(218,165,32,0)');
    ctx.fillStyle = bottomGlow;
    ctx.fillRect(0, 0, 512, 512);

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255,215,0,.4)';
    ctx.shadowBlur = 20;
    ctx.font = '700 68px "Suez One"';
    ctx.fillText('מועדים', 256, 280);
    ctx.fillText('לשמחה', 256, 370);
    ctx.shadowBlur = 0;
}

function render5(ctx) {
    // "שנה הבאה בירושלים" — sunset + Jerusalem skyline + Star of David
    const g = ctx.createLinearGradient(0, 0, 0, 512);
    g.addColorStop(0, '#f9a825');
    g.addColorStop(0.3, '#ef6c00');
    g.addColorStop(0.6, '#ad1457');
    g.addColorStop(1, '#4a148c');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // sun glow
    const sun = ctx.createRadialGradient(256, 300, 0, 256, 300, 200);
    sun.addColorStop(0, 'rgba(255,235,59,.3)');
    sun.addColorStop(1, 'rgba(255,235,59,0)');
    ctx.fillStyle = sun;
    ctx.fillRect(0, 0, 512, 512);

    // Jerusalem skyline
    ctx.fillStyle = '#1a0a30';
    ctx.globalAlpha = 0.75;
    ctx.beginPath();
    ctx.moveTo(0, 512);
    // ground line
    ctx.lineTo(0, 420);
    // building 1
    ctx.lineTo(40, 420); ctx.lineTo(40, 380); ctx.lineTo(70, 380); ctx.lineTo(70, 420);
    // tower 1
    ctx.lineTo(90, 420); ctx.lineTo(90, 340); ctx.lineTo(95, 320); ctx.lineTo(100, 340); ctx.lineTo(100, 420);
    // building 2
    ctx.lineTo(120, 420); ctx.lineTo(120, 370); ctx.lineTo(160, 370); ctx.lineTo(160, 420);
    // dome 1
    ctx.lineTo(180, 420); ctx.lineTo(180, 380);
    ctx.quadraticCurveTo(210, 330, 240, 380);
    ctx.lineTo(240, 420);
    // big dome (Al-Aqsa style)
    ctx.lineTo(250, 420); ctx.lineTo(250, 370);
    ctx.quadraticCurveTo(290, 300, 330, 370);
    ctx.lineTo(330, 420);
    // tower 2 (minaret)
    ctx.lineTo(340, 420); ctx.lineTo(340, 310);
    ctx.lineTo(344, 295); ctx.lineTo(348, 310);
    ctx.lineTo(348, 420);
    // building 3
    ctx.lineTo(370, 420); ctx.lineTo(370, 380); ctx.lineTo(400, 380); ctx.lineTo(400, 420);
    // dome 2
    ctx.lineTo(410, 420); ctx.lineTo(410, 390);
    ctx.quadraticCurveTo(435, 350, 460, 390);
    ctx.lineTo(460, 420);
    // end
    ctx.lineTo(480, 420); ctx.lineTo(480, 395); ctx.lineTo(512, 395);
    ctx.lineTo(512, 512);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    // Star of David
    ctx.strokeStyle = 'rgba(255,255,255,.6)';
    ctx.lineWidth = 2.5;
    // triangle 1
    ctx.beginPath();
    ctx.moveTo(256, 55);
    ctx.lineTo(290, 115);
    ctx.lineTo(222, 115);
    ctx.closePath();
    ctx.stroke();
    // triangle 2 (inverted)
    ctx.beginPath();
    ctx.moveTo(256, 125);
    ctx.lineTo(222, 65);
    ctx.lineTo(290, 65);
    ctx.closePath();
    ctx.stroke();

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,.4)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 3;
    ctx.font = '700 52px "Secular One"';
    ctx.fillText('שנה הבאה', 256, 200);
    ctx.fillText('בירושלים', 256, 270);
    ctx.shadowBlur = 0;
}

function render6(ctx) {
    // "חג אביב שמח" — spring green-yellow + flowers + butterfly
    const g = ctx.createLinearGradient(0, 0, 512, 512);
    g.addColorStop(0, '#c8e6c9');
    g.addColorStop(0.5, '#f0f4c3');
    g.addColorStop(1, '#dcedc8');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // Draw flowers
    function drawFlower(cx, cy, petalR, petals, petalColor, centerColor, size) {
        size = size || 1;
        for (let i = 0; i < petals; i++) {
            const angle = (Math.PI * 2 / petals) * i;
            const px = cx + Math.cos(angle) * petalR * size;
            const py = cy + Math.sin(angle) * petalR * size;
            ctx.fillStyle = petalColor;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.arc(px, py, petalR * 0.7 * size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = centerColor;
        ctx.beginPath();
        ctx.arc(cx, cy, petalR * 0.5 * size, 0, Math.PI * 2);
        ctx.fill();
    }

    drawFlower(80, 80, 18, 6, '#f48fb1', '#ffeb3b', 1);
    drawFlower(430, 100, 15, 5, '#ce93d8', '#fff176', 1);
    drawFlower(60, 400, 16, 5, '#90caf9', '#ffe082', 1);
    drawFlower(440, 420, 20, 6, '#ef9a9a', '#fff59d', 1);
    drawFlower(120, 240, 12, 5, '#a5d6a7', '#fff176', 0.8);
    drawFlower(400, 280, 14, 6, '#f48fb1', '#ffcc80', 0.9);
    drawFlower(256, 450, 16, 5, '#b39ddb', '#fff176', 1);
    drawFlower(180, 80, 10, 5, '#80cbc4', '#fff9c4', 0.7);
    drawFlower(350, 60, 12, 6, '#ffab91', '#fff59d', 0.8);

    // stems
    ctx.strokeStyle = '#66bb6a';
    ctx.lineWidth = 2;
    [[80,98,80,140],[430,118,430,155],[60,418,60,455],[440,440,440,475]].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });

    // Butterfly
    ctx.save();
    ctx.translate(340, 200);
    ctx.rotate(-0.2);
    // wings
    ctx.fillStyle = '#ff8a65';
    ctx.globalAlpha = 0.6;
    // upper wings
    ctx.beginPath();
    ctx.ellipse(-18, -10, 25, 18, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(18, -10, 25, 18, 0.4, 0, Math.PI * 2);
    ctx.fill();
    // lower wings
    ctx.fillStyle = '#ffb74d';
    ctx.beginPath();
    ctx.ellipse(-14, 12, 18, 14, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(14, 12, 18, 14, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // body
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.ellipse(0, 0, 3, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // antennae
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.bezierCurveTo(-5, -28, -15, -30, -18, -28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.bezierCurveTo(5, -28, 15, -30, 18, -28); ctx.stroke();
    ctx.restore();

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#33691e';
    ctx.shadowColor = 'rgba(0,0,0,.1)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 3;
    ctx.font = '700 72px "Varela Round"';
    ctx.fillText('חג אביב', 256, 230);
    ctx.fillText('שמח', 256, 320);
    ctx.shadowBlur = 0;
}

function render7(ctx) {
    // "תודה רבה!" — pink-coral + hearts + sparkles
    const g = ctx.createRadialGradient(256, 256, 30, 256, 256, 380);
    g.addColorStop(0, '#fce4ec');
    g.addColorStop(0.5, '#f48fb1');
    g.addColorStop(1, '#e57373');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // Hearts scattered
    const heartData = [
        [80, 100, 30, 'rgba(255,255,255,.3)'],
        [420, 80, 25, 'rgba(255,255,255,.25)'],
        [100, 400, 35, 'rgba(255,255,255,.2)'],
        [400, 420, 28, 'rgba(255,255,255,.3)'],
        [60, 250, 20, 'rgba(255,255,255,.2)'],
        [450, 260, 22, 'rgba(255,255,255,.25)'],
        [200, 60, 18, 'rgba(255,255,255,.2)'],
        [320, 450, 24, 'rgba(255,255,255,.3)'],
        [180, 440, 20, 'rgba(255,255,255,.15)'],
        [350, 100, 16, 'rgba(255,255,255,.2)'],
    ];
    heartData.forEach(([x, y, size, color]) => {
        ctx.fillStyle = color;
        drawHeart(ctx, x, y, size);
        ctx.fill();
    });

    // Sparkle effects
    drawSparkle(ctx, 120, 160, 14, 'rgba(255,255,255,.8)');
    drawSparkle(ctx, 400, 150, 10, 'rgba(255,255,255,.7)');
    drawSparkle(ctx, 80, 340, 12, 'rgba(255,255,255,.6)');
    drawSparkle(ctx, 440, 360, 15, 'rgba(255,255,255,.8)');
    drawSparkle(ctx, 200, 420, 8, 'rgba(255,255,255,.5)');
    drawSparkle(ctx, 340, 60, 10, 'rgba(255,255,255,.6)');

    // text with outline
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '700 90px "Karantina"';
    // outline
    ctx.strokeStyle = 'rgba(150,30,60,.3)';
    ctx.lineWidth = 8;
    ctx.strokeText('תודה', 256, 220);
    ctx.strokeText('רבה!', 256, 320);
    // fill
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,.2)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 4;
    ctx.fillText('תודה', 256, 220);
    ctx.fillText('רבה!', 256, 320);
    ctx.shadowBlur = 0;
}

function render8(ctx) {
    // "חג פסח שמח לכל הצוות!" — royal purple-blue + crown + confetti
    const g = ctx.createLinearGradient(0, 0, 256, 512);
    g.addColorStop(0, '#4a148c');
    g.addColorStop(0.5, '#283593');
    g.addColorStop(1, '#1a237e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // Confetti shapes
    const confettiColors = ['#ffd54f','#ff8a65','#4fc3f7','#aed581','#f48fb1','#ce93d8','#ffcc80','#80deea'];
    const rng2 = (seed) => { let s = seed; return () => { s = (s * 16807) % 2147483647; return s / 2147483647; }; };
    const r2 = rng2(123);
    for (let i = 0; i < 50; i++) {
        const x = r2() * 512;
        const y = r2() * 512;
        const w = r2() * 12 + 4;
        const h = r2() * 6 + 3;
        const angle = r2() * Math.PI;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = confettiColors[Math.floor(r2() * confettiColors.length)];
        ctx.globalAlpha = r2() * 0.4 + 0.3;
        if (r2() > 0.5) {
            ctx.fillRect(-w / 2, -h / 2, w, h);
        } else {
            ctx.beginPath(); ctx.arc(0, 0, w / 2, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }
    ctx.globalAlpha = 1;

    // Crown at top
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(176, 100);
    ctx.lineTo(186, 50);
    ctx.lineTo(216, 80);
    ctx.lineTo(236, 35);
    ctx.lineTo(256, 75);
    ctx.lineTo(276, 35);
    ctx.lineTo(296, 80);
    ctx.lineTo(326, 50);
    ctx.lineTo(336, 100);
    ctx.closePath();
    ctx.fill();
    // crown base
    ctx.fillRect(176, 95, 160, 18);
    // jewels
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.arc(216, 78, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1e88e5';
    ctx.beginPath(); ctx.arc(256, 68, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#43a047';
    ctx.beginPath(); ctx.arc(296, 78, 5, 0, Math.PI * 2); ctx.fill();

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,.3)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 3;
    ctx.font = '700 62px "Secular One"';
    ctx.fillText('חג פסח שמח', 256, 230);
    ctx.font = '700 48px "Secular One"';
    ctx.fillStyle = '#ffd54f';
    ctx.fillText('לכל הצוות!', 256, 320);
    ctx.shadowBlur = 0;

    // sparkles around text
    drawSparkle(ctx, 100, 230, 12, '#ffd700');
    drawSparkle(ctx, 420, 240, 10, '#ffd700');
    drawSparkle(ctx, 130, 320, 8, '#fff');
    drawSparkle(ctx, 400, 310, 11, '#fff');
}

function render9(ctx) {
    // "לשנה טובה ומתוקה" — honey golden + pomegranate + honeycomb
    const g = ctx.createRadialGradient(256, 256, 30, 256, 256, 380);
    g.addColorStop(0, '#fff8e1');
    g.addColorStop(0.5, '#ffe082');
    g.addColorStop(1, '#f9a825');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);

    // Honeycomb pattern (subtle)
    ctx.strokeStyle = 'rgba(180,130,30,.12)';
    ctx.lineWidth = 1.5;
    const hexR = 25;
    const hexH = hexR * Math.sqrt(3);
    for (let row = -1; row < 12; row++) {
        for (let col = -1; col < 12; col++) {
            const cx = col * hexR * 1.5;
            const cy = row * hexH + (col % 2 ? hexH / 2 : 0);
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = Math.PI / 3 * i - Math.PI / 6;
                const method = i === 0 ? 'moveTo' : 'lineTo';
                ctx[method](cx + Math.cos(angle) * hexR, cy + Math.sin(angle) * hexR);
            }
            ctx.closePath();
            ctx.stroke();
        }
    }

    // Pomegranate
    ctx.save();
    ctx.translate(256, 400);
    // body
    const pomG = ctx.createRadialGradient(0, 0, 5, 0, 0, 55);
    pomG.addColorStop(0, '#e53935');
    pomG.addColorStop(0.7, '#c62828');
    pomG.addColorStop(1, '#8e0000');
    ctx.fillStyle = pomG;
    ctx.beginPath();
    ctx.arc(0, 5, 50, 0, Math.PI * 2);
    ctx.fill();
    // crown
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.moveTo(-12, -45);
    ctx.lineTo(-8, -60);
    ctx.lineTo(-3, -50);
    ctx.lineTo(0, -65);
    ctx.lineTo(3, -50);
    ctx.lineTo(8, -60);
    ctx.lineTo(12, -45);
    ctx.closePath();
    ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,.2)';
    ctx.beginPath();
    ctx.ellipse(-15, -10, 12, 20, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // seeds visible
    ctx.fillStyle = 'rgba(255,200,200,.3)';
    [[-10,10],[-5,0],[5,0],[0,15],[10,10],[-15,20],[15,20],[0,25]].forEach(([x,y]) => {
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();

    // text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#6d1b0a';
    ctx.shadowColor = 'rgba(0,0,0,.1)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 3;
    ctx.font = '700 60px "Suez One"';
    ctx.fillText('לשנה טובה', 256, 170);
    ctx.fillText('ומתוקה', 256, 255);
    ctx.shadowBlur = 0;
}

/* ===== Render all stickers ===== */
const renderers = [render0, render1, render2, render3, render4, render5, render6, render7, render8, render9];

function renderAll() {
    renderers.forEach((fn, i) => {
        const canvas = document.getElementById('sticker-' + i);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 512, 512);
        // rounded clip
        ctx.save();
        drawRoundedRect(ctx, 0, 0, 512, 512, 40);
        ctx.clip();
        fn(ctx);
        ctx.restore();
    });
}

/* ===== Font loading ===== */
document.fonts.ready.then(() => {
    // Small delay to ensure fonts are painted
    setTimeout(renderAll, 200);
});

/* ===== Download helpers ===== */
function downloadSticker(i) {
    const canvas = document.getElementById('sticker-' + i);
    canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = STICKERS[i].file + '.png';
        a.click();
        URL.revokeObjectURL(url);
    }, 'image/png');
}

function downloadAll() {
    STICKERS.forEach((_, i) => {
        setTimeout(() => downloadSticker(i), i * 300);
    });
}
