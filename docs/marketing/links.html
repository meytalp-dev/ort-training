<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קישורים חשובים — מיטל פלג</title>
    <meta name="description" content="גישה מהירה לכל המערכות — סטודיו לעיצוב, מערכת שיווק, אתר הדרכות ועוד">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(160deg, #f0f7ff 0%, #f5faf7 40%, #faf5ff 80%, #fff8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 32px 16px 48px;
            color: #1e3a5f;
        }

        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 8px 0 0;
            animation: fadeUp 0.4s ease;
        }

        .header h1 {
            font-family: 'Caveat', cursive;
            font-size: 38px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 15px;
            color: #7a9ab8;
            font-weight: 300;
        }

        .divider {
            width: 50%;
            height: 2px;
            margin: 0 auto;
            background: linear-gradient(90deg, transparent, #5a93c0, #5abf92, #9b7ed8, transparent);
            border-radius: 1px;
            opacity: 0.35;
        }

        /* Cards Grid */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 28px 16px 24px;
            background: white;
            border-radius: 20px;
            text-decoration: none;
            color: #1e3a5f;
            box-shadow: 0 2px 16px rgba(30, 58, 95, 0.06);
            border: 1px solid rgba(90, 147, 192, 0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 20px 20px 0 0;
        }

        .card:nth-child(1)::before { background: linear-gradient(90deg, #9b7ed8, #b89ce6); }
        .card:nth-child(2)::before { background: linear-gradient(90deg, #5a93c0, #7babd4); }
        .card:nth-child(3)::before { background: linear-gradient(90deg, #5abf92, #7dd4ac); }
        .card:nth-child(4)::before { background: linear-gradient(90deg, #e8784d, #f0956e); }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(30, 58, 95, 0.12);
        }

        .card:active {
            transform: scale(0.97);
        }

        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:nth-child(1) .card-icon { background: linear-gradient(135deg, #f0e8fd, #e4d8f6); }
        .card:nth-child(2) .card-icon { background: linear-gradient(135deg, #e8f4fd, #d0e8f8); }
        .card:nth-child(3) .card-icon { background: linear-gradient(135deg, #e8f8f0, #d0f0e4); }
        .card:nth-child(4) .card-icon { background: linear-gradient(135deg, #fde8e0, #f8d4c8); }

        .card-icon svg {
            width: 26px;
            height: 26px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 13px;
            color: #7a9ab8;
            font-weight: 300;
            line-height: 1.5;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:nth-child(1) { animation: fadeUp 0.4s ease 0.05s both; }
        .card:nth-child(2) { animation: fadeUp 0.4s ease 0.1s both; }
        .card:nth-child(3) { animation: fadeUp 0.4s ease 0.15s both; }
        .card:nth-child(4) { animation: fadeUp 0.4s ease 0.2s both; }

        /* Back link */
        .back-link {
            text-align: center;
            animation: fadeUp 0.4s ease 0.3s both;
        }

        .back-link a {
            font-size: 14px;
            color: #7a9ab8;
            text-decoration: none;
            font-weight: 300;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #5a93c0;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #a0b4c8;
            font-weight: 300;
        }

        /* Mobile — single column */
        @media (max-width: 440px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .card {
                flex-direction: row;
                text-align: right;
                padding: 18px 20px;
                gap: 14px;
            }

            .card-icon {
                width: 48px;
                height: 48px;
                min-width: 48px;
                border-radius: 14px;
            }

            .card-icon svg {
                width: 22px;
                height: 22px;
            }

            .card-content {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>קישורים חשובים</h1>
            <p>גישה מהירה לכל המערכות</p>
        </div>

        <div class="divider"></div>

        <!-- Cards -->
        <div class="cards">

            <!-- Design Studio -->
            <a href="../design-studio/index.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#9b7ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>
                    </svg>
                </div>
                <div class="card-content">
                    <div class="card-title">סטודיו לעיצוב</div>
                    <div class="card-desc">עיצוב ויזואלי, סגנונות ומיתוג</div>
                </div>
            </a>

            <!-- Link in Bio -->
            <a href="linkinbio.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#5a93c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                </div>
                <div class="card-content">
                    <div class="card-title">דף קישורים</div>
                    <div class="card-desc">Link in Bio — לשיתוף ברשתות</div>
                </div>
            </a>

            <!-- Marketing System -->
            <a href="hub.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#5abf92" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                </div>
                <div class="card-content">
                    <div class="card-title">מערכת שיווק</div>
                    <div class="card-desc">דשבורד, CRM, ניוזלטר וקמפיינים</div>
                </div>
            </a>

            <!-- Training Site -->
            <a href="../training/claude-code/index.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#e8784d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </div>
                <div class="card-content">
                    <div class="card-title">אתר טריינינג</div>
                    <div class="card-desc">הדרכות Claude Code, Gemini ועוד</div>
                </div>
            </a>

        </div>

        <!-- Back -->
        <div class="back-link">
            <a href="hub.html">חזרה למרכז השיווק</a>
        </div>

        <!-- Footer -->
        <div class="footer">
            Learni &copy; 2026
        </div>

    </div>
</body>
</html>
