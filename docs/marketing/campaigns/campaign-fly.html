<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קמפיין — תתחילו לעוף על זה</title>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@400;600;700;800&family=Amatic+SC:wght@400;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .campaign-container {
            position: relative;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: #f0f7f7;
            border-radius: 12px;
        }

        .bg-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%);
            width: 100%;
            height: auto;
            object-fit: cover;
            z-index: 1;
        }

        /* Gradient overlays for text readability */
        .overlay-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 580px;
            background: linear-gradient(
                to bottom,
                rgba(0, 77, 77, 0.95) 0%,
                rgba(0, 77, 77, 0.88) 60%,
                rgba(0, 77, 77, 0.0) 100%
            );
            z-index: 2;
        }

        .overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 550px;
            background: linear-gradient(
                to top,
                rgba(0, 60, 65, 0.95) 0%,
                rgba(0, 60, 65, 0.9) 40%,
                rgba(0, 60, 65, 0.0) 100%
            );
            z-index: 2;
        }

        /* Top text area */
        .top-text {
            position: absolute;
            top: 60px;
            left: 60px;
            right: 60px;
            z-index: 3;
            text-align: center;
        }

        .headline {
            font-family: 'Playpen Sans Hebrew', cursive;
            font-size: 100px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.3;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .headline .accent {
            color: #5CE1E6;
            font-size: 110px;
            text-shadow: 0 0 20px rgba(92,225,230,0.5), 0 4px 20px rgba(0,0,0,0.3);
            display: inline-block;
            animation: fly 2.5s ease-in-out infinite;
            position: relative;
        }

        @keyframes fly {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                text-shadow: 0 0 20px rgba(92,225,230,0.5);
            }
            30% {
                transform: translateY(-25px) rotate(-5deg);
                text-shadow: 0 0 40px rgba(92,225,230,0.8), 0 0 80px rgba(92,225,230,0.4);
            }
            60% {
                transform: translateY(-10px) rotate(3deg);
                text-shadow: 0 0 30px rgba(92,225,230,0.6);
            }
        }

        .sub-headline-wrapper {
            margin-top: 30px;
            background: rgba(232,117,74,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(232,117,74,0.5);
            border-radius: 20px;
            padding: 20px 50px;
            display: inline-block;
            animation: subHeadlineEntry 1s ease-out forwards, borderGlow 2.5s ease-in-out 1s infinite;
        }

        .sub-headline {
            font-family: 'Amatic SC', cursive;
            font-size: 110px;
            font-weight: 700;
            color: #E8754A;
            line-height: 1.1;
            letter-spacing: 6px;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 20px rgba(232,117,74,0.5), 0 2px 4px rgba(0,0,0,0.3);
        }

        .sub-headline .letter {
            display: inline-block;
        }

        .sub-headline .letter:nth-child(1) { animation-delay: 0s; }
        .sub-headline .letter:nth-child(2) { animation-delay: 0.08s; }
        .sub-headline .letter:nth-child(3) { animation-delay: 0.16s; }
        .sub-headline .letter:nth-child(4) { animation-delay: 0.24s; }
        .sub-headline .letter:nth-child(5) { animation-delay: 0.32s; }
        .sub-headline .letter:nth-child(6) { animation-delay: 0.4s; }
        .sub-headline .letter:nth-child(7) { animation-delay: 0.48s; }
        .sub-headline .letter:nth-child(8) { animation-delay: 0.56s; }
        .sub-headline .letter:nth-child(9) { animation-delay: 0.64s; }
        .sub-headline .letter:nth-child(10) { animation-delay: 0.72s; }
        .sub-headline .letter:nth-child(11) { animation-delay: 0.8s; }
        .sub-headline .letter:nth-child(12) { animation-delay: 0.88s; }
        .sub-headline .letter:nth-child(13) { animation-delay: 0.96s; }
        .sub-headline .letter:nth-child(14) { animation-delay: 1.04s; }
        .sub-headline .letter:nth-child(15) { animation-delay: 1.12s; }
        .sub-headline .letter:nth-child(16) { animation-delay: 1.2s; }
        .sub-headline .letter:nth-child(17) { animation-delay: 1.28s; }
        .sub-headline .letter:nth-child(18) { animation-delay: 1.36s; }

        .english-part {
            display: inline;
            direction: ltr;
            unicode-bidi: bidi-override;
        }

        @keyframes letterDance {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-10px) rotate(-3deg);
                color: #FFB088;
            }
            50% {
                transform: translateY(0) rotate(0deg);
            }
        }

        @keyframes subHeadlineEntry {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes borderGlow {
            0%, 100% {
                border-color: rgba(232,117,74,0.4);
                box-shadow: 0 0 15px rgba(232,117,74,0.2);
            }
            50% {
                border-color: rgba(232,117,74,0.9);
                box-shadow: 0 0 40px rgba(232,117,74,0.4), 0 0 80px rgba(232,117,74,0.15);
            }
        }

        /* Bottom text area */
        .bottom-text {
            position: absolute;
            bottom: 60px;
            left: 60px;
            right: 60px;
            z-index: 3;
            text-align: center;
        }

        .description {
            font-family: 'Playpen Sans Hebrew', cursive;
            font-size: 36px;
            font-weight: 600;
            color: #E8754A;
            line-height: 1.7;
            margin-bottom: 50px;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .desc-accent {
            color: #5CE1E6;
            font-weight: 700;
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(232,117,74,0.3), 0 0 30px rgba(232,117,74,0.1);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 20px rgba(232,117,74,0.6), 0 0 50px rgba(232,117,74,0.3), 0 0 80px rgba(232,117,74,0.1);
                transform: scale(1.02);
            }
        }

        .cta-button {
            display: inline-block;
            font-family: 'Heebo', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #E8754A 0%, #D4603A 100%);
            padding: 18px 60px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(232,117,74,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(232,117,74,0.5);
        }

        /* Claude Code Logo inside sub-headline */
        .claude-logo {
            display: inline-block;
            vertical-align: middle;
            margin-left: 15px;
            animation: logoSpin 4s ease-in-out infinite;
        }

        @keyframes logoSpin {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.1); }
        }

        /* Decorative sparkles */
        .sparkle {
            position: absolute;
            z-index: 2;
            opacity: 0.6;
        }
        .sparkle-1 { top: 15%; right: 8%; font-size: 40px; color: #E8754A; animation: pulse 2s ease-in-out infinite; }
        .sparkle-2 { top: 25%; left: 6%; font-size: 30px; color: #FFB088; animation: pulse 2s ease-in-out 0.5s infinite; }
        .sparkle-3 { bottom: 35%; right: 5%; font-size: 35px; color: #E8754A; animation: pulse 2s ease-in-out 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Print / export helper */
        @media print {
            body { background: none; padding: 0; }
            .campaign-container { border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="campaign-container">
        <!-- Background image -->
        <img src="computer2%20pomelu.png" alt="" class="bg-image">

        <!-- Overlays -->
        <div class="overlay-top"></div>
        <div class="overlay-bottom"></div>

        <!-- Sparkles -->
        <div class="sparkle sparkle-1">&#10022;</div>
        <div class="sparkle sparkle-2">&#10022;</div>
        <div class="sparkle sparkle-3">&#10022;</div>

        <!-- Top: Headline -->
        <div class="top-text">
            <div class="headline">
                תתחילו <span class="accent">לעוף</span> על זה
            </div>
            <div class="sub-headline-wrapper">
                <span class="claude-logo">
                    <svg width="70" height="70" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g transform="translate(30,30)">
                            <line x1="0" y1="-22" x2="0" y2="-8" stroke="#E8754A" stroke-width="5" stroke-linecap="round"/>
                            <line x1="0" y1="8" x2="0" y2="22" stroke="#E8754A" stroke-width="5" stroke-linecap="round"/>
                            <line x1="-22" y1="0" x2="-8" y2="0" stroke="#E8754A" stroke-width="5" stroke-linecap="round"/>
                            <line x1="8" y1="0" x2="22" y2="0" stroke="#E8754A" stroke-width="5" stroke-linecap="round"/>
                            <line x1="-16" y1="-16" x2="-6" y2="-6" stroke="#D4603A" stroke-width="4.5" stroke-linecap="round"/>
                            <line x1="6" y1="6" x2="16" y2="16" stroke="#D4603A" stroke-width="4.5" stroke-linecap="round"/>
                            <line x1="16" y1="-16" x2="6" y2="-6" stroke="#D4603A" stroke-width="4.5" stroke-linecap="round"/>
                            <line x1="-6" y1="6" x2="-16" y2="16" stroke="#D4603A" stroke-width="4.5" stroke-linecap="round"/>
                        </g>
                    </svg>
                </span>
                <div class="sub-headline"><span class="letter">ח</span><span class="letter">י</span><span class="letter">נ</span><span class="letter">ו</span><span class="letter">ך</span><span class="letter">+</span><span dir="ltr" class="english-part"><span class="letter">C</span><span class="letter">l</span><span class="letter">a</span><span class="letter">u</span><span class="letter">d</span><span class="letter">e</span><span class="letter">&nbsp;</span><span class="letter">C</span><span class="letter">o</span><span class="letter">d</span><span class="letter">e</span></span></div>
            </div>
        </div>


        <!-- Lerani Logo — top right -->
        <a href="https://www.facebook.com/share/g/1DfNai3EEv/" target="_blank" class="lerani-logo" style="position: absolute; top: 30px; right: 30px; z-index: 10; width: 160px; background: transparent; padding: 10px;">
          <svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="ll-lg" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#a8c8f0"/><stop offset="50%" stop-color="#7babd4"/><stop offset="100%" stop-color="#5a93c0"/></radialGradient>
              <radialGradient id="ll-rg" cx="60%" cy="40%" r="60%"><stop offset="0%" stop-color="#a8e6cf"/><stop offset="50%" stop-color="#7dd4ac"/><stop offset="100%" stop-color="#5abf92"/></radialGradient>
              <linearGradient id="ll-og" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/><stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/></linearGradient>
              <filter id="ll-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e3a5f40"/></filter>
              <filter id="ll-tg"><feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/><feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/><feComposite in="color" in2="blur" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <clipPath id="ll-cr"><circle cx="218" cy="78" r="72"/></clipPath>
            </defs>
            <circle cx="142" cy="78" r="72" fill="url(#ll-lg)" opacity="0.8" filter="url(#ll-sh)"/>
            <circle cx="218" cy="78" r="72" fill="url(#ll-rg)" opacity="0.8" filter="url(#ll-sh)"/>
            <circle cx="142" cy="78" r="72" fill="url(#ll-og)" clip-path="url(#ll-cr)" opacity="0.5"/>
            <circle cx="142" cy="78" r="72" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
            <circle cx="218" cy="78" r="72" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
            <text x="180" y="90" text-anchor="middle" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#1e3a5f" letter-spacing="2" filter="url(#ll-tg)">Lerani</text>
          </svg>
        </a>

        <!-- Bottom: Description + CTA -->
        <div class="bottom-text">
            <div class="description">
                ליווי צמוד שהופך את הכלים המתקדמים ביותר<br>
                לחלק בלתי נפרד <span class="desc-accent">מהסיפור</span> שלכם
            </div>
            <a href="#" class="cta-button">לפרטים והרשמה</a>
        </div>
    </div>
</body>
</html>
