<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ברכת פסח — אורט בית הערבה</title>

    <!-- OG tags for WhatsApp preview -->
    <meta property="og:title" content="חג פסח שמח — אורט בית הערבה">
    <meta property="og:description" content="הלוואי שחג החירות והאביב יביא איתו תקווה לימים טובים יותר">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meytalp-dev.github.io/ort-presentation-builder/marketing/pesach-greeting/">
    <meta property="og:image" content="https://meytalp-dev.github.io/ort-presentation-builder/marketing/pesach-greeting/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@400;700;800&family=Assistant:wght@400;600;700&family=Heebo:wght@300;400;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
        }

        .video-container {
            position: relative;
            width: 100vw;
            max-width: 1280px;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bottom-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
            pointer-events: none;
        }

        .credits-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .credits {
            position: absolute;
            bottom: -800px;
            width: 100%;
            text-align: center;
            animation: scrollUp 12s ease-in-out 0.5s forwards;
        }

        @keyframes scrollUp {
            0% { bottom: -800px; }
            100% { bottom: 40px; }
        }

        .greeting-title {
            font-family: 'Playpen Sans Hebrew', cursive;
            font-size: 110px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
            color: #E8A0BF;
            text-shadow: 0 4px 25px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5), 0 0 40px rgba(232,160,191,0.4);
            filter: drop-shadow(0 0 20px rgba(232,160,191,0.4));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .greeting-subtitle {
            font-family: 'Playpen Sans Hebrew', cursive;
            font-size: 46px;
            font-weight: 700;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 3px 15px rgba(0,0,0,0.7), 0 0 30px rgba(255,255,255,0.2);
            margin-bottom: 25px;
        }

        .greeting-body {
            font-family: 'Varela Round', sans-serif;
            font-size: 38px;
            font-weight: 400;
            color: #fff;
            text-shadow: 0 3px 20px rgba(0,0,0,0.8), 0 1px 8px rgba(0,0,0,0.6);
            line-height: 1.7;
            max-width: 900px;
            margin: 0 auto;
        }

        .greeting-signature {
            font-family: 'Playpen Sans Hebrew', cursive;
            font-size: 28px;
            font-weight: 700;
            color: #F0C05A;
            text-shadow: 0 2px 12px rgba(0,0,0,0.6), 0 0 25px rgba(240,192,90,0.4);
            margin-top: 25px;
        }

        /* Responsive for mobile */
        @media (max-width: 768px) {
            .greeting-title { font-size: 48px; gap: 8px; }
            .greeting-title svg { width: 30px; height: 30px; }
            .greeting-subtitle { font-size: 24px; margin-bottom: 15px; }
            .greeting-body { font-size: 20px; line-height: 1.6; }
            .greeting-signature { font-size: 16px; margin-top: 15px; }
            .credits { animation-name: scrollUpMobile; }
            @keyframes scrollUpMobile {
                0% { bottom: -500px; }
                100% { bottom: 20px; }
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="Golden_light_sweeps_202604011256.mp4" type="video/mp4">
        </video>
        <div class="bottom-gradient"></div>
        <div class="credits-wrapper">
            <div class="credits">
                <div class="greeting-title">
                <svg class="flower-icon" viewBox="0 0 80 80" width="55" height="55">
                    <g transform="translate(40,40)">
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#E84B8A" opacity="0.9"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#D63A78" opacity="0.9" transform="rotate(72)"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#E84B8A" opacity="0.9" transform="rotate(144)"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#D63A78" opacity="0.9" transform="rotate(216)"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#E84B8A" opacity="0.9" transform="rotate(288)"/>
                        <circle cx="0" cy="0" r="4" fill="#F0C05A"/>
                    </g>
                </svg>
                חג פסח שמח
                <svg class="flower-icon" viewBox="0 0 80 80" width="55" height="55">
                    <g transform="translate(40,40)">
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#E84B8A" opacity="0.9"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#D63A78" opacity="0.9" transform="rotate(72)"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#E84B8A" opacity="0.9" transform="rotate(144)"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#D63A78" opacity="0.9" transform="rotate(216)"/>
                        <path d="M0,-18 C7,-16 11,-7 0,0 C-11,-7 -7,-16 0,-18Z" fill="#E84B8A" opacity="0.9" transform="rotate(288)"/>
                        <circle cx="0" cy="0" r="4" fill="#F0C05A"/>
                    </g>
                </svg>
            </div>
                <div class="greeting-subtitle">קהילה יקרה</div>
            <svg width="250" height="20" style="margin-bottom: 15px;">
                <path d="M20,12 Q125,0 230,12" stroke="#E84B8A" stroke-width="3" fill="none" stroke-linecap="round"/>
            </svg>
                <div class="greeting-body">
                    הלוואי שחג החירות והאביב<br>
                    יביא איתו תקווה לימים טובים יותר<br>
                    וחזרה לשגרה מבורכת<br>
                    עם התלמידים היקרים שלנו
                </div>
                <div class="greeting-signature">
                    מאחלים לכם ולבני משפחותיכם חג פסח שמח וכשר<br>
                    מיטל פלג וכל צוות בית הספר
                </div>
            </div>
        </div>
    </div>
</body>
</html>
