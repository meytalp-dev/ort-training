<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>בקשת מערך שיעור – אורט בית הערבה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800&family=Rubik:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F0F4F8;--card:#fff;--border:#E2E8F0;
  --primary:#2A9D8F;--primary-l:#D4F3EF;--primary-d:#1a7a6d;
  --dark:#1E293B;--gray:#64748B;
  --green:#52B788;--green-l:#D8F3DC;
  --shadow:0 2px 20px -4px rgba(0,0,0,.06);
  --r:20px;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);width:120%;height:80px;background:var(--bg);border-radius:50% 50% 0 0}
.header h1{font-family:'Rubik',sans-serif;font-size:clamp(1.5rem,4vw,2rem);font-weight:900;position:relative}
.header p{font-size:.9rem;opacity:.85;margin-top:.5rem;position:relative}
.container{max-width:600px;margin:-1rem auto 2rem;padding:0 1.5rem}
.card{background:var(--card);border-radius:var(--r);padding:32px;box-shadow:var(--shadow);margin-top:24px}
.card h2{font-family:'Rubik',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.fg{margin-bottom:16px}
.fg label{display:block;font-weight:600;font-size:.9rem;margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary)}
.fg textarea{min-height:100px;resize:vertical}
.fg .hint{font-size:.8rem;color:var(--gray);margin-top:4px}
.fg.invalid input,.fg.invalid select{border-color:#E76F7A}
.btn{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:var(--primary-d)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.success{display:none;text-align:center;padding:40px 24px}
.success .icon{font-size:3rem;margin-bottom:16px}
.success h2{font-family:'Rubik',sans-serif;color:var(--primary);margin-bottom:12px}
.success p{color:var(--gray);line-height:1.6;margin-bottom:24px}
.link-btn{display:inline-block;padding:14px 32px;background:var(--primary);color:#fff;border-radius:12px;text-decoration:none;font-weight:700;transition:background .2s}
.link-btn:hover{background:var(--primary-d)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:#fff;padding:14px 28px;border-radius:14px;font-weight:600;z-index:9999;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.card{padding:24px}}
</style>
</head>
<body>

<div class="header">
  <h1>📩 בקשת מערך שיעור</h1>
  <p>מלאו את הטופס ונכין עבורכם מערך שיעור מלא</p>
</div>

<div class="container">
  <div class="card" id="formCard">
    <h2>📝 פרטי הבקשה</h2>

    <div class="fg">
      <label>שם המורה</label>
      <input type="text" id="teacherName" placeholder="השם שלכם">
    </div>

    <div class="fg">
      <label>מייל</label>
      <input type="email" id="teacherEmail" placeholder="your@bethaarava.ort.org.il">
    </div>

    <div class="fg">
      <label>נושא השיעור</label>
      <input type="text" id="topic" placeholder='למשל: "מבנה התא", "המרד הגדול"'>
    </div>

    <div class="fg">
      <label>מקצוע</label>
      <select id="subject">
        <option value="">בחרו מקצוע</option>
        <option value="תספורת ועיצוב שיער">תספורת ועיצוב שיער</option>
        <option value="היסטוריה">היסטוריה</option>
        <option value="מתמטיקה">מתמטיקה</option>
        <option value="מדעים">מדעים</option>
        <option value="עברית">עברית</option>
        <option value="אנגלית">אנגלית</option>
        <option value="אזרחות">אזרחות</option>
        <option value="תנ״ך">תנ״ך</option>
        <option value="אחר">אחר</option>
      </select>
    </div>

    <div class="fg">
      <label>כיתה</label>
      <select id="grade">
        <option value="">בחרו כיתה</option>
        <option value="ט">ט</option>
        <option value="י">י</option>
        <option value="יא">יא</option>
        <option value="יב">יב</option>
      </select>
    </div>

    <div class="fg">
      <label>הערות נוספות (אופציונלי)</label>
      <textarea id="notes" placeholder="דגשים מיוחדים, חומר ספציפי, קובץ שרוצים לצרף..."></textarea>
      <div class="hint">כתבו כל מידע שיכול לעזור בהכנת מערך השיעור</div>
    </div>

    <button class="btn" onclick="submitRequest()" id="submitBtn">📤 שלחו בקשה</button>
  </div>

  <div class="card success" id="successCard">
    <div class="icon">✅</div>
    <h2>הבקשה נשלחה!</h2>
    <p>מייטל תכין עבורכם מערך שיעור מלא ותשלח לכם קישור בהקדם.</p>
    <a href="../lesson-generator/" class="link-btn">רוצים לנסות ליצור בעצמכם? →</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyLwo3jrseEDJ4GLnVNCzoJTRJBK_IAkJE0IiGGcx18buwJQ0XSRgOcJ2FmbMtA5ojU/exec';

async function submitRequest() {
  var name = document.getElementById('teacherName').value.trim();
  var email = document.getElementById('teacherEmail').value.trim();
  var topic = document.getElementById('topic').value.trim();
  var subject = document.getElementById('subject').value;
  var grade = document.getElementById('grade').value;
  var notes = document.getElementById('notes').value.trim();
  var valid = true;

  [['teacherName',name],['teacherEmail',email],['topic',topic],['subject',subject],['grade',grade]].forEach(function(p) {
    var fg = document.getElementById(p[0]).closest('.fg');
    if (!p[1]) { fg.classList.add('invalid'); valid = false; } else { fg.classList.remove('invalid'); }
  });

  if (!valid) { showToast('נא למלא את כל השדות'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'שולח...';

  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'lessonRequest',
        name: name,
        email: email,
        topic: topic,
        subject: subject,
        grade: grade,
        notes: notes,
        date: new Date().toLocaleString('he-IL')
      })
    });

    document.getElementById('formCard').style.display = 'none';
    document.getElementById('successCard').style.display = '';
  } catch(e) {
    btn.disabled = false; btn.textContent = '📤 שלחו בקשה';
    showToast('שגיאה בשליחה, נסו שוב');
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
