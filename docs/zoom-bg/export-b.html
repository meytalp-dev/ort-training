<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Zoom Background - Style B</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Rubik:wght@400;500;700&family=Poppins:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; padding: 0; overflow: hidden; }
.zoom-bg {
  width: 1920px;
  height: 1080px;
  position: relative;
  overflow: hidden;
  background: #FBF8F4;
}

/* Colored background using radial gradients (reliable in puppeteer) */
.bg-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}
.bg-layer::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 800px 800px at 90% 0%, rgba(137,207,240,0.5) 0%, transparent 65%),
    radial-gradient(ellipse 700px 700px at 0% 95%, rgba(157,181,160,0.45) 0%, transparent 65%),
    radial-gradient(ellipse 550px 550px at 75% 75%, rgba(201,169,110,0.3) 0%, transparent 65%),
    radial-gradient(ellipse 600px 600px at 25% 0%, rgba(212,118,110,0.25) 0%, transparent 65%),
    radial-gradient(ellipse 500px 500px at 50% 90%, rgba(168,230,207,0.35) 0%, transparent 65%),
    radial-gradient(ellipse 450px 450px at 5% 40%, rgba(123,171,212,0.25) 0%, transparent 65%);
}

.content {
  position: absolute;
  z-index: 2;
  top: 40px;
  right: 60px;
  text-align: right;
}
.logo-area { margin-bottom: 12px; }
.title-text {
  font-family: 'Rubik', sans-serif;
  font-size: 44px;
  font-weight: 700;
  color: #3A3A50;
  margin-bottom: 8px;
}
.name-text {
  font-family: 'Heebo', sans-serif;
  font-size: 26px;
  font-weight: 400;
  color: #5a93c0;
}

.tech-elements {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 1;
}
.tech-el {
  position: absolute;
  font-family: 'Fira Code', monospace;
  color: #3A3A50;
}
.tech-el:nth-child(1) { top: 6%; left: 4%; font-size: 64px; transform: rotate(-15deg); opacity: 0.06; }
.tech-el:nth-child(2) { bottom: 8%; right: 4%; font-size: 56px; transform: rotate(10deg); opacity: 0.06; }
.tech-el:nth-child(3) { top: 14%; right: 12%; font-size: 42px; color: #89CFF0; opacity: 0.15; }
.tech-el:nth-child(4) { bottom: 22%; left: 8%; font-size: 36px; color: #9DB5A0; opacity: 0.15; }
.tech-el:nth-child(5) { top: 50%; left: 2%; font-size: 30px; color: #C9A96E; opacity: 0.12; transform: rotate(-5deg); }
.tech-el:nth-child(6) { bottom: 6%; left: 32%; font-size: 26px; color: #5a93c0; opacity: 0.1; }
.tech-el:nth-child(7) { top: 4%; left: 38%; font-size: 24px; color: #D4766E; opacity: 0.1; }
.tech-el:nth-child(8) { top: 72%; right: 8%; font-size: 28px; color: #7dd4ac; opacity: 0.12; transform: rotate(5deg); }
.tech-el:nth-child(9) { top: 35%; right: 3%; font-size: 22px; color: #a8c8f0; opacity: 0.1; }

.decorative-dots {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 1;
}
.d-dot {
  position: absolute;
  border-radius: 50%;
}
.d-dot:nth-child(1) { width: 16px; height: 16px; background: #89CFF0; top: 18%; left: 16%; opacity: 0.25; }
.d-dot:nth-child(2) { width: 12px; height: 12px; background: #9DB5A0; top: 72%; left: 52%; opacity: 0.25; }
.d-dot:nth-child(3) { width: 18px; height: 18px; background: #C9A96E; top: 8%; right: 22%; opacity: 0.2; }
.d-dot:nth-child(4) { width: 10px; height: 10px; background: #D4766E; bottom: 12%; left: 20%; opacity: 0.2; }
.d-dot:nth-child(5) { width: 14px; height: 14px; background: #7dd4ac; top: 42%; right: 6%; opacity: 0.2; }
.d-dot:nth-child(6) { width: 12px; height: 12px; background: #a8c8f0; top: 60%; left: 6%; opacity: 0.15; }
.d-dot:nth-child(7) { width: 10px; height: 10px; background: #5abf92; bottom: 30%; right: 15%; opacity: 0.15; }

/* Subtle bottom-right accent stripe */
.accent-stripe {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 5px;
  background: linear-gradient(90deg, #89CFF0, #7dd4ac, #C9A96E, #D4766E);
  opacity: 0.4;
  z-index: 1;
}
</style>
</head>
<body>
<div class="zoom-bg" id="zoom-bg">
  <div class="bg-layer"></div>
  <div class="tech-elements">
    <span class="tech-el">{ }</span>
    <span class="tech-el">&lt;/&gt;</span>
    <span class="tech-el">const</span>
    <span class="tech-el">async</span>
    <span class="tech-el">$ _</span>
    <span class="tech-el">=&gt;</span>
    <span class="tech-el">/**</span>
    <span class="tech-el">await</span>
    <span class="tech-el">fn()</span>
  </div>
  <div class="decorative-dots">
    <span class="d-dot"></span>
    <span class="d-dot"></span>
    <span class="d-dot"></span>
    <span class="d-dot"></span>
    <span class="d-dot"></span>
    <span class="d-dot"></span>
    <span class="d-dot"></span>
  </div>
  <div class="accent-stripe"></div>
  <div class="content">
    <div class="logo-area">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="200" height="130">
        <defs>
          <radialGradient id="lc" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#a8c8f0"/><stop offset="50%" stop-color="#7babd4"/><stop offset="100%" stop-color="#5a93c0"/></radialGradient>
          <radialGradient id="rc" cx="60%" cy="40%" r="60%"><stop offset="0%" stop-color="#a8e6cf"/><stop offset="50%" stop-color="#7dd4ac"/><stop offset="100%" stop-color="#5abf92"/></radialGradient>
          <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7babd4" stop-opacity="0.6"/><stop offset="100%" stop-color="#7dd4ac" stop-opacity="0.6"/></linearGradient>
          <clipPath id="cr"><circle cx="240" cy="115" r="85"/></clipPath>
        </defs>
        <circle cx="160" cy="115" r="85" fill="url(#lc)" opacity="0.75"/>
        <circle cx="240" cy="115" r="85" fill="url(#rc)" opacity="0.75"/>
        <circle cx="160" cy="115" r="85" fill="url(#og)" clip-path="url(#cr)" opacity="0.5"/>
        <circle cx="160" cy="115" r="85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
        <circle cx="240" cy="115" r="85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
        <text x="200" y="125" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="42" font-weight="700" fill="#1e3a5f" letter-spacing="1">Lerani</text>
        <text x="200" y="228" text-anchor="middle" font-family="'Heebo', sans-serif" font-size="14" font-weight="400" fill="#4a6a8a" letter-spacing="1" opacity="0.85" direction="rtl">חינוך · בינה מלאכותית · הגשמת חלומות</text>
      </svg>
    </div>
    <div class="title-text">הדרכת Claude Code</div>
    <div class="name-text">מיטל פלג</div>
  </div>
</div>
</body>
</html>
