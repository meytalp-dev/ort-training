<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סיימון - משחק הזיכרון</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: #F5F3FA;
            color: #1E1B3A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding: 16px;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #1E1B3A;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            color: #7C3AED;
            margin-top: 4px;
        }

        .stats-bar {
            display: flex;
            gap: 32px;
            justify-content: center;
            align-items: center;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 400;
            color: #6B6B8D;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1E1B3A;
        }

        .stat-value.highlight {
            color: #7C3AED;
        }

        /* Simon board */
        .simon-board {
            position: relative;
            width: min(360px, 85vw);
            height: min(360px, 85vw);
        }

        .simon-btn {
            position: absolute;
            width: 48%;
            height: 48%;
            border: none;
            cursor: pointer;
            transition: filter 0.1s ease, transform 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .simon-btn:active {
            transform: scale(0.97);
        }

        .simon-btn.disabled {
            pointer-events: none;
        }

        /* Quadrant positions */
        .simon-btn[data-color="green"] {
            top: 0;
            left: 0;
            border-radius: 100% 12px 12px 12px;
            background: #14B8A6;
            box-shadow: inset -4px -4px 12px rgba(0,0,0,0.15), inset 2px 2px 8px rgba(255,255,255,0.1);
        }

        .simon-btn[data-color="red"] {
            top: 0;
            right: 0;
            border-radius: 12px 100% 12px 12px;
            background: #E76F7A;
            box-shadow: inset 4px -4px 12px rgba(0,0,0,0.15), inset -2px 2px 8px rgba(255,255,255,0.1);
        }

        .simon-btn[data-color="yellow"] {
            bottom: 0;
            left: 0;
            border-radius: 12px 12px 12px 100%;
            background: #F59E0B;
            box-shadow: inset -4px 4px 12px rgba(0,0,0,0.15), inset 2px -2px 8px rgba(255,255,255,0.1);
        }

        .simon-btn[data-color="blue"] {
            bottom: 0;
            right: 0;
            border-radius: 12px 12px 100% 12px;
            background: #7C3AED;
            box-shadow: inset 4px 4px 12px rgba(0,0,0,0.15), inset -2px -2px 8px rgba(255,255,255,0.1);
        }

        /* Lit-up / active states */
        .simon-btn[data-color="green"].lit {
            background: #5EEAD4;
            box-shadow: 0 0 40px rgba(20, 184, 166, 0.7), 0 0 80px rgba(20, 184, 166, 0.3), inset 0 0 20px rgba(255,255,255,0.3);
        }

        .simon-btn[data-color="red"].lit {
            background: #FCA5AB;
            box-shadow: 0 0 40px rgba(231, 111, 122, 0.7), 0 0 80px rgba(231, 111, 122, 0.3), inset 0 0 20px rgba(255,255,255,0.3);
        }

        .simon-btn[data-color="yellow"].lit {
            background: #FCD34D;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.7), 0 0 80px rgba(245, 158, 11, 0.3), inset 0 0 20px rgba(255,255,255,0.3);
        }

        .simon-btn[data-color="blue"].lit {
            background: #A78BFA;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.7), 0 0 80px rgba(124, 58, 237, 0.3), inset 0 0 20px rgba(255,255,255,0.3);
        }

        /* Error flash */
        .simon-btn.error-flash {
            background: #EF4444 !important;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.8) !important;
        }

        /* Center circle */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28%;
            height: 28%;
            border-radius: 50%;
            background: #F5F3FA;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .center-text {
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 700;
            color: #7C3AED;
            text-align: center;
            line-height: 1.3;
        }

        /* Message area */
        .message-area {
            min-height: 28px;
            text-align: center;
        }

        .message {
            font-size: 1.1rem;
            font-weight: 500;
            color: #1E1B3A;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message.visible {
            opacity: 1;
        }

        .message.error {
            color: #E76F7A;
            font-weight: 700;
        }

        .message.success {
            color: #14B8A6;
        }

        /* Start button */
        .start-btn {
            padding: 14px 48px;
            font-family: 'Heebo', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #7C3AED, #9F67FF);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(124, 58, 237, 0.45);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Decorative ring around board */
        .board-container {
            position: relative;
            padding: 12px;
        }

        .board-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid rgba(124, 58, 237, 0.1);
            pointer-events: none;
        }

        /* Responsive */
        @media (max-height: 700px) {
            .header h1 { font-size: 1.6rem; }
            .game-wrapper { gap: 12px; }
            .simon-board {
                width: min(300px, 80vw);
                height: min(300px, 80vw);
            }
        }

        @media (max-width: 380px) {
            .stats-bar { gap: 20px; }
            .stat-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <h1>סיימון - משחק הזיכרון</h1>
            <div class="subtitle">נבנה עם Claude Code</div>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">שלב</div>
                <div class="stat-value highlight" id="levelDisplay">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">שיא</div>
                <div class="stat-value" id="highScoreDisplay">0</div>
            </div>
        </div>

        <div class="board-container">
            <div class="board-ring"></div>
            <div class="simon-board" id="simonBoard">
                <button class="simon-btn disabled" data-color="green" data-index="0"></button>
                <button class="simon-btn disabled" data-color="red" data-index="1"></button>
                <button class="simon-btn disabled" data-color="yellow" data-index="2"></button>
                <button class="simon-btn disabled" data-color="blue" data-index="3"></button>
                <div class="center-circle">
                    <div class="center-text">SIMON</div>
                </div>
            </div>
        </div>

        <div class="message-area">
            <div class="message" id="message"></div>
        </div>

        <button class="start-btn" id="startBtn">התחל משחק</button>
    </div>

    <script>
        // ---- Audio Engine ----
        const AudioEngine = (() => {
            let ctx = null;

            function getCtx() {
                if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                return ctx;
            }

            // Classic Simon-like frequencies
            const FREQS = [329.63, 261.63, 220.00, 164.81]; // E4, C4, A3, E3
            const ERROR_FREQS = [180, 160, 140, 120];

            function playTone(index, duration = 0.3) {
                const ac = getCtx();
                const osc = ac.createOscillator();
                const gain = ac.createGain();

                osc.type = 'sine';
                osc.frequency.value = FREQS[index];

                gain.gain.setValueAtTime(0.35, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);

                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(ac.currentTime);
                osc.stop(ac.currentTime + duration);
            }

            function playError() {
                const ac = getCtx();
                ERROR_FREQS.forEach((freq, i) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq;
                    const startT = ac.currentTime + i * 0.15;
                    gain.gain.setValueAtTime(0.2, startT);
                    gain.gain.exponentialRampToValueAtTime(0.001, startT + 0.2);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(startT);
                    osc.stop(startT + 0.25);
                });
            }

            function playSuccess() {
                const ac = getCtx();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const startT = ac.currentTime + i * 0.12;
                    gain.gain.setValueAtTime(0.25, startT);
                    gain.gain.exponentialRampToValueAtTime(0.001, startT + 0.25);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(startT);
                    osc.stop(startT + 0.3);
                });
            }

            return { playTone, playError, playSuccess };
        })();

        // ---- Game State ----
        const COLORS = ['green', 'red', 'yellow', 'blue'];
        let sequence = [];
        let playerIndex = 0;
        let level = 0;
        let highScore = parseInt(localStorage.getItem('simon-high-score') || '0', 10);
        let isPlaying = false;
        let isShowingSequence = false;

        // DOM
        const buttons = document.querySelectorAll('.simon-btn');
        const startBtn = document.getElementById('startBtn');
        const levelDisplay = document.getElementById('levelDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const messageEl = document.getElementById('message');

        highScoreDisplay.textContent = highScore;

        // ---- UI Helpers ----
        function showMessage(text, type = '') {
            messageEl.className = 'message';
            messageEl.textContent = text;
            if (type) messageEl.classList.add(type);
            // Force reflow for transition
            void messageEl.offsetWidth;
            messageEl.classList.add('visible');
        }

        function hideMessage() {
            messageEl.classList.remove('visible');
        }

        function setButtonsEnabled(enabled) {
            buttons.forEach(btn => {
                if (enabled) btn.classList.remove('disabled');
                else btn.classList.add('disabled');
            });
        }

        function lightUp(index, duration = 300) {
            return new Promise(resolve => {
                const btn = buttons[index];
                btn.classList.add('lit');
                AudioEngine.playTone(index, duration / 1000);
                setTimeout(() => {
                    btn.classList.remove('lit');
                    setTimeout(resolve, 80); // gap between notes
                }, duration);
            });
        }

        function flashAllError() {
            return new Promise(resolve => {
                buttons.forEach(btn => btn.classList.add('error-flash'));
                AudioEngine.playError();
                setTimeout(() => {
                    buttons.forEach(btn => btn.classList.remove('error-flash'));
                    setTimeout(() => {
                        buttons.forEach(btn => btn.classList.add('error-flash'));
                        setTimeout(() => {
                            buttons.forEach(btn => btn.classList.remove('error-flash'));
                            resolve();
                        }, 250);
                    }, 150);
                }, 350);
            });
        }

        // ---- Game Logic ----
        function addToSequence() {
            sequence.push(Math.floor(Math.random() * 4));
        }

        async function playSequence() {
            isShowingSequence = true;
            setButtonsEnabled(false);
            showMessage('הקשיבו לרצף...', '');

            await new Promise(r => setTimeout(r, 500));

            const speed = Math.max(200, 400 - level * 15);

            for (let i = 0; i < sequence.length; i++) {
                await lightUp(sequence[i], speed);
            }

            isShowingSequence = false;
            setButtonsEnabled(true);
            showMessage('תורכם! חזרו על הרצף', 'success');
        }

        function startGame() {
            sequence = [];
            playerIndex = 0;
            level = 0;
            isPlaying = true;
            startBtn.disabled = true;
            startBtn.textContent = 'משחק פעיל...';
            nextRound();
        }

        function nextRound() {
            level++;
            levelDisplay.textContent = level;
            playerIndex = 0;
            addToSequence();
            playSequence();
        }

        async function handlePlayerInput(index) {
            if (!isPlaying || isShowingSequence) return;

            // Light up briefly on press
            const btn = buttons[index];
            btn.classList.add('lit');
            AudioEngine.playTone(index, 0.2);
            setTimeout(() => btn.classList.remove('lit'), 200);

            if (sequence[playerIndex] === index) {
                playerIndex++;
                if (playerIndex === sequence.length) {
                    // Round complete
                    setButtonsEnabled(false);
                    AudioEngine.playSuccess();
                    showMessage('כל הכבוד! ממשיכים...', 'success');
                    setTimeout(() => nextRound(), 1000);
                }
            } else {
                // Wrong!
                isPlaying = false;
                setButtonsEnabled(false);

                if (level - 1 > highScore) {
                    highScore = level - 1;
                    localStorage.setItem('simon-high-score', highScore);
                    highScoreDisplay.textContent = highScore;
                }

                await flashAllError();
                showMessage(`טעות! הגעתם לשלב ${level}. הניקוד: ${level - 1}`, 'error');

                startBtn.disabled = false;
                startBtn.textContent = 'שחק שוב';
            }
        }

        // ---- Event Listeners ----
        startBtn.addEventListener('click', () => {
            hideMessage();
            startGame();
        });

        buttons.forEach((btn, i) => {
            btn.addEventListener('click', () => handlePlayerInput(i));

            // Touch support - prevent double-firing
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePlayerInput(i);
            }, { passive: false });
        });

        // Keyboard support (arrows or 1-4)
        document.addEventListener('keydown', (e) => {
            const map = { '1': 0, '2': 1, '3': 2, '4': 3 };
            if (map[e.key] !== undefined) {
                handlePlayerInput(map[e.key]);
            }
        });
    </script>
</body>
</html>
