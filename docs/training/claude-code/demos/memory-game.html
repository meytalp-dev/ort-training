<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק זיכרון - בעלי חיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED;
            --primary-light: #A78BFA;
            --primary-dark: #5B21B6;
            --secondary: #14B8A6;
            --secondary-light: #5EEAD4;
            --accent: #F59E0B;
            --accent-light: #FCD34D;
            --bg: #F5F3FA;
            --card-bg: #FFFFFF;
            --text: #1E1B4B;
            --text-light: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 600px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 600;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.08);
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .stat-box:hover {
            border-color: var(--primary-light);
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.timer-icon {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
        }

        .stat-icon.moves-icon {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
        }

        .stat-icon.pairs-icon {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
        }

        .stat-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        /* Game board */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 480px;
            width: 100%;
            perspective: 1000px;
        }

        /* Card */
        .card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg);
        }

        .card.matched .card-front {
            box-shadow: 0 0 0 3px var(--accent), 0 8px 24px rgba(245, 158, 11, 0.3);
            animation: matchPulse 0.6s ease;
        }

        @keyframes matchPulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.1); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .card-face {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.3s;
        }

        .card-back {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.2);
            flex-direction: column;
            gap: 4px;
        }

        .card-back:hover {
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.35);
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }

        .card-back svg {
            width: 40px;
            height: 40px;
            fill: rgba(255, 255, 255, 0.7);
        }

        .card-front {
            background: var(--card-bg);
            transform: rotateY(180deg);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            font-size: 3rem;
            user-select: none;
        }

        /* Restart button */
        .restart-btn {
            margin-top: 28px;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Heebo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .restart-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Win overlay */
        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 27, 75, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .win-overlay.active {
            display: flex;
            opacity: 1;
        }

        .win-card {
            background: white;
            border-radius: 28px;
            padding: 40px 48px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            animation: winSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes winSlideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .win-card .trophy {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
        }

        .win-card .trophy svg {
            width: 44px;
            height: 44px;
            fill: white;
        }

        .win-card h2 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 8px;
        }

        .win-card .win-subtitle {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .win-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
        }

        .win-stat {
            background: var(--bg);
            border-radius: 16px;
            padding: 16px 20px;
            min-width: 100px;
        }

        .win-stat .ws-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
        }

        .win-stat .ws-label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .win-card .play-again-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--secondary), #0D9488);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Heebo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(20, 184, 166, 0.3);
        }

        .win-card .play-again-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(20, 184, 166, 0.4);
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 200;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                max-width: 360px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .stats-bar {
                gap: 10px;
            }

            .stat-box {
                padding: 8px 14px;
            }

            .stat-value {
                font-size: 1.1rem;
            }

            .card-front {
                font-size: 2.2rem;
            }

            .win-card {
                padding: 28px 24px;
            }

            .win-stats {
                gap: 10px;
            }

            .win-stat {
                padding: 12px 14px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>משחק זיכרון - בעלי חיים</h1>
    <p>מצאו את כל הזוגות התואמים</p>
</div>

<div class="stats-bar">
    <div class="stat-box">
        <div class="stat-icon timer-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
        </div>
        <div class="stat-info">
            <span class="stat-label">זמן</span>
            <span class="stat-value" id="timer">00:00</span>
        </div>
    </div>
    <div class="stat-box">
        <div class="stat-icon moves-icon">
            <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.18 2-3.74C16 4.46 13.54 2 10.5 2S5 4.46 5 7.5c0 1.56.79 2.93 2 3.74zm5.56 2.52c-.29-.11-.58-.18-.89-.22l-3.3-.47A1.49 1.49 0 0 0 9 14.5v.07L7.57 20H16c.55 0 1-.45 1-1v-2.5c0-1.32-.85-2.45-2.02-2.86z"/><path d="M14 20H6l1.43-5.43A1.49 1.49 0 0 1 8.86 13.5h.01l3.3.47c.31.04.6.11.89.22A3.005 3.005 0 0 1 15.08 17v2c0 .55-.45 1-1 1z" opacity=".3"/></svg>
        </div>
        <div class="stat-info">
            <span class="stat-label">מהלכים</span>
            <span class="stat-value" id="moves">0</span>
        </div>
    </div>
    <div class="stat-box">
        <div class="stat-icon pairs-icon">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div class="stat-info">
            <span class="stat-label">זוגות</span>
            <span class="stat-value" id="pairs">0 / 6</span>
        </div>
    </div>
</div>

<div class="game-board" id="game-board"></div>

<button class="restart-btn" id="restart-btn">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    התחל מחדש
</button>

<!-- Win overlay -->
<div class="win-overlay" id="win-overlay">
    <div class="win-card">
        <div class="trophy">
            <svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 0 0 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
        </div>
        <h2>כל הכבוד!</h2>
        <p class="win-subtitle">מצאתם את כל הזוגות</p>
        <div class="win-stats">
            <div class="win-stat">
                <div class="ws-value" id="win-time">00:00</div>
                <div class="ws-label">זמן</div>
            </div>
            <div class="win-stat">
                <div class="ws-value" id="win-moves">0</div>
                <div class="ws-label">מהלכים</div>
            </div>
        </div>
        <button class="play-again-btn" id="play-again-btn">שחקו שוב</button>
    </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
(function() {
    const animals = [
        { emoji: '\uD83D\uDC36', name: 'כלב' },
        { emoji: '\uD83D\uDC31', name: 'חתול' },
        { emoji: '\uD83E\uDD81', name: 'אריה' },
        { emoji: '\uD83D\uDC18', name: 'פיל' },
        { emoji: '\uD83D\uDC2C', name: 'דולפין' },
        { emoji: '\uD83E\uDD89', name: 'ינשוף' }
    ];

    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let timerInterval = null;
    let seconds = 0;
    let isLocked = false;
    let gameStarted = false;

    const board = document.getElementById('game-board');
    const timerEl = document.getElementById('timer');
    const movesEl = document.getElementById('moves');
    const pairsEl = document.getElementById('pairs');
    const winOverlay = document.getElementById('win-overlay');
    const winTime = document.getElementById('win-time');
    const winMoves = document.getElementById('win-moves');

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function formatTime(s) {
        const m = String(Math.floor(s / 60)).padStart(2, '0');
        const sec = String(s % 60).padStart(2, '0');
        return m + ':' + sec;
    }

    function startTimer() {
        if (timerInterval) return;
        gameStarted = true;
        timerInterval = setInterval(() => {
            seconds++;
            timerEl.textContent = formatTime(seconds);
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function createCard(animal, index) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.name = animal.name;

        card.innerHTML =
            '<div class="card-face card-back">' +
                '<svg viewBox="0 0 24 24"><path d="M11.07 12.85c.77-1.39 2.25-2.21 3.11-3.44.91-1.29.4-3.7-2.18-3.7-1.69 0-2.52 1.28-2.52 1.28L8 5.93S9.34 4 11.99 4c1.59 0 2.9.67 3.71 1.63.78.93 1.14 2.2.76 3.46-.48 1.58-1.86 2.46-2.84 3.52-.66.71-.88 1.39-.88 2.39h-2.02c-.01-.68.07-1.57.35-2.15zM12 18c.83 0 1.5.67 1.5 1.5S12.83 21 12 21s-1.5-.67-1.5-1.5S11.17 18 12 18z"/></svg>' +
            '</div>' +
            '<div class="card-face card-front">' +
                '<span>' + animal.emoji + '</span>' +
            '</div>';

        card.addEventListener('click', () => flipCard(card));
        return card;
    }

    function flipCard(card) {
        if (isLocked) return;
        if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
        if (flippedCards.length >= 2) return;

        if (!gameStarted) startTimer();

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            moves++;
            movesEl.textContent = moves;
            checkMatch();
        }
    }

    function checkMatch() {
        const [a, b] = flippedCards;
        const match = a.dataset.name === b.dataset.name;

        if (match) {
            a.classList.add('matched');
            b.classList.add('matched');
            matchedPairs++;
            pairsEl.textContent = matchedPairs + ' / 6';
            flippedCards = [];

            if (matchedPairs === 6) {
                stopTimer();
                setTimeout(showWin, 600);
            }
        } else {
            isLocked = true;
            setTimeout(() => {
                a.classList.remove('flipped');
                b.classList.remove('flipped');
                flippedCards = [];
                isLocked = false;
            }, 800);
        }
    }

    function showWin() {
        winTime.textContent = formatTime(seconds);
        winMoves.textContent = moves;
        winOverlay.classList.add('active');
        launchConfetti();
    }

    function initGame() {
        // Reset
        stopTimer();
        board.innerHTML = '';
        flippedCards = [];
        matchedPairs = 0;
        moves = 0;
        seconds = 0;
        isLocked = false;
        gameStarted = false;
        timerEl.textContent = '00:00';
        movesEl.textContent = '0';
        pairsEl.textContent = '0 / 6';
        winOverlay.classList.remove('active');

        // Create pairs
        const pairs = [...animals, ...animals];
        cards = shuffle(pairs);

        cards.forEach((animal, i) => {
            board.appendChild(createCard(animal, i));
        });
    }

    // Confetti
    function launchConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const colors = ['#7C3AED', '#14B8A6', '#F59E0B', '#A78BFA', '#5EEAD4', '#FCD34D', '#EC4899', '#3B82F6'];
        const pieces = [];

        for (let i = 0; i < 150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 3 + 2,
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 10,
                opacity: 1
            });
        }

        let frame = 0;
        const maxFrames = 180;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;

            pieces.forEach(p => {
                p.x += p.vx;
                p.vy += 0.05;
                p.y += p.vy;
                p.rotation += p.rotSpeed;
                if (frame > maxFrames - 40) {
                    p.opacity = Math.max(0, p.opacity - 0.025);
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });

            if (frame < maxFrames) {
                requestAnimationFrame(draw);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        draw();
    }

    // Events
    document.getElementById('restart-btn').addEventListener('click', initGame);
    document.getElementById('play-again-btn').addEventListener('click', initGame);
    window.addEventListener('resize', () => {
        const canvas = document.getElementById('confetti-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Start
    initGame();
})();
</script>
</body>
</html>
