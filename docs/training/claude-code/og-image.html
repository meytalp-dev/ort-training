<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
body::after {
  content: '';
  position: absolute;
  top: -150px; right: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(20,184,166,0.2) 0%, transparent 70%);
}
.glow-orange {
  position: absolute;
  bottom: -100px; left: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(232,120,77,0.12) 0%, transparent 70%);
}
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 80px;
}
.title {
  font-size: 52px;
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 20px;
}
.title .teal {
  background: linear-gradient(90deg, #14B8A6, #2DD4BF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 26px;
  color: #94A3B8;
  margin-bottom: 28px;
}
.price-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.price {
  font-size: 48px;
  font-weight: 900;
  color: #E8784D;
}
.price-label {
  font-size: 18px;
  color: #94A3B8;
}
.date {
  display: inline-block;
  background: rgba(20,184,166,0.15);
  border: 1px solid rgba(20,184,166,0.3);
  border-radius: 50px;
  padding: 8px 28px;
  font-size: 18px;
  color: #5EEAD4;
  font-weight: 700;
}
.learni {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 2px;
}
.accent-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #E8784D, #14B8A6, #E8784D);
}
</style>
</head>
<body>
<div class="glow-orange"></div>
<div class="content">
  <div class="title">הדרכת <span class="teal">Claude Code</span><br>למורים ואנשי חינוך</div>
  <div class="subtitle">בלי לכתוב שורת קוד אחת</div>
  <div class="price-row">
    <span class="price">99 ש״ח</span>
    <span class="price-label">| מחיר השקה</span>
  </div>
  <div class="date">מתחילים 5.4.2026</div>
</div>
<div class="learni">Learni</div>
<div class="accent-line"></div>
</body>
</html>
