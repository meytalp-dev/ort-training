<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: 'Heebo', sans-serif;
  background: #0F0F1A;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* Gradient orbs */
.orb1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: #7C3AED; filter: blur(120px); opacity: 0.35; top: -100px; right: -50px; }
.orb2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: #14B8A6; filter: blur(120px); opacity: 0.3; bottom: -80px; left: -30px; }
.orb3 { position: absolute; width: 250px; height: 250px; border-radius: 50%; background: #F59E0B; filter: blur(100px); opacity: 0.15; top: 40%; left: 35%; }

.content {
  position: relative; z-index: 1;
  text-align: center; padding: 40px;
}
h1 {
  font-size: 72px; font-weight: 900; line-height: 1.15;
  background: linear-gradient(135deg, #fff 0%, #A78BFA 50%, #14B8A6 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 24px;
}
.subtitle {
  font-size: 28px; color: #CBD5E1; font-weight: 400;
  margin-bottom: 32px; line-height: 1.6;
}
.schedule {
  display: inline-flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(20,184,166,0.25));
  border: 2px solid rgba(167,139,250,0.4);
  padding: 18px 40px; border-radius: 20px;
  font-size: 26px; font-weight: 700; color: #E2E8F0;
}
.schedule strong { color: #A78BFA; }
.badge {
  display: inline-block;
  background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4);
  padding: 8px 24px; border-radius: 50px; font-size: 20px; color: #6EE7B7;
  margin-bottom: 20px; font-weight: 600;
}
.logo-text {
  position: absolute; bottom: 28px; left: 40px;
  font-size: 18px; color: #64748B; font-weight: 500;
}
</style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="content">
    <div class="badge">הרשמה פתוחה</div>
    <h1>אתגר קלוד קוד</h1>
    <div class="subtitle">3 ימים. 3 יכולות. מציאות חדשה.</div>
    <div class="schedule">
      שלישי – חמישי 24–26/3 | <strong>10:00</strong> | שעה וחצי
    </div>
  </div>
  <div class="logo-text">לרני – כשבינה מלאכותית וחינוך נפגשים</div>
</body>
</html>
