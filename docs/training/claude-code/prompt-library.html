<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ספריית פרומפטים ל-Claude Code | Learni</title>
<meta name="description" content="ספריית פרומפטים מוכנים ל-Claude Code — העתיקו, הדביקו וקבלו תוצר מוכן. למורים, מנהלים, יזמים ושימוש כללי.">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@400;700&family=Heebo:wght@300;400;500;600;700;800;900&family=Karantina:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #FAF8F5;
  --bg-card:     #ffffff;
  --teal:        #2A9D8F;
  --teal-100:    #D4F3EF;
  --green:       #52B788;
  --green-light: #D8F3DC;
  --amber:       #E9A319;
  --amber-light: #FEF3C7;
  --rose:        #E76F7A;
  --purple:      #7E57C2;
  --purple-light:#EDE7F6;
  --claude:      #D97757;
  --claude-light:#FFF7ED;
  --white:       #ffffff;
  --text:        #2D3436;
  --text-mid:    #4A5568;
  --text-muted:  #6B7D8F;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 16px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:   0 12px 40px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
  --r:           20px;
  --r-lg:        28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 60px 24px 32px;
  max-width: 800px;
  margin: 0 auto;
}
.hero-title {
  font-family: 'Karantina', cursive;
  font-size: clamp(40px, 8vw, 64px);
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 8px;
}
.hero-title .brand-word {
  font-family: 'Playpen Sans Hebrew', cursive;
  color: var(--claude);
}
.hero-subtitle {
  font-size: clamp(15px, 3vw, 18px);
  color: var(--text-muted);
  margin-bottom: 32px;
}
.hero-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--teal);
  text-decoration: none;
  margin-bottom: 24px;
  transition: opacity .2s;
}
.hero-back:hover { opacity: .7; }

/* ===== SEARCH ===== */
.search-wrap {
  max-width: 560px;
  margin: 0 auto 24px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  border: 2px solid rgba(0,0,0,.08);
  border-radius: 16px;
  background: var(--white);
  font-family: 'Heebo', sans-serif;
  font-size: 16px;
  color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  direction: rtl;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 4px rgba(42,157,143,.12);
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 700px;
  margin: 0 auto 32px;
  padding: 0 16px;
}
.tab-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: 2px solid rgba(0,0,0,.08);
  border-radius: 40px;
  background: var(--white);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  transition: all .25s;
  white-space: nowrap;
}
.tab-btn:hover { border-color: rgba(0,0,0,.15); background: #f5f5f5; }
.tab-btn.active { color: var(--white); border-color: transparent; }
.tab-btn.active[data-cat="all"]     { background: var(--text); }
.tab-btn.active[data-cat="teachers"]{ background: var(--claude); }
.tab-btn.active[data-cat="managers"]{ background: var(--teal); }
.tab-btn.active[data-cat="entrepreneurs"]{ background: var(--purple); }
.tab-btn.active[data-cat="general"] { background: var(--green); }

.tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  border-radius: 11px;
  font-size: 12px;
  font-weight: 700;
  background: rgba(0,0,0,.08);
  color: var(--text-mid);
}
.tab-btn.active .tab-count {
  background: rgba(255,255,255,.3);
  color: var(--white);
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(10px);
  border-radius: var(--r);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,.04);
  transition: transform .25s, box-shadow .25s;
  display: flex;
  flex-direction: column;
  position: relative;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.card-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.card-icon.teachers  { background: var(--claude-light); color: var(--claude); }
.card-icon.managers  { background: var(--teal-100); color: var(--teal); }
.card-icon.entrepreneurs { background: var(--purple-light); color: var(--purple); }
.card-icon.general   { background: var(--green-light); color: var(--green); }

.card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.card-cat {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-right: auto;
  white-space: nowrap;
}
.card-cat.teachers  { background: var(--claude-light); color: var(--claude); }
.card-cat.managers  { background: var(--teal-100); color: var(--teal); }
.card-cat.entrepreneurs { background: var(--purple-light); color: var(--purple); }
.card-cat.general   { background: var(--green-light); color: var(--green); }

.card-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
  line-height: 1.5;
}

.card-prompt {
  background: rgba(0,0,0,.03);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.7;
  direction: rtl;
  flex: 1;
  position: relative;
  cursor: pointer;
  transition: background .2s;
  overflow: hidden;
}
.card-prompt:hover { background: rgba(0,0,0,.06); }

.card-prompt.collapsed {
  max-height: 85px;
}
.card-prompt.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 36px;
  background: linear-gradient(transparent, rgba(250,248,245,.95));
  pointer-events: none;
}

.card-expand {
  display: none;
  font-size: 12px;
  color: var(--teal);
  font-weight: 600;
  text-align: center;
  padding: 6px;
  cursor: pointer;
  margin-top: 4px;
}
.card-expand.visible { display: block; }

.copy-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--white);
  border: 1px solid rgba(0,0,0,.08);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .2s;
  z-index: 2;
}
.copy-btn:hover {
  background: var(--teal-100);
  border-color: var(--teal);
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  grid-column: 1 / -1;
}
.empty-state svg { margin-bottom: 16px; color: var(--text-muted); }
.empty-state p { font-size: 16px; color: var(--text-muted); }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: var(--white);
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 10000;
  transition: transform .3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 32px 24px 48px;
  color: var(--text-muted);
  font-size: 13px;
}
.footer a {
  color: var(--teal);
  text-decoration: none;
  font-weight: 600;
}
.footer a:hover { text-decoration: underline; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero { padding: 40px 16px 24px; }
  .grid { grid-template-columns: 1fr; padding: 0 16px 40px; }
  .tabs { gap: 6px; }
  .tab-btn { padding: 8px 14px; font-size: 13px; }
}
</style>
</head>

    prompt: 'תבנה מחולל QR Code HTML. כולל: שדה הזנת טקסט/URL, יצירת QR בזמן אמת, בחירת צבע (רקע + קוד), בחירת גודל, כפתור הורדה כ-PNG, תצוגה מקדימה. השתמש בספריית qrcode.js (CDN). עיצוב מודרני, נקי, מותאם למובייל, עברית RTL.'

  {

    desc: 'טיימר 25/5 דקות עם אנימציה וסטטיסטיקות',
    prompt: 'תבנה טיימר פומודורו HTML. כולל: טיימר עגול עם אנימציית התקדמות (SVG circle), 25 דק\' עבודה / 5 דק\' הפסקה, צליל התראה, מונה סשנים, סטטיסטיקות יומיות (שמירה ב-localStorage), מצב מסך מלא. עיצוב מינימליסטי, צבעי טורקיז וירוק, עברית RTL.'
  },
  {
    id: 27, cat: 'general', catLabel: 'כללי',
    title: 'מחולל סיסמאות',
    desc: 'יצירת סיסמה חזקה עם מד חוזק והעתקה',
    prompt: 'תבנה מחולל סיסמאות HTML. כולל: סליידר לאורך (8–32 תווים), toggle-ים (אותיות גדולות, מספרים, סימנים מיוחדים), יצירה בלחיצה, מד חוזק ויזואלי (חלשה/בינונית/חזקה עם צבעים), כפתור העתקה, היסטוריית 5 אחרונות. עיצוב מודרני, עברית RTL.'
  },
  {
    id: 28, cat: 'general', catLabel: 'כללי',
    title: 'מעצב קורות חיים',
    desc: 'בונה CV עם תצוגה מקדימה והורדה',
    prompt: 'תבנה מעצב קורות חיים HTML. כולל: טופס מובנה (פרטים אישיים, ניסיון, השכלה, כישורים), תצוגה מקדימה בזמן אמת בעמוד A4, 3 תבניות עיצוב לבחירה, כפתור הדפסה/PDF (@media print). עיצוב מקצועי, עברית RTL, גופן Heebo.'
  },
  {
    id: 29, cat: 'general', catLabel: 'כללי',
    title: 'עורך Markdown',
    desc: 'עורך split-pane עם תצוגה מקדימה בזמן אמת',
    prompt: 'תבנה עורך Markdown HTML עם תצוגה מפוצלת. כולל: חלונית עריכה (שמאל) וחלונית תצוגה מקדימה (ימין), סרגל כלים (כותרות, bold, italic, רשימה, קישור, תמונה, קוד), המרה בזמן אמת, כפתור העתקת HTML, כפתור הורדה. השתמש ב-marked.js (CDN). עיצוב מודרני, עברית RTL.'
  }
];

// ===== STATE =====
let activeCategory = 'all';
let searchQuery = '';

// ===== RENDER =====
function renderPrompts() {
  const grid = document.getElementById('grid');
  let filtered = prompts;

  if (activeCategory !== 'all') {
    filtered = filtered.filter(p => p.cat === activeCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.title.includes(q) || p.prompt.includes(q) || p.desc.includes(q) || p.catLabel.includes(q)
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <p>לא נמצאו פרומפטים תואמים</p>
      </div>`;
    updateCounts(filtered);
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card" data-cat="${p.cat}">
      <div class="card-header">
        <div class="card-icon ${p.cat}">
          ${getCatIcon(p.cat)}
        </div>
        <span class="card-title">${p.title}</span>
        <span class="card-cat ${p.cat}">${p.catLabel}</span>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-prompt collapsed" onclick="toggleExpand(this)" id="prompt-${p.id}">
        <div class="copy-btn" onclick="event.stopPropagation(); copyText('${p.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </div>
        ${p.prompt}
      </div>
      <div class="card-expand" onclick="toggleExpand(document.getElementById('prompt-${p.id}'))">
        הצג עוד
      </div>
    </div>
  `).join('');

  // Check which prompts need expand button
  requestAnimationFrame(() => {
    document.querySelectorAll('.card-prompt.collapsed').forEach(el => {
      if (el.scrollHeight > 90) {
        el.nextElementSibling.classList.add('visible');
      }
    });
  });

  updateCounts(filtered);
}

function updateCounts(filtered) {
  const all = searchQuery
    ? prompts.filter(p => {
        const q = searchQuery.toLowerCase();
        return p.title.includes(q) || p.prompt.includes(q) || p.desc.includes(q) || p.catLabel.includes(q);
      })
    : prompts;

  document.getElementById('count-all').textContent = all.length;
  ['teachers','managers','entrepreneurs','general'].forEach(cat => {
    document.getElementById('count-' + cat).textContent = all.filter(p => p.cat === cat).length;
  });
}

function getCatIcon(cat) {
  const icons = {
    teachers: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 3 3 6 3s6-1 6-3v-5"/></svg>',
    managers: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    entrepreneurs: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>',
    general: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
  };
  return icons[cat] || '';
}

// ===== ACTIONS =====
function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  renderPrompts();
}

function filterPrompts() {
  searchQuery = document.querySelector('.search-input').value.trim();
  renderPrompts();
}

function toggleExpand(el) {
  if (!el.classList.contains('card-prompt')) return;
  el.classList.toggle('collapsed');
  const expandBtn = el.nextElementSibling;
  if (expandBtn) {
    expandBtn.textContent = el.classList.contains('collapsed') ? 'הצג עוד' : 'הצג פחות';
  }
}

function copyText(id) {
  const p = prompts.find(x => x.id === parseInt(id));
  if (!p) return;
  navigator.clipboard.writeText(p.prompt).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = p.prompt;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

// ===== INIT =====
renderPrompts();
</script>
</body>
</html>
